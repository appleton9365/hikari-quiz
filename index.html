<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">

<title>光回線クイズ｜第三営業部 新人研修 v32</title>
<style>
:root{--bg:#0a0e1a;--surface:#111827;--surface2:#1c2538;--border:#2a3550;--accent:#3b82f6;--accent2:#60a5fa;--correct:#22c55e;--wrong:#ef4444;--gold:#f59e0b;--text:#e2e8f0;--muted:#94a3b8;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background-color:#0a0e1a;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
body{font-family:'Yu Gothic','YuGothic','Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;-webkit-text-size-adjust:100%;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(16px,env(safe-area-inset-bottom))}
#app{width:100%;max-width:700px}
#screen-title{text-align:center;padding:40px 20px}
.logo-badge{display:inline-block;background:linear-gradient(135deg,#1e3a5f,#2563eb);border:1px solid var(--accent);border-radius:999px;padding:6px 18px;font-size:11px;letter-spacing:.1em;color:var(--accent2);text-transform:uppercase;margin-bottom:20px}
.title-main{font-size:clamp(26px,6vw,40px);font-weight:800;line-height:1.18;letter-spacing:.02em;margin-bottom:10px;background:linear-gradient(135deg,#7dd3fc,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:0 2px 28px rgba(59,130,246,.22)}
.title-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.8}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.mode-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;line-height:1.4}
.mode-btn:hover,.mode-btn:active{border-color:var(--accent);background:#1a2744}
.mode-btn.full{grid-column:1/-1;background:linear-gradient(135deg,#2563eb,#7c3aed);border-color:transparent;color:white;font-size:15px;padding:16px}
.mode-btn .mode-label{font-size:10px;color:var(--muted);display:block;margin-top:2px;font-weight:400}
.mode-btn.full .mode-label{color:rgba(255,255,255,.7)}
.mode-btn.full-ghost{grid-column:1/-1;background:var(--surface2);border:1.5px solid #991b1b;color:#f87171;font-size:15px;padding:16px}
.mode-btn.full-ghost:hover,.mode-btn.full-ghost:active{background:#3a1e1e;border-color:#ef4444}
.mode-btn.full-ghost .mode-label{color:#f8717199;display:block;margin-top:2px;font-weight:400}
#screen-quiz{padding:8px 0}
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 4px}
.set-badge{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:700;letter-spacing:.05em}
.set-badge.s1{background:#1e3a2e;color:#4ade80;border:1px solid #166534}
.set-badge.s2{background:#1e3048;color:#60a5fa;border:1px solid #1e40af}
.set-badge.s3{background:#2d2048;color:#c084fc;border:1px solid #6b21a8}
.set-badge.s4{background:#3a1e2a;color:#f472b6;border:1px solid #9d174d}
.set-badge.s5{background:#3a1e1e;color:#f87171;border:1px solid #991b1b;animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{box-shadow:0 0 4px #ef444466}to{box-shadow:0 0 14px #ef4444bb}}
.score-display{font-size:13px;color:var(--muted)}.score-display span{color:var(--accent2);font-weight:700}
.header-left{display:flex;align-items:center;gap:8px}
.btn-top{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:700;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.btn-top:hover,.btn-top:active{border-color:var(--accent);color:var(--accent2)}
.progress-bar{height:4px;background:var(--surface2);border-radius:999px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#2563eb,#7c3aed);border-radius:999px;transition:width .4s ease}
.question-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-num{font-size:11px;color:var(--muted)}
.diff-stars{font-size:12px;letter-spacing:-1px}
.cat-tag{font-size:10px;padding:2px 8px;background:var(--surface2);border-radius:999px;color:var(--muted);border:1px solid var(--border)}
.q-text{font-size:15px;line-height:1.7;font-weight:500}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 14px 13px 42px;color:var(--text);font-size:14px;line-height:1.5;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;position:relative;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;width:100%;display:block}
.choice-btn::before{content:attr(data-label);position:absolute;left:11px;top:50%;transform:translateY(-50%);width:22px;height:22px;background:var(--border);border-radius:50%;font-size:10px;font-weight:700;color:var(--muted);line-height:22px;text-align:center;pointer-events:none}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:#1a2744}
.choice-btn:active:not(:disabled){background:#1a2744;border-color:var(--accent)}
.choice-btn.correct{border-color:var(--correct);background:#0f2d1a;color:#4ade80}
.choice-btn.correct::before{background:var(--correct);color:white}
.choice-btn.wrong{border-color:var(--wrong);background:#2d0f0f;color:#f87171}
.choice-btn.wrong::before{background:var(--wrong);color:white}
.choice-btn.show-correct{border-color:var(--correct);background:#0f2d1a;color:#4ade80}
.choice-btn:disabled{cursor:default}
.feedback{background:var(--surface2);border-radius:var(--radius);padding:14px;margin-top:4px;display:none;animation:fadeIn .2s ease}
.feedback.show{display:block}
.feedback-header{font-size:14px;font-weight:700;margin-bottom:6px}
.feedback-header.ok{color:var(--correct)}.feedback-header.ng{color:var(--wrong)}
.feedback-exp{font-size:13px;line-height:1.7;color:#cbd5e1}
.quiz-nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;align-items:center}
.btn-back,.btn-skip,.btn-next{padding:12px 8px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s,color .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;text-align:center;display:block}
.btn-back:hover,.btn-skip:hover,.btn-next:hover{border-color:var(--accent);color:var(--accent2)}
.btn-back:active,.btn-skip:active,.btn-next:active{border-color:var(--accent);color:var(--accent2)}
.btn-next{display:none!important}.btn-next.show{display:block!important;grid-column:3;grid-row:1}
#screen-cooldown{text-align:center;padding:48px 24px}
.cooldown-emoji{font-size:56px;margin-bottom:16px}
.cooldown-msg{font-size:18px;font-weight:700;margin-bottom:12px;line-height:1.6}
.cooldown-sub{font-size:13px;color:var(--muted);margin-bottom:32px;line-height:1.8}
#screen-setend{text-align:center;padding:40px 24px}
.setend-emoji{font-size:48px;margin-bottom:16px}
.set-score-bar{background:var(--surface2);border-radius:var(--radius);padding:16px;margin-bottom:20px;border:1px solid var(--border)}
.set-score-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.set-score-num{font-size:36px;font-weight:900;color:var(--gold)}
.set-score-denom{font-size:18px;color:var(--muted)}
.setend-msg{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.5;color:var(--accent2)}
.setend-detail{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.8}
#screen-finale{text-align:center;padding:40px 24px}
.finale-emoji{font-size:56px;margin-bottom:16px}
.finale-title{font-size:clamp(18px,4vw,24px);font-weight:900;margin-bottom:8px;line-height:1.4}
.finale-grade{display:inline-block;padding:6px 18px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:16px}
.finale-score-big{font-size:72px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
.finale-score-label{font-size:14px;color:var(--muted);margin-bottom:20px}
.finale-comment{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;font-size:14px;line-height:1.8;margin-bottom:24px;text-align:left;color:#cbd5e1}
.finale-comment .accent{font-weight:700;color:var(--accent2)}
#screen-review{padding:8px 0}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding:0 4px}
.review-title{font-size:16px;font-weight:700;color:var(--accent2)}
.review-stats{font-size:13px;color:var(--muted)}
.review-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
.review-item.correct-item{border-color:#166534}
.review-item.wrong-item{border-color:#991b1b}
.review-q-num{font-size:11px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.review-badge{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:700}
.review-badge.ok{background:#0f2d1a;color:#4ade80;border:1px solid #166534}
.review-badge.ng{background:#2d0f0f;color:#f87171;border:1px solid #991b1b}
.review-q-text{font-size:14px;font-weight:500;margin-bottom:10px;line-height:1.6}
.review-choices{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.review-choice{font-size:12px;padding:6px 10px;border-radius:8px;line-height:1.4}
.review-choice.correct{background:#0f2d1a;color:#4ade80}
.review-choice.wrong{background:#2d0f0f;color:#f87171;text-decoration:line-through;opacity:.7}
.review-choice.missed{background:#0f2d1a;color:#4ade80;border:1px dashed #166534}
.review-exp{font-size:12px;line-height:1.6;color:#94a3b8;padding:8px;background:var(--surface2);border-radius:8px}
.btn-primary{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;border-radius:var(--radius);color:white;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.05em;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.btn-primary:hover{opacity:.9}.btn-primary:active{transform:scale(.98);opacity:.85}
.btn-secondary{display:block;width:100%;padding:13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--muted);font-size:14px;cursor:pointer;transition:border-color .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;margin-bottom:10px}
.btn-secondary:hover,.btn-secondary:active{border-color:var(--accent);color:var(--accent2)}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
.effect-video{display:none;position:fixed;top:0;left:0;right:0;bottom:0;width:100vw;height:100vh;height:100dvh;height:100lvh;object-fit:cover;pointer-events:none;mix-blend-mode:screen;background-color:transparent;transform:translate3d(0,0,0);-webkit-transform:translate3d(0,0,0)}
.effect-video.active{display:block}
#vid-confetti{z-index:10}
#vid-rain{z-index:10}
#vid-fire{z-index:0}
#screen-title,#screen-quiz,#screen-cooldown,#screen-setend,#screen-finale,#screen-review{position:relative;z-index:1}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
body.shaking{animation:shake 0.5s ease}
#streak-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);z-index:20;background:linear-gradient(135deg,#1a0a00,#3d1500);border:2px solid #f97316;border-radius:20px;padding:20px 36px;text-align:center;pointer-events:none;transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);min-width:200px;max-width:85vw;box-shadow:0 0 40px rgba(249,115,22,0.4)}
#streak-popup.show{display:block;transform:translate(-50%,-50%) scale(1)}
#streak-fires{font-size:28px;line-height:1;white-space:nowrap;letter-spacing:2px}
#streak-text{font-size:clamp(18px,5vw,26px);font-weight:900;color:#f97316;white-space:nowrap;margin-top:4px;text-shadow:0 0 20px rgba(249,115,22,0.8)}
#streak-combo{font-size:11px;font-weight:700;color:#fb923c;letter-spacing:.2em;white-space:nowrap;margin-top:4px;opacity:.8}
#bgnet{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0;transition:opacity .5s ease}#app{position:relative;z-index:1}.title-ver{display:inline-block;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:11px;letter-spacing:.18em;color:var(--accent2);border:1px solid var(--border);border-radius:6px;padding:2px 9px;margin-bottom:22px;opacity:.85}</style>
</head>

<div id="pw-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#1e293b;padding:40px;border-radius:16px;text-align:center;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div style="font-size:32px;margin-bottom:12px;">📡</div>
    <div style="color:#e2e8f0;font-size:18px;font-weight:700;margin-bottom:6px;">光回線知識研修クイズ</div>
    <div style="color:#94a3b8;font-size:13px;margin-bottom:24px;">パスワードを入力してください</div>
    <input id="pw-input" type="password" placeholder="パスワード" style="width:100%;padding:12px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:15px;box-sizing:border-box;outline:none;margin-bottom:12px;" onkeydown="if(event.key==='Enter')checkPw()">
    <div id="pw-error" style="color:#f87171;font-size:13px;height:18px;margin-bottom:8px;"></div>
    <button onclick="checkPw()" style="width:100%;padding:12px;border-radius:8px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;">入室する</button>
  </div>
</div>
<script>
async function checkPw(){
  const val = document.getElementById('pw-input').value;
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
  const hex = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  if(hex === 'bf9275cbae8cb9c3f1f4d2a4a41f46997f3760a727932d9095aeb8da412ed858'){
    document.getElementById('pw-screen').style.display='none';
  } else {
    document.getElementById('pw-error').textContent='パスワードが違います';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pw-input').focus();
});
</script>

<script>
const QB = [{"id":"A001","cat":"A","diff":1,"q":"光回線サービス「andline光SE」を提供しているのはどの会社か？","choices":["NTT東日本","NTTドコモビジネス","KDDI","株式会社アイキューブ・マーケティング"],"ans":3,"exp":"andline光SEは株式会社アイキューブ・マーケティングが提供する光コラボレーションサービス。NTT東西から回線の卸提供を受けて、回線とプロバイダをセットで提供している。"},{"id":"A002","cat":"A","diff":1,"q":"光コラボレーション（光コラボ）の仕組みとして正しいのはどれか？","choices":["各事業者が独自に光ファイバー網を敷設してサービスを提供するモデル","NTT東西のダークファイバーを借りて独自設備でサービスを提供するモデル","各事業者がNTT東西から回線を卸受けし、回線とプロバイダをセットでユーザーに提供するモデル","NTT東西がエンドユーザーに直接インターネット接続を提供するモデル"],"ans":2,"exp":"光コラボはNTT東西が事業者に回線を卸売りし、事業者が回線＋プロバイダをセットにしてユーザーに一括提供するモデル。窓口が1本化されるのが特徴。"},{"id":"A003","cat":"A","diff":1,"q":"光回線サービスの3要素として正しい組み合わせはどれか？","choices":["宅内機器（ONU等）・アクセスライン（回線）・プロバイダ（接続）","電柱・光ファイバー・インターネット（設備系3要素の組み合わせ）","ONU・ルーター・スマートフォン（端末系3要素の組み合わせ）","ひかり電話・光テレビ・インターネット（サービス3要素の組み合わせ）"],"ans":0,"exp":"光回線サービスは「宅内機器（ONU等）」「アクセスライン（回線）」「プロバイダ（接続）」の3要素で構成される。光コラボはこれを一括提供するモデル。"},{"id":"A004","cat":"A","diff":1,"q":"NTT法（日本電信電話株式会社等に関する法律）によりNTT東西に課されている義務として正しいのはどれか？","choices":["全国一律料金でのサービス提供義務（NTT直販限定）","他社への設備貸出義務（回線の卸売り義務）","年間1兆円以上の設備投資義務（投資額の規定）","光回線の無償提供義務（収益性度外視の義務）"],"ans":1,"exp":"NTT法により、NTT東西には他社への設備貸出義務が課されている。これが光コラボ成立の法的根拠。元国営として全国を網羅するインフラを持つため、光コラボ事業者は全国展開が可能。"},{"id":"A005","cat":"A","diff":2,"q":"アクセスライン（ラストワンマイル）の分類として正しいものはどれか？","choices":["NTT系・電力系・CATV系の3種類に分類される","光コラボ系・独自回線系・CATV系の3種類に分類される","NTT系・ソフトバンク系・au系の3種類に分類される","フレッツ系・ダークファイバー系・無線系の3種類に分類される"],"ans":0,"exp":"アクセスラインは「NTT系」「電力系」「CATV系」の3種類が基本分類。「ソフトバンク系」「au系」といった通信キャリア名での分類はしない。auひかりやNURO光はNTTのダークファイバーを使う独自回線として扱う。"},{"id":"A006","cat":"A","diff":2,"q":"auひかり・NURO光などが使う「ダークファイバー」とは何か？","choices":["NTT東西が敷設した光ファイバーのうち、使われていない予備の芯線","各事業者が独自に敷設した未開通の光ファイバー（規定上の運用と判断する取扱）","CATVが持つ同軸ケーブルの予備回線（規定上の運用と判断する取り扱い）","電力会社の電柱に設置された専用光ファイバー（規定上の運用と判断する取扱）"],"ans":0,"exp":"ダークファイバーはNTT東西が敷設した光ファイバーのうち、現在使われていない予備の芯線。auひかりやNURO光はこれを借り受け、通信局舎内に独自のネットワーク設備を構築して提供する。"},{"id":"A007","cat":"A","diff":3,"q":"PPPoE方式が夜間に速度低下を起こす主な原因はどれか？","choices":["IPv4アドレスが枯渇してプロバイダ側の処理が追いつかないため","ユーザーのルーターが夜間モードに切り替わり速度を自動制限するため","光ファイバーが夜間の気温低下で収縮し信号減衰が起きるため","NTT網とプロバイダをつなぐ「網終端装置（NTE）」がボトルネックになるため"],"ans":3,"exp":"PPPoE方式ではNTT網とプロバイダをつなぐ「網終端装置（NTE）」を必ず経由する。夜間の利用集中でこの装置がボトルネックとなり速度低下が発生する。IPoEはこの装置を迂回するため速い。"},{"id":"A008","cat":"A","diff":2,"q":"IPoE（IPv6 IPoE）方式の特徴として正しいのはどれか？","choices":["IDとパスワードで認証し、網終端装置を経由してインターネットに接続する","網終端装置を迂回してインターネットに直結し、混雑を回避できる","IPv4専用の接続方式でIPv6には対応していない","光コラボでのみ使用でき、フレッツ光では使えない"],"ans":1,"exp":"IPoE（IPv6 IPoE）はVNE事業者が提供する接続方式で、混雑の原因となる網終端装置を迂回してインターネットに直結できる。andline光SEなど多くの光コラボで標準提供されている。"},{"id":"A009","cat":"A","diff":3,"q":"「IPv4 over IPv6（IPv6サービス）」技術が必要な理由として正しいのはどれか？","choices":["IPv6だけでは通信速度が遅いため、IPv4を併用して速度を補う必要があるから","IPv4アドレスはIPv6より暗号化強度が高くセキュリティ上優先されるから","光コラボ事業者がIPv6ネットワークへの接続設備を持っていないから","IPoE方式は本来IPv6通信にしか対応せず、IPv4専用のWebサイトにアクセスできないから"],"ans":3,"exp":"IPoEはIPv6の通信路を使うが、世の中にはまだIPv4専用のWebサイトも多い。IPv4のデータをIPv6のカプセルに包んでIPoEルートを通す「IPv4 over IPv6（IPv6サービス）」技術により、両方のサイトに高速でアクセスできる。"},{"id":"A010","cat":"A","diff":3,"q":"VNE（Virtual Network Enabler）事業者の役割として正しいのはどれか？","choices":["NTT東西に代わってフレッツ光の工事・開通手続きを代行する事業者","光コラボ事業者から委託を受けてエンドユーザーに回線を直接転売する事業者","スマートフォンキャリアとセット割の条件交渉・契約締結を行う事業者","IPoE方式のIPv6接続基盤をISP（プロバイダ）に卸提供する事業者"],"ans":3,"exp":"VNE事業者はNTT東西のNGN網に接続し、IPoE方式のIPv6+IPv4 over IPv6（IPv6サービス）接続基盤をISP（プロバイダ）に卸提供する。代表的なVNEはJPIX（v6プラス）、インターネットマルチフィード（transix）、アルテリア・ネットワークス（クロスパス）など。"},{"id":"A011","cat":"A","diff":3,"q":"「v6オプション」とは何か？","choices":["プロバイダが提供するIPv6オプションサービスの月額料金（規定上の運用と判断）","NTT東西のNGN設備内でIPv6（IPoE）接続を管理する機能","ルーターをIPv6対応に切り替えるためのファームウェア（規定の運用）","光コラボ事業者を変更するための承諾番号（規定上の運用と判断する）"],"ans":1,"exp":"v6オプションはNTTのNGN設備内でIPv6（IPoE）接続を紐付ける機能。事業者変更時に「旧事業者のv6オプション廃止」が完了しないと「新事業者のv6オプション新設」ができず、乗り換え直後にネット不通になるトラブルが多発する。"},{"id":"A012","cat":"A","diff":4,"q":"NURO光の工事が「原則2回」になる理由として正しいのはどれか？","choices":["ダークファイバーを使うため宅内工事と屋外工事で施工会社が異なるから","NURO光は光ファイバーが2本必要な独自規格を採用しているから","NTT東西の設備審査と竣工検査がそれぞれ別日に義務付けられているから","宅内配線と屋外配線で使用するケーブル規格が異なるため別工事になるから"],"ans":0,"exp":"NURO光はNTTのダークファイバーを使う独自回線。宅内工事はNURO側業者が、屋外工事（壁面に光キャビネット設置等）はNTT側業者が担当するため2回の立ち会いが必要になる。なお戸建て向け新プラン「NURO光1」は1回工事に改善。"},{"id":"A013","cat":"A","diff":4,"q":"auひかりをandline光SEに乗り換える場合の工事について正しいのはどれか？","choices":["auひかりはNTTの回線を使っていないため新設工事（派遣工事）が必要","auひかりはNTT回線を使っているため転用承諾番号で手続きができる","auひかりは光コラボ扱いのため事業者変更承諾番号で乗り換えられる","auひかりはKDDI管轄だが設備はNTT共用のため無派遣工事で対応可能"],"ans":0,"exp":"auひかりはNTTのダークファイバー（または独自網）を使う独自回線。フレッツ系とはアクセスラインが全く異なるため、andline光SEへの乗り換えには新設工事（派遣工事）が必要。転用・事業者変更手続きは使えない。"},{"id":"A014","cat":"A","diff":2,"q":"電力系光回線の特徴として正しいのはどれか？","choices":["各地域の電力会社グループが独自インフラで提供する地域限定の光回線","全国どこでも同一料金で使えるNTT系のサービス","太陽光発電の余剰電力を活用した光回線サービス","NTT東西のフレッツ光回線を卸受けして提供する光コラボサービス"],"ans":0,"exp":"電力系光回線は各地域の電力会社グループが独自インフラで提供する。NTTのフレッツ網の混雑影響を受けにくいが、提供エリアが各電力会社の供給エリアに限定される。代表：eo光（関西）、コミュファ光（東海）、ビビック光（九州）等。"},{"id":"A015","cat":"A","diff":3,"q":"CATV系インターネット（従来型プラン）の接続方式として正しいのはどれか？","choices":["局舎から宅内付近まで光ファイバー、宅内への最終区間は同軸ケーブルを使うHFC構成","NTTのフレッツ光回線をCATV事業者が卸受けしてユーザーに再提供する光コラボ形態","衛星通信で幹線を中継し宅内への最終区間だけ光ファイバーを使うハイブリッド構成","電柱から宅内まで光ファイバーを一本で引き込むFTTH方式の純粋な光回線構成"],"ans":0,"exp":"従来型CATVインターネットは、局舎から宅内付近まで光ファイバー、最終区間は同軸ケーブルを使うHFC（Hybrid Fiber-Coaxial）構成。最近はJ:COMも光回線プランを展開している。"},{"id":"B001","cat":"B","diff":1,"q":"「ドコモ光」は次のどれに分類されるか？","choices":["光コラボ","独自回線（CATV系）","独自回線（ダークファイバー系）","独自回線（電力系）"],"ans":0,"exp":"ドコモ光はNTT東西のフレッツ光を卸受けして提供する光コラボ。andline光SEと同じ分類。"},{"id":"B002","cat":"B","diff":1,"q":"「SoftBank光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（電力系）","独自回線（CATV系）","光コラボ"],"ans":3,"exp":"SoftBank光はNTTフレッツ光を卸受けして提供する光コラボ。IPv4 over IPv6（IPv6サービス）はBBIXの「IPv6高速ハイブリッド」を使用（光BBユニット専用）。"},{"id":"B003","cat":"B","diff":1,"q":"「NURO光」は次のどれに分類されるか？","choices":["独自回線（CATV系）","光コラボ","独自回線（ダークファイバー系）","独自回線（電力系）"],"ans":2,"exp":"NURO光はソニーネットワークコミュニケーションズが提供する独自回線。NTTのダークファイバーを借り受けて独自設備で提供。標準で下り最大2Gbps。"},{"id":"B004","cat":"B","diff":1,"q":"「auひかり」は次のどれに分類されるか？","choices":["光コラボ","独自回線（電力系）","独自回線（CATV系）","独自回線（ダークファイバー系）"],"ans":3,"exp":"auひかりはKDDIが提供する独自回線。関東では旧東京電力系の独自網、その他エリアではNTTのダークファイバーを使う。フレッツ網を使わないため混雑の影響を受けにくい。"},{"id":"B005","cat":"B","diff":1,"q":"「楽天ひかり」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（CATV系）","独自回線（電力系）","光コラボ"],"ans":3,"exp":"楽天ひかりはNTTフレッツ光を卸受けして提供する光コラボ。IPv4 over IPv6（IPv6サービス）はアルテリア・ネットワークスの「クロスパス（Xpass）」を採用。"},{"id":"B006","cat":"B","diff":1,"q":"「eo光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","光コラボ","独自回線（電力系）","独自回線（CATV系）"],"ans":2,"exp":"eo光は関西電力グループのオプテージが提供する独自回線（電力系）。提供エリアは関西限定。"},{"id":"B007","cat":"B","diff":1,"q":"「コミュファ光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（CATV系）","独自回線（電力系）","光コラボ"],"ans":2,"exp":"コミュファ光は中部電力グループの中部テレコミュニケーションが提供する独自回線（電力系）。提供エリアは主に東海・長野。"},{"id":"B008","cat":"B","diff":1,"q":"「J:COM NET」は次のどれに分類されるか？","choices":["独自回線（CATV系）","独自回線（電力系）","独自回線（ダークファイバー系）","光コラボ"],"ans":0,"exp":"J:COM NETはJCOM株式会社が提供するCATV系のインターネットサービス。全国15都府県に展開する国内最大級のCATV事業者。"},{"id":"B009","cat":"B","diff":2,"q":"「ビビック光（BBIQ）」は次のどれに分類されるか？","choices":["光コラボ","独自回線（ダークファイバー系）","独自回線（CATV系）","独自回線（電力系）"],"ans":3,"exp":"ビビック光（BBIQ）は九州電力グループのQTnetが提供する独自回線（電力系）。提供エリアは九州限定。"},{"id":"B010","cat":"B","diff":2,"q":"「メガエッグ（Mega・Egg）」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（CATV系）","光コラボ","独自回線（ダークファイバー系）"],"ans":0,"exp":"メガエッグは中国電力グループのエネコムが提供する独自回線（電力系）。提供エリアは中国地方限定。"},{"id":"B011","cat":"B","diff":2,"q":"「ピカラ光」は次のどれに分類されるか？","choices":["独自回線（CATV系）","光コラボ","独自回線（ダークファイバー系）","独自回線（電力系）"],"ans":3,"exp":"ピカラ光は四国電力グループのSTNetが提供する独自回線（電力系）。提供エリアは四国限定。"},{"id":"B012","cat":"B","diff":2,"q":"「イッツコム」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（ダークファイバー系）","独自回線（CATV系）","光コラボ"],"ans":2,"exp":"イッツコムはイッツ・コミュニケーションズ株式会社（東急グループ）が提供するCATV系サービス。東京・神奈川の東急線沿線エリア限定。"},{"id":"B013","cat":"B","diff":2,"q":"「BIGLOBE光」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（CATV系）","独自回線（ダークファイバー系）","光コラボ"],"ans":3,"exp":"BIGLOBE光はNTTフレッツ光を卸受けして提供する光コラボ。IPv4 over IPv6（IPv6サービス）はJPIXのv6プラス（MAP-E）互換サービスを採用。"},{"id":"B014","cat":"B","diff":2,"q":"「ahamo光」は次のどれに分類されるか？","choices":["MVNOのモバイル回線","独自回線（電力系）","光コラボ","独自回線（ダークファイバー系）"],"ans":2,"exp":"ahamo光はNTTドコモが提供する光コラボ。NTTフレッツ光回線を使用するが、PPPoE接続を提供せずIPoE（IPv4 over IPv6（IPv6サービス））のみの提供となっている。"},{"id":"B015","cat":"B","diff":2,"q":"「GMOとくとくBB光」は次のどれに分類されるか？","choices":["独自回線（CATV系）","独自回線（ダークファイバー系）","光コラボ","独自回線（電力系）"],"ans":2,"exp":"GMOとくとくBB光はNTTフレッツ光を卸受けして提供する光コラボ。IPv4 over IPv6（IPv6サービス）はJPIXのv6プラス（MAP-E）を採用。"},{"id":"B016","cat":"B","diff":3,"q":"電力系光回線（eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光）に共通する特徴として正しいのはどれか？","choices":["全国どこの住所でも同一の月額料金で均一なサービスが受けられること","申し込みから最短即日で工事不要のセルフ開通ができること","フレッツ光回線の混雑影響を受けない独自インフラで、提供エリアが地域限定であること","NTT東西から回線を卸受けして提供する光コラボサービスであること"],"ans":2,"exp":"電力系光回線はすべて各地域の電力会社グループが独自インフラで提供する。NTTのフレッツ網を使わないため混雑の影響を受けにくいが、提供エリアが各電力会社の供給エリアに限定される。"},{"id":"B017","cat":"B","diff":3,"q":"andline光SEからeo光へ乗り換える場合について正しいのはどれか？","choices":["eo光は独自回線なのでアクセスラインが異なり、新設工事（派遣工事）が必要","転用手続きで工事費が安くなる（eo光のNTT回線連携キャンペーン適用）","andline光SEとeo光は同じNTT回線を使うため乗り換え不可（重複契約となる）","事業者変更承諾番号を取得して工事不要で乗り換えできる（光コラボ間の標準手順）"],"ans":0,"exp":"eo光は電力系の独自回線。andline光SEとはアクセスラインが根本的に異なるため、乗り換えには新設工事（派遣工事）が必要。転用・事業者変更は光コラボ間のみ可能。"},{"id":"B018","cat":"B","diff":3,"q":"「So-net光プラス」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（CATV系）","独自回線（NURO光系）","光コラボ"],"ans":3,"exp":"So-net光プラスはNTTフレッツ光を卸受けして提供する光コラボ。なお同じSo-netが取り扱うNURO光は独自回線（ダークファイバー系）であり、別サービス。"},{"id":"B019","cat":"B","diff":3,"q":"「フレッツ光」自体は次のどれに分類されるか？","choices":["NTT東西から回線を卸受けして回線とプロバイダをセットで提供する光コラボレーションサービス","NTTのダークファイバーを借り受けてKDDI等が独自ネットワークで構築したダークファイバー系サービス","ケーブルテレビ会社が同軸ケーブルやHFCインフラを使って提供するCATV系インターネットサービス","NTT東西が直接提供する光回線サービス（光コラボの元回線）"],"ans":3,"exp":"フレッツ光はNTT東西が直接エンドユーザーに提供する光回線サービス。光コラボはこのフレッツ光を卸受けしたもの。フレッツ光自体は光コラボではなく、光コラボの「元回線」にあたる。"},{"id":"B020","cat":"B","diff":4,"q":"「enひかり」は次のどれに分類されるか？","choices":["独自回線（電力系）","光コラボ","独自回線（CATV系）","独自回線（ダークファイバー系）"],"ans":1,"exp":"enひかりはNTTフレッツ光を卸受けして提供する光コラボ。VNEをv6プラス・transixから選択できる珍しいサービスとして知られる。"},{"id":"C001","cat":"C","diff":1,"q":"他のプロバイダと契約してフレッツ光を利用中のお客様がandline光SEに切り替える場合の手続きを何と呼ぶか？","choices":["解約","新規契約","事業者変更","転用"],"ans":3,"exp":"フレッツ光（NTT＋プロバイダの2契約構成）から光コラボに切り替えることを「転用」と呼ぶ。転用には「転用承諾番号」が必要で、有効期限は取得から15日間。"},{"id":"C002","cat":"C","diff":1,"q":"ドコモ光を利用中のお客様がandline光SEに乗り換える場合の手続きを何と呼ぶか？","choices":["事業者変更","解約後再契約","新規契約","転用"],"ans":0,"exp":"光コラボから別の光コラボへの乗り換えは「事業者変更」。事業者変更承諾番号を取得して手続きする。同じNTTのアクセスラインを使い続けるため工事不要が原則。"},{"id":"C003","cat":"C","diff":1,"q":"「無派遣工事」が適用されるケースとして正しいのはどれか？","choices":["新築戸建てへの光ファイバー新規引き込み","集合住宅でVDSL方式から光配線方式への変更","auひかりからandline光SEへの乗り換え","転用や事業者変更で既存回線をそのまま使う場合"],"ans":3,"exp":"無派遣工事になるのは転用・事業者変更でNTT東西の既存アクセスラインをそのまま使う場合。新築工事・配線方式変更・異なるインフラへの乗り換えはすべて派遣工事が必要。"},{"id":"C004","cat":"C","diff":2,"q":"転用の注意点として、お客様に必ず案内すべき事項はどれか？","choices":["転用するとIPoE方式に自動変更されるため光回線の通信速度は必ず改善される","光コラボへの転用には申し込みから最短でも2ヶ月の工事期間が必要","転用後は0120から始まる新しい電話番号に自動変更される","転用後に旧プロバイダとの契約は自動的に解約されないため、お客様自身で解約手続きが必要"],"ans":3,"exp":"転用時、回線はandline光SEに切り替わるが旧プロバイダとの契約は自動解約されない。お客様が別途解約手続きをしないと二重払いになる。andline光SE重要事項説明書にも明記されている重要事項。"},{"id":"C005","cat":"C","diff":1,"q":"ONU（回線終端装置）の役割として正しいのはどれか？","choices":["電話の通話品質を改善する装置","Wi-Fiの電波を飛ばす装置","インターネット接続の認証を行う装置","光信号をデジタル信号に変換する装置"],"ans":3,"exp":"ONUは光ファイバーの光信号をデジタル信号に変換する「回線終端装置」。責任分解点はONUまでで、ONU以降はお客様の設備となる。"},{"id":"C006","cat":"C","diff":2,"q":"「ひかり電話」を契約した場合に設置されるホームゲートウェイ（HGW）の特徴として正しいのはどれか？","choices":["お客様が家電量販店等で自前購入して設置する必要がある市販装置","ONUとWi-Fiルーターが一体化した装置で、ひかり電話契約時に設置される","インターネット接続は別のONUが担当するため、HGWはひかり電話専用の装置である","光ファイバーの光信号をデジタル信号に変換するだけのシンプルな変換装置"],"ans":1,"exp":"ひかり電話契約時に設置されるHGWはONU機能＋ルーター機能が一体化した装置。ひかり電話の「あり/なし」確認は工事前確認で重要。Wi-Fiオプションを追加するか自前ルーターを接続するかで構成が変わる。"},{"id":"C007","cat":"C","diff":2,"q":"集合住宅の配線方式で「光コンセント」がある場合、何を意味するか？","choices":["光ファイバーが宅内まで引き込まれている「光配線方式」の証拠","VDSL方式が使われていることを示す（規定の運用と判断）","LAN配線方式で共有速度が低い可能性がある（規定上の運用）","電話線コンセントとは別の新型コンセント（規定上の運用と判断）"],"ans":0,"exp":"壁面に「光」と書かれた光コンセントがあれば、宅内まで光ファイバーが来ている光配線方式の証拠。これがなくLAN口やTEL口しかない場合はVDSL方式等の可能性があり、速度低下のボトルネックになる場合がある。"},{"id":"C008","cat":"C","diff":2,"q":"集合住宅における「VDSL方式」の説明として正しいのはどれか？","choices":["各部屋まで光ファイバーを直接引き込む最も高速な方式（規定上は光配線方式と同等の運用と判断する）","棟内の共有スペースまで光ファイバーを引き込み、各部屋への配線に既存の電話線（メタル線）を使う方式","CATVの同軸ケーブルとWi-Fiを組み合わせた集合住宅向け方式（規定上の特例運用と判断する取り扱い）","全部屋でLANケーブルを10Gbps規格で共有するマンション向け高速方式（規定上の特例運用と判断する）"],"ans":1,"exp":"VDSL方式は棟内の共用スペース（MDF室等）まで光ファイバーを引き込み、そこから各部屋には既存の電話線（メタル線）を使う。メタル線区間が速度低下のボトルネックになることがある。NTT東西はVDSL→光配線方式への移行を順次進めている。"},{"id":"C009","cat":"C","diff":2,"q":"戸建て住宅の派遣工事における光ファイバーの引き込み方法として存在しないのはどれか？","choices":["既存の電話線配管を利用する","エアコンダクトを利用する","壁に新規穴あけ（直径約1cm）をして引き込む","地下に新たに配管を埋設して引き込む"],"ans":3,"exp":"戸建て工事の引き込み方法は「既存配管利用」「エアコンダクト利用」「壁穴あけ」の3種類。地下への埋設配管は一般住宅の光回線工事では行わない。"},{"id":"C010","cat":"C","diff":2,"q":"andline光SEの派遣工事の立ち会いについて正しいのはどれか？","choices":["ONU等の設置場所を決定できる方の立ち会いが必要","無派遣工事の場合でも必ず立ち会いが必要","工事は夜間に行われるため平日昼間の立ち会いは不要","工事の立ち会いは不要で外出していても開通できる"],"ans":0,"exp":"派遣工事では「ONU等の設置場所を決定できる方の立ち会い」が必須。工事時間は概ね1時間。無派遣工事の場合はNTTの工事員が伺わないため立ち会い不要だが、ONUのセルフ接続が必要。"},{"id":"C011","cat":"C","diff":2,"q":"「転用承諾番号」の有効期限について正しいのはどれか？","choices":["取得日から15日間","取得日から30日間","取得日から7日間","有効期限はない"],"ans":0,"exp":"転用承諾番号の有効期限は取得日から15日間。期限内にandline光SEへの申し込みが必要。有効期限を過ぎた場合は再取得が必要になる。"},{"id":"C012","cat":"C","diff":3,"q":"andline光SEの工事キャンセル（取消）について正しいのはどれか？","choices":["工事完了前であればキャンセル可能でキャンセル料はかからない（工事着手後は費用が発生）","工事の1週間前までならキャンセル可能だがキャンセル料が発生する（一律3,300円）","申し込み後はいかなる場合もキャンセル不可（技術的・制度的に手段がない・規定の運用上）","初期契約解除制度でのみキャンセルが可能（規定上の8日間ルール内の特例措置と判断する）"],"ans":0,"exp":"andline光SEは工事完了前であればキャンセル料なしでキャンセル可能。ただし工事着手後にキャンセルした場合、それまでに発生した工事費用はお客様負担。取消連絡は工事3日前の午後7:00まで。"},{"id":"C013","cat":"C","diff":2,"q":"andline光SEの初期契約解除制度の期間として正しいのはどれか？","choices":["契約月末まで","申込日から14日以内","開通のご案内受領日を含む8日以内","申込日から8日以内"],"ans":2,"exp":"初期契約解除制度は「andline光SEお申し込み内容兼開通のご案内」の受領日を含む8日以内。工事着手前であれば費用負担なし、工事着手後は発生した工事費を負担する必要がある。"},{"id":"C014","cat":"C","diff":3,"q":"集合住宅（マンション）の光回線工事で「建物オーナー・管理会社の許可」が必要な理由として正しいのはどれか？","choices":["光回線は建物の資産価値に影響するため","マンション全体の電力量が変わるため","工事が共用スペース（MDF室等）の作業を伴うため","各部屋のインターネット料金を管理組合がまとめて支払うため"],"ans":2,"exp":"集合住宅の光回線工事では、棟内の共用スペース（MDF室等）での作業が必要になるため、事前にオーナーや管理会社の承諾・当日の開錠手配が必要。賃貸の場合はお客様が必ず事前に承諾を取る。"},{"id":"C015","cat":"C","diff":4,"q":"宅内に「光コンセント（既設）」がある場合のメリットとして正しいのはどれか？","choices":["再契約時などに業者が来ない「無派遣工事」で開通できる可能性がある","光コンセントがある場合はONUが不要になり宅内機器のレンタル費用がゼロになる","光コンセントがあれば新規申し込み時の審査が免除され即日開通が保証される","既設の光コンセントはどの事業者でも共用できるため転用の際に工事費が全額免除される"],"ans":0,"exp":"既設の光コンセントがある場合、過去の残置配線を流用した「無派遣工事」で開通できる可能性がある。工事費も大幅に抑えられる（3,300円程度）。工事前確認でコンセントの有無を確認することが重要。"},{"id":"C016","cat":"C","diff":3,"q":"「事業者変更承諾番号」に関して正しいのはどれか？","choices":["解約手続きが完了した際にandlineから発行される解約確認用の番号","フレッツ光からandline光SEなどの光コラボに転用する際にNTT東西から取得する番号","光回線の新規申し込みをする際に必ず事前に取得しておかなければならない番号","光コラボから別の光コラボへ乗り換える際に現在の事業者から発行してもらう番号"],"ans":3,"exp":"事業者変更承諾番号は、光コラボから別の光コラボへ乗り換える（事業者変更）際に現在の事業者から発行してもらう番号。andline光SEから他社へ乗り換える場合も、このandline光SE側への手続きが必要。2022年7月以降の新規申込者は発行手数料無料。"},{"id":"C017","cat":"C","diff":2,"q":"andline光SEの最低利用期間と解約金について正しいのはどれか？","choices":["最低利用期間の定めはなく、解約金は発生しない","最低利用期間1年、解約金あり（規定上の運用）","最低利用期間2年、解約金あり（規定上の運用）","最低利用期間3年、解約金10,000円（規定）"],"ans":0,"exp":"andline光SEは最低利用期間の定めがなく、解約金も発生しない。解約月の利用料金は日割りにならず1ヶ月分請求される点に注意。解約希望月の15日までに連絡が必要。"},{"id":"C018","cat":"C","diff":3,"q":"andline光SEで「IPv6接続でご利用の場合」の設定について正しいのはどれか？","choices":["IPv6はルーターが自動設定するためお客様の操作は不要","ID/パスワードは不要でお客様への通知もしていない","IDとパスワードを必ずルーターに設定する必要がある","IPv6は月額オプションとして別途申し込みが必要"],"ans":1,"exp":"andline光SE重要事項説明書に「インターネットをIPv6接続でご利用いただく場合、ID/パスワードは不要となり、お客さまへの通知もしておりません」と明記されている。"},{"id":"C019","cat":"C","diff":4,"q":"ドコモ光10ギガから他の光コラボ事業者へ事業者変更する際の注意事項として正しいのはどれか？","choices":["事業者変更の前に「1ギガ」プランへのダウングレード工事が必要","10ギガから他社への事業者変更は禁止されており一度フレッツ光直販に戻す必要がある","10ギガプランは事業者変更番号が発行されないためNTT東西経由の特殊申請が必要","10ギガプランはNTTとドコモの共同契約のためドコモ側での解除手続きが先に必要"],"ans":0,"exp":"ドコモ光10ギガから他社の光コラボ事業者への事業者変更は、まず「1ギガ」プランへのダウングレード工事が必要。工事を伴うため余裕を持った日程でのお申し込みが必要。"},{"id":"C020","cat":"C","diff":3,"q":"「事業者変更時のv6オプション競合」トラブルはなぜ発生するか？","choices":["旧事業者のv6オプション廃止処理が完了しないと新事業者のv6オプション新設処理ができないため","新旧事業者間でv6オプションの移管料金をめぐる精算処理が完了するまで新設を保留する仕様のため","IPv6アドレスの再割り当てにNTT東西の審査期間（最大5営業日）が必要なため","v6オプションはONUの機器認証と紐付いており機器の登録変更に時間がかかるため"],"ans":0,"exp":"NTTのNGN設備では1回線に1つのv6オプションしか紐付けられない。旧事業者のv6オプション廃止処理が完了しないと新事業者側が新設できず、この処理のタイムラグや連携ミスでネット不通トラブルが多発する。"},{"id":"D001","cat":"D","diff":4,"q":"IPv4 over IPv6（IPv6サービス）の方式として存在しないのはどれか？","choices":["MAP-E（v6プラス等が採用）","IPIP（固定IPオプション等が採用）","DS-Lite（transix等が採用）","PPPoE-Plus（次世代PPPoE方式）"],"ans":3,"exp":"IPv4 over IPv6（IPv6サービス）の主な方式はMAP-E・DS-Lite・IPIP。「PPPoE-Plus」という方式は存在しない。PPPoEはIPv4 over IPv6（IPv6サービス）とは別の接続方式。"},{"id":"D002","cat":"D","diff":2,"q":"VNE事業者「JPIX」が提供するIPv4 over IPv6（IPv6サービス）サービス名と方式の組み合わせとして正しいのはどれか？","choices":["v6プラス / MAP-E","transix / DS-Lite","OCNバーチャルコネクト / MAP-E","クロスパス / DS-Lite"],"ans":0,"exp":"JPIXが提供するIPv4 over IPv6（IPv6サービス）サービスは「v6プラス」でMAP-E方式を採用。ドコモ光・GMOとくとくBB光・So-net光など多くのプロバイダが採用している。"},{"id":"D003","cat":"D","diff":2,"q":"VNE事業者「インターネットマルチフィード」が提供するIPv4 over IPv6（IPv6サービス）サービス名と方式として正しいのはどれか？","choices":["v6プラス / MAP-E","transix / DS-Lite","IPv6高速ハイブリッド / IPIP","クロスパス / DS-Lite"],"ans":1,"exp":"インターネットマルチフィード（MFEED）が提供するIPv4 over IPv6（IPv6サービス）サービスは「transix」でDS-Lite方式を採用。IIJmioひかりなどで利用されている。"},{"id":"D004","cat":"D","diff":3,"q":"「クロスパス（Xpass）」を提供するVNE事業者と方式の組み合わせとして正しいのはどれか？","choices":["BBIX / IPIP独自方式","JPIX / MAP-E","アルテリア・ネットワークス / DS-Lite（可変IP）","インターネットマルチフィード / DS-Lite"],"ans":2,"exp":"クロスパス（Xpass）はアルテリア・ネットワークスが提供するIPv4 over IPv6（IPv6サービス）サービス。可変IPはDS-Lite方式、固定IPはIPIPトンネリング方式。楽天ひかりで採用されている。"},{"id":"D005","cat":"D","diff":3,"q":"「OCNバーチャルコネクト」について正しいのはどれか？","choices":["JPIXが提供するDS-Lite方式のサービス（規定上の運用と判断する取扱）","アルテリア・ネットワークスが提供するDS-Lite方式のサービス（規定）","BBIXが提供するIPIP独自方式のサービス（規定上の運用と判断する取扱）","NTTドコモビジネス（旧NTTコム）が提供するMAP-E方式のサービス"],"ans":3,"exp":"OCNバーチャルコネクトはNTTドコモビジネス（旧NTTコミュニケーションズ）が提供するMAP-E方式のVNEサービス。ahamo光で採用されている。なお2025〜2026年にかけてv6プラスへの切り替えが進んでいる。"},{"id":"D006","cat":"D","diff":3,"q":"「IPv6高速ハイブリッド」（BBIXが提供）の特徴として正しいのはどれか？","choices":["IPIP独自方式で光BBユニット専用、ポート制限なしでIPv4グローバルアドレスを1つ占有","DS-Lite方式を採用し、市販のDS-Lite対応ルーターで利用可能（規定上の運用と判断する）","v6プラスと互換性があり、v6プラス対応ルーターで利用可能（規定上の運用と判断する取扱）","MAP-E方式を採用し、市販のMAP-E対応ルーターで利用可能（規定上の運用と判断する取扱）"],"ans":0,"exp":"BBIXのIPv6高速ハイブリッドはIPIP独自方式で、ソフトバンク光専用の「光BBユニット」しか対応していない。1契約につきグローバルIPv4アドレスを1つ占有するためポート開放制限がなく、MAP-EやDS-Liteとは根本的に異なる。"},{"id":"D007","cat":"D","diff":4,"q":"MAP-E方式のポート制限として正しいのはどれか？","choices":["ポートは使えないがIPv4通信は無制限","月間通信量で制限がかかる規定上の取扱","ポート番号が割り当て範囲内に制限される","全ポートが自由に使える規定上の取り扱い"],"ans":2,"exp":"MAP-Eでは複数ユーザーがIPv4アドレスを共有するため使用できるポート番号の範囲が制限される。割り当てられた範囲内での限定的なポート開放は可能。"},{"id":"D008","cat":"D","diff":5,"q":"DS-Lite方式でポート開放が「できない」理由として正しいのはどれか？","choices":["VNE事業者側でNAT変換を行うためユーザー側からポート開放ができない","月額500円程度のオプションを追加契約すればポート開放が可能になる","NAT変換をユーザー側のルーターが行うためポート番号の競合が発生する","DS-LiteはIPv6通信のみに対応しIPv4のポートという概念が存在しない"],"ans":0,"exp":"DS-LiteはNAT変換をVNE（クラウド側）が行うNATステートフル方式。ユーザー側のルーターからポート番号を指定して開放する手段がない。固定IPオプション（IPIP方式）に変更するか、クラウド中継サービスを活用する。"},{"id":"D009","cat":"D","diff":4,"q":"IPv4 over IPv6（IPv6サービス）環境（通常プラン）でできないこととして正しいのはどれか？","choices":["一般的なWebブラウジング","オンラインゲームでのプレイ（ポート開放不要のもの）","YouTube・Netflixなどの動画視聴","固定IPv4アドレスの取得"],"ans":3,"exp":"通常のMAP-E・DS-Liteでは複数ユーザーでIPv4アドレスを共有するため固定IPv4アドレスは取得できない（別途固定IPオプションの契約が必要）。またポート開放が必要な特定サービスも制限される。"},{"id":"D010","cat":"D","diff":3,"q":"「IPv6対応」と表記されているルーターを購入すれば必ずIPoE接続ができるか？","choices":["いいえ。VNEのサービス方式に個別対応している必要があり「IPv6対応」表記だけでは不十分","はい。「IPv6対応」と表記されていればIPoE接続に必要な全プロトコルに自動対応している","はい。IPv6対応ルーターはNTTとの認証が完了済みのためIPoE接続が保証されている","いいえ。IPoE接続にはルーターではなくONUのIPv6対応が必要で、ルーターの表記は無関係"],"ans":0,"exp":"「IPv6対応」の表記があっても、v6プラス（MAP-E）、transix（DS-Lite）、クロスパス（DS-Lite）などVNEごとに方式が異なる。ルーターが契約しているVNEのプロトコルに個別対応していなければIPoE接続はできない。レンタルルーターが最も確実。"},{"id":"D011","cat":"D","diff":5,"q":"お客様が「ポート開放が必要なゲームサーバーを自宅で運営したい」と言っている。andline光SEがv6プラス（MAP-E）での提供の場合、適切な案内はどれか？","choices":["MAP-EはNATをルーター側で行うため、割り当てられたポート範囲内での設定は可能","MAP-E方式ではVNE側でNATを一括処理するため、ポート開放は一切できない","MAP-E方式はDS-Liteと同じ仕組みのため、ポート開放の可否も完全に同一である","MAP-E方式では全ポートが開放された状態で提供されるため、追加設定は不要"],"ans":0,"exp":"MAP-E方式は完全なポート開放はできないが、割り当てられたポートの範囲内での設定であれば限定的に可能。DS-Liteより柔軟性がある。固定IPオプションも選択肢として案内できる。"},{"id":"D012","cat":"D","diff":2,"q":"andline光SEにおけるIPv4 over IPv6（IPv6サービス）接続について正しいのはどれか？","choices":["別途申し込みが必要なオプションサービス","PPPoE接続よりも遅い","ルーターにID/パスワードを設定する必要がある","標準提供（手続き不要・自動適用）"],"ans":3,"exp":"andline光SEはIPv6（IPoE）接続＋IPv4 over IPv6（IPv6サービス）接続が標準提供。手続き不要で自動適用される。IPv6接続利用時はルーターへのID/パスワード設定は不要。"},{"id":"D013","cat":"D","diff":3,"q":"「DS-Lite方式」と「MAP-E方式」の最大の違いはどれか？","choices":["DS-LiteはIPv6のみ対応しておりIPv4通信はできない、MAP-EはIPv4専用方式である","DS-LiteはNATをVNE事業者側で処理するため完全なポート開放ができない。","DS-Liteのほうが通信速度が速くMAP-Eは遅い。どちらもポート制限なしで使える","DS-LiteはNTT専用でフレッツ光のみ利用可能。MAP-Eは全国どの光回線でも利用できる"],"ans":1,"exp":"DS-LiteはNAT変換をVNE側クラウドで行う（NATステートフル）ためポート開放不可。MAP-EはNAT変換をルーター側で行う（NATステートレス）ため、割り当てられたポート範囲内で限定的なポート開放が可能。"},{"id":"D014","cat":"D","diff":4,"q":"「v6コネクト」を提供するVNE事業者として正しいのはどれか？","choices":["アルテリア・ネットワークス","朝日ネット（ASAHInet）","インターネットマルチフィード","JPIX"],"ans":1,"exp":"v6コネクトは株式会社朝日ネット（ASAHInet）が提供するIPv4 over IPv6（IPv6サービス）サービスでDS-Lite方式を採用。アルテリアのクロスパスと方式は同じだが別の事業者・サービス。"},{"id":"D015","cat":"D","diff":4,"q":"事業者変更時の「v6オプション競合」によりネット不通が発生した場合の対処として最も適切なのはどれか？","choices":["旧事業者のv6オプション廃止処理の完了を確認・依頼しながら、PPPoEで一時的に接続する","IPv4 over IPv6（IPv6サービス）を諦めてPPPoEに永続的に切り替える","お客様のルーターを初期化するよう案内する（メーカー指定の手順で工場出荷状態に戻す）","新しいONUに交換するよう案内する（NTT東西へONU交換手続きを別途依頼する）"],"ans":0,"exp":"v6オプション競合はNTTの設備内での処理問題。根本解決は旧事業者のv6オプション廃止完了を待つこと。その間はPPPoE接続で一時対応する。廃止完了後に新事業者側でv6オプションが新設されIPoEが使えるようになる。"},{"id":"D016","cat":"D","diff":3,"q":"IPoE方式がPPPoEより優れている点として正しいのはどれか？","choices":["5G対応スマートフォンと組み合わせると通信速度が特に向上する","上り方向の通信速度がPPPoE方式と比べて常に2倍以上になる","月額料金がPPPoE接続より必ず安く設定されているため費用が削減できる","ID/パスワード認証が不要で網終端装置を迂回するため混雑時も速度が安定しやすい"],"ans":3,"exp":"IPoEはPPPoEで混雑の原因となる網終端装置（NTE）を迂回してインターネットに直結する。ID/パスワード認証も不要。料金・速度の保証・5Gとの関係は無関係。"},{"id":"D017","cat":"D","diff":5,"q":"MAP-E方式で「固定IPアドレス」オプションを利用した場合の通信方式として正しいのはどれか？","choices":["IPIPトンネリング方式に切り替わり、グローバルIPv4アドレスが1つ占有される","固定IPオプションを契約するとIPoEからPPPoEに戻り、ID/パスワード認証が必要になる","MAP-Eの仕組みはそのままで、使用するIPv4アドレスのみが固定アドレスに変わる","固定IPオプションを使うとトンネリング方式がDS-Liteに切り替わり、VNE側でNATが行われる"],"ans":0,"exp":"v6プラス固定IP・クロスパス固定IP・transix固定IPなど、MAP-E/DS-Liteの固定IPサービスはIPIPトンネリング（IPv4 over IPv6（IPv6サービス） IPIP）方式に切り替わり、専用のグローバルIPv4アドレスが1つ占有される。これによりポート開放制限がなくなる。なお方式名称はルーターメーカー各社の設定画面でも「IPv4 over IPv6（IPv6サービス）（IPIP）」と明記されている。"},{"id":"D018","cat":"D","diff":5,"q":"NURO光が2025年頃から順次切り替えを進めている「MAP-E化」により発生する問題として正しいのはどれか？","choices":["月額料金が1,000円以上値上がりする（NURO光プロバイダ料金の改定による影響・規定）","MAP-E化に伴いWi-Fiが完全に利用できなくなりWi-Fi 6にも非対応となる（規定）","固定IPアドレスの利用停止と、ポート開放が必要な一部ゲームやP2P通信への影響が発生する可能性がある","MAP-E化により通信速度が現行の半分以下に低下し、Netflixなどの動画視聴に支障が出る（規定）"],"ans":2,"exp":"NURO光は従来の「デュアルスタック方式」（個別IPv4アドレス）からMAP-E方式への切り替えが進行中。MAP-E化によりIPv4ポートが共有となり、ポート開放が必要なオンラインゲームやP2P通信に影響が出る場合がある。"},{"id":"D019","cat":"D","diff":4,"q":"auひかりのIPv6接続の特徴として正しいのはどれか？","choices":["auひかりでIPoE接続するにはv6プラス対応の市販ルーターを別途購入して設定する必要がある（規定上の運用と判断する取り扱い）","auひかりはKDDI独自のデュアルスタックネットワークで、HGWを接続するだけでIPv4・IPv6ともに高速通信が可能。VNE申し込み手続きは不要","auひかりのIPv6接続はBBIXの光BBユニットが必須でフレッツ光と同じVNEサービスを利用する（規定上の運用と判断する取り扱い）","光コラボと同様にv6プラスかtransixを別途申し込んでMAP-EまたはDS-Lite接続の設定が必要になる（規定上の運用と判断する取扱）"],"ans":1,"exp":"auひかりは独自のKDDIネットワークでデュアルスタック構成。フレッツ光のように「MAP-EかDS-Liteを申し込む」という手続きが不要で、標準提供のHGWを繋ぐだけでIPv4・IPv6両方が使える。設定トラブルが少ないのが特徴。"},{"id":"D020","cat":"D","diff":5,"q":"「IPv6 IPoEは使えるがIPv4 over IPv6（IPv6サービス）（MAP-E等）が使えない」状態の場合、IPv4サイトへのアクセスはどうなるか？","choices":["IPv6のみ高速、IPv4は網終端装置経由のPPPoEとなるため夜間に遅くなる可能性がある","IPv4 over IPv6が使えない場合はIPv6サイトにもアクセスできなくなるため、すべてのウェブサイトが低速になる","IPoEが有効であればIPv4 over IPv6が使えなくてもIPv4通信も自動的にIPoE経由に切り替わるため速度低下は起きない","IPv4 over IPv6が使えない環境ではIPv4とIPv6の両通信がPPPoEに強制されるため昼夜問わず速度が低下する"],"ans":0,"exp":"IPoEが使えてもIPv4 over IPv6（IPv6サービス）が使えない場合、IPv4サイトへのアクセスはPPPoE経由となる。IPv6サイトは速いが、IPv4サイトは網終端装置経由になるため夜間に速度低下が起きる場合がある。"},{"id":"E001","cat":"E","diff":1,"q":"andline光SEはどの種類の光回線サービスに分類されるか？","choices":["独自回線（電力系）","独自回線（ダークファイバー系）","光コラボレーションサービス","NTT東西が直接提供するフレッツ光"],"ans":2,"exp":"andline光SEは株式会社アイキューブ・マーケティングが提供する光コラボレーションサービス。NTT東西から卸電気通信役務の提供を受け、フレッツ光ネクストに相当するFTTHアクセス回線を提供している。"},{"id":"E002","cat":"E","diff":1,"q":"andline光SEの派遣工事料の支払い方法として選択できるのはどれか？","choices":["一括払いまたは12回分割払い（1,650円/月）","12回・24回・36回分割払いから選択","一括払いのみであり、他の手続きや機器は一切不要","月次自動引き落としのみであり、他の手続きや機器は一切不要"],"ans":0,"exp":"andline光SE重要事項説明書によると、派遣工事料の支払いは「一括払い」または「12回分割払い（1,650円/月）」から選択可能。分割払いは派遣工事を要する場合の新規契約工事料についてのみ可能。"},{"id":"E003","cat":"E","diff":2,"q":"andline光SEの重要事項説明書に記載されているFTTHアクセス回線タイプとして存在しないのはどれか？","choices":["ファミリー・ギガラインプラン","ファミリー・スーパーハイスピードタイプ隼","マンション・ギガスマートタイプ","ファミリー・ハイスピードタイプ"],"ans":2,"exp":"andline光SEの重要事項説明書に記載されているFTTHアクセス回線タイプはすべてファミリー向け（ファミリー・ギガラインプラン、ファミリー・スーパーハイスピードタイプ隼、ファミリー・ハイスピードタイプ、ファミリータイプ）。「マンション・ギガスマートタイプ」は存在しない。"},{"id":"E004","cat":"E","diff":2,"q":"andline光SEの月額料金の初回請求はいつか？","choices":["契約当月以降3か月目の10日","契約当月の翌月","工事完了日の翌日","契約当月"],"ans":0,"exp":"andline光SEの初月費用は「契約事務手数料」と「月額料金」のみで、請求日は契約当月以降3か月目の10日となる。"},{"id":"E005","cat":"E","diff":2,"q":"停電時のandline電話について正しいのはどれか？","choices":["停電時は緊急通報を含む通話が一切できない","受信のみ可能で発信できない（技術的・制度的に手段がない）","緊急通報（110・119番）のみ使用可能","バッテリーバックアップがあるため通話可能"],"ans":0,"exp":"andline電話はIP電話（光回線ベース）のため停電時は緊急通報を含む全ての通話ができない。通常の固定電話（メタル回線）とは異なる重要な違いで、申し込み時に必ず案内が必要。"},{"id":"E006","cat":"E","diff":2,"q":"andline電話の月額使用料として正しいのはどれか？","choices":["無料（通話料のみ）","1,100円（税込）","550円（税込）","220円（税込）"],"ans":2,"exp":"andline電話の月額使用料は550円（税込）で、これとは別に通話料が発生する。固定電話への通話は県内・県外ともに8.8円/3分。"},{"id":"E007","cat":"E","diff":3,"q":"andline電話で「番号表示サービス」（NTTのナンバーディスプレイ相当）の月額料金は？","choices":["220円（税込）","440円（税込）","無料","550円（税込）"],"ans":1,"exp":"andline番号表示サービス（NTTのナンバーディスプレイ相当）は月額440円（税込）。他にも非通知ブロック220円、割り込み電話330円、転送550円などのオプションがある。"},{"id":"E008","cat":"E","diff":2,"q":"andline光SEの解約月の利用料金について正しいのはどれか？","choices":["解約日によって日割りか否かが異なる","日割りで計算される","解約月は料金が発生しない","日割りにならず1ヶ月分請求される"],"ans":3,"exp":"andline光SEの月額料金は解約月は日割りにならず1ヶ月分請求される。解約手続きは解約希望月の15日までにカスタマーサポートデスクへ連絡が必要。"},{"id":"E009","cat":"E","diff":3,"q":"andline光SEカスタマーサポートデスクの受付時間として正しいのはどれか？","choices":["9:00〜18:00（平日のみ・規定上の運用）","10:00〜20:00（平日のみ・規定上の運用）","10:00〜19:00（年末年始を除く土日祝含む）","9:00〜21:00（365日・規定上の運用）"],"ans":2,"exp":"andline光SEカスタマーサポートデスク（0120-978-736）の受付時間は午前10:00〜午後7:00（年末年始を除く土日祝無休）。"},{"id":"E010","cat":"E","diff":2,"q":"andlineTV（光テレビサービス）の月額利用料として正しいのはどれか？","choices":["495円（税込）","1,100円（税込）","660円（税込）","825円（税込）"],"ans":3,"exp":"andlineTVの月額利用料は825円（税込）。内訳はandlineTV伝送サービス495円＋スカパーJSAT施設利用サービス330円の合算。"},{"id":"E011","cat":"E","diff":3,"q":"andlineTVの提供エリアについて正しいのはどれか？","choices":["光コラボが提供できるエリアはすべてandlineTVも提供されており、全47都道府県で利用可能（規定上の運用と判断する取り扱い）","andlineTVはフレッツ光サービスエリアのうち首都圏4都県（東京・神奈川・千葉・埼玉）のみで提供されている","andline光SEのサービスエリアと完全に一致しており全提供地域で申し込める（規定上の運用と判断する取り扱い）","NTT東日本・NTT西日本の「フレッツ・テレビ」の提供エリアと同じで、エリア内でも設備状況により提供できない場合がある"],"ans":3,"exp":"andlineTVの提供エリアはNTT東日本・NTT西日本の「フレッツ・テレビ」の提供エリアと同じ。35都道府県の一部地域で提供（2021年3月時点）。提供エリア内でも設備状況によりサービス提供できない場合がある。"},{"id":"E013","cat":"E","diff":3,"q":"フレッツ光からandline光SEに転用した際に失効するものとして正しいのはどれか？","choices":["ひかり電話の電話番号（転用後は番号が変わる）","フレッツ光の物理回線設備（撤去される）","ひかり電話に設定していた付加サービス（留守電・割り込み等）の設定内容","NTT東西から付与されたポイント等"],"ans":3,"exp":"転用時、NTT東西から付与されるポイント等はフレッツ光オプションサービスのご契約期間が残っていても転用に伴い失効する。andline光SE重要事項説明書に明記されている転用時の重要注意事項。"},{"id":"E014","cat":"E","diff":3,"q":"ひかり電話を利用中のお客様がフレッツ光からandline光SEに転用する場合について正しいのはどれか？","choices":["フレッツ光からandline光SEへの転用時にひかり電話番号が新しい番号に変更される","現在のひかり電話サービスはandline光SEへの転用と同時に自動廃止となり継続できない","ひかり電話の転用には光回線の転用とは別に専用の申し込み手続きが個別に必要","光回線の転用と同時にひかり電話も自動的に転用される（andline電話に）"],"ans":3,"exp":"ひかり電話をご利用中のお客様がフレッツ光から転用する場合、ひかり電話は光回線の転用と同時に自動的に転用される（andline電話として継続）。転用前後でサービス内容や料金が一部変更となる場合がある。"},{"id":"E015","cat":"E","diff":3,"q":"andline光SEの「工事前のお申し込みの取り消し」について正しいのはどれか？","choices":["工事実施前であればキャンセル料等はかからない","申込から48時間を超えた場合は工事実施前でもキャンセル料が発生する","工事実施前のキャンセルでも事務手数料（3,300円税込）が必ずかかる","キャンセルは工事1週間前までに連絡しないとキャンセル料が発生する"],"ans":0,"exp":"工事実施前であればandline光SEに関するキャンセル料などはかからない。ただし工事着手後（切替完了後を含む）に取り消した場合は発生した費用をお客様に請求。取消連絡は工事3日前の午後7:00まで。"},{"id":"F001","cat":"F","diff":2,"q":"andlineTVを利用するために宅内に設置が必要な専用機器はどれか？","choices":["ONU（通常の回線終端装置）のみ","Wi-Fiルーター","映像用回線終端装置（V-ONU）","スカパーJSATのセットトップボックス"],"ans":2,"exp":"andlineTVの利用には、通常のインターネット用ONU（回線終端装置）に加えて「映像用回線終端装置（V-ONU）」の設置が必要。これはandlineTV（フレッツ・テレビ）用の専用機器。"},{"id":"F002","cat":"F","diff":2,"q":"分配器と分波器の違いとして正しいのはどれか？","choices":["分配器は1本の同軸ケーブルを複数台に分岐する装置、分波器は地デジとBS/CSの混合信号を分ける装置","分配器と分波器は同じもので呼び方が違うだけであり、他の手続きや機器は一切不要（共通仕様）","分配器は地デジ専用、分波器はBS/CS専用に使う装置（規格ごとに分かれた仕様の運用と判断）","分配器はテレビを増やす工事に必要、分波器は工事不要で取り付けできる装置（家庭向け簡易仕様）"],"ans":0,"exp":"分配器は1本の同軸ケーブルを複数台のテレビに分岐するための機器。分波器（セパレーター）はテレビの背面で地デジとBS/CSの混合信号を分離するための機器。テレビを複数台接続する場合は分配器が必要。"},{"id":"F003","cat":"F","diff":2,"q":"テレビ視聴に使う「同軸ケーブル」の特性について正しいのはどれか？","choices":["分配数が増えるほど各テレビへの信号レベルが低下（減衰）する","分配数が増えるほど信号が増幅される（規定上の運用と判断する取扱）","同軸ケーブルはLANケーブルの代わりとして使用できる（規定上の運用）","同軸ケーブルの長さは信号品質に影響しない（規定上の運用と判断）"],"ans":0,"exp":"同軸ケーブルは信号を分配するたびに信号レベルが低下（減衰）する。テレビを多台数接続する場合、信号が弱くなりすぎる場合があり、ブースターの設置が必要になることがある。"},{"id":"F004","cat":"F","diff":3,"q":"「ブースター」の設置が必要になるケースとして正しいのはどれか？","choices":["IPoEに切り替えても速度が改善しない場合にブースターを追加することで速度向上が期待できる","分配による信号減衰や受信電波が弱く、テレビ映像に障害が出る場合","Wi-Fiルーターの出力が弱くスマートフォンへの電波が届かない場合にブースターを設置する","テレビが4K（Ultra HD）対応機種の場合は必ずブースターの設置が義務付けられている"],"ans":1,"exp":"ブースターはテレビ用アンテナや同軸ケーブルの信号を増幅する装置。分配器による信号減衰や元の受信レベルが低い場合に設置する。設置には別途工事費が発生する。"},{"id":"F005","cat":"F","diff":3,"q":"andlineTVで「光回線と同時に工事する場合」のテレビ回線工事費として正しいのはどれか？","choices":["5,500円（税込）","3,300円（税込）","無料","8,250円（税込）"],"ans":1,"exp":"andlineTVのテレビ回線工事費は光回線の派遣工事と同時の場合3,300円（税込）、単独工事の場合は8,250円（税込）となる（andline光SE重要事項説明書より）。"},{"id":"F006","cat":"F","diff":3,"q":"andlineTVでテレビ複数台（2〜4台）を接続する工事について正しいのはどれか？","choices":["複数台接続の工事費は1台と全く同じ金額で追加費用は発生しない","テレビの台数に応じて1台分の工事費がそれぞれ個別に加算される","2台目以降のテレビ接続は工事不要で無料で追加できる","2〜4台をまとめる工事として21,780円（税込）が発生する"],"ans":3,"exp":"andlineTVでテレビ複数台（2〜4台）を接続する場合、専用の工事（分配器設置等）が必要で21,780円（税込）の工事費が発生する（重要事項説明書より）。1台の場合のテレビ接続工事は7,150円（税込）。"},{"id":"F007","cat":"F","diff":2,"q":"フレッツ・テレビ（andlineTV）が提供する放送サービスとして正しいのはどれか？","choices":["NHKと民放のみであり、他の手続きや機器は一切不要","地上波デジタル放送とBSデジタル放送","地上波・BS・CS全チャンネル","地上波放送のみであり、他の手続きや機器は一切不要"],"ans":1,"exp":"andlineTV（フレッツ・テレビ）は地上波デジタル放送とBSデジタル放送が受信できるサービス。スカパーJSATの施設利用サービスを通じて提供される。CSチャンネルは別途有料契約が必要。"},{"id":"F008","cat":"F","diff":3,"q":"andlineTVの映像用回線終端装置（V-ONU）から宅内のテレビへの配線に使うのはどれか？","choices":["同軸ケーブル","LANケーブル","HDMIケーブル","光ファイバーケーブル"],"ans":0,"exp":"andlineTVでは、映像用回線終端装置（V-ONU）からテレビまでの配線に同軸ケーブルを使用する。光ファイバーの映像信号をV-ONUで変換し、既存の同軸配線でテレビに届ける仕組み。"},{"id":"F009","cat":"F","diff":3,"q":"andlineTVについて「原則として同一世帯以外でのご利用はできない」という制限はどういう意味か？","choices":["同じ市区町村内での利用制限（行政区分が一致条件）","同じ棟内の全部屋での利用制限（建物単位の契約扱い）","同一世帯のみ（個人視聴目的）での利用制限","同一建物内の利用制限（建築物単位の規定）"],"ans":2,"exp":"andlineTVは「andline光SE 1契約に対して1契約」で「原則として同一世帯以外のご利用はできない」。集合住宅でも同一世帯以外への提供はできない。"},{"id":"F010","cat":"F","diff":3,"q":"フレッツ・テレビも契約しているお客様がandline光SEに転用する場合について正しいのはどれか？","choices":["フレッツ・テレビもandlineTVとして自動的に転用される","フレッツ・テレビは転用対象外のため、andlineTV利用継続には別途新規申し込みが必要","転用時にフレッツ・テレビは一旦解約となり、工事完了後に改めてandlineTVを申し込む","フレッツ・テレビは転用後もNTTとの契約のまま維持され、andlineTVとは並行して契約が続く"],"ans":0,"exp":"フレッツ光転用時、ひかり電話と同様にフレッツ・テレビもandlineTVとして自動的に転用される。スカパーJSATとの「テレビ視聴サービス契約」は引き続きの契約となる。"},{"id":"G001","cat":"G","diff":2,"q":"ドコモ光の「タイプA」と「タイプB」の違いとして正しいのはどれか？","choices":["タイプAは1ギガ、タイプBは10ギガプラン","タイプAとタイプBでは提携プロバイダが異なる","タイプAは東日本エリア、タイプBは西日本エリア","タイプAは戸建て向け、タイプBは集合住宅向け"],"ans":1,"exp":"ドコモ光はプロバイダがセットになったプランで、タイプA（OCN等）とタイプBによって提携プロバイダが異なる。"},{"id":"G002","cat":"G","diff":2,"q":"「ahamo光」の接続方式として正しいのはどれか？","choices":["IPoE方式（IPv4 over IPv6（IPv6サービス））のみ（PPPoEは提供しない）","ahamo光はドコモが独自に整備した5G専用回線を使って接続するサービスだ","PPPoEとIPoEの両方を標準で提供しており用途に応じて切り替えて使える","PPPoE方式のみで接続するためIPoEには対応しておらず旧来の認証方式を採用している"],"ans":0,"exp":"ahamo光はPPPoE接続を提供せず、IPoE方式（IPv4 over IPv6（IPv6サービス））のみでの提供。OCNバーチャルコネクト対応のルーターが必要（または光電話契約でHGW利用）。"},{"id":"G003","cat":"G","diff":2,"q":"auひかりのプロバイダ変更について正しいのはどれか？","choices":["auひかりには複数のプロバイダから選べる機能がない（提供時に固定割当の運用）","プロバイダは自由にいつでも変更可能（マイページから無料手続きで完結する運用）","プロバイダのみの変更はできず、変更する場合はauひかりを一旦解約して再契約が必要","光コラボと同様に事業者変更承諾番号で簡単にプロバイダを変更できる仕組み"],"ans":2,"exp":"auひかりは回線とプロバイダがセット契約のため、プロバイダのみの変更はできない。変更する場合はauひかりを一旦解約し、希望のプロバイダを通じて再申し込みが必要（解約金・工事費等が発生する場合がある）。"},{"id":"G004","cat":"G","diff":2,"q":"auひかりの「auスマートバリュー」を適用するための必須条件として正しいのはどれか？","choices":["auひかり電話（固定電話）の契約が必須条件","auひかりと同名義でau携帯契約があれば適用","auスマホを1台以上契約しているだけで適用","スマホ契約のみで電話契約は不要となる規定"],"ans":0,"exp":"auスマートバリューを適用するためには「auひかり電話（固定電話オプション）」の契約が必須条件。スマートフォンのみでは適用されない。NURO光のソフトバンクセット割も同様に光電話が条件。"},{"id":"G005","cat":"G","diff":3,"q":"NURO光の「スマートライフオプション（月額550円）」の役割として正しいのはどれか？","choices":["auひかりとのセット割を適用するためのオプション（規定上の運用と判断する取扱）","通信速度を2Gbpsから10Gbpsにアップグレードするオプション（規定の運用）","ポート開放の制限を解除するためのオプション（規定上の運用と判断する取り扱い）","ソニー製高性能ONU（Wi-Fi6対応）を確実に受け取るためのオプション"],"ans":3,"exp":"NURO光では旧来からONU機器がランダム支給される問題があった。月額550円の「スマートライフオプション」を契約することでソニー製のWi-Fi6対応高性能ONUを確実に受け取れる。"},{"id":"G006","cat":"G","diff":3,"q":"ドコモ光の「プロバイダがセットになったプラン」を解約する場合について正しいのはどれか？","choices":["提携プロバイダを先に解約してからドコモに解約連絡する順番が必要（規定上の運用と判断する取り扱い）","ドコモと各提携プロバイダの両方にそれぞれ個別に解約手続きが必要（規定上の運用と判断する取り扱い）","ドコモへの解約手続きのみで提携プロバイダへも内容が通知される（ただしプロバイダごとに対応が異なる）","My docomoのWebサイトからのみ解約手続きが可能でありショップ窓口は利用できない（規定）"],"ans":2,"exp":"ドコモ光（プロバイダセットプラン）の場合、ドコモへの解約手続き完了後、提携プロバイダへも手続き内容が通知される。プロバイダは自動解約または有料・無料プランへ変更など、各社で取り扱いが異なる。"},{"id":"G007","cat":"G","diff":3,"q":"auひかりの特徴として正しいのはどれか？","choices":["建物単位でエリア確認が必要な独自回線で、光コラボとはインフラが異なる","ひかり電話の契約なしでauスマートバリューが適用される","NTTフレッツ光を使う光コラボのため事業者変更で乗り換えられる","夜間に網終端装置が混雑するためIPoEへの切り替えが推奨される"],"ans":0,"exp":"auひかりはKDDI独自回線（ダークファイバーまたは独自網）。光コラボの事業者変更制度は使えず乗り換えには新設工事が必要。建物単位のエリア確認が必須で隣の建物が対応済みでも自宅が未対応なケースがある。"},{"id":"G008","cat":"G","diff":3,"q":"NURO光の工事費（44,000円）が「実質無料」とされる仕組みの注意点として正しいのはどれか？","choices":["工事費は毎月の割引で相殺されるが上限が設定されている（規定上の運用と判断する取扱）","2年縛りがあるが解約金は発生しない（規定上は2年縛りなしと同等の運用と判断する）","工事費は完全無料でどのタイミングで解約しても費用は発生しない（特例運用と判断する）","月額割引で実質無料になるが、途中解約すると工事費の残債が一括請求される"],"ans":3,"exp":"NURO光の工事費44,000円は月額割引で「実質無料」になるが、途中解約すると割引を受けていない残りの工事費が一括で請求される。"},{"id":"G009","cat":"G","diff":4,"q":"ホームルーター（home 5G等）と光回線の比較として正しいのはどれか？","choices":["ホームルーターは工事不要が最大のメリットだが、ping値が光回線より遅くなる傾向がありゲームやビデオ通話に影響が出る場合がある","ホームルーターは5G回線を使うため、光回線より下り速度が高く出るケースが多くゲームにも適している","ホームルーターは無線のため光回線と異なりping値の概念がなく、速度指標はダウンロード速度のみで評価する","ホームルーターは工事不要だが月額料金が光回線の2〜3倍に達するため、コスト面で選択されることはほぼない"],"ans":0,"exp":"ホームルーターは工事不要が最大のメリット。ただし無線（5G/4G回線）使用のため、ping値（応答速度）が光回線より遅くなる傾向がある。オンラインゲームの応答速度重視の用途には光回線が適している。"},{"id":"G010","cat":"G","diff":3,"q":"ドコモ光の「単独タイプ」の説明として正しいのはどれか？","choices":["光回線のみでインターネット接続には別途プロバイダとの契約が必要","ドコモのスマートフォンを保有していない場合のみ選択できるプランで、プロバイダはドコモが自動で付与する","単独タイプはひかり電話オプションが含まれず、固定電話を使いたい場合に別途申し込みが必要なプラン","ドコモ光の中でも最大通信速度が低いプランで、速度重視の場合はセット割プランへの変更が推奨される"],"ans":0,"exp":"ドコモ光の「単独タイプ」はプロバイダが含まれていないプラン。インターネット利用には別途プロバイダと契約が必要（別途月額基本使用料が発生）。プロバイダをドコモ以外のものと組み合わせたい場合に使う。"},{"id":"G011","cat":"G","diff":3,"q":"「イッツコム」の提供エリアとして正しいのはどれか？","choices":["NTT東西の光回線を卸受けして関東6都県（東京・神奈川・千葉・埼玉・茨城・栃木）に提供する","J:COMと同様にケーブルテレビの同軸インフラを活用して全国15都府県に展開するCATV系事業者","東京都・神奈川県の東急線沿線エリアのみ","九州電力グループのQTnetが九州全域（7県）をカバーする独自回線サービスとして提供している"],"ans":2,"exp":"イッツコム（イッツ・コミュニケーションズ）は東急グループのCATV事業者。提供エリアは東京都（渋谷区・世田谷区・目黒区・大田区・町田市）と神奈川県（横浜市・川崎市の一部）の東急線沿線エリアに限定。"},{"id":"G012","cat":"G","diff":2,"q":"「J:COM NET」の特徴として正しいのはどれか？","choices":["ケーブルテレビの同軸ケーブルインフラを活用し、北海道〜九州の15都府県に展開する国内最大級のCATV系インターネット事業者","J:COM NETはNTTフレッツ光回線を卸受けして全国50都道府県以上で提供する最大手の光コラボサービス","J:COM NETはNURO光と同様にNTTのダークファイバーを借り受けて全国に独自ネットワークで展開している","J:COM NETは四国・九州を中心に展開する電力会社系のローカル光回線サービスで提供エリアが限定されている"],"ans":0,"exp":"J:COM NETはJCOM株式会社が提供するCATV系インターネットサービス。北海道から九州まで全国15都府県に展開する国内最大級のCATV事業者。近年は光回線プランも展開している。"},{"id":"G013","cat":"G","diff":3,"q":"NURO光の「ONU機器ガチャ」問題が解消される条件として正しいのはどれか？","choices":["スマートライフオプションを契約すれば旧プランでも改善される","新マンションプランに切り替えることでONUの機種が統一され、ランダム支給の問題が解消される","工事時に担当者へ直接SONY製ONUを指定すれば旧プランでも対応してもらえる","NURO光の機器ガチャ問題は現在もすべてのプランで解消されておらず、回避手段は存在しない"],"ans":0,"exp":"NURO光の新マンションプランと「NURO光1」ではSONY製高性能ONU（Wi-Fi6対応）に統一された。価格の安い旧戸建てプランは依然ランダム支給。ソニー製を指定したい場合はスマートライフオプション（月550円）の契約が必要。"},{"id":"G014","cat":"G","diff":4,"q":"電力系光回線5社（eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光）について誤っているのはどれか？","choices":["各地域の電力会社グループが提供する独自インフラのサービス","auスマートバリュー（またはUQ自宅セット割）に対応している事業者が多い","全国どこでも同一料金・同一サービスで利用可能","NTTのフレッツ網の混雑影響を受けにくい"],"ans":2,"exp":"電力系光回線は各地域の電力会社エリアに限定された地域限定サービス。eo光は関西、コミュファ光は東海・長野、ビビック光は九州、メガエッグは中国、ピカラ光は四国のみ。「全国どこでも」という説明は誤り。"},{"id":"G015","cat":"G","diff":3,"q":"auひかりの「集合住宅（マンション）」タイプの工事について正しいのはどれか？","choices":["建物内にKDDIの設備が導入済みの場合、屋外工事は不要で宅内工事のみで開通できる","マンションタイプは全物件で屋外・宅内の2回工事が必要で、戸建てタイプより工事日数が長くかかる","マンションタイプはKDDIの工事が一切不要で、申し込み後すぐに利用開始できる","マンションタイプはNTTの光回線設備を共用するため、管理組合の許可なく工事を進めることができない"],"ans":0,"exp":"auひかりマンションタイプは回線が共用部まで導入済みの場合、屋外工事は不要で基本的に宅内工事のみとなる。戸建ては外線・内線の両工事が必要。"},{"id":"H001","cat":"H","diff":5,"q":"Wi-Fiルーターを「ブリッジモード（APモード）」に設定する場合の説明として正しいのはどれか？","choices":["ブリッジモードにするとルーターのNAT・DHCP機能が無効になり、Wi-Fi中継器として動作する","ブリッジモードはルーターのWAN側とLAN側を論理的に分離し、セグメントごとに異なるIPv6プレフィックスを割り当てる動作モードである","ブリッジモードに設定するとルーターがWAN側のMACアドレスをLAN側端末に透過的に渡すため、各端末がグローバルIPを直接取得して通信する","ブリッジモードではルーターのSPIが有効になり、外部からの不正アクセスをより精密に検知・遮断する"],"ans":0,"exp":"ブリッジモード（APモード）はルーターのNAT・DHCP機能を無効にしてWi-Fi親機として動作させる設定。ONUやHGWをメインルーターとして使い、市販Wi-Fiルーターをブリッジモードで接続することで「二重NAT」を回避できる。NASやゲーム機のポート開放トラブルの原因になることが多い。"},{"id":"H002","cat":"H","diff":5,"q":"Wi-Fi 6（IEEE 802.11ax）とWi-Fi 5（IEEE 802.11ac）の違いとして正しいのはどれか？","choices":["Wi-Fi 6はOFDMAにより多数端末の同時接続効率が大幅に向上し、2.4GHz・5GHz両対応で理論最大速度はWi-Fi 5比約1.4倍","Wi-Fi 6はMU-MIMOのストリーム数が最大4から最大16に拡張され、5GHz帯の最大チャンネル幅が160MHzから320MHzに倍増している","Wi-Fi 6はOFDM変調をOFDMAに切り替えることで、単一端末への最大スループットがWi-Fi 5比で約4倍に向上している","Wi-Fi 6はBSS Coloringにより隣接APとのチャンネル重複が完全に排除され、混雑環境でも理論値に近い速度が出る"],"ans":0,"exp":"Wi-Fi 6（802.11ax）の主な改善点はOFDMA技術による多端末同時通信の効率化、MU-MIMOの強化、TWT（Target Wake Time）による省電力化。2.4GHz・5GHz両対応。最大理論速度はWi-Fi 5比で約1.4倍（9.6Gbps）。なおWi-Fi 6EはさらにWi-Fi6に6GHz帯を追加したもの。"},{"id":"H003","cat":"H","diff":6,"q":"光回線（1Gbps契約）でスピードテストを実施したところ「有線LAN接続で実測200Mbps、Wi-Fi接続で実測50Mbps」という結果が出た。原因として最も可能性が高いのはどれか？","choices":["有線200Mbpsが出ているためONU〜回線は正常。Wi-Fi区間がボトルネックであり、5GHz帯への切り替え・チャンネル変更・端末との距離確認から着手する","有線とWi-Fiの速度差が大きい場合はHGW内部のルーティング処理がボトルネックになっている可能性が高く、HGWのファームウェア更新を最初に試みる","有線200Mbpsは正常範囲だが、Wi-Fiが著しく遅い場合はONUとルーターWANポート間のオートネゴシエーション不整合が原因であることが多い","まずプロバイダの混雑状況をリアルタイムで確認し、夜間帯域制限が適用されていないかを確認してからWi-Fiの切り分けを行う"],"ans":0,"exp":"有線200Mbpsが出ているなら回線・ONU・HGWまでは問題ない。Wi-Fi区間がボトルネック。原因として①2.4GHz帯の混雑・電波干渉、②ルーターと端末の距離・障害物、③ルーター自体の性能、④端末のWi-Fi規格の古さが考えられる。5GHz帯（802.11ac以上）への切り替えが最初の改善手順。チャンネル変更・ルーターの設置場所変更も有効。"},{"id":"H004","cat":"H","diff":6,"q":"フレッツ光クロス（10Gbps）への乗り換えを検討しているお客様への案内として正しいのはどれか？","choices":["恩恵を受けるには10GbE対応ONU・ルーター・CAT6A以上のLANケーブル・PC側10GbEポートが全て必要","CAT6A以上の宅内配線があれば既存のWi-Fi 5ルーターでも有線10Gbpsの恩恵が受けられるため、まずLANケーブルの規格確認を優先する","ONUのみNTT東西が無償交換するが、ルーター・LANケーブルはCAT5eのままでも理論上10Gbpsの速度は出る","対応プロバイダへの変更は不要で、そのままIPoE接続を維持した状態で10Gbpsが利用できる"],"ans":0,"exp":"10Gbps（フレッツ光クロス等）で実測の高速を得るには全経路の対応が必要。①10GbE対応ONUまたはHGW、②10GbEポート付きルーター（CAT6A LANケーブル）、③接続端末の10GbEポート。Wi-Fi経由では現状Wi-Fi 6E（6GHz帯）でも理論値4.8Gbps程度が上限。PCの有線ポートがGbE（1Gbps）どまりの場合は10G投資のメリットが活かせない。"},{"id":"B021","cat":"B","diff":1,"q":"「@nifty光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（CATV系）","光コラボ","独自回線（電力系）"],"ans":2,"exp":"@nifty光はNTTフレッツ光を卸受けして提供する光コラボ。ニフティ株式会社が提供。IPv4 over IPv6（IPv6サービス）はJPIXのv6プラス（MAP-E）を採用。"},{"id":"B023","cat":"B","diff":1,"q":"「IIJmioひかり」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","光コラボ","独自回線（電力系）","独自回線（CATV系）"],"ans":1,"exp":"IIJmioひかりはNTTフレッツ光を卸受けして提供する光コラボ。IPv4 over IPv6（IPv6サービス）はインターネットマルチフィードのtransix（DS-Lite）を採用。"},{"id":"B024","cat":"B","diff":1,"q":"「DTI光」は次のどれに分類されるか？","choices":["独自回線（CATV系）","独自回線（電力系）","光コラボ","独自回線（ダークファイバー系）"],"ans":2,"exp":"DTI光はNTTフレッツ光を卸受けして提供する光コラボ。フリービット株式会社グループのDTI（ドリーム・トレイン・インターネット）が提供。"},{"id":"B025","cat":"B","diff":1,"q":"「AsahiNet光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（電力系）","独自回線（CATV系）","光コラボ"],"ans":3,"exp":"AsahiNet光は朝日ネット（ASAHInet）が提供する光コラボ。IPv4 over IPv6（IPv6サービス）は自社が提供するv6コネクト（DS-Lite）を採用している。"},{"id":"B026","cat":"B","diff":1,"q":"「hi-ho光」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（CATV系）","光コラボ","独自回線（ダークファイバー系）"],"ans":2,"exp":"hi-ho光はNTTフレッツ光を卸受けして提供する光コラボ。ハイホー株式会社（三菱電機インフォメーションネットワーク系列）が提供。"},{"id":"B027","cat":"B","diff":2,"q":"「OCN光（OCNで光）」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（CATV系）","光コラボ","独自回線（電力系）"],"ans":2,"exp":"OCN光（OCNで光）はNTTドコモが提供する個人向け光コラボ（2023年のNTTグループ再編で個人向けはNTTドコモに統合）。IPv4 over IPv6（IPv6サービス）はOCNバーチャルコネクト（MAP-E）を採用。2026年5月よりドコモ光・OCNインターネットへ順次統合中。"},{"id":"B028","cat":"B","diff":2,"q":"「BIGLOBE光」が採用しているIPv4 over IPv6（IPv6サービス）方式はどれか？","choices":["クロスパス（DS-Lite方式・規定上の運用）","IPv6オプション（v6プラス互換・MAP-E）","OCNバーチャルコネクト（MAP-E方式・規定）","transix（DS-Lite方式・規定上の運用）"],"ans":1,"exp":"BIGLOBE光はJPIXのv6プラスと互換性のある「IPv6オプション（MAP-E方式）」を採用。v6プラス対応ルーターで利用可能。"},{"id":"B029","cat":"B","diff":2,"q":"「スターキャット光」は次のどれに分類されるか？","choices":["独自回線（電力系）","独自回線（ダークファイバー系）","光コラボ","独自回線（CATV系）"],"ans":3,"exp":"スターキャット光は名古屋市・愛知県のCATV事業者・スターキャット・ケーブルネットワーク（中部電力グループ）が提供するCATV系サービス。"},{"id":"B030","cat":"B","diff":2,"q":"「ZTV（ケーブルテレビ）」は次のどれに分類されるか？","choices":["独自回線（電力系）","光コラボ","独自回線（CATV系）","独自回線（ダークファイバー系）"],"ans":2,"exp":"ZTVは三重・和歌山・滋賀エリアのCATV事業者（関西電力グループ）。CATV系インターネットサービス。"},{"id":"B031","cat":"B","diff":2,"q":"「ハルネット」「TOKAIネット」などの地域系インターネットサービスは一般的にどれに分類されるか？","choices":["独自回線（ダークファイバー系）","光コラボ","独自回線（CATV系）","独自回線（電力系）"],"ans":1,"exp":"地域系の多くの中小プロバイダはNTTフレッツ光を卸受けして提供する光コラボ。または「with フレッツ」でISPのみ提供しているケースもある。"},{"id":"B032","cat":"B","diff":2,"q":"「フレッツ 光ネクスト」と「ドコモ光」の最も大きな違いはどれか？","choices":["フレッツ光は最大100Mbpsだが、ドコモ光は最大1Gbpsの高速通信が可能","契約の形態（フレッツ光はNTT＋プロバイダの2社契約、ドコモ光はドコモとの1社契約）","フレッツ光はNTT東西が直接提供するためNTTが関与するが、ドコモ光はNTTとは独立したサービス","フレッツ光はIPoE接続に非対応でPPPoEのみだが、ドコモ光はIPoE接続が標準提供される"],"ans":1,"exp":"フレッツ光はNTT東西とプロバイダの2社別々に契約・支払いが必要。ドコモ光は光コラボとして回線＋プロバイダをドコモが一括提供し、請求も1本化される。物理的な回線は同じNTTのアクセスラインを使用。"},{"id":"B033","cat":"B","diff":3,"q":"次のうち「独自回線（電力系）」に分類されるのはどれか？","choices":["J:COM NET（CATVインターネット）","NURO光（ソニーネットワーク）","コミュファ光（中部電力グループ）","イッツコム（東急グループCATV）"],"ans":2,"exp":"コミュファ光は中部電力グループが提供する電力系独自回線。J:COM NETはCATV系、イッツコムはCATV系（東急グループ）、NURO光はダークファイバー系独自回線。"},{"id":"B034","cat":"B","diff":3,"q":"次のうち「光コラボ」に分類されるのはどれか？","choices":["NURO光（ソニーネットワーク）","eo光（関西電力グループ）","auひかり（KDDI独自回線）","楽天ひかり（NTTフレッツ卸）"],"ans":3,"exp":"楽天ひかりはNTTフレッツ光を卸受けして提供する光コラボ。auひかりはKDDI独自回線、NURO光はダークファイバー系独自回線、eo光は電力系独自回線。"},{"id":"B035","cat":"B","diff":3,"q":"次のうち「NTT東西が直接提供するフレッツ光」ではなく「光コラボ」であるのはどれか？","choices":["フレッツ 光ライト","フレッツ光クロス","SoftBank光","フレッツ光ネクスト（ファミリー・ギガラインプラン）"],"ans":2,"exp":"SoftBank光はNTTフレッツ光を卸受けしたソフトバンクの光コラボ。フレッツ光ネクスト（各プラン）・フレッツ光クロス・フレッツ光ライトはNTT東西が直接提供するフレッツ光サービス。"},{"id":"B036","cat":"B","diff":3,"q":"「auひかり」と「au回線（スマートフォン）」の乗り換えにおいて正しいのはどれか？","choices":["auひかりからドコモ光への乗り換えには工事が不要（規定上は事業者変更扱いの運用と判断する取り扱い）","auひかりはフレッツ回線なのでau以外のスマホでも乗り換え手続きができる（規定上の運用と判断する）","auひかりは独自回線であり、auを解約しても引き続きauひかりは利用できる（セット割は解除）","auひかりを解約すると自動的にauスマホも解約になる（規定上の連動解約運用と判断する取り扱い）"],"ans":2,"exp":"auひかりとauスマホは別契約のため、auスマホを解約してもauひかりは継続利用できる（ただしauスマートバリューのセット割は解除される）。auひかりからドコモ光への乗り換えは独自回線→光コラボのため新設工事が必要。"},{"id":"B037","cat":"B","diff":2,"q":"「povo光（仮称）」「UQ光」といったUQ/povo系の光サービスはどれに分類されるか？","choices":["独自回線（電力系）","auひかりと同一のKDDI独自回線","光コラボ","独自回線（ダークファイバー系）"],"ans":1,"exp":"UQ光・povo光はauひかりと同じKDDI・中部テレコム等が提供するサービスで、実質auひかりと同じ独自回線インフラを使用する。光コラボではない。"},{"id":"B038","cat":"B","diff":4,"q":"次の5つのうち「独自回線（ダークファイバー系または独自整備網）」に分類されるものの数として正しいのはどれか。①auひかり ②NURO光 ③eo光 ④楽天ひかり ⑤J:COM NET","choices":["3つ","1つ","4つ","2つ"],"ans":3,"exp":"①auひかり＝独自回線（KDDI系ダークファイバー/独自網）、②NURO光＝独自回線（ダークファイバー系）の2つ。③eo光＝独自回線だが電力系に分類、④楽天ひかり＝光コラボ、⑤J:COM NET＝CATV系。「ダークファイバー系」に限定すると①②の2つ。"},{"id":"B039","cat":"B","diff":3,"q":"「NURO光 for マンション」と「ドコモ光 マンションタイプ」の分類として正しいのはどれか？","choices":["NURO光・ドコモ光ともに光コラボ","NURO光・ドコモ光ともに独自回線","NURO光は独自回線、ドコモ光は光コラボ","NURO光は光コラボ、ドコモ光は独自回線"],"ans":2,"exp":"NURO光はマンションプランでもSONY系の独自回線（ダークファイバー系）。ドコモ光はマンションタイプでもNTTフレッツ光を使う光コラボ。サービス名に「マンション」がついても分類は変わらない。"},{"id":"B040","cat":"B","diff":2,"q":"次のうちISPとして「光コラボ」ではなく「フレッツ光 with プロバイダ」形態（NTT回線＋別途プロバイダ契約）で提供するサービスはどれか？","choices":["ドコモ光（NTTドコモが提供する光コラボサービス）","フレッツ光（NTT直販）＋OCN等の別途プロバイダ契約","楽天ひかり（楽天モバイルが提供する光コラボサービス）","SoftBank光（ソフトバンクが提供する光コラボ）"],"ans":1,"exp":"フレッツ光（NTT直販）はNTT東西との回線契約にOCN・ぷらら・BIGLOBEなど別途プロバイダと個別契約する「2社契約モデル」。ドコモ光・SoftBank光・楽天ひかりはいずれも光コラボで1社契約モデル。"},{"id":"B041","cat":"B","diff":3,"q":"光コラボとフレッツ光（NTT直販）でまったく同じなのはどれか？","choices":["フレッツ光も光コラボも同じNTT東西が一括して請求書を発行しお客様に送付する","建物に引き込まれている光ファイバーの物理回線","月額料金はどちらも同じNTT東西の料金表に基づき設定されるため全プランで一致している","フレッツ光でも光コラボでも全く同じプロバイダ（OCN・BIGLOBE等）が使用できる"],"ans":1,"exp":"光コラボもフレッツ光も、建物に引き込まれる物理的な光ファイバー回線はまったく同じNTT東西のアクセスライン。違うのは契約形態・料金体系・請求元・プロバイダなど。"},{"id":"B042","cat":"B","diff":2,"q":"「ぷらら光」は次のどれに分類されるか？","choices":["独自回線（ダークファイバー系）","独自回線（CATV系）","独自回線（電力系）","光コラボ"],"ans":3,"exp":"ぷらら光はNTTドコモグループのぷらら（現NTTドコモ）が提供する光コラボ。2022年にドコモに吸収合併。"},{"id":"B043","cat":"B","diff":3,"q":"次のうち提供エリアが全国でないのはどれか？","choices":["楽天ひかり","ドコモ光","SoftBank光","eo光（関西電力グループ）"],"ans":3,"exp":"eo光は関西電力グループのオプテージが提供する電力系独自回線で、関西地方限定。ドコモ光・楽天ひかり・SoftBank光はNTTフレッツ光を使う光コラボで全国展開している。"},{"id":"B044","cat":"B","diff":3,"q":"次のうち光コラボの乗り換え（事業者変更）が最も手軽に行える組み合わせはどれか？","choices":["ドコモ光→SoftBank光","auひかり→ドコモ光","NURO光→楽天ひかり","eo光→andline光SE"],"ans":0,"exp":"ドコモ光→SoftBank光はどちらも光コラボのため「事業者変更」で工事不要。auひかり→ドコモ光・NURO光→楽天ひかりはいずれも独自回線→光コラボの新設工事が必要。eo光→andline光SEも独自回線→光コラボで新設工事が必要。"},{"id":"B045","cat":"B","diff":3,"q":"「フレッツ光クロス」の説明として正しいのはどれか？","choices":["NTT東西が提供する下り最大10Gbpsのフレッツプランで光コラボとしても卸提供されているが対応エリアやプロバイダが限定される","NTT東西が一部エリアで試験提供する2.5Gbpsの中間速度プランで光コラボへの卸提供は未対応のままとなっている","ソフトバンクが独自に整備した10Gbps光回線サービスでNTTフレッツ光とは別系統のアクセスラインを使用している","NURO光が関東・関西エリア限定で提供する10GbpsプランでNTTのダークファイバーをフルに活用した独自規格"],"ans":0,"exp":"フレッツ光クロスはNTT東西が提供する下り最大10Gbpsのフレッツ光プラン。光コラボとしても卸提供されているが、対応ISPや提供エリアが1Gbpsプランより限定的。IPoEサービスもフレッツ光ネクストとは一部対応VNEが異なる。"},{"id":"B046","cat":"B","diff":4,"q":"「andline光SE」の分類と提供会社の組み合わせとして正しいのはどれか？","choices":["光コラボ / 株式会社アイキューブ・マーケティング","フレッツ光直販 / NTT東日本・NTT西日本","MVNO回線バンドル / 株式会社インターネットイニシアティブ（IIJ）","CATV系インターネット / 株式会社ジュピターテレコム（J:COM）"],"ans":0,"exp":"andline光SEは株式会社アイキューブ・マーケティングが提供する光コラボ。NTT東西から卸電気通信役務の提供を受けて光回線とプロバイダをセットで提供している。"},{"id":"B047","cat":"B","diff":2,"q":"「mineo光（マイネオ光）」は次のどれに分類されるか？","choices":["独自回線（CATV系）","独自回線（電力系）","独自回線（ダークファイバー系）","光コラボ"],"ans":3,"exp":"mineo光はオプテージが提供する光コラボ。同社のeo光（電力系独自回線）とは別サービスで、全国展開を目的にNTTフレッツ光を卸受けして提供している。"},{"id":"B048","cat":"B","diff":3,"q":"「NURO光 東海・北陸・東北エリア」について正しいのはどれか？","choices":["NURO光は全47都道府県で完全に自社独自インフラのみを使って均一なサービスを展開している","東北エリアのNURO光はNTT東日本との業務提携によりフレッツ光として直接契約する形態になっている","NURO光は全提供エリアで下り最大2Gbpsをサービス水準協定（SLA）で速度保証している","東海・北陸・東北などの一部エリアではNTTフレッツ光回線を使った光コラボとして提供されており、本家NURO光と異なる"],"ans":3,"exp":"NURO光は関東・関西・中部・九州・沖縄が自社独自回線での提供だが、一部エリア（東北・北海道など）ではNTTフレッツ光回線を使った光コラボ形態での提供となり、サービス内容や速度が異なる場合がある。"},{"id":"B049","cat":"B","diff":2,"q":"「コミュファ光」と「auスマートバリュー」の組み合わせについて正しいのはどれか？","choices":["コミュファ光でのauスマートバリュー適用には光電話の契約が不要（規定上の運用と判断する取扱）","コミュファ光はNTT系なのでauスマートバリューは適用できない（規定上の運用と判断する取り扱い）","コミュファ光は中部電力系独自回線だが、auスマートバリューの対象サービスとなっている","コミュファ光でのセット割はau限定で他社スマホは対象外（規定上の運用と判断する取り扱い）"],"ans":2,"exp":"コミュファ光（中部テレコミュニケーション）はKDDI系企業のため、auスマートバリューおよびUQ自宅セット割の対象サービス。同様にeo光・BBIQ・メガエッグ・ピカラ光も同様の割引対象となっている。"},{"id":"B050","cat":"B","diff":3,"q":"次のうち「事業者変更」ではなく必ず「新規工事（新設）」が必要になる乗り換えはどれか？","choices":["ドコモ光→楽天ひかり","auひかり→ドコモ光","@nifty光→GMOとくとくBB光","SoftBank光→andline光SE"],"ans":1,"exp":"auひかりは独自回線のため、フレッツ系光コラボであるドコモ光への乗り換えには新設工事が必要。ドコモ光→楽天ひかり、SoftBank光→andline光SE、@nifty光→GMOとくとくBB光はいずれも光コラボ間の事業者変更で工事不要。"},{"id":"B051","cat":"B","diff":2,"q":"「ケーブルワン」「ケーブルテレビ富山」などの地域CATV系インターネットサービスの分類として正しいのはどれか？","choices":["独自回線（CATV系）","独自回線（電力系）","独自回線（ダークファイバー系）","光コラボ"],"ans":0,"exp":"地域のCATV（ケーブルテレビ）会社が提供するインターネットサービスはCATV系に分類。同軸ケーブルやHFC構成を使うことが多く、地域によって速度・品質が異なる。"},{"id":"B052","cat":"B","diff":3,"q":"「フレッツ光」から「ドコモ光」に乗り換えた後、物理的な光ファイバー回線はどうなるか？","choices":["乗り換えと同時にドコモが独自に敷設した新しい光ファイバーに物理的に切り替わる","以前のフレッツ光と全く同じ光ファイバー回線を引き続き使用する（アクセスライン不変）","NTT東西がドコモ光用に新設した最新の光ファイバー設備に順次交換される","切替処理の数時間だけ無線回線で代替接続されその後光回線に自動復旧する"],"ans":1,"exp":"光コラボへの転用・事業者変更は論理的な契約変更であり、物理的なNTT東西のアクセスライン（光ファイバー）はまったく変わらない。そのため工事が不要で、ONUもそのまま使い続けることができる。"},{"id":"B053","cat":"B","diff":3,"q":"光コラボの説明として誤っているのはどれか？","choices":["光コラボを利用するとNTT東西の光回線設備は使われなくなる","NTT東西から光回線を卸受けして提供するサービス","光コラボのプロバイダを変えるには事業者変更が必要","光コラボ間の乗り換えは「事業者変更」と呼ばれ原則工事不要"],"ans":0,"exp":"光コラボを利用していても物理的には同じNTT東西のアクセスライン（光ファイバー・ONU）を使用している。「NTT東西の設備が使われなくなる」は誤り。光コラボは契約・請求の窓口を一本化しただけで物理インフラは変わらない。"},{"id":"B054","cat":"B","diff":3,"q":"「楽天ひかり」が採用しているVNEサービスとIPv4 over IPv6（IPv6サービス）方式として正しいのはどれか？","choices":["アルテリア・ネットワークス / クロスパス（DS-Lite）","インターネットマルチフィード / v6プラス（MAP-E）","BBIX / v6コネクト（MAP-E）","NTTコミュニケーションズ / OCNバーチャルコネクト（DS-Lite）"],"ans":0,"exp":"楽天ひかりはアルテリア・ネットワークスが提供するクロスパス（Xpass）をVNEサービスとして採用。IPv4 over IPv6（IPv6サービス）方式はDS-Lite（可変IP）またはIPIPトンネリング（固定IP）。"},{"id":"B055","cat":"B","diff":3,"q":"「SoftBank光」が採用しているIPv4 over IPv6（IPv6サービス）サービスの特殊性として正しいのはどれか？","choices":["クロスパス（DS-Lite）を採用しており楽天ひかりと同じルーターが使える","BBIXのIPv6高速ハイブリッドを採用しており、ソフトバンク専用の光BBユニットのみに対応","transix（DS-Lite）なので市販のDS-Lite対応ルーターで利用できる","v6プラス（MAP-E）なので市販のMAP-E対応ルーターで利用できる"],"ans":1,"exp":"SoftBank光はBBIXのIPv6高速ハイブリッドを採用。MAP-EでもDS-LiteでもないIPIP独自方式で、ソフトバンクが提供する光BBユニット専用。他のVNEと互換性がなく、v6プラス対応ルーターでは利用できない。"},{"id":"B056","cat":"B","diff":4,"q":"ドコモ光のIPv4 over IPv6（IPv6サービス）について正しいのはどれか？","choices":["ドコモ光はIPv4 over IPv6（IPv6サービス）に対応しておらず、全プロバイダでPPPoE接続のみを提供する","ドコモ光ではタイプA契約者はv6プラス、タイプB契約者はOCNバーチャルコネクトと法令で定められている","ドコモ光のIPv4 over IPv6（IPv6サービス）はプロバイダによって採用するVNEが異なる。","ドコモ光は全プロバイダでv6プラス（MAP-E）に統一されており、ルーター選定に迷いが生じない"],"ans":2,"exp":"ドコモ光のIPv4 over IPv6（IPv6サービス）はプロバイダによって採用するVNEが異なる。OCNインターネット・ぷらら等はOCNバーチャルコネクト（MAP-E）、BIGLOBE・GMOとくとくBB等はv6プラス（MAP-E）、ASAHInetはv6コネクト（DS-Lite）など。ルーター選定時は自分のプロバイダが使うVNEを確認してから対応機器を選ぶことが必要。"},{"id":"B057","cat":"B","diff":3,"q":"「enひかり」の特徴として他の光コラボと大きく異なる点はどれか？","choices":["VNEサービス（v6プラス・transix）をプロバイダ変更なしに選択・切り替えできる","enひかりはすべての工事が完全無料で初期費用ゼロで申し込める点が大きな特徴","enひかりはひかり電話が月額料金に含まれており追加費用なしで標準提供される","enひかりの月額料金は他の光コラボと比較して業界最安値水準を常に維持している"],"ans":0,"exp":"enひかりはv6プラス（JPIX/MAP-E）とtransix（インターネットマルチフィード/DS-Lite）の2つのVNEから選択・切り替えができる珍しい光コラボ。他社は基本的にVNEが固定されており選べない。"},{"id":"B058","cat":"B","diff":4,"q":"「andline光SE」と「ドコモ光（タイプA）」の乗り換えについて正しいのはどれか？","choices":["どちらも光コラボなので事業者変更で工事不要","andline光SEは光コラボだがドコモ光タイプAはCATVのため工事が必要","ドコモ光は独自のNGN設備を持つため転用承諾番号を使った特殊手続きが必要","andline光SEからドコモ光への変更は同系列サービスのため手続き不要で自動移行される"],"ans":0,"exp":"andline光SEもドコモ光もNTTフレッツ光を卸受けした光コラボ。光コラボ→光コラボの乗り換えは「事業者変更」で工事不要（原則無派遣工事）。"},{"id":"B059","cat":"B","diff":3,"q":"次のうち「独自回線（CATV系）」に分類されるものとして正しいのはどれか？","choices":["BBIQ（ビビック光）","コミュファ光","イッツコム（東急線沿線）","eo光（オプテージ）"],"ans":2,"exp":"イッツコムはイッツ・コミュニケーションズ（東急グループ）が提供するCATV系のインターネットサービス。eo光・コミュファ光・ビビック光はいずれも独自回線（電力系）。"},{"id":"B060","cat":"B","diff":3,"q":"「IIJmioひかり」が採用しているIPv4 over IPv6（IPv6サービス）方式として正しいのはどれか？","choices":["v6プラス（MAP-E）","OCNバーチャルコネクト（MAP-E）","クロスパス（DS-Lite）","transix（DS-Lite）"],"ans":3,"exp":"IIJmioひかりはインターネットマルチフィードのtransix（DS-Lite）を採用。IIJはインターネットマルチフィードの主要株主であることもあり、transixを長年採用している。"},{"id":"X001","cat":"X","diff":2,"q":"フレッツ光（NTT直販）を利用する場合の契約形態として正しいのはどれか？","choices":["NTT東西（回線）とプロバイダ（接続）の2社と別々に契約が必要","NTT東西のみとの契約でプロバイダは不要（規定上の運用と判断する）","NTT東西との1社契約でインターネットが利用できる（規定の運用）","スマートフォンキャリアとのセット契約が必須であり省略した場合は開通しない"],"ans":0,"exp":"フレッツ光（NTT直販）を利用するには、NTT東西との回線契約とは別に、OCN・ぷらら・BIGLOBEなどのプロバイダ（ISP）と個別に契約する必要がある。請求書も2本（NTT東西＋プロバイダ）届く。"},{"id":"X002","cat":"X","diff":2,"q":"フレッツ光を利用中のお客様がプロバイダの料金をNTTに対して支払っているが正しいか？","choices":["誤り。フレッツ光ではプロバイダ選択に関わらず全プランでインターネット接続料金はゼロ円で提供されている","正しい。フレッツ光はNTT東西がプロバイダ料を合算して請求する「まとめ払いサービス」を全プランで標準提供している","誤り。フレッツ光（NTT直販）ではNTTへの回線使用料とプロバイダへのサービス料は別々に支払う","正しい。フレッツ光ではNTT東西がプロバイダ料も含めてすべての通信費を一括管理し、月次でユーザーに自動精算する"],"ans":2,"exp":"フレッツ光（NTT直販）では回線使用料はNTT東西へ、インターネット接続料はプロバイダへと別々に支払う2本立て請求。この「2社契約・2本請求」を解消するために生まれたのが光コラボモデル。"},{"id":"X003","cat":"X","diff":2,"q":"フレッツ光に対応するプロバイダ（「with フレッツ」対応）の例として正しいのはどれか？","choices":["フレッツ光への接続プロバイダは光コラボとして認定された事業者のみが提供できる","フレッツ光に対応できるプロバイダはNTT東西の完全子会社のみに限定されている","OCN・ぷらら・BIGLOBE・@niftyなどのISP","au（KDDI）はNTTフレッツ光回線に対応したプロバイダとして「with フレッツ」に公式参加している"],"ans":2,"exp":"フレッツ光に対応する「with フレッツ」対応プロバイダには、OCN（NTTドコモビジネス）、ぷらら（NTTドコモ）、BIGLOBE、@nifty（ニフティ）、DTI、IIJなど多数のISPが含まれる。"},{"id":"X004","cat":"X","diff":2,"q":"「フレッツ光からドコモ光への転用」の動機として最も一般的なのはどれか？","choices":["NTTとプロバイダへの2本の請求が1本に一本化される","転用するとひかり電話の月額料金が永年無料になる特典が適用される","転用すると同じ光ファイバーでも通信速度が大幅に向上する","転用すると自動的にIPv6 IPoEが有効になり夜間の速度改善が保証される"],"ans":0,"exp":"フレッツ光（NTT直販）の主な不便さは「NTT東西＋プロバイダへの2本請求」。光コラボに転用すると請求が1本化されるため管理がシンプルになる。速度やIPv6は転用後も同じアクセスラインを使うため変化しない（プロバイダが変わる場合は接続方式が変わることはある）。"},{"id":"X005","cat":"X","diff":2,"q":"フレッツ光（NTT直販）のメリットとして正しいのはどれか？","choices":["フレッツ光（NTT直販）の月額料金は光コラボより常に低く設定されており費用面で有利","フレッツ光（NTT直販）は工事費が一切かからず無料で開通できるサービス","プロバイダを自由に変更・複数契約が可能で、希望のプロバイダと組み合わせられる","フレッツ光（NTT直販）は光コラボよりもNTT設備への近さから通信速度が速い"],"ans":2,"exp":"フレッツ光（NTT直販）の最大のメリットはプロバイダの自由度。複数のISPを同時に契約したり、好みのプロバイダを自由に変更できる。光コラボはプロバイダが固定されるため、こうした柔軟性はない。"},{"id":"X006","cat":"X","diff":2,"q":"フレッツ光（NTT直販）の「フレッツ 光ネクスト ファミリー・ギガラインプラン」の最大通信速度として正しいのはどれか？","choices":["100Mbps","10Gbps","200Mbps","1Gbps（下り最大）"],"ans":3,"exp":"フレッツ 光ネクスト ファミリー・ギガラインプランは下り最大1Gbpsのサービス。光コラボのandline光SEも同等のFTTHアクセス回線（ファミリー・ギガラインプラン）を使用する。10Gbpsはフレッツ光クロスのプラン。"},{"id":"X007","cat":"X","diff":2,"q":"「フレッツ 光ネクスト スーパーハイスピードタイプ隼」の最大通信速度として正しいのはどれか？","choices":["100Mbps","200Mbps","10Gbps","1Gbps（下り最大）"],"ans":3,"exp":"フレッツ光ネクスト スーパーハイスピードタイプ隼は下り最大1Gbpsのサービス。ファミリー・ギガラインプランと同様の速度だが提供形態が異なる。andline光SEの重要事項説明書にも記載されているFTTHアクセス回線タイプの一つ。"},{"id":"X008","cat":"X","diff":3,"q":"フレッツ光（NTT直販）の契約でインターネットに接続するために必要なのはどれか？","choices":["NTT東西との回線契約＋プロバイダとのインターネット接続契約（2つ必要）","NTT東西との回線契約のみであり、他の手続きや機器は一切不要","プロバイダとの契約のみ（NTTへの申し込みは不要）","ひかり電話の契約が必須であり省略した場合は開通しない"],"ans":0,"exp":"フレッツ光でインターネットを使うにはNTT東西の回線契約（フレッツ光）とプロバイダのインターネット接続サービスの2つが必要。どちらかだけでは接続できない。"},{"id":"X009","cat":"X","diff":3,"q":"「with フレッツ」の説明として正しいのはどれか？","choices":["NTT東西がエンドユーザーに直接提供する公式の光コラボサービスの名称","フレッツ光の契約者だけが利用できる公衆Wi-Fiスポットサービスの名称","フレッツ光の次世代高速プランである10Gbpsサービス（光クロス）の旧称","フレッツ光（NTT直販）とISPを組み合わせて使う接続形態の総称"],"ans":3,"exp":"「with フレッツ」はNTT東西のフレッツ光回線と対応プロバイダ（OCN・BIGLOBE等）を個別に契約して組み合わせる接続形態の総称。光コラボとは異なりNTT東西とプロバイダへの2社契約・2本請求になる。"},{"id":"X010","cat":"X","diff":3,"q":"フレッツ光（NTT直販）を光コラボ（ドコモ光など）に「転用」した際、プロバイダはどうなるか？","choices":["転用手続きが完了した瞬間に以前のプロバイダとの契約は自動的に解約される","以前のプロバイダは光コラボのプロバイダに変わり、ユーザーが解約しない限り二重契約になる","転用後も以前のプロバイダがそのまま新サービスのプロバイダとして引き継がれる","プロバイダとの既存契約はNTT東西が転用手続きと同時に代行して全て解約する"],"ans":1,"exp":"フレッツ光から光コラボに転用しても、以前のプロバイダ（OCN・ぷらら等）との契約は自動解約されない。ユーザー自身が旧プロバイダに解約手続きをしないと二重払いになる。andline光SE重要事項説明書でも明記されている重要事項。"},{"id":"X011","cat":"X","diff":2,"q":"フレッツ光のエリア確認は何で行うか？","choices":["NTT東西の公式サイトでの住所入力による提供エリア検索","スマートフォンのGPS機能で自動判定","プロバイダ各社が独自に提供エリアを設定しているため各社に問い合わせ","NTT東西に電話して担当者に聞くしかない"],"ans":0,"exp":"フレッツ光の提供エリアはNTT東西の公式サイト（東日本：flets-east.jp、西日本：flets-west.jp）で住所を入力して確認できる。光コラボ事業者もこのエリア情報に基づいてサービスを提供しているため、光コラボのエリア確認もほぼ同様の手順で可能。"},{"id":"X012","cat":"X","diff":2,"q":"「フレッツ光ネクスト」と「フレッツ光クロス」の最大の違いはどれか？","choices":["フレッツ光ネクストはNTT東日本のみ、フレッツ光クロスはNTT西日本のみ","フレッツ光ネクストは最大1Gbps、フレッツ光クロスは最大10Gbpsの回線速度","フレッツ光ネクストは光コラボに転用不可、フレッツ光クロスは光コラボに転用可能","フレッツ光ネクストは法人向け、フレッツ光クロスは個人向け"],"ans":1,"exp":"フレッツ光ネクストは下り最大1Gbpsの光回線（ファミリー・ギガラインプラン等）。フレッツ光クロスは下り最大10Gbpsの超高速光回線。両方ともNTT東西が提供し、光コラボへの卸提供も行っている。"},{"id":"X013","cat":"X","diff":2,"q":"「フレッツ光」の請求書発行元は誰か？","choices":["NTTドコモビジネスがまとめて請求する（規定上の運用と判断する）","NTT東西のみであり、他の手続きや機器は一切不要だ","プロバイダ（OCN・ぷらら等）のみであり機器は不要","NTT東西からの請求書とプロバイダからの請求書の2本が届く"],"ans":3,"exp":"フレッツ光（NTT直販）では回線利用料はNTT東西から、インターネット接続料はプロバイダからと2本の請求書が届く。これを解消する「請求1本化」が光コラボへの転用動機の一つ。"},{"id":"X014","cat":"X","diff":3,"q":"フレッツ光の「v6オプション」の申し込みは誰が行うか？","choices":["利用中のプロバイダを通じて申し込む","NTT東西に直接申し込む","光コラボ事業者にのみ申し込める","v6オプションは自動適用のため申し込み不要"],"ans":0,"exp":"フレッツ光（NTT直販）でのv6オプション申し込みは、契約しているプロバイダを通じて行うのが一般的（プロバイダがNTTに代行申請する）。プロバイダによってはプロバイダ側のサービスメニューから申し込む形になる。"},{"id":"X015","cat":"X","diff":3,"q":"フレッツ光（NTT直販）から光コラボに転用する場合、転用できないものはどれか？","choices":["現在のプロバイダとのサービス契約（プロバイダが光コラボの指定プロバイダでない場合）","フレッツ光のひかり電話の電話番号は転用時に廃番となり新しい番号が発番される","光ファイバーの物理配線は転用の際に撤去・取り替えされるため引き継げない","ONUはお客様が購入しているため転用しても持ち出し可能だが転用の対象外となる"],"ans":0,"exp":"フレッツ光から光コラボに転用する際、電話番号・光ファイバーアクセスライン・ONUはそのまま引き継げる。ただし現在のプロバイダが転用先の光コラボの指定プロバイダでない場合、そのプロバイダとのサービスは転用できない（光コラボ指定のプロバイダに切り替わる）。"},{"id":"X016","cat":"X","diff":2,"q":"「フレッツ光ライト」の特徴として正しいのはどれか？","choices":["フレッツ光ライトは集合住宅にのみ提供されている特別低価格の高速回線プラン","月間データ量に上限があり、使用量に応じて速度が変化する従量課金型プラン","フレッツ光ライトは光ファイバーを使った最大10Gbpsの超高速通信プラン","フレッツ光クロスをリニューアルして提供するサービスの別名がフレッツ光ライト"],"ans":1,"exp":"フレッツ光ライトは月間使用量が少ない月は安価になる従量課金型の光回線プラン。ヘビーユーザーには不向きだが、あまりインターネットを使わないユーザーにはコスト面でメリットがある。"},{"id":"X017","cat":"X","diff":3,"q":"フレッツ光（NTT直販）のユーザーが「インターネット接続が遅い」と感じた場合、どちらに問い合わせるべきか？","choices":["どのような速度問題でもまずプロバイダに問い合わせてNTT東西への連絡を代行してもらう","インターネット接続の速度問題はすべてNTT東西が担当するためNTT東西にのみ問い合わせる","フレッツ光の速度問題はスマートフォンキャリア（au・ドコモ等）のネットワーク担当に問い合わせる","原因によって異なる（回線側はNTT東西、接続サービス・速度側はプロバイダ）"],"ans":3,"exp":"フレッツ光（NTT直販）は2社契約のため、問い合わせ先も分かれる。光ファイバーの断線・ONU故障等の物理回線問題はNTT東西へ、速度低下・PPPoE設定・IPv6設定等の接続問題はプロバイダへ問い合わせる。この点、光コラボは窓口が1本化されているため問い合わせがシンプル。"},{"id":"X018","cat":"X","diff":2,"q":"「フレッツ光」のONUはどちらが設置・管理するか？","choices":["フレッツ光のONUは光コラボ事業者（ドコモ・ソフトバンク等）が設置・管理する","フレッツ光のONUはお客様が家電量販店等で自費購入して自身で設置する機器","フレッツ光のONUはプロバイダ（OCN・BIGLOBE等）が設置・管理し故障時もプロバイダが対応する","NTT東西が設置し、NTT東西が管理（故障時の対応もNTT東西）"],"ans":3,"exp":"フレッツ光のONUはNTT東西が設置・管理する。故障時の交換依頼もNTT東西へ。光コラボの場合でも、アクセスライン（光ファイバー）やONUの管理はNTT東西が行う（光コラボ事業者はその上の契約・サービス部分を担当）。"},{"id":"X019","cat":"X","diff":3,"q":"フレッツ光（NTT直販）を解約せずにプロバイダのみを変更したい場合の手続きとして正しいのはどれか？","choices":["フレッツ光の回線契約はそのままに、旧プロバイダを解約して新プロバイダを申し込むだけで変更できる","フレッツ光の回線契約ごと新プロバイダに移行するため、NTTへの転用承諾番号の取得が必要（規定）","プロバイダ変更には工事が必要で、最短でも数日の通信断が発生する（規定上の運用と判断する取扱）","フレッツ光（NTT直販）ではプロバイダが固定されており、変更するには一度解約が必要（規定の運用）"],"ans":0,"exp":"フレッツ光（NTT直販）ではプロバイダは独立した契約のため、フレッツ光の回線契約は維持したまま旧プロバイダを解約し、新プロバイダを申し込むだけで変更できる。光コラボはプロバイダ変更可否が事業者により異なり、ドコモ光のように複数プロバイダから選べる事業者ではプロバイダのみ変更できるが、単一ISP一体型の事業者では事業者変更が必要になる。"},{"id":"X020","cat":"X","diff":3,"q":"「andline光SE（光コラボ）」からNTT東西の「フレッツ光（NTT直販）」に戻すことはできるか？","choices":["できない。光コラボからフレッツ光（NTT直販）への逆方向の手続きは制度上存在しない","できる。光コラボからフレッツ光（NTT直販）への「再転用」の制度がある","できるが、アクセスラインが変わるため新規工事（派遣工事）が必要になる","できるが、NTT東西の窓口ではなく元の光コラボ事業者を通じて申し込む必要がある"],"ans":1,"exp":"光コラボからフレッツ光（NTT直販）への切り替えは「再転用」として可能（NTT東西のサービスへ戻す転用）。事業者変更承諾番号を取得してNTT東西の担当窓口に申し込む。工事は不要（アクセスラインが変わらないため）。"},{"id":"X021","cat":"X","diff":3,"q":"「フレッツ光ネクスト」における「ファミリータイプ」と「マンションタイプ」の最大の違いはどれか？","choices":["IPv6が使えるかどうかの違い（ファミリーのみIPv6対応・マンションは非対応）","速度の違い（ファミリーは100Mbps、マンションは1Gbpsで2桁差がある）","建物種別と配線方式の違い（ファミリーは戸建て向け専用線、マンションは集合住宅向け共用線）","プロバイダの選択肢の違い（ファミリーは指定3社のみ、マンションは自由に選択可能）"],"ans":2,"exp":"ファミリータイプは戸建て向けで光ファイバーを専用で引き込む（FTTH専用線）。マンションタイプは集合住宅向けで建物内の共用設備から各部屋に配線する（VDSL・LAN・光配線方式など）。速度はプランによって異なるが建物種別が主な違い。"},{"id":"X022","cat":"X","diff":3,"q":"フレッツ光のプロバイダを「OCN」から「BIGLOBE」に変更する際の手順として正しいのはどれか？","choices":["事業者変更承諾番号をOCNから取得してBIGLOBEに提示する","NTT東西にプロバイダ変更の届出をしてOCNに解約通知が自動送信される","フレッツ光の回線契約はそのままにOCNを解約してBIGLOBEを申し込む","フレッツ光を一旦解約してBIGLOBE光（光コラボ）として新規申込する"],"ans":2,"exp":"フレッツ光（NTT直販）でのプロバイダ変更は、現プロバイダ（OCN）を解約して新プロバイダ（BIGLOBE）を申し込むだけ。フレッツ光の回線契約は継続されるため工事不要・事業者変更承諾番号も不要。光コラボとは異なり、プロバイダは独立して変更できる。"},{"id":"X023","cat":"X","diff":3,"q":"フレッツ光（NTT直販）とひかり電話の契約関係として正しいのはどれか？","choices":["ひかり電話はフレッツ光を申し込むと自動的に付いてくる","ひかり電話はNTT東西との回線契約に付随して申し込むサービス","ひかり電話はプロバイダとの契約で提供される","ひかり電話はスマートフォンキャリアとの契約で提供される"],"ans":1,"exp":"ひかり電話はNTT東西のフレッツ光の付加サービスとして、NTT東西との回線契約に付随して申し込む。光コラボに転用する場合、ひかり電話も光コラボ事業者のサービス（andline電話等）として自動的に転用される。"},{"id":"X024","cat":"X","diff":3,"q":"フレッツ光（NTT直販）の主なデメリットとして当てはまらないのはどれか？","choices":["月額料金が回線料とプロバイダ料の2本立てで請求が分かれる点","スマートフォンとのセット割引が光コラボと比べて少ない点","プロバイダを自由に変更できない（光コラボと違い1社しか選べない）","障害時の問い合わせ窓口がNTT東西とプロバイダで二つに分かれる点"],"ans":2,"exp":"フレッツ光（NTT直販）はプロバイダを自由に変更・複数契約できるのがメリット（デメリットではない）。むしろ2本請求・窓口分散・セット割の少なさがデメリット。光コラボは請求1本化やスマホセット割がメリット。"},{"id":"X025","cat":"X","diff":4,"q":"フレッツ光（NTT直販）で複数のプロバイダを同時契約できるのはなぜか？","choices":["フレッツ光の回線契約とプロバイダ契約が独立しているため、複数プロバイダを別々に契約して同時利用できる","フレッツ光は帯域保証型サービスのため、プロバイダを増やすほど各プロバイダへの割り当て速度が均等分割される","NTT東西が複数プロバイダへの同時接続を公式に推奨しており、専用の「マルチプロバイダ契約プラン」が存在する","フレッツ光のHGWがVLAN分割機能を持つため、1つの物理回線を仮想的に複数回線として各プロバイダに割り当てられる"],"ans":0,"exp":"フレッツ光（NTT直販）はNTT東西との回線契約にプロバイダ契約が独立しているため、複数のプロバイダを同時に契約して使い分けることが可能（例：自宅用にOCN・ゲーム用にBIGLOBEなど）。光コラボはプロバイダが固定されるためこの使い方はできない。"},{"id":"A016","cat":"A","diff":1,"q":"光回線の「ベストエフォート型」サービスとはどういう意味か？","choices":["24時間いつでも契約速度と同一の速度が安定して出ることを保証するサービス","契約速度（最大速度）を目標に最善努力をするが速度保証はないサービス","通信速度の最低値が契約時に保証される品質保証型のサービス","月間データ量の上限がなく速度制限なしで使い続けられる無制限サービス"],"ans":1,"exp":"ベストエフォート型とは「最善努力型」の意味で、記載されている速度（例：1Gbps）はあくまで理論上の最大値であり保証ではない。実際の速度は時間帯・利用者数・端末性能などにより変動する。andline光SEを含む一般的な光回線はすべてベストエフォート型。"},{"id":"A017","cat":"A","diff":2,"q":"「ONU」と「HGW（ホームゲートウェイ）」の違いとして正しいのはどれか？","choices":["ONUは光信号変換のみを行う機器。HGWはONU機能にルーター機能＋ひかり電話対応が追加された機器","どちらも同じ機器だが、ONUはNTT東西管理でHGWはプロバイダ管理という違いがあるだけ","ONUはプロバイダが設置・管理し、HGWはNTT東西が設置・管理する別々の機器である","HGWはWi-Fi電波を発射する無線親機で、ONUは有線のみ対応した旧式の接続機器"],"ans":0,"exp":"ONUは光信号をデジタル信号に変換するだけのシンプルな機器。HGW（ホームゲートウェイ）はONU機能にルーター機能・ひかり電話対応機能が統合されたもので、ひかり電話を契約すると設置される。Wi-Fi機能は別途Wi-Fiオプションで追加が必要。"},{"id":"A018","cat":"A","diff":2,"q":"光回線の「ONUの責任分解点」について正しいのはどれか？","choices":["ONUはお客様が購入するため全て自己責任","ONUまでの機器はNTT東西が管理。","責任分解点は回線の引き込み口（光コンセント）であり、ONUはお客様の管理","ONUの故障はお客様が修理費用を負担する"],"ans":1,"exp":"光回線の責任分解点（デマーケーションポイント）はONU。ONUまでの光ファイバー・ONUはNTT東西（または光コラボ事業者）が提供・管理。ONU以降のLAN配線・Wi-Fiルーター・PC等はお客様の管理範囲。"},{"id":"A019","cat":"A","diff":3,"q":"「PPPoE」と「IPoE」を同一回線で同時に使うことはできるか？","choices":["できる。IPoEで主に接続しながら、PPPoEでも別途接続して使い分けることが可能","できない。IPoEを有効にすると回線がIPv6専用になりPPPoEは無効になる","できる。ただしNTT東西への追加申請が必要であり省略した場合は開通しない","できない。どちらか一方しか選べない（プロバイダ側で排他制御されている）"],"ans":0,"exp":"IPoEとPPPoEは同一フレッツ光回線で同時に利用できる。IPv6サイトはIPoEで高速に接続しながら、古いIPv4専用ポートが必要なサービスはPPPoEで接続するなど使い分けが可能。プロバイダによっては「PPPoE動的IPアドレス追加オプション」として提供している。"},{"id":"A020","cat":"A","diff":3,"q":"NTT東西が提供する「フレッツ v6オプション」の申し込みが必要な状況として正しいのはどれか？","choices":["フレッツ光に新規契約したユーザー全員に開通と同時に自動で適用されるオプション（規定上の運用と判断する取り扱い）","PPPoE接続のみで満足しているユーザーには不要。IPoE（IPv6 IPoE）接続を利用したいユーザーがプロバイダを通じて申し込む","v6オプションは2024年4月以降すべてのフレッツ光契約で標準廃止となったサービス（規定上の運用と判断する取り扱い）","v6オプションはプロバイダ独自のサービスのため、NTT東西ではなくプロバイダのみに申し込む（規定上の運用と判断する取り扱い）"],"ans":1,"exp":"フレッツ v6オプションはIPoE（IPv6 IPoE）接続を利用するためにNTT東西のNGN設備に設定するオプション。PPPoEのみで問題ない場合は不要。通常はISP（プロバイダ）がNTT東西に代行申請する。光コラボの場合は自動的に設定されているケースが多い。"},{"id":"A021","cat":"A","diff":3,"q":"光回線の「網終端装置（NTE）」がボトルネックになるのはどのような接続方式か？","choices":["IPoE（IPv6 IPoE）接続","IPv4 over IPv6（IPv6サービス）（MAP-E）接続","DS-Lite接続","PPPoE接続"],"ans":3,"exp":"網終端装置（NTE）はPPPoE接続でのみ経由する装置。夜間の利用集中でボトルネックとなる。IPoE接続はこの装置を迂回するため影響を受けない。IPv4 over IPv6（IPv6サービス）（MAP-E・DS-Lite）はIPoEの上で動くため同様に網終端装置を経由しない。"},{"id":"A022","cat":"A","diff":4,"q":"「NGN（次世代ネットワーク）」の説明として正しいのはどれか？","choices":["NTT東西が運営する光ファイバーを使ったIP通信ネットワーク基盤","NTT東西が開発した電話回線とIP回線を統合した音声専用の次世代交換機","総務省が主導するISP間のピアリング標準規格で光回線全体に適用される","VNE事業者が独自に整備する高速IPバックボーンネットワークの総称"],"ans":0,"exp":"NGN（Next Generation Network：次世代ネットワーク）はNTT東西が構築・運営するIP通信ネットワーク基盤。フレッツ光の通信はこのNGN上で動く。VNE事業者もNTT東西のNGNに接続してIPoEサービスを提供している。"},{"id":"A023","cat":"A","diff":3,"q":"「光コラボ事業者変更」の際に発生する「v6オプション競合」の原因として正しいのはどれか？","choices":["NGN設備では1回線に1つのv6オプションしか設定できないため旧廃止前に新設処理が走ると競合する","v6オプションはIPv6アドレスが世界に1つしか存在しないため同時に2社が保持できない","光コラボ事業者間でv6オプションの利用料が二重請求されることで発生する課金競合","NTTのNGN設備がIPv6とIPv4を同時処理できないため切替時に一時的に競合する"],"ans":0,"exp":"NTT東西のNGN設備は1回線に1つのv6オプションしか設定できない仕様。事業者変更時に旧事業者のv6オプション廃止処理の完了前に新事業者の新設処理が走ると「既に設定済み」として新設が失敗し、IPoEが使えない状態になる。"},{"id":"A024","cat":"A","diff":3,"q":"光回線の「速度低下の主な原因」として当てはまらないのはどれか？","choices":["端末（PC・スマホ）のNICや処理能力の限界","光ファイバーの物理的な色（光の波長選択）","使用しているWi-Fiルーターの性能限界","夜間のPPPoE接続での網終端装置の混雑"],"ans":1,"exp":"光ファイバーの色（光の波長）は速度低下の原因にはならない。速度低下の主な原因は①夜間のPPPoE/網終端装置の混雑②Wi-Fiルーターの性能③端末の処理能力やNICの規格④LAN配線の品質（カテゴリ）⑤集合住宅の配線方式（VDSL等）など。"},{"id":"A025","cat":"A","diff":2,"q":"「光ファイバー」がインターネット接続に適している理由として正しいのはどれか？","choices":["ガラス繊維製で金属より軽量なため長距離配線でも重力による断線が起きにくい","電気信号ではなく光を使うが、強い太陽光が当たると信号と混在して干渉が起きやすい","気体（空気）を媒体として光を伝送するため配管工事や壁穴あけが一切不要になる","光信号を使うため電磁波干渉を受けにくく、長距離伝送でも減衰が少なく高速通信が可能"],"ans":3,"exp":"光ファイバーは光信号（電気信号ではなく光）を使って情報を伝送する。電磁波干渉を受けにくく、長距離でも信号減衰が少なく、高速・大容量通信に適している。一般家庭向け光回線として1Gbps〜10Gbpsの通信が可能。"},{"id":"A026","cat":"A","diff":2,"q":"集合住宅の光回線で「LAN配線方式」の説明として正しいのはどれか？","choices":["棟内の共用スペースから各部屋までLANケーブル（メタル線）で配線する方式","共用スペースから各部屋まで光ファイバーを1本ずつ直接引き込むFTTH方式","棟内に設置した共用無線LANルーターの電波を各部屋で受信して接続する方式","既存のCATVケーブル（同軸）をそのまま流用してインターネット信号を重畳する方式"],"ans":0,"exp":"LAN配線方式は棟内の共用スペース（MDF室等）に光ファイバーを引き込み、そこから各部屋まではLANケーブル（メタル線）で接続する方式。VDSL方式と比べて速度が出やすいが、光配線方式（光ファイバーを各部屋に直接引き込む）ほどではない。"},{"id":"A027","cat":"A","diff":3,"q":"「FTTH（Fiber to the Home）」とはどういう意味か？","choices":["光ファイバーを電話局まで引く方式（FTTC型の運用と判断する取り扱い）","光ファイバーを建物の棟内共用スペースまで引き込む方式（FTTB型の運用）","光ファイバーを利用者の宅内（家の中）まで直接引き込む通信方式","光ファイバーを建物の外壁まで引き込む方式（FTTC型の運用と判断する）"],"ans":2,"exp":"FTTH（Fiber to the Home）は光ファイバーを利用者の家の中まで直接引き込む通信方式。フレッツ光・光コラボの戸建てプランや光配線方式のマンションがこれに該当。VDSL方式やLAN配線方式との違いは「光ファイバーが宅内まで来ているか」にある。"},{"id":"A028","cat":"A","diff":3,"q":"光回線の「ファミリータイプ（戸建て）」と「マンションタイプ」で速度に差が出る原因として正しいのはどれか？","choices":["マンションタイプは共用設備や配線方式（VDSL・LAN等）を共有するため方式によって最終区間がボトルネックになる","マンションタイプは棟内で複数のONUを1台に集約しているためONU性能がボトルネックになる","マンションタイプはNTT局舎からの距離が戸建てより遠くなるため伝送損失が大きくなる","マンションタイプは法定上の電波帯域制限により最大通信速度が500Mbpsに制限されている"],"ans":0,"exp":"マンションタイプでは棟内の共用設備（VDSL・LAN・光配線等）を経由するため、配
