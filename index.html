線方式によって実効速度に差が出る。光配線方式（FTTH）であれば戸建てと同等の速度が出るが、VDSLでは最大100Mbps程度、LAN配線でも共用帯域の影響を受ける場合がある。"},{"id":"A029","cat":"A","diff":3,"q":"「インターネット接続サービス（プロバイダ）」の役割として正しいのはどれか？","choices":["光ファイバーのインフラ整備・維持管理を担い各家庭へ回線を直接提供する事業者","スマートフォンの通信網を管理しモバイルとの連携サービスを提供する事業者","NTT東西のフレッツ光回線（アクセスライン）とインターネットを接続するゲートウェイを提供する事業者","Wi-Fiの電波を広域に飛ばしエリア内ユーザーに無線接続を提供する事業者"],"ans":2,"exp":"プロバイダ（ISP）はNTT東西の光回線とインターネットを接続するゲートウェイ（IPアドレスの割り当て・DNSサーバーの提供・メールサーバー等）を提供する事業者。光回線はNTT東西、インターネット接続はプロバイダという役割分担がある。"},{"id":"A030","cat":"A","diff":3,"q":"「光コラボ」と「フレッツ光（NTT直販）」で実際に異なるのはどれか？","choices":["契約・請求の形態とプロバイダの種類","光ファイバーの線種とONUのファームウェアバージョン","NGNへの接続方式と通信品質の保証レベル","提供エリアの範囲とフレッツ電話の利用可否"],"ans":0,"exp":"光コラボとフレッツ光（NTT直販）は物理的なアクセスライン（光ファイバー）・ONUの基本機能・NTT東西のNGN設備はまったく同じ。異なるのは契約の窓口（光コラボ事業者orNTT直販）・請求形態（1本or2本）・プロバイダの種類。"},{"id":"C021","cat":"C","diff":2,"q":"光回線の工事の「土日祝加算」について正しいのはどれか？","choices":["土日祝の工事は必ず追加料金（3,300円程度）が発生する","土日祝は工事業者の休日のため原則として工事は実施されない","土日祝に工事を依頼すると平日より料金が割安になる特別割引がある","土日祝の工事費は平日と完全に同一で追加料金はいっさい発生しない"],"ans":0,"exp":"andline光SEの工事前確認でも案内すべき重要事項。土日祝に工事を行う場合は「割増工事料（3,300円税込）」が加算される。フレッツ・テレビ伝送サービス利用規約の割増工事費規定にも記載。"},{"id":"C022","cat":"C","diff":2,"q":"光回線の「派遣工事」で工事員が宅内に入れない場合はどうなるか？","choices":["工事費を支払えば書類上で開通処理できる","工事員が強制的に入ることができる","工事が実施できないため日程を変更する必要がある","宅外のみの工事を行いインターネットを仮開通させる"],"ans":2,"exp":"派遣工事は工事員が宅内に入って作業を行うことが必須。当日に立ち会えない場合や工事員が入室できない場合は工事が実施できず日程変更になる。工事当日の不在は最も多いトラブルの一つ。"},{"id":"C023","cat":"C","diff":3,"q":"「戸建て賃貸」でandline光SEに申し込む場合の注意点として正しいのはどれか？","choices":["戸建て賃貸は必ず無派遣工事になる（NTTの規定で派遣工事は実施不可となる）","集合住宅と同様にオーナー・管理会社の許可が必要（壁への穴あけ等の工事がある場合）","工事前に物件の登記確認が必要であり省略した場合は開通しない（規定で義務）","賃貸物件では光回線の申し込みができない（技術的・制度的に手段がない・規定）"],"ans":1,"exp":"戸建て賃貸では集合住宅と同様に、壁への穴あけや配管の使用等が発生する場合はオーナー・管理会社の許可が必要。特に新規引き込みでは壁に穴をあけることがあるため、事前に承諾を得るよう案内する。"},{"id":"C024","cat":"C","diff":3,"q":"「転用」申し込み後、工事日が確定するまでの流れとして正しいのはどれか？","choices":["転用承諾番号取得後andline光SEに申し込むと当日中に自動で開通する","転用承諾番号の取得からNTT東西の工事完了まで最低でも1か月以上かかる","転用承諾番号を取得し申し込み後、NTTの工事調整を経て工事日が確定する（通常数日〜数週間）","転用は物理工事が不要なため申し込みと同時にその場で即日開通する"],"ans":2,"exp":"転用はNTT東西の設備上での切替処理（無派遣工事）が大半だが、申し込みからNTTの処理・切替日の確定まで通常数日〜2週間程度かかる。混雑状況や申し込み時期によっても変動する。"},{"id":"C025","cat":"C","diff":3,"q":"光回線の工事で「穴あけ不可」の制約がある場合の代替手段として存在するのはどれか？","choices":["窓から光ファイバーを室内に引き込む（規定上の特例措置）","衛星回線への自動切り替え（規定上の代替手段の運用）","エアコンダクトや既存の電話線配管を利用した引き込み","穴あけ不可の場合は光回線の申し込み自体ができない（規定）"],"ans":2,"exp":"穴あけができない場合（賃貸等）でも、エアコンのドレン配管（エアコンダクト）や既設の電話線配管が使える場合は光ファイバーを引き込める。これらも使えない場合は工事不可となり、ホームルーターや他の手段を検討する。"},{"id":"C026","cat":"C","diff":2,"q":"andline光SEの「解約手続きの期限」として正しいのはどれか？","choices":["解約希望月の15日までにカスタマーサポートデスクへ連絡が必要","年に2回の解約受付期間内のみ手続き可能（規定上の運用と判断する取り扱い）","解約は希望日の1ヶ月前から受け付け（規定上の運用と判断する取り扱い）","解約希望月の1日までに連絡が必要であり省略した場合は開通しない"],"ans":0,"exp":"andline光SEの解約は解約希望月の15日までにカスタマーサポートデスク（0120-978-736）へ連絡。15日を過ぎると翌月末の解約になる。解約月の月額料金は日割りにならず1ヶ月分請求される。"},{"id":"C027","cat":"C","diff":3,"q":"「転用」と「事業者変更」の違いとして正しいのはどれか？","choices":["転用はフレッツ光（NTT直販）→光コラボ、事業者変更は光コラボ→別の光コラボ","転用は光コラボ→フレッツ光（NTT直販）、事業者変更はフレッツ光（NTT直販）→光コラボ","転用も事業者変更も同じ手続きで承諾番号の名称が事業者によって異なるだけ","転用はNTT東西が発行する番号、事業者変更は総務省が発行する番号を使う"],"ans":0,"exp":"転用：NTT直販フレッツ光→光コラボ（転用承諾番号・有効15日）。事業者変更：光コラボ→別の光コラボ（事業者変更承諾番号・有効15日）。どちらもアクセスライン不変のため原則工事不要。"},{"id":"C028","cat":"C","diff":3,"q":"光回線の「開通後の設定」においてルーターにID/パスワードを設定する必要があるのはどの接続方式か？","choices":["PPPoE接続のみ（IDとパスワードがプロバイダから発行される）","IPoE接続のみ（IPv6アドレスの自動取得にプロバイダのID認証が必要）","PPPoEとIPoEの両方（どちらもプロバイダのID認証を経由してNGNに接続するため）","どちらも不要（ONU内部でID/パスワードが自動生成されルーターへの手動入力は一切ない）"],"ans":0,"exp":"PPPoE接続ではプロバイダから発行されるユーザーID（xxxxx@provider.ne.jp形式）とパスワードをルーターに設定する必要がある。IPv6 IPoE（IPoE方式）ではID/パスワードは不要で、ルーターが自動的に接続設定を取得する。andline光SEの重要事項説明書でも「IPv6接続ではID/パスワードの通知はしていない」と明記。"},{"id":"C029","cat":"C","diff":4,"q":"集合住宅の光回線工事で「MDF室（主配線盤室）」が何か理解している必要があるのはなぜか？","choices":["棟内の光ファイバー・通信配線の集約場所であり、光回線工事ではMDF室での作業が発生するため管理会社の開錠手配が必要","MDF室が建物の何階にあるかによって配線距離が変わり工事費の計算に直接影響するため確認が必要","MDF室は各戸のお客様専用スペースのため工事員には入室権限がなく事前の法的許可申請が必要","MDF室には光回線工事で設置するWi-Fiルーターの設定端末が置かれており設定作業のために入室が必要"],"ans":0,"exp":"MDF室（Main Distribution Frame室）は集合住宅の棟内で光ファイバーや電話線等の通信配線が集約されている部屋。光回線の新規工事や配線変更ではMDF室での作業が必要になるため、管理会社に事前連絡して当日の開錠手配が必要。"},{"id":"C030","cat":"C","diff":4,"q":"「フレッツ光クロス（10Gbps）」から他の光コラボ（1Gbps）への事業者変更について正しいのはどれか？","choices":["10Gbpsから1Gbpsへのダウングレード工事が必要なため工事を伴う事業者変更となる","フレッツ光クロスから光コラボへの変更は転用承諾番号ではなく特別移行番号が必要になる","フレッツ光クロスは独自設備のため1Gbpsの光コラボへの変更は技術的に不可能","フレッツ光クロス対応エリアは限定されておりエリア外の光コラボへは変更申請ができない"],"ans":0,"exp":"フレッツ光クロス（10Gbps）から1Gbpsの光コラボへ変更する場合、10Gbps対応の設備から1Gbps対応設備への切替工事が必要。工事を伴うため日程調整が必要。なお1Gbpsの光コラボ間での事業者変更は工事不要。"},{"id":"C031","cat":"C","diff":2,"q":"「無派遣工事」でのONUセルフ取り付けについて正しいのはどれか？","choices":["無派遣工事では工事員が短時間で接続してすぐに帰る（規定上の運用と判断する取扱）","無派遣工事でも必ず立ち会いが必要であり省略した場合は開通しない（規定上の運用と判断）","ONUが郵送されてくるため、お客様自身で光コンセントにONUを接続し電源を入れる","ONUは工事員が取り付けるため無派遣でも立ち会いが必要であり省略した場合は開通しない"],"ans":2,"exp":"無派遣工事ではNTT東西の工事員が宅内に来ず、郵送されたONUをお客様自身で光コンセントに挿して電源を入れるだけで開通する。接続方法は同梱の説明書またはスタートガイドに記載されており、難しい作業ではない。"},{"id":"C032","cat":"C","diff":3,"q":"「光回線の引き込み工事後のONUの設置場所」について正しいのはどれか？","choices":["ONUは防水仕様のため屋外の電気メーターボックス内に必ず設置する","ONUは電波干渉を避けるため必ず玄関の壁面に固定設置しなければならない","ONUの設置場所はNTT東西の工事担当者が規定の位置に一方的に決定する","工事当日にお客様と工事員が相談して決定するため、事前に設置希望場所を考えておく必要がある"],"ans":3,"exp":"ONUの設置場所は工事当日に工事員とお客様が相談して決定する。基本的には光ファイバーの引き込み口（光コンセントの位置）に近い場所になるが、可能な範囲で希望の部屋・場所を伝えられる。工事前確認でお客様の希望を事前に聞いておくのが良い。"},{"id":"C033","cat":"C","diff":3,"q":"光回線の工事後すぐにインターネットに繋がらない場合、最初に確認すべき点として正しいのはどれか？","choices":["ONUの動作ランプ・ルーターとONUのLAN接続・PPPoEの場合はID/パスワードの設定を順番に確認する","まず光コラボ事業者のサポートに電話し開通証明番号を伝えることで遠隔復旧を依頼する","工事直後は24時間のNGN設備反映待ちが必須のためルーターの再起動はその後に行う","ONUのSN番号をプロバイダのマイページに登録しないと通信が開放されない仕様になっている"],"ans":0,"exp":"工事後の接続不良の多くは「ルーターの設定未完了」が原因。まずONUの動作ランプ（PON・DATA点灯確認）→ルーターとONUのLAN接続確認→PPPoEの場合はルーターへのID/パスワード設定確認の順で切り分ける。IPoEの場合はID/パスワード不要なためルーターの自動設定待ち。"},{"id":"C034","cat":"C","diff":4,"q":"「マンションでの光回線の配線方式変更（VDSL→光配線）工事」について正しいのはどれか？","choices":["お客様が個人でカスタマーサポートに申し込めば無料でVDSL方式から光配線方式にいつでも変更できる","一度VDSL方式として設計された棟内配線は技術的・物理的にFTTH光配線への変更が根本的に不可能","各世帯が個別に工事費（戸当たり約5万円）を負担することでVDSLから光配線への変更申し込みが可能","NTT東西がマンションの管理組合または管理会社に提案・工事する形式が多く、お客様個人では申し込めないケースが多い"],"ans":3,"exp":"VDSL→光配線方式への移行工事は棟全体の共用設備の変更を伴うため、NTT東西から管理組合・管理会社への提案・交渉が必要で、個人では申し込めないケースが多い。NTT東西は老朽化したVDSL設備の置き換えを進めているが、建物単位での対応となる。"},{"id":"C035","cat":"C","diff":4,"q":"andline光SEの契約において「法人契約」の特徴として正しいのはどれか？","choices":["法人契約では契約者が法人名義になり担当者変更や担当者不在時の手続きには権限確認が必要","法人契約では月額料金が個人契約の1.5倍になる代わりに固定IPアドレスが標準で付与される","法人契約では2回線以上の同時申し込みが必須条件となり単独での1回線申し込みはできない","法人契約では工事費が全額免除される代わりに最低2年間の解約禁止期間が設定される"],"ans":0,"exp":"andline光SEの法人契約では契約名義が会社名になる。担当者が変更になった場合や担当者不在時に手続きを行う場合は、会社としての権限確認が必要。また請求書の名義・振込先等も会社名義になる。"},{"id":"C036","cat":"C","diff":3,"q":"「光コラボからホームルーターへの乗り換え」で工事について正しいのはどれか？","choices":["ホームルーターへ乗り換えると光回線が自動解約される","ホームルーターはSIMカードを挿入して使用する機器のため工事不要。","ホームルーターへの乗り換えには派遣工事が必要であり省略した場合は開通しない","光回線の解約と同時にホームルーターが自動的に開通する"],"ans":1,"exp":"ホームルーターはSIM（5G/4G）を使う機器のため設置工事は不要。ただし光回線は自動解約されないため、お客様が光コラボ事業者に解約の連絡をする必要がある。ホームルーターを使い始めてから光回線を解約するまでの二重払い期間に注意。"},{"id":"C037","cat":"C","diff":2,"q":"光回線の工事で「壁の外側に光キャビネット（光ローゼット）を設置する」のはどのような場合か？","choices":["ONUを建物の外壁に設置して屋外からも管理できるようにするための工事","Wi-Fiルーターを外壁に固定することで電波の届く範囲を広げるための設置工事","集合住宅の場合に限り各部屋の外壁に光キャビネットを設置する工事のこと","戸建て住宅で光ファイバーを新規に宅内に引き込む際、建物外壁に引き込み口として設置する"],"ans":3,"exp":"戸建て住宅の新規光ファイバー引き込み工事では、建物の外壁に光キャビネット（光ローゼット）を設置して、そこから宅内に光ファイバーを引き込む。エアコンダクトや既存電話配管を使う場合は不要なこともある。"},{"id":"C038","cat":"C","diff":3,"q":"「光回線の工事日変更・キャンセル」の連絡先として正しいのはどれか？","choices":["申し込みをした光コラボ事業者に連絡する","工事を担当するNTT東西の工事店に直接連絡する","変更・キャンセルは受け付けていない","NTT東西に直接連絡する"],"ans":0,"exp":"工事日の変更・キャンセルは申し込み先の光コラボ事業者（andline光SEの場合は0120-978-736）に連絡する。直接NTT東西や工事店に連絡しても対応できない。工事3日前の午後7時までに連絡が必要。"},{"id":"C039","cat":"C","diff":2,"q":"「光回線の月額料金の日割り計算」について正しいのはどれか？","choices":["開通月は日割り計算（開通日から月末まで）、解約月は日割りなし（1ヶ月分請求）","開通月も解約月もすべて日割り計算が適用され利用日数分だけ請求される","月の途中に開通した場合のみ日割りで、1日開通なら日割りは適用されない","開通月も解約月も日割り計算は一切適用されず常に1か月分が請求される"],"ans":0,"exp":"andline光SEは開通月（利用開始月）は開通日から月末まで日割り計算される。解約月は日割りにならず1ヶ月分請求される。この非対称な計算方法はお客様への案内で特に注意が必要な点。"},{"id":"C040","cat":"C","diff":3,"q":"andline光SEで「ひかり電話なし（ONUのみ）」の環境でIPoE接続を使う場合のルーターについて正しいのはどれか？","choices":["ひかり電話なしの場合はIPoEは利用できない（技術的・制度的に手段がない）","IPoE対応のルーターが必要（ONUだけではIPoEの接続設定ができない）","NTTからIPoE専用ルーターが自動的に郵送される","ルーターなしでONUに直接PCを繋げばIPoEで接続できる"],"ans":1,"exp":"ひかり電話なし（ONUのみ）の環境でIPoEを使うには、v6プラス対応等のIPoE対応ルーターが必要。ONUに直接PCを繋いだだけではIPoEの接続設定（VNEサービスへの認証・接続）ができない。IPoE非対応ルーターの場合はPPPoE接続になる。"},{"id":"C041","cat":"C","diff":3,"q":"光コラボの「初期工事費の分割払い」について正しいのはどれか？","choices":["andline光SEでは派遣工事料金を一括払いまたは12回分割払いで選択できる","andline光SEでは工事費は全て月額料金に含まれており別途請求は一切発生しない","andline光SEでは分割払いを選択した場合クレジットカード払いのみ受け付けている","andline光SEでは工事費の分割払いは36回のみで一括払いへの変更は申込時のみ可能"],"ans":0,"exp":"andline光SEでは派遣工事料金（19,800円税込）を一括払いまたは12回分割払い（1,650円/月）から選択できる。ただし途中解約した場合の残債については確認が必要。"},{"id":"C042","cat":"C","diff":4,"q":"「光コラボの事業者変更」で工事が必要になる例外ケースとして正しいのはどれか？","choices":["事業者変更に工事が必要なケースは一切ない（光コラボ間の切替は全て無工事で完結する規定）","プロバイダが変わる場合は常に工事が必要であり省略した場合は開通しない（規定で義務）","マンションタイプから戸建てタイプへの変更では工事が必要であり省略した場合は開通しない","ドコモ光10ギガなど10Gbpsプランからの事業者変更では、1Gbpsへのダウングレード工事が必要"],"ans":3,"exp":"通常の光コラボ間の事業者変更（1Gbpsprラン同士）は工事不要。ただしドコモ光10ギガ等の10Gbpsプランから他社の1Gbpsプランへ変更する場合は、NTT東西側でのプラン変更工事が必要になる。"},{"id":"C044","cat":"C","diff":3,"q":"「転用承諾番号の有効期限」について正しいのはどれか？","choices":["有効期限はない（使い切るまで有効）","有効期限は60日間","有効期限は30日間","有効期限は取得日から15日間"],"ans":3,"exp":"転用承諾番号の有効期限は取得日から15日間。期限内に光コラボ事業者への申し込みが完了する必要がある。有効期限切れの場合は再取得が必要。なお事業者変更承諾番号の有効期限も同じく15日間である。"},{"id":"C045","cat":"C","diff":3,"q":"「事業者変更承諾番号の有効期限」として正しいのはどれか？","choices":["60日間","30日間","15日間","90日間"],"ans":2,"exp":"事業者変更承諾番号の有効期限は取得日（発行日）を含む15日間。期限を過ぎると無効になり再取得が必要。転用承諾番号も同じく15日間。2022年7月以降、新規申込者については発行手数料が無料化されている。"},{"id":"D021","cat":"D","diff":3,"q":"IPv6アドレスとIPv4アドレスの最大数の比較として正しいのはどれか？","choices":["IPv6はIPv4より少ないがセキュリティが高い（規定の運用と判断する取扱）","IPv4は約43億個、IPv6は約340澗個で実質無限といえる数","IPv6はIPv4の2倍のアドレス数を持つ（規定の運用と判断する取扱）","IPv4とIPv6のアドレス数は同じ（規定の運用と判断する取り扱い）"],"ans":1,"exp":"IPv4は32ビットで約43億個のアドレス。IPv6は128ビットで約340澗個（3.4×10の38乗）のアドレス。インターネット接続端末の爆発的増加によりIPv4アドレスが枯渇したため、IPv6への移行が進んでいる。"},{"id":"D022","cat":"D","diff":6,"q":"「MAP-E」のフルネームとして正しいのはどれか？","choices":["Managed Access Protocol for Ethernet","Multi-Address Port Enhancement","Multiple Access Protocol over Ethernet","Mapping of Address and Port using Encapsulation"],"ans":3,"exp":"MAP-E（Mapping of Address and Port using Encapsulation）は、1つのIPv4グローバルアドレスを複数ユーザーで共有し、ポート番号の範囲を割り当てることでIPv4 over IPv6（IPv6サービス）通信を実現する技術方式。JPIXのv6プラス等で採用。"},{"id":"D023","cat":"D","diff":6,"q":"「DS-Lite」のフルネームと仕組みとして正しいのはどれか？","choices":["Dual Stack Lite。IPv4のパケットをIPv6トンネルでカプセル化してVNE側でNATを行う","Dedicated Service Line。企業向けに専用の物理線を使って接続するサービス","Direct Stream Lite。送受信データをリアルタイム圧縮して帯域を効率化する技術","Dynamic Spectrum Lite。周波数帯域をリアルタイムで動的に割り当てる無線技術"],"ans":0,"exp":"DS-Lite（Dual Stack Lite）はIPv4パケットをIPv6トンネルに包んでVNE側（AFTRサーバー）まで運び、VNE側でNAT変換する方式。NATがVNE側に集約されるため、エンドユーザー側のルーターにNAT設定は不要だが、ポート開放ができないデメリットがある。"},{"id":"D024","cat":"D","diff":3,"q":"「IPv4 over IPv6（IPv6サービス）」接続中にPPPoEも使いたい場合（固定IPが必要等）の方法として正しいのはどれか？","choices":["IPv4 over IPv6（IPv6サービス）を一旦完全に無効化してからPPPoEを新規に有効にする","現在のプロバイダを解約して別のPPPoE専用プロバイダに変更するしか方法がない","IPv4 over IPv6（IPv6サービス）とPPPoEは技術的に同一回線での同時利用が不可能だ","「PPPoE動的IPアドレス追加オプション」等の手続きにより、IPoE接続と並行してPPPoE接続も使用できる"],"ans":3,"exp":"IPoE（IPv4 over IPv6（IPv6サービス））とPPPoEは同一回線で並行利用可能。プロバイダによっては「PPPoE動的IPアドレス追加オプション」として提供しており、メインはIPoEで高速接続しながらPPPoEでも接続を維持できる。ただしPPPoE追加には月額費用が発生する場合がある。"},{"id":"D025","cat":"D","diff":5,"q":"「MAP-E方式でのポート開放」について最も正確な説明はどれか？","choices":["MAP-EではNATをルーター側で行うため、VNEから割り当てられたポート範囲内であればルーターでポート開放の設定が可能","MAP-EではNATをVNE側のサーバーで行うため、ユーザー側のルーターからはポート開放の操作ができない","MAP-EはDS-Liteと同様にポート開放が完全に不可能であり、ポートを使うサービスはPPPoEに切り替える必要がある","MAP-Eではポート開放が可能だが、開放できるのは1〜1023番ポート（ウェルノウンポート）のみに限定される"],"ans":0,"exp":"MAP-E方式はNATをルーター側で行う（NATステートレス）ため、VNEから割り当てられたポートの範囲内であればルーターでのポート開放設定が可能。ただし全ポートが使えるわけではなく、割り当てられた範囲に制限される。DS-Liteと違いポート開放自体は可能なのが特徴。"},{"id":"D026","cat":"D","diff":6,"q":"「IPv6のリンクローカルアドレス」の特徴として正しいのはどれか？","choices":["fe80::で始まる同一リンク内のみで通信できるアドレスで、インターネットには到達しない","fe80::で始まるアドレスで、プロバイダから自動割り当てされるグローバルIPv6アドレスの一種","2001::で始まる同一リンク内専用アドレスで、DHCPv6サーバーが割り当てる","fe80::で始まり、VPNトンネル内でのみ使用されるIPv6の専用アドレス形式"],"ans":0,"exp":"IPv6リンクローカルアドレスはfe80::で始まり、同一リンク（同じネットワーク接続内）の通信のみに使われる。インターネットへの通信にはグローバルIPv6アドレスが必要。光回線のIPoE接続でIPv6が使えるようになるのはグローバルIPv6アドレスを取得した場合。"},{"id":"D027","cat":"D","diff":4,"q":"「IPoEの接続確認方法」として正しいのはどれか？","choices":["https://test-ipv6.com/等のIPv6テストサイトにアクセスしてIPv6アドレスが付与されているか確認する","IPoE接続の確認はルーターの管理画面のみで行え、外部サイトへのアクセスでは確認できない（規定上の運用と判断する取扱）","IPoE接続の確認にはNTT東西の専用確認ツールをPCにインストールする必要がある（規定上の運用と判断する取扱）","ルーターのWAN側IPアドレスが192.168.x.x以外であればIPoE接続が確立していると判断できる（規定の運用）"],"ans":0,"exp":"IPoE（IPv6）接続の確認は、PCで「https://test-ipv6.com/」などのIPv6テストサイトにアクセスして、IPv6アドレスが付与されているか（IPv6でインターネットに接続できているか）を確認する方法が一般的。"},{"id":"D028","cat":"D","diff":5,"q":"「DNSサーバー」の役割として正しいのはどれか？","choices":["インターネットの通信速度を測定するサーバー","Wi-Fiの電波を増幅するサーバー","ドメイン名をIPアドレスに変換するサーバー","ルーターのNAT変換を代行するサーバー"],"ans":2,"exp":"DNSサーバー（Domain Name System）はドメイン名（例：google.com）をIPアドレス（例：142.250.x.x）に変換する「インターネットの電話帳」。プロバイダがDNSサーバーを提供するのが一般的。IPoE環境でもプロバイダのDNSを使う。"},{"id":"D029","cat":"D","diff":5,"q":"光回線で「ポート80番」「ポート443番」が特別な理由として正しいのはどれか？","choices":["ひかり電話が優先的に使うウェルノウンポートで、この2つが埋まるとひかり電話の発着信が不安定になる可能性があるから","NTTが自社サービス用に予約管理しているポートで、光コラボ事業者はこれらのポートを業務用途に転用できない規定があるから","ポート80はHTTP（Webブラウジング）、ポート443はHTTPSのウェルノウンポートで、一般的なWebブラウジングに使われる","MAP-EやDS-Liteの環境ではポート80・443がVNEのセキュリティポリシーで強制ブロックされるから"],"ans":2,"exp":"ポート80番はHTTP（Webページ閲覧の非暗号化通信）、ポート443番はHTTPS（SSL/TLS暗号化Web通信）のウェルノウンポート（Well-known Port）。MAP-EやDS-Liteでも通常のWebブラウジングには問題なく使える。ゲームサーバーや特殊サービスでは別の固有ポートを使うことがある。"},{"id":"D030","cat":"D","diff":5,"q":"「v6プラス（MAP-E）」接続中にPS5等でオンラインゲームをする場合の注意点として正しいのはどれか？","choices":["MAP-EはPS5の通信仕様に最適化された方式のためゲームには全く問題ない（規定上の運用と判断する取り扱い上のルール）","MAP-E環境ではすべてのオンラインゲームが技術的な理由から動作しなくなる（規定上の運用と判断する取り扱い上のルール）","オンラインゲームはすべてIPv6プロトコルで動作するためMAP-EのIPv4制限は無関係だ（規定上の運用と判断する取り扱い）","通常プレイ（クライアント側）は問題ないが、ゲームサーバーを立てたりポート開放が必要な機能（UPnP等）を使う場合は動作しない可能性がある"],"ans":3,"exp":"v6プラス（MAP-E）では通常のオンラインゲームプレイ（クライアントとして参加）は問題なく動作する。ただしゲームサーバーを自宅で立てたり、UPnPが必要な一部ゲームの特定機能（NAT越え等）は、割り当てポートの制限で動作しない場合がある。"},{"id":"D031","cat":"D","diff":3,"q":"「光回線の実測速度をスピードテストで測る際」の注意点として正しいのはどれか？","choices":["有線LAN接続でテストしないと、Wi-Fi区間の速度がボトルネックになり正確な回線速度が測れない","スピードテストはNTT提供の公式サイトのみを使用しなければ正確な測定結果が得られない","スピードテストはONUの電源投入直後30分以内に行わないと回線の初期化状態が終わっておらず正確に測れない","スピードテストを複数のサービスで行い最も高い数値を光回線の実速度として採用するのが正しい"],"ans":0,"exp":"スピードテストをWi-Fi接続で行うとWi-Fiルーターの性能・電波環境がボトルネックになり、光回線自体の速度を正確に測れない。回線の本来の速度を測るには有線LAN（イーサネットケーブル直接接続）でのテストが必要。"},{"id":"D032","cat":"D","diff":4,"q":"「DHCP」の役割として正しいのはどれか？","choices":["Wi-Fiの通信を暗号化してセキュリティを確保するために使われるプロトコルで、WPA2/WPA3の動作基盤となっている","ルーターがLAN内の端末にIPアドレス・ゲートウェイ・DNSサーバー等のネットワーク設定を自動で割り当てるプロトコル","インターネットとLANの境界に設置されてNAT変換とIPアドレス管理を一括で担うルーター組み込みのプロトコル","光ファイバーの光信号をルーターが処理できるデジタル電気信号に変換するためのプロトコルで、ONUの主要機能の一つ"],"ans":1,"exp":"DHCP（Dynamic Host Configuration Protocol）はルーターがLAN内のPC・スマホ等にIPアドレス・サブネットマスク・デフォルトゲートウェイ・DNSサーバーのアドレスを自動的に割り当てる仕組み。「IPアドレスの自動取得」がDHCP。"},{"id":"D033","cat":"D","diff":4,"q":"「二重NAT（ダブルNAT）」の問題として正しいのはどれか？","choices":["ルーターが2台直列でどちらもルーターモードだとNATが2重になりポート開放等に支障が出る","ルーターが2台直列になると通信速度が半減するが、NATの動作自体には影響しない","HGWの下に市販ルーターをAPモードで接続した場合に二重NATが発生しポート開放が失敗する","二重NATはIPv6環境でのみ発生する現象で、IPv4のみの環境では問題は起きない"],"ans":0,"exp":"二重NAT（ダブルNAT）は、例えばHGW（ルーター機能あり）の下に市販のWi-Fiルーター（ルーターモード）を接続した場合に発生する。NATが2重になりポート開放が機能しない・オンラインゲームの接続品質が悪化する等の問題が起きる。解決策はWi-FiルーターをAPモード（ブリッジモード）に変更すること。"},{"id":"D034","cat":"D","diff":3,"q":"光回線の「ルーターのWANポート」と「LANポート」の違いとして正しいのはどれか？","choices":["WANポートはルーターとONUを繋ぐインターネット側の接続口。","WANポートはWi-Fi電波の送受信、LANポートは有線接続（規定）","WANポートは高速、LANポートは低速（規定上の運用と判断）","WANポートはセキュリティが弱くLANポートは強い（規定の運用）"],"ans":0,"exp":"WANポート（Wide Area Network）はルーターのインターネット側接続口で、ONUやHGWと繋ぐ。LANポート（Local Area Network）はPC・NAS・プリンター等の宅内機器と繋ぐ。WANポートにONUを繋ぎ、LANポートからPCに接続するのが基本構成。"},{"id":"D035","cat":"D","diff":4,"q":"「Wi-Fi 6E」がWi-Fi 6と異なる最大の特徴はどれか？","choices":["6GHz帯への対応が追加され、より広い帯域幅と干渉の少ない通信が可能になった","5GHz帯のチャンネル数が大幅に拡張され、最大通信速度がWi-Fi 6の2倍になった","2.4GHz帯での通信効率が大幅に改善され、壁越し等の遠距離通信が強化された","Wi-Fi 6と同じ周波数帯を使いながら暗号化強度を強化しセキュリティを向上させた"],"ans":0,"exp":"Wi-Fi 6E（E=Extended）はWi-Fi 6（2.4GHz・5GHz対応）に6GHz帯を追加したもの。6GHz帯は従来のWi-Fiが使っていない帯域のため干渉が少なく、フレキシブルな広帯域チャンネル（最大160MHz幅）が利用可能。ただし端末とルーターが両方Wi-Fi 6E対応が必要。"},{"id":"D036","cat":"D","diff":2,"q":"Wi-Fiの「2.4GHz帯」と「5GHz帯」の違いとして正しいのはどれか？","choices":["2.4GHz帯と5GHz帯は速度も特性も同じ（規定上の運用と判断する取り扱い）","2.4GHz帯は速いが障害物に弱く、5GHz帯は遅いが障害物に強い（規定）","5GHz帯は家電機器と干渉しやすく2.4GHz帯は干渉しにくい（規定の運用）","2.4GHz帯は障害物に強く遠くまで届くが干渉を受けやすく速度が出にくい。"],"ans":3,"exp":"2.4GHz帯は電波が遠くまで届き壁等の障害物を透過しやすいが、電子レンジ・Bluetooth等との干渉が多く速度が出にくい。5GHz帯は障害物に弱く届く距離も短いが、干渉が少なくWi-Fi 5（802.11ac）等では高速通信が可能。ルーターの近くで高速が必要なら5GHz、遠い部屋なら2.4GHzが有利。"},{"id":"D037","cat":"D","diff":5,"q":"光回線で「ポート開放（UPnP）」が必要なシナリオとして誤っているのはどれか？","choices":["NASを自宅サーバーとして外部公開する場合","PS5でゲームサーバーを自宅でホストする場合","IPカメラの映像を外出先から視聴する場合","YouTubeで動画を視聴する場合"],"ans":3,"exp":"YouTubeの視聴はユーザーがサーバー（YouTubeのデータセンター）にアクセスする「アウトバウンド通信」のため、ポート開放は一切不要。ポート開放が必要なのは「外部からユーザー宅内のサーバー・機器にアクセスする」ケース（ゲームサーバーホスト・NAS公開・IPカメラ外部視聴等）。"},{"id":"D038","cat":"D","diff":4,"q":"「NAT（ネットワークアドレス変換）」の主な役割として正しいのはどれか？","choices":["宅内の複数端末がプライベートIPを使いながら1つのグローバルIPでインターネットに接続できるようアドレスを変換する","インターネット上のサーバーのIPアドレスを覚えやすいドメイン名に変換して表示する機能","宅内のすべての端末にグローバルIPアドレスを直接割り当て、インターネットから各端末に直接アクセスできるようにする機能","VPN接続時に通信経路を暗号化してIPアドレスを隠蔽し、匿名でインターネットに接続させる機能"],"ans":0,"exp":"NAT（Network Address Translation）はルーターが宅内のプライベートIPアドレス（192.168.x.x等）とプロバイダから割り当てられたグローバルIPアドレスの間でアドレスを相互変換する機能。1つのグローバルIPで複数の端末がインターネットに接続できる。"},{"id":"D039","cat":"D","diff":5,"q":"「IPv6 IPoEで接続中の場合のデフォルトのDNSサーバー」について正しいのはどれか？","choices":["IPoE接続ではGoogleのパブリックDNS（8.8.8.8）が自動的に優先設定される","VNE事業者またはプロバイダが提供するIPv6対応DNSサーバーが自動設定される","IPoE接続ではDNSサーバーの自動配布が行われないためユーザーが必ず手動設定する","IPoE環境ではDNSによる名前解決が機能しないためIPアドレスを直接入力する必要がある"],"ans":1,"exp":"IPoE（IPv6）接続ではDHCPv6またはRA（Router Advertisement）を通じてVNE事業者・プロバイダのIPv6対応DNSサーバーのアドレスが自動配布される。ユーザーが手動でDNSを設定する必要はない（必要な場合は変更可）。"},{"id":"D040","cat":"D","diff":4,"q":"「CAT6AのLANケーブル」が必要になるシナリオはどれか？","choices":["Wi-Fi 6接続に必須（IEEE 802.11axの規格で必須要件）","光コラボとNTT東西の接続に必要（局舎・宅内の配線規格として指定）","フレッツ光クロス（10Gbps）の速度を有線LANで十分に活かすため","1Gbps（ギガ）対応のルーターとPCを有線接続する場合（通常規格）"],"ans":2,"exp":"CAT6AはEEEE 802.3an規格の10Gbps（10GBASE-T）に対応したLANケーブル。一般的な1Gbps（ギガ）接続にはCAT5e・CAT6で十分。10Gbps回線（フレッツ光クロス等）の恩恵を有線LAN全体で活かすにはCAT6A以上が必要。"},{"id":"E016","cat":"E","diff":2,"q":"andline電話で固定電話宛ての通話料金として正しいのはどれか？","choices":["無料（通話料込みの月額利用料・規定上の運用）","距離によって料金が変わる（県内・県外で異なる）","県内・県外ともに8.8円（税込）/3分","県内は無料、県外は有料（規定の運用と判断）"],"ans":2,"exp":"andline電話の固定電話宛て通話料は県内・県外ともに一律8.8円（税込）/3分。NTT加入電話への通話も同料金。なお携帯電話への通話は別料金体系となる。"},{"id":"E017","cat":"E","diff":2,"q":"andline光SEで「PPPoE接続」を希望するお客様への案内として正しいのはどれか？","choices":["PPPoEは追加料金が発生する（月額500円のオプション加入が必要となる）","PPPoEはNTT東西への別途申し込みが必要であり省略した場合は開通しない","andline光SEはIPoEが標準提供だが、PPPoEでの接続も可能。","andline光SEはPPPoE接続に非対応のためIPoEのみ（仕様上の制約）"],"ans":2,"exp":"andline光SEではIPoE（IPv4 over IPv6（IPv6サービス））が標準提供されるが、PPPoEでの接続も可能。PPPoEの場合はプロバイダから発行されるユーザーID・パスワードをルーターに設定する。IPoEとPPPoEの同時利用も原則可能。"},{"id":"E018","cat":"E","diff":3,"q":"andline光SEの「IPv4 PPPoE接続用のID/パスワード」はいつ発行されるか？","choices":["工事完了後に郵送される開通案内書にIDとパスワードが同封されて届く（規定上の運用と判断する取扱）","IPv6 IPoEが標準提供のためPPPoE用のID/パスワードの通知はしていない","andlineのサポートサイトにマイページからログインしてダウンロードする（規定の運用）","申し込みフォーム送信と同時にメールで自動発行されて届く（規定上の運用と判断する取扱）"],"ans":1,"exp":"andline光SE重要事項説明書では「IPv6接続でご利用の場合はID/パスワードは不要で通知もしていない」と明記。これはIPoEが標準のため。PPPoEでの接続を希望する場合はプロバイダへの問い合わせが必要となる。"},{"id":"E019","cat":"E","diff":3,"q":"andline光SEに「ひかり電話（andline電話）」を追加する場合の工事について正しいのはどれか？","choices":["電話機を購入するだけで利用できる（規定上の運用と判断する取扱）","HGW（ホームゲートウェイ）への交換工事が必要な場合がある","追加工事は不要でオンライン手続きのみで利用開始（規定の運用）","ひかり電話の追加は年1回しかできない（技術的・制度的に手段がない）"],"ans":1,"exp":"現在ONUのみの環境にひかり電話を追加する場合、ONU→HGW（ホームゲートウェイ）への機器交換工事が必要になる。HGWには電話機インターフェースが内蔵されているため。既にHGWが設置されている場合は書類手続きのみで追加できる場合もある。"},{"id":"E020","cat":"E","diff":3,"q":"andline光SEの「お客様情報変更」（氏名・住所・電話番号等の変更）の手続き方法として正しいのはどれか？","choices":["andlineカスタマーサポートデスクへ連絡して所定の手続きを行う","NTT東西に直接連絡して変更できる（NTTの管轄運用と判断する取り扱い）","光回線は契約情報の変更ができない（技術的・制度的に手段がない・規定の運用）","オンライン申し込みフォームから24時間変更できる（24時間運用と判断する）"],"ans":0,"exp":"andline光SEの契約者情報変更（氏名・住所・振込口座等）はandlineカスタマーサポートデスク（0120-978-736）への連絡が必要。オンラインのみでの完結は基本的に難しく、本人確認書類の提出が必要な場合もある。"},{"id":"E021","cat":"E","diff":3,"q":"andline光SEで「解約後の再申し込み」について正しいのはどれか？","choices":["解約後の再申し込みは制限される場合がある","解約後の再申し込みは6ヶ月間の待機期間が必要で、その間は申し込み不可","解約後の再申し込みは制限なく可能で、キャンペーン適用も再度受けられる","解約後30日以内の再申し込みであれば無条件でキャンペーン優遇が再適用される"],"ans":0,"exp":"解約後の再申し込み自体は可能だが、キャンペーンの工事費無料等の優遇を目的とした短期解約→再申し込みは認められない場合がある。andline光SE重要事項説明書にも不正利用への対応に関する規定がある。"},{"id":"E022","cat":"E","diff":3,"q":"andline光SEの「工事費の支払い方法」として正しいのはどれか？","choices":["クレジットカードのみであり、他の手続きや機器は一切不要","現金払いのみ（コンビニ支払い・規定の運用）","銀行振込のみであり、他の手続きや機器は一切不要","口座振替（自動引き落とし）またはクレジットカード"],"ans":3,"exp":"andline光SEの月額料金・工事費等の支払いは口座振替（自動引き落とし）またはクレジットカードの2種類。現金やコンビニ払いには対応していない。支払い方法の確認は申し込み時の重要な確認事項。"},{"id":"E023","cat":"E","diff":3,"q":"andlineTVの「スカパーJSAT施設利用登録料」について正しいのはどれか？","choices":["andlineTV申し込み時に発生する初期費用（3,080円税込）で、スカパーJSATの依頼に基づきandlineが請求する","スカパー！プレミアムサービスの月額基本料（3,080円税込）で、andlineTVの契約期間中は毎月請求される","andlineTVのアンテナ設備を共用施設に設置するための工事費（3,080円税込）で、建物の管理組合に支払われる","andlineTV解約時にのみ発生する違約金（3,080円税込）で、契約期間内に解約した場合のみ請求される"],"ans":0,"exp":"andlineTVを申し込むと、スカパーJSAT施設利用登録料（3,080円税込）が初期費用として発生する。これはandlineTV重要事項に記載されており、スカパーJSATの代理としてandlineが請求する費用。"},{"id":"E024","cat":"E","diff":3,"q":"andline光SEで「解約を申し出たが工事が完了していた場合」のキャンセル（取り消し）について正しいのはどれか？","choices":["工事完了後でも8日以内であれば費用なしでキャンセルが認められている","工事が完了（切替完了）した後のキャンセルは受け付けるが、発生した工事費等はお客様の負担となる","工事が完了してしまうと技術的な理由からキャンセルする手段がまったくない","工事費の半額を負担することを条件にキャンセル扱いにしてもらえる"],"ans":1,"exp":"andline光SEは工事完了後のキャンセル（取り消し）を申し出ることは可能だが、工事着手後に発生した費用（工事費等）はお客様負担となる。工事完了後のキャンセルは実質的に「解約」と同じ扱いになる。"},{"id":"E025","cat":"E","diff":2,"q":"andline光SEの「契約事務手数料」について正しいのはどれか？","choices":["月々の利用料金に含まれており別途発生することはない月額料金","工事費と連動して工事の種類（派遣・無派遣）によって金額が変わる費用","申し込み時に1回だけ発生する初期費用（4,378円税込）","法人名義での申し込みの場合にのみ発生する特別な手数料"],"ans":2,"exp":"andline光SEの契約事務手数料は申し込み時に1回だけ発生する初期費用（4,378円税込）。新規・転用・事業者変更いずれの申し込みでも発生する。工事費（派遣工事費）とは別の費用。"},{"id":"E026","cat":"E","diff":1,"q":"andline光SEの「払い込み方法」として「クレジットカード」を選択している場合、毎月の引き落とし日について正しいのはどれか？","choices":["各クレジットカード会社の引き落とし日による","andlineからの請求日である毎月15日にカード口座から一律引き落とされる","クレジットカード払いの場合は月末締め・翌月27日払いに統一されている","クレジットカード会社に関わらずandlineの指定日（毎月10日）に引き落とされる"],"ans":0,"exp":"andline光SEの月額料金をクレジットカードで支払う場合、実際の引き落とし日はカード会社の規定による（一般的にはカードの引き落とし日）。andlineからカードへの請求は月次で行われるが、口座からの実際の引き落としはカード会社のサイクルに依存する。"},{"id":"E027","cat":"E","diff":3,"q":"andline電話で「050番号」が発番される場合と「0AB~J番号（固定電話番号）」が発番される場合の違いとして正しいのはどれか？","choices":["0AB~J番号はひかり電話として提供され固定電話番号が使える。","050番号は無料、0AB~J番号は有料（規定の運用と判断する取扱）","050番号は固定電話番号、0AB~J番号はIP電話番号（規定の運用）","どちらも同じ用途で提供方法に違いはない（規定上の運用と判断する取扱）"],"ans":0,"exp":"andline電話で0AB~J番号（03・06等の市外局番付き番号）が発番されるのはひかり電話として契約した場合。固定電話番号としてNTT加入電話と同様に使える。050番号はIP電話として提供される別サービス。フレッツ光から転用時はひかり電話の0AB~J番号がそのまま引き継がれる。"},{"id":"E028","cat":"E","diff":3,"q":"andline光SEの「2年縛り・解約金」の仕組みについて正しいのはどれか？","choices":["最低利用期間はなく解約金も発生しない","1年以内の解約は工事費相当額の解約金が発生する","2年以内の解約は解約金10,000円が発生する","3年縛りがあり中途解約は違約金が発生する"],"ans":0,"exp":"andline光SEには最低利用期間の定めがなく、いつ解約しても解約金（違約金）は発生しない。解約月の月額料金は日割りにならず1ヶ月分請求されるが、解約金自体はゼロ。これはandline光SEの大きな特徴の一つ。"},{"id":"E029","cat":"E","diff":2,"q":"andline光SEで「ひかり電話（andline電話）が使えない」状況として正しいのはどれか？","choices":["PPPoE接続中はひかり電話が使えない","Wi-Fi接続中はひかり電話が使えない","停電中はひかり電話（IP電話）が使えない","IPoE接続中はひかり電話が使えない"],"ans":2,"exp":"andline電話はIP電話（光回線ベース）のため、停電時には通話ができない（緊急通報含む）。これは一般加入電話（メタル電話）とは異なる重要な違いで、重要事項説明書でも必ず案内すべき事項。"},{"id":"E030","cat":"E","diff":3,"q":"andline光SEの「転居（引越し）」に関する手続きとして正しいのはどれか？","choices":["同一都道府県内なら工事不要で転居できる（規定の運用）","転居先のエリアやマンション設備によっては工事が必要。","転居は解約後の再申し込みしか対応していない（規定）","引越し後の住所で自動的に継続される（規定の運用）"],"ans":1,"exp":"andline光SEの転居手続きは転居先での工事（配線引き回し・ONU設置等）が必要な場合が多い。転居先が光コラボ対応エリア外の場合はサービス継続が難しい場合も。転居が決まったら早めにカスタマーサポートデスクへ連絡することが必要。"},{"id":"F011","cat":"F","diff":2,"q":"andlineTVを申し込む場合の前提条件として正しいのはどれか？","choices":["スカパーJSATと直接契約が必要であり省略した場合は開通しない","andline光SEの契約なしでもandlineTVのみ申し込める","ひかり電話の契約がないと申し込めない","andline光SEの契約（回線契約）が前提として必要"],"ans":3,"exp":"andlineTVはandline光SEの回線サービスに付帯するサービスのため、andline光SEの契約が前提。andline光SE 1契約に対してandlineTV 1契約で提供される。"},{"id":"F012","cat":"F","diff":3,"q":"andlineTVで「地デジのみ視聴できて、BSが映らない」場合の原因として最も可能性が高いのはどれか？","choices":["andlineTVの地デジプランに加入しておりBSオプションが未契約のため（規定上の運用と判断する取り扱い）","V-ONUからの同軸ケーブルに分波器が接続されておらず、テレビのBS/CS入力端子にケーブルが繋がっていない","andlineTVではBS放送は追加オプション契約が必要なため標準では非提供（規定上の運用と判断する取扱）","宅内にブースターが未設置のためBS信号が増幅されず受信できていない（規定上の運用と判断する取り扱い）"],"ans":1,"exp":"andlineTVでは地デジもBSも同一の同軸ケーブルで混合して伝送される。テレビ（またはレコーダー）で地デジとBSを分けて受信するには分波器（セパレーター）をテレビの入力端子に接続する必要がある。分波器未接続の場合BSが映らないトラブルが発生する。"},{"id":"F013","cat":"F","diff":4,"q":"andlineTVで「映像が乱れる・映らないチャンネルがある」場合の原因として最も可能性が低いのはどれか？","choices":["V-ONUの電源が入っていない","分配器による信号減衰が大きすぎる（ブースターが必要）","Wi-Fiルーターの電波が弱い","同軸ケーブルが劣化または接続が緩んでいる"],"ans":2,"exp":"andlineTVはWi-Fiではなく同軸ケーブルで映像を伝送するため、Wi-Fiルーターの電波強度は映像品質に関係しない。映像の乱れ・不映の原因は同軸ケーブルの劣化・接続不良・分配による信号減衰・V-ONUの問題等が考えられる。"},{"id":"F014","cat":"F","diff":3,"q":"フレッツ・テレビ（andlineTV）の視聴に「不要」な機器はどれか？","choices":["同軸ケーブル","NTT東西のフレッツ光回線","映像用回線終端装置（V-ONU）","屋外の衛星アンテナ（パラボラアンテナ）"],"ans":3,"exp":"andlineTVはフレッツ光の光ファイバーを通じてBS・地デジ放送を届けるため、屋外に衛星アンテナ（パラボラアンテナ）を設置する必要がない。これがandlineTVの主なメリットの一つ。"},{"id":"F015","cat":"F","diff":3,"q":"andlineTVの工事でテレビを「5台以上」接続したい場合について正しいのはどれか？","choices":["通常のandlineTVのテレビ接続工事は2〜4台までであり、5台以上は別途対応の確認が必要","andlineTVは1契約につきテレビ1台のみが対象で、複数台接続には台数分の契約が必要","andlineTVのテレビ接続台数に制限はなく、分配器を用意すれば何台でも標準工事で接続できる","5台以上の接続はandlineTVでは対応不可で、フレッツ・テレビへの個人契約への切り替えが必要"],"ans":0,"exp":"andlineTVの標準工事でのテレビ接続は通常2〜4台まで（重要事項説明書の複数台接続工事は2〜4台を対象）。5台以上の接続は個別対応の確認が必要。信号の減衰・分配器・ブースターの設置等を含めた別途見積が必要になる。"},{"id":"F016","cat":"F","diff":2,"q":"「分波器（セパレーター）」はどこに取り付けるものか？","choices":["ONU（インターネット用）の出力端子","テレビの背面のアンテナ入力端子部分","V-ONUと壁の同軸コンセントの間","ブースターと同軸ケーブルの間"],"ans":1,"exp":"分波器（セパレーター）はテレビの背面に取り付ける小型の部品で、同軸ケーブルから来る地デジとBS/CSの混合信号をテレビの「地デジアンテナ入力」と「BS/CSアンテナ入力」の2系統に分離する。テレビ1台ごとに必要。"},{"id":"F017","cat":"F","diff":3,"q":"「分配器」の仕組みとして正しいのはどれか？","choices":["Wi-Fiの電波を複数の部屋に分配する装置（規定上の運用と判断する取扱）","1本の同軸ケーブルから来た信号を複数の同軸ケーブルに分岐する装置","地デジとBS/CSの信号を別々の周波数に分けて強化する装置（規定の運用）","ONUの出力をルーターとテレビに分岐する装置（規定の運用と判断）"],"ans":1,"exp":"分配器は1本の同軸ケーブルの信号を2本・4本・8本等に分岐するパッシブ（電源不要）な機器。分配するたびに信号レベルが低下（1分割で約3dB減衰）するため、分配数が増えるほど信号が弱くなりブースターが必要になる可能性がある。"},{"id":"F018","cat":"F","diff":3,"q":"andlineTVで「テレビが映らない」場合の初期確認事項として正しい順序はどれか？","choices":["まずブースターを購入して設置し、それでも映らない場合はV-ONUの電源確認と同軸ケーブルの接続確認を行う","まずandlineのカスタマーサポートに連絡して遠隔診断を依頼し、問題が特定できてから宅内機器の確認を行う","V-ONUの電源と動作ランプ→同軸ケーブルの接続確認→テレビのアンテナ設定（チャンネルスキャン）の順で確認する","まずWi-Fiルーターを再起動してネットワークを初期化し、それでも解決しない場合にV-ONUの確認へ進む"],"ans":2,"exp":"andlineTVの映像不良の初期確認手順は①V-ONUの電源ON・ランプ確認②同軸ケーブルの抜け・緩み確認③テレビ側でチャンネルスキャン（初期設定）の実施の順。これで解決しない場合にカスタマーサポートへ連絡する。"},{"id":"F019","cat":"F","diff":2,"q":"andlineTVで「NHKの受信料」はどうなるか？","choices":["andlineTVで地デジ・BSが視聴できるが、NHK受信料はandlineTVの月額料金に含まれておりNHKへの直接支払いは不要","andlineTVで地デジ・BSが視聴できるため通常のNHK受信契約が必要であり、受信料はNHKに直接支払う","andlineTVはIPTVサービスのためNHK放送受信契約の対象外であり、受信料の支払い義務は発生しない","andlineTVを契約するとNHKのネット受信契約が自動適用されるため、アンテナ受信と重複して二重請求となる"],"ans":1,"exp":"andlineTVで地デジ・BSが視聴できる場合、通常のNHK放送受信契約が必要であり、受信料はNHKに直接支払う。andlineTVの月額利用料（825円税込）にはNHK受信料は含まれない。重要事項説明書にも明記されている。"},{"id":"F020","cat":"F","diff":3,"q":"andlineTVの「録画」について正しいのはどれか？","choices":["andlineTVはフレッツ・テレビ信号を使うため、テレビのアンテナ入力端子に対応したBDレコーダー等で録画が可能","andlineTVは専用チューナー経由の配信方式のため録画機能は一切なく、別途録画サービスの契約が必要","andlineTVは著作権保護のため録画が完全に禁止されており、録画機器を接続してもコピーガードが機能する","andlineTVの録画には対応NASとandlineの専用録画アプリの組み合わせが必要で、一般的なBDレコーダーは使えない"],"ans":0,"exp":"andlineTVはテレビのアンテナ入力端子（同軸）から映像を受信する標準方式のため、地デジ・BSチューナー内蔵のBDレコーダーやHDDレコーダーで録画が可能。専用機器は不要。"},{"id":"G016","cat":"G","diff":2,"q":"NURO光の「通信速度の仕組み」について正しいのはどれか？","choices":["SONY製の専用ONUを使った場合のみ速度が保証される契約になっている","ベストエフォート型サービスのため2Gbpsは理論上の最大値であり速度保証はない","昼間の時間帯（9時〜18時）に限り下り2Gbpsの速度を保証している","下り最大2GbpsをSLAで正式に保証している速度保証型のサービスだ"],"ans":1,"exp":"NURO光を含む一般的な光回線はすべてベストエフォート型で速度保証はない。「下り最大2Gbps」は理論上の最大値。実際の速度は時間帯・接続機器・建物の配線環境によって変動する。"},{"id":"G017","cat":"G","diff":3,"q":"「auひかり」の解約金（違約金）について正しいのはどれか？","choices":["解約金はプランに関係なく一律10,000円と規定されている","auひかりはandline光SEと同様に解約金が一切発生しない縛りなしのサービスだ","契約から2年以内に解約した場合のみ解約金が発生し3年目以降は無料になる","auひかりには最低利用期間があり、期間内の解約には解約金が発生する"],"ans":3,"exp":"auひかりは最低利用期間（通常2年または3年）があり、期間内の解約には解約金が発生する。金額はプランや契約時期によって異なるが、戸建てプランでは数千〜数万円程度。解約金の存在はandline光SEとの大きな違いの一つ（andline光SEは解約金なし）。"},{"id":"G018","cat":"G","diff":2,"q":"「ドコモ光」と「ドコモのスマートフォン」を組み合わせた場合の割引の正式名称として正しいのはどれか？","choices":["光回線セット割","auスマートバリュー","docomoひかりセット割","ドコモ光セット割"],"ans":3,"exp":"ドコモのスマートフォンとドコモ光を組み合わせた場合の割引は「ドコモ光セット割」。スマートフォンの月額料金が割引される。なお「auスマートバリュー」はauひかり等とauスマートフォンのセット割引の名称。"},{"id":"G019","cat":"G","diff":2,"q":"「SoftBank光」と「ソフトバンクのスマートフォン」を組み合わせた場合の割引として正しいのはどれか？","choices":["SoftBankファミリー割","ソフトバンクスマートバリュー","ソフトバンク光セット割","おうち割光セット"],"ans":3,"exp":"SoftBank光とソフトバンクスマートフォン（またはY!mobileスマートフォン等）を組み合わせると「おうち割光セット」が適用され、スマートフォンの月額料金が割引される。光コラボ各社でスマホセット割の名称が異なることは覚えておく必要がある。"},{"id":"G020","cat":"G","diff":4,"q":"NURO光でソフトバンクスマートフォンのセット割（NURO光 for ソフトバンク）を利用したい場合の条件として正しいのはどれか？","choices":["ソフトバンク光ではなくNURO光でもソフトバンクのセット割が適用される場合があるが、NURO光の電話オプション（ひかり電話等）の契約が条件","NURO光はソフトバンクグループのサービスではないため、ソフトバンクスマートフォンとのセット割は一切提供されていない","NURO光でソフトバンクのセット割を利用するにはソフトバンク光への転用手続きが必要で、NURO光のままでは割引は適用されない","NURO光のソフトバンクセット割はスマートフォンの回線数に応じた割引で、電話オプション等の条件は特に設定されていない"],"ans":0,"exp":"NURO光はSoftBank光とは別のサービスだが、ソフトバンクグループ（SONYとソフトバンクが出資）であるため「NURO光 for ソフトバンク」という形でソフトバンクスマホとのセット割が提供されている。ただし電話オプション等の条件がある。詳細は申込時の確認が必要。"},{"id":"G021","cat":"G","diff":3,"q":"「ホームルーター（home 5G等）」でゲームが遅いと感じる主な原因として正しいのはどれか？","choices":["5G対応ホームルーターはゲーム通信で使用するUDPパケットの処理規格に非対応のため、オンライン対戦で遅延が発生する","無線（5G/4G）接続のためping値（応答遅延）が光回線より高くなる傾向があり、レイテンシが重要なリアルタイムゲームでは不利","ホームルーターにはゲーム通信を自動検出してトラフィックを最適化するQoS機能が内蔵されており遅延を抑制できる","5G回線はダウンロード速度は光回線と同等だが、上り速度が光回線の約10分の1程度しか出ないためゲームに不向きだ"],"ans":1,"exp":"ホームルーターは無線（5G/4G携帯回線）を使うためping値（レイテンシ）が光回線より高い傾向がある。ダウンロード速度は十分でもリアルタイムゲームでの操作の遅延・ラグが起きやすい。光回線+有線LAN接続と比べると不利。"},{"id":"G022","cat":"G","diff":3,"q":"「eo光」から「ドコモ光」への乗り換えを検討しているお客様への正しい案内はどれか？","choices":["eo光は電力系独自回線のため、ドコモ光（光コラボ）への切り替えには新設工事が必要","eo光はNTT系光コラボの一種のため、ドコモ光への切り替えは事業者変更手続きのみで工事なしに完了できる","eo光からドコモ光への乗り換えでは転用承諾番号を取得するだけで手続きが完了し、工事は不要","eo光は光コラボではないが事業者変更に準じた手続きが用意されており、工事不要で乗り換え可能な場合がある"],"ans":0,"exp":"eo光は関西電力グループの電力系独自回線。ドコモ光はNTT系光コラボ。全く異なるアクセスラインを使うため、eo光を解約しドコモ光を新規工事（派遣工事）で申し込む必要がある。eo光は工事・解約金に注意。"},{"id":"G023","cat":"G","diff":2,"q":"「NURO光のONUはお客様の私有物か？」について正しいのはどれか？","choices":["NURO光の契約時にONU代金を一括購入するためお客様の私有物になる","NURO光を解約した後もONUをそのまま自宅に置いておいて問題ない","NURO光のONUは購入かレンタルかを申し込み時に選択できる","NURO光のONUはNURO光からのレンタル品であり、解約時は返却が必要"],"ans":3,"exp":"NURO光のONUはレンタル品（お客様の私有物ではない）。解約時にはONUを返却する必要がある。返却が遅れたり返却しない場合は費用が請求される場合がある。フレッツ光系のONUも同様にNTT東西からのレンタル品。"},{"id":"G024","cat":"G","diff":4,"q":"「ドコモ光 10ギガ（フレッツ光クロス）」に申し込む際の注意点として正しいのはどれか？","choices":["10Gbpsプランは対応エリアが1Gbpsプランより限定的。","10ギガはマンションでのみ提供されている（規定上の運用と判断する取り扱い）","フレッツ光クロスは光コラボには卸提供されていない（規定の運用と判断）","すべての建物・エリアで即日開通できる（規定上の運用と判断する取り扱い）"],"ans":0,"exp":"ドコモ光10ギガ（フレッツ光クロスベース）は1Gbpsプランと比べて対応エリアが限定的。また契約したからといって自動的に10Gbpsの速度が出るわけではなく、10GbE対応機器（ルーター・PC）とCAT6A以上のLANケーブルが必要。費用対効果を丁寧に案内する必要がある。"},{"id":"G025","cat":"G","diff":3,"q":"「auひかり」と「J:COM NET」の違いとして正しいのはどれか？","choices":["auひかりはKDDI系の独自回線、J:COM NETはCATV系のインターネットサービスで使用する物理インフラが根本的に異なる","auひかりとJ:COM NETはどちらもKDDIグループのサービスで、物理インフラを共用しているが提供プランと料金体系が異なる","auひかりは光ファイバー単独のサービスで、J:COM NETはテレビ・インターネット・電話がセットになった光コラボサービス","auひかりは全国展開しているが、J:COM NETはNTT東日本エリア限定のためNTT西日本エリアでは利用できない"],"ans":0,"exp":"auひかりはKDDIグループがNTTのダークファイバー等を使って構築した光回線の独自ネットワーク。J:COM NETはCATV（ケーブルテレビ）のHFC（光ファイバー＋同軸ケーブル）インフラを使うインターネットサービス。物理インフラがまったく異なる。"},{"id":"G026","cat":"G","diff":3,"q":"「光回線とモバイルWi-Fiルーター（ポケットWi-Fi）を両方持つ」メリットとして正しいのはどれか？","choices":["光回線を契約しているとモバイルWi-Fiのデータ容量が無制限になる（規定上の運用と判断する取り扱い）","自宅での通信はどちらか一方で十分なため両方を持つ意味はない（規定上の運用と判断する取り扱い）","外出先でもWi-Fi接続ができる（モバイルWi-Fi）と自宅での安定高速通信（光回線）を両立できる","光回線とモバイルWi-Fiを同時にオンにすることで通信速度が2倍に向上する（規定上の運用と判断）"],"ans":2,"exp":"光回線は自宅での有線・Wi-Fi接続に高速・安定した通信を提供。モバイルWi-Fiは外出先でのインターネット接続に使う。両方を用途に応じて使い分けることで利便性が高まる。ただしコスト面での検討も必要。"},{"id":"G027","cat":"G","diff":4,"q":"「コミュファ光」の提供エリアとして正しいのはどれか？","choices":["東海地方・長野県を中心とした中部電力グループのサービス提供エリア","近畿・中国・四国地方の関西電力グループが提供する電力系光回線で、eo光と統合されたサービス","東海・北陸・信越地方を含む広域エリアを対象とし、auスマートバリューの対象サービスとなっている","九州・沖縄エリアを提供エリアとするビビック光と同一グループが運営するサービス"],"ans":0,"exp":"コミュファ光は中部電力グループ（中部テレコミュニケーション）が提供する電力系光回線。提供エリアは東海地方（愛知・静岡・岐阜・三重）と長野県。関西のeo光・九州のビビック光とは別の電力系サービス。"},{"id":"G028","cat":"G","diff":3,"q":"「ビビック光（BBIQ）」の提供エリアとして正しいのはどれか？","choices":["九州地方（福岡・熊本・鹿児島等）","東海地方（愛知・静岡等）","四国地方（香川・愛媛等）","中国地方（広島・岡山等）"],"ans":0,"exp":"ビビック光（BBIQ）は九州電力グループのQTnetが提供する電力系独自回線。提供エリアは九州（福岡・佐賀・長崎・熊本・大分・宮崎・鹿児島）および沖縄。中国地方はメガエッグ、四国はピカラ光が担当する電力系サービス。"},{"id":"G029","cat":"G","diff":3,"q":"「メガエッグ（Mega Egg）」の提供エリアと運営会社として正しいのはどれか？","choices":["関西電力グループ・オプテージ / 関西地方","四国電力グループ・STNet / 四国地方","九州電力グループ・QTnet / 九州地方","中国電力グループ・エネコム / 中国地方（広島・岡山・山口等）"],"ans":3,"exp":"メガエッグ（Mega Egg）は中国電力グループのエネコムが提供する電力系独自回線。提供エリアは中国地方（広島・岡山・山口・島根・鳥取）。四国はSTNetのピカラ光が担当。"},{"id":"G030","cat":"G","diff":3,"q":"「ピカラ光」の提供エリアと運営会社として正しいのはどれか？","choices":["中国電力グループ・エネコム / 中国地方","四国電力グループ・STNet / 四国地方","中部電力グループ / 東海地方","九州電力グループ・QTnet / 九州地方"],"ans":1,"exp":"ピカラ光は四国電力グループのSTNet（エスティーネット）が提供する電力系独自回線。提供エリアは四国4県（香川・愛媛・高知・徳島）。電力系5社（eo光・コミュファ・ビビック・メガエッグ・ピカラ）の地域分担を整理して覚えることが重要。"},{"id":"G031","cat":"G","diff":4,"q":"電力系光回線5社のうち「auスマートバリュー（またはUQ自宅セット割）の対象外」であるのはどれか？","choices":["対象外の社はなく5社すべて対象（適用には各社の光電話契約が条件）","eo光のみが対象外で、残り4社はauスマートバリューの対象となっている","コミュファ光とメガエッグの2社のみがauスマートバリューの対象外である","5社すべてUQ自宅セット割は対象外だが、auスマートバリューはすべて対象"],"ans":0,"exp":"電力系5社（eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光）はいずれもKDDIと資本関係があり、auスマートバリューまたはUQ自宅セット割の対象（適用には各社の光電話オプション契約が条件）。au公式でもコミュファ光・eo光・ピカラ光等が対象事業者として明記されている。「すべて対象外」「一部のみ対象外」は誤り（なお各社とも一部の廉価コースは対象外の場合がある）。"},{"id":"G032","cat":"G","diff":3,"q":"「NURO光の工事日程が遅い」と言われる理由として正しいのはどれか？","choices":["ダークファイバー独自回線のため宅内工事（NURO側）と屋外工事（NTT側）の2社の日程調整が必要","NURO光は申込数が多く工事業者が慢性的に不足しているため、他社と比べて工事完了まで時間がかかる","NURO光はNTT東西の回線を使わない完全独自インフラのため、エリア拡張工事が都度必要になる","NURO光の開通には管理組合の事前承認が必須で、承認取得のための待機期間が工事期間に加算される"],"ans":0,"exp":"NURO光は独自回線のため宅内工事（NURO派遣業者）と屋外工事（NTT東西派遣業者）の2回の工事が必要。2つの異なる業者の工事日程を合わせる必要があるため、スケジュール調整に時間がかかることが多い。光コラボの転用・事業者変更（数日〜2週間）と比べて工事完了まで1ヶ月以上かかる場合もある。"},{"id":"G033","cat":"G","diff":3,"q":"「J:COM NET」の特徴で「光コラボとは異なる点」はどれか？","choices":["J:COM NETはスマートフォンとのセット割引サービスを提供していない","J:COM NETはIPv6に技術的に対応できないため非対応となっている","アクセスラインにNTT東西の光ファイバーではなくCATVインフラを使う","J:COM NETは申し込み後すぐに開通するため工事が不要なサービスだ"],"ans":2,"exp":"J:COM NETは光コラボとは異なりCATV系（HFC：光ファイバー＋同軸ケーブル）のインフラを使用。NTTのフレッツ光アクセスラインを使わないため、フレッツ光への転用・事業者変更の対象外。J:COM NETとの解約と別サービスへの新規申込が必要。"},{"id":"G034","cat":"G","diff":3,"q":"「auひかりのお申し込みでエリア確認が特に重要な理由」として正しいのはどれか？","choices":["auひかりはNTT東西の光回線を使うため全国どこでも申し込めるが月額料金の確認が必要","auひかりは各電力会社のサービス提供エリア内のみで利用できるサービスである","auひかりは独自回線のため1棟ごとにエリア確認が必須で、隣の建物が利用可能でも対象建物がエリア外のケースがある","auひかりはiPhone・iPadユーザー専用のサービスのためAndroid利用者は申し込めない"],"ans":2,"exp":"auひかりはNTTのフレッツ網を使わないKDDI独自回線のため、サービス提供可否が1棟ごとに異なる。集合住宅ではKDDI設備の建物内導入が必要で、同じ街でも建物によって使える・使えないが分かれる。光コラボとの最大の違いの一つ。"},{"id":"G035","cat":"G","diff":3,"q":"「イッツコムからandline光SEへの乗り換え」について正しいのはどれか？","choices":["イッツコムはCATV系、andline光SEはNTTフレッツ系光コラボであり、インフラが全く異なるため解約と新規工事が必要","イッツコムもandline光SEもNTTフレッツ光を使うため、転用承諾番号を取得するだけで工事不要で切り替えられる","イッツコムはNTTフレッツ光の光コラボ事業者のため、事業者変更承諾番号による手続きのみで乗り換えが可能","イッツコムとandline光SEはどちらもCATV系インフラを使うため、インフラ共有による簡易手続きで切り替えられる"],"ans":0,"exp":"イッツコムはCATV系（HFCインフラ）のサービス。andline光SEはNTTフレッツ光を使う光コラボ。全く異なるインフラを使うため、イッツコムの解約とandline光SEへの新規工事（派遣工事）が必要。"},{"id":"W001","cat":"W","diff":5,"q":"Wi-Fi 6（IEEE 802.11ax）がWi-Fi 5（802.11ac）より多端末接続に強い最大の理由はどれか？","choices":["OFDMA技術により1つの電波チャネルを複数端末で同時に効率よく共有できるため","MU-MIMO技術により送受信アンテナ数が従来の4倍に増加し、物理的に同時送受信できる端末数が増えたため","BSS Coloring機能により隣接するWi-Fiネットワークとの電波干渉が完全にゼロになったため","最大通信速度が9.6Gbpsまで向上したため、多端末が同時接続しても帯域不足が起きにくくなったため"],"ans":0,"exp":"Wi-Fi 6（802.11ax）の最大の改善点はOFDMA（直交周波数分割多元接続）技術の採用。1チャネルを小さなサブチャネルに分割して複数端末に同時割り当てできるため、スマホ・PC・IoT機器が多数接続する環境での通信効率が大幅に向上する。"},{"id":"W002","cat":"W","diff":6,"q":"Wi-Fiルーターの「ストリーム数（空間ストリーム数）」の説明として正しいのはどれか？","choices":["MIMOアンテナが同時に送受信できるデータの「通り道」の数で、4x4は送信4本×受信4本を意味する","ルーターが同時に接続を受け付けられる端末の最大数で、4x4は最大16台の同時接続が可能であることを意味する","電波の到達距離を示す指標で、4x4は4GHz帯と4GHz帯延長域の双方をカバーすることを意味する","Wi-Fi規格のバージョン番号と対応周波数帯の組み合わせを示すもので、4x4はWi-Fi4の2.4GHz・5GHz両対応を意味する"],"ans":0,"exp":"ストリーム数（空間ストリーム数）はMIMO技術における同時データ伝送路の数。「4x4」表記は送信4ストリーム×受信4ストリームを意味する。ストリーム数が多いほど通信速度と安定性が向上するが、端末側も対応したストリーム数が必要。現在の推奨はミニマム2x2、スタンダード4x4。"},{"id":"W003","cat":"W","diff":6,"q":"Wi-Fiルーターの「2x2」と「4x4」（ストリーム数）の違いとして正しいのはどれか？","choices":["4x4は2x2の2倍のアンテナ・ストリーム数を持ち、同時接続台数が増えたり高負荷作業での安定性が高い","4x4モデルは2x2モデルの4倍の最大接続台数を持ち、スマート家電が多い家庭でのIoT管理に特化している","2x2は戸建て向け、4x4はマンション向けに設計されており、建物の構造によって適切な選択が変わる","4x4ルーターは6GHz帯に対応しているが2x2ルーターは5GHz帯までの対応のため、Wi-Fi 6Eを使う場合は4x4が必要"],"ans":0,"exp":"ストリーム数4x4は2x2の2倍のデータ伝送路を持つ。安価な2x2モデルは接続台数が増えたり重い作業（オンラインゲーム・ビデオ会議）を行うと処理能力の限界で通信が途切れやすい。安定性を重視するなら4x4モデルが推奨。"},{"id":"W004","cat":"W","diff":3,"q":"Wi-Fiの「5GHz帯」と「2.4GHz帯」の特性の違いとして正しいのはどれか？","choices":["5GHz帯は高速だが障害物に弱く近距離向き。2.4GHz帯は遠距離に届きやすいが電子レンジ等の電波干渉を受けやすい","5GHz帯は障害物を透過しやすく遠距離に強い。2.4GHz帯は高速だが近距離専用で電波が回り込まない","2.4GHz帯と5GHz帯の速度差はなく、違いは使用できるチャネル数と電波干渉の受けやすさのみ","5GHz帯は電子レンジと電波干渉が発生しやすく、2.4GHz帯は障害物に弱いため近距離専用として使われる"],"ans":0,"exp":"5GHz帯は速度重視だが壁などの障害物に弱く届く距離が短い。2.4GHz帯は電波が回り込みやすく遠くまで届くが、電子レンジ・Bluetoothとの電波干渉を受けやすく速度が低下しやすい。ルーター付近で高速通信が必要なら5GHz、遠い部屋なら2.4GHzが有利。"},{"id":"W005","cat":"W","diff":6,"q":"「チャネル帯域幅（チャネル幅）」を広げる（例：40MHz→80MHz）メリットとデメリットとして正しいのはどれか？","choices":["メリットは速度向上。デメリットは周囲の電波と干渉しやすくなり、集合住宅等の混雑環境ではかえって速度低下・不安定化する可能性がある","メリットは速度向上。デメリットはルーターのCPU処理負荷が増大し発熱が上昇するため、長期使用での製品寿命や動作安定性に影響が出る","帯域幅を広げると速度向上と電波干渉の低減を同時に実現でき、特に5GHz帯では干渉チャネルが減少するためデメリットはほぼ存在しない","メリットは同時接続台数の増加。デメリットは帯域幅を広げると接続している端末1台あたりの割り当て最大速度が比例して低下する"],"ans":0,"exp":"チャネル帯域幅は「道路の車線数」に例えられる。広げると（20→40→80→160MHz）一度に運べるデータ量が増え速度向上につながる。ただし使用する周波数帯域が広くなるため、集合住宅等で周囲の多くのWi-Fiと重なりやすくなり、混雑環境では逆効果になることがある。"},{"id":"W006","cat":"W","diff":4,"q":"フレッツ光コラボを利用している場合、ルーターの「IPv6サービス（IPv4 over IPv6（IPv6サービス））」対応について正しいのはどれか？","choices":["使用するVNEサービスに個別対応したルーターが必要で「IPv6対応」の表記があっても対応VNEが合わないと使えない","「IPv6対応」と表記されたルーターであれば、どのプロバイダ・VNEサービスでも自動判別して使用できる","VNEサービスへの対応はファームウェア更新で随時追加されるため、購入時のVNE非対応は問題にならない","フレッツ光コラボではプロバイダに関係なくNTT東西のHGWを使えばVNEへの対応は自動で行われる"],"ans":0,"exp":"VNEサービスはv6プラス（MAP-E）・transix（DS-Lite）・OCNバーチャルコネクト（MAP-E）・クロスパス（DS-Lite）等があり方式が異なる。ルーターが「IPv6対応」と表記されていても自分のプロバイダのVNEサービスに個別対応していなければIPv4 over IPv6（IPv6サービス）は使えない。プロバイダ指定のレンタルルーターが最も確実。"},{"id":"W007","cat":"W","diff":6,"q":"「バンドステアリング」機能の説明として正しいのはどれか？","choices":["ルーターが自動的に端末ごとに最適な周波数帯を判断して接続を振り分ける機能","2.4GHz帯と5GHz帯のSSIDを1つに統合して表示し、ユーザーが手動で周波数帯を選択しやすくする機能","複数のルーターが連携して特定端末への帯域を集中的に割り当てメッシュ環境でのローミングを制御する機能","ルーターの周波数帯を時間帯によって自動切り替えし、夜間は2.4GHz・昼間は5GHzを優先する機能"],"ans":0,"exp":"バンドステアリングは5GHz帯（高速・短距離）と2.4GHz帯（低速・長距離）を端末の状況に応じて自動切り替えする機能。ルーター付近では高速な5GHz帯に、遠ざかると安定した2.4GHz帯に自動的に切り替える。ユーザーが手動で周波数帯を選ぶ手間を省ける。"},{"id":"W008","cat":"W","diff":4,"q":"「メッシュWi-Fi」の説明として正しいのはどれか？","choices":["複数のメッシュ対応機器を家中に設置し、相互に通信してシームレスに広いエリアをカバーするWi-Fiシステム","1台のルーターに大容量アンテナを複数搭載し、階数をまたいで電波を届かせる単体Wi-Fiシステム","ルーターと中継器をWPS接続で繋ぐ従来方式の発展型で、中継器が親機の電波を増幅して届ける仕組み","プロバイダのバックボーンと宅内ネットワークを複数経路で接続し、速度と冗長性を向上させるシステム"],"ans":0,"exp":"メッシュWi-Fiは複数のメッシュノードが相互通信しながらネットワークを形成するシステム。従来の中継器と異なりすべてのノードが同一のSSIDを共有し、端末が移動しても自動的に最適なノードに接続し直す（シームレスローミング）。広い家や複数フロアの住宅に有効。"},{"id":"W009","cat":"W","diff":4,"q":"Wi-Fi 6Eがとくに集合住宅で有効な理由として正しいのはどれか？","choices":["6GHz帯は従来のWi-Fiが使っていない新帯域のため電波干渉が少なく混雑環境で有効だが、障害物には弱い","6GHz帯は2.4GHz帯より低い周波数を使うため障害物を透過しやすく、集合住宅の遠い部屋まで電波が届きやすい","Wi-Fi 6Eは5GHz帯を2本束ねて使う技術であり、集合住宅での干渉低減は電波出力の増強によって実現している","Wi-Fi 6Eの6GHz帯は日本では未認可のため現時点では2.4GHz・5GHz帯のみが実際に利用可能"],"ans":0,"exp":"Wi-Fi 6E（802.11ax）はWi-Fi 6の2.4GHz・5GHz帯に加えて6GHz帯をサポート。6GHz帯は従来のWi-Fiが使っていなかった新帯域のため干渉が少ないが、高い周波数帯のため障害物（壁・床）に弱く設置場所の工夫が必要。ルーターと端末の両方がWi-Fi 6E対応が条件。"},{"id":"W010","cat":"W","diff":5,"q":"HGWがある環境でWi-Fiルーターを追加する場合、二重NAT問題を防ぐための正しい設定はどれか？","choices":["Wi-FiルーターをAPモード（ブリッジモード）でHGWに接続する","Wi-FiルーターをルーターモードのままHGWのLAN端子に接続する","HGWとWi-Fiルーターの間にハブを挟むことでNATが1つに統合され二重NAT問題を解消できる","HGWのDMZ機能でWi-FiルーターのIPを指定することでNATが2重になるのを防ぐことができる"],"ans":0,"exp":"HGWは既にルーター機能（NAT・DHCP）を持つ。その後段にWi-FiルーターをルーターモードでつなぐとNATが2重になる二重NAT問題が発生。Wi-FiルーターをAPモード（ブリッジモード）にするとルーター機能が無効になり問題を回避できる。"},{"id":"W011","cat":"W","diff":4,"q":"「Wi-Fi 7（IEEE 802.11be）」の主な特徴として正しいのはどれか？","choices":["MLOにより複数周波数帯を同時利用でき、理論最大速度は約46Gbpsで遅延低減にも優れる","Wi-Fi 7最大の新機能は16×16 MIMOの採用であり、アンテナ数の増加により理論最大速度が約46Gbpsになった","Wi-Fi 7はWi-Fi 6の5GHz帯専用規格を拡張したもので、6GHz帯のサポートはWi-Fi 8で実装予定","Wi-Fi 7では最大チャネル幅が320MHzに拡大されたが、MLO機能はWi-Fi 7.5として別規格化された"],"ans":0,"exp":"Wi-Fi 7（802.11be）はマルチリンクオペレーション（MLO）が主な新機能。2.4GHz・5GHz・6GHzの複数帯域を同時に束ねて使えるため遅延が大幅に低減される。理論最大速度は約46Gbps（Wi-Fi 6の約4.8倍）。2024〜2025年に対応ルーター・端末が普及し始めた。"},{"id":"W012","cat":"W","diff":3,"q":"光回線のプロバイダレンタルルーターを使うメリットとして正しいのはどれか？","choices":["プロバイダのVNEサービスに動作確認済みのため設定が簡単で、接続不良時にプロバイダへ一本化して問い合わせられる","レンタルルーターは最新Wi-Fi規格（Wi-Fi 7等）への対応が自動更新されるため、長期利用でも買い替えが不要","レンタルルーターはプロバイダが一括管理するためセキュリティパッチが自動適用され、ファームウェア更新の手間が省ける","レンタルルーターを使うと回線速度の保証が付与され、速度が下回った際にプロバイダから補償が受けられる"],"ans":0,"exp":"プロバイダのレンタルルーターはそのプロバイダのVNEサービス（v6プラス・OCNバーチャルコネクト等）との動作確認が取れており、セットアップが容易。接続不良時の問い合わせ先もプロバイダ1か所で済む。ただし最新規格への更新は遅い場合があり、月額レンタル料が発生する場合がある。"},{"id":"W013","cat":"W","diff":4,"q":"「LAN端子のカテゴリ（CAT）」について、1Gbpsの光回線に使う場合の推奨として正しいのはどれか？","choices":["1Gbpsの通信にはCAT5e以上で十分。","1GbpsにはCAT7以上が必須で、CAT5eやCAT6では接続できない","CAT6はWi-Fi接続専用のケーブルで有線LAN接続には使えない","LANケーブルのカテゴリは速度に影響せずどのCATでも性能は同じ"],"ans":0,"exp":"CAT5e・CAT6は1Gbps（1000BASE-T）対応のため、一般的な光回線（1Gbps）には十分。10Gbps回線（フレッツ光クロス等）を有線でフルに活かすにはCAT6A（10GBASE-T対応）以上が必要。なおWi-Fiの速度はルーター〜端末間の無線区間で決まるためLANケーブルのカテゴリは関係しない。"},{"id":"W014","cat":"W","diff":3,"q":"「Wi-Fiの速度が出ない」場合のトラブルシューティングとして最初に確認すべき点として正しいのはどれか？","choices":["有線LAN接続でも遅いか確認する。有線で速度が出ればWi-Fi区間の問題、有線でも遅ければ回線・ONU・HGW側の問題の可能性が高い","まずルーターを再起動し、それで改善しなければDNS設定を変更してプロバイダのDNSサーバーへの応答速度を確認する。有線での切り分けは最後の手段","Wi-Fi速度不満はほぼルーターのファームウェアの不具合が原因のため、最初にファームウェアを最新版にアップデートして問題が解消されるか確認する","まず接続しているSSIDが2.4GHzか5GHzかを確認し、5GHz接続になっていなければ5GHzのSSIDに手動で切り替えることで改善するケースが多い"],"ans":0,"exp":"Wi-Fi速度不満の切り分けは「有線LAN接続での速度確認」が最初の手順。有線で速度が出る→Wi-Fi区間の問題（ルーター性能・設置場所・電波干渉・端末のWi-Fi規格）を疑う。有線でも遅い→回線・ONU・HGW・プロバイダ側を疑う。この2段階の切り分けがすべての起点。"},{"id":"W015","cat":"W","diff":2,"q":"「Wi-Fiルーターの設置場所」として推奨されるのはどれか？","choices":["家の中央部、高い位置（棚の上等）、金属製品・電子レンジ・コードレス電話から離れた場所","窓際の低い位置（床から30cm程度）に設置することで屋外の基地局電波との干渉が防ぎやすくなる","テレビの背面近くに設置することで電源ノイズが共用されWi-Fi電波が安定しやすくなる","押し入れや壁の内側に設置することで電波が壁に反射し部屋全体に均等に届きやすくなる"],"ans":0,"exp":"Wi-Fiルーターは電波を全方向に発するため、家の中央・高い位置に設置するのが理想的。電子レンジ（2.4GHz帯と同じ周波数で干渉）・コードレス電話・金属製品から離すことも重要。床や押し入れは電波が遮蔽され届きにくくなる。"},{"id":"W016","cat":"W","diff":5,"q":"「OCNバーチャルコネクト（MAP-E）」対応ルーターを選ぶ場合の注意点として正しいのはどれか？","choices":["OCNバーチャルコネクトとv6プラスはどちらもMAP-E方式だが実装が異なるため、ルーターはそれぞれ個別対応の確認が必要","v6プラスとOCNバーチャルコネクトの両対応かどうかはNTT東西の公式対応リストで確認できる","OCNバーチャルコネクトはv6プラスの上位互換方式のため、v6プラス非対応でもOCNバーチャルコネクト対応ルーターであれば両方使える","OCNバーチャルコネクトとv6プラスはIPv6アドレス体系が異なるだけでMAP-E処理は共通のため同一ルーターで対応できる"],"ans":0,"exp":"OCNバーチャルコネクトとv6プラスはどちらもMAP-E方式だが、実装の細部が異なる。そのためルーターのv6プラス対応とOCNバーチャルコネクト対応は別々に確認が必要で、v6プラス対応のみでOCNバーチャルコネクト非対応のルーターが存在する。メーカーの動作確認済みリストで必ず確認すること。"},{"id":"W017","cat":"W","diff":3,"q":"光回線の宅内でWi-Fiの電波が弱い部屋がある場合の解決策として、最もコストパフォーマンスが高いのはどれか？","choices":["電波が弱い部屋の近くに中継器またはメッシュWi-Fiのサブノードを追加設置する","電波が弱い部屋専用にプロバイダのレンタルルーターを追加契約することで2系統のWi-Fi環境を構築できる","ルーターをハイパワーモードに設定変更することで電波の到達距離を合法的に延ばせる","弱電波の原因は光回線の帯域不足の場合が多いため、まずIPv6サービスへの切り替えを優先する"],"ans":0,"exp":"Wi-Fiの電波が届かない・弱い部屋への対策は中継器またはメッシュWi-Fiのサブノード追加が最も現実的。中継器は安価だがSSIDが変わる製品もあり端末の切り替えが手動になる場合がある。メッシュWi-Fiはシームレスローミングで自動切り替えができ利便性が高い。有線LANでバックホール接続すると無線中継より安定する。"},{"id":"W018","cat":"W","diff":4,"q":"「4K動画のストリーミング視聴」に必要なWi-Fi帯域として正しいのはどれか？","choices":["4K動画（Netflix等）は一般的に25〜35Mbps程度あれば視聴できるため、Wi-Fi 5以上の環境であれば十分","UHDコーデック処理のためWi-Fi 6以上の環境が必須で、Wi-Fi 5では安定した視聴ができない","映像と音声の同期処理のため上り・下り合計で最低100Mbpsが必要であり、上りが遅い回線では視聴品質が低下する","HEVC（H.265）エンコードのため、Wi-Fi 5以下の環境ではデコード処理が追いつかず映像が乱れる"],"ans":0,"exp":"Netflix等の4K（Ultra HD）ストリーミングは一般的に25〜35Mbps程度の帯域があれば視聴できる。Wi-Fi 5（802.11ac）以上の環境では通常十分。ただし家族全員が同時に4K視聴したり4K録画・アップロードを同時に行う場合は帯域が合算されるため余裕が必要。"},{"id":"W019","cat":"W","diff":4,"q":"「Wi-Fiルーターの最大通信速度」表記（例：Wi-Fi 5対応・最大1733Mbps）の注意点として正しいのはどれか？","choices":["最大通信速度は理論値であり、実際は接続端末の性能・電波環境・接続台数等により理論値の30〜60%程度が実態","ルーターの最大通信速度表記は実測値の中央値を示しており、記載値を下回ることは規格上ありえない","ルーターのWi-Fi速度表記はインターネット回線速度と同一の基準で測定されているため、そのまま実速度の指標になる","最大通信速度は上り・下りの合算値として表記されるため、片方向の実速度は表記値の半分以下になる"],"ans":0,"exp":"Wi-Fiルーターの最大通信速度は理論上の最大値。実際の速度は端末の対応ストリーム数（端末が2x2ならルーターが4x4でも2x2相当）・電波環境・距離・接続台数・干渉等により変動し、一般的に理論値の30〜60%程度が実態。また、Wi-Fi区間の速度とインターネット接続速度は別物で、回線速度がボトルネックになることもある。"},{"id":"W020","cat":"W","diff":4,"q":"「IPv6サービス（IPv4 over IPv6（IPv6サービス））」に対応したルーターの設定方法として正しいのはどれか？","choices":["IPv6サービス対応ルーターを接続するとVNEへの接続設定が自動で行われる","IPv6サービスに対応するには専用アプリのインストールが必要で、ルーター接続だけでは自動設定は行われない","VNEサービスへの接続にはプロバイダから発行された専用のIPv6 IDとパスワードの手動入力が必要","IPv6サービス対応ルーターでもDNS設定はプロバイダ指定のアドレスに手動変更しなければ正常に動作しない"],"ans":0,"exp":"IPv6サービス（IPoE）対応ルーターを接続すると、対応しているVNEサービスへの接続が自動的に行われる。PPPoEのようにユーザーIDとパスワードを手動入力する必要はない。ただし前提として、そのルーターが自分のプロバイダのVNEサービス（v6プラス・OCNバーチャルコネクト等）に対応していることが必須。"},{"id":"W021","cat":"W","diff":3,"q":"「Wi-Fiルーターの電波が弱い・届かない」場合、まず確認すべき原因として最も頻度が高いのはどれか？","choices":["ルーターの設置場所が悪い、または壁・床・家具による電波遮蔽が原因のことが多い","ルーターのファームウェアが古いまま放置されているためセキュリティ制限が働き出力が自動低下している","プロバイダ側の回線帯域がWi-Fiルーターの最大出力より低く設定されているため電波が制限されている","端末のWi-Fiドライバが古いと5GHz帯を認識できなくなるため、端末のソフトウェア更新が最初の対処法"],"ans":0,"exp":"Wi-Fi電波が弱い・届かない原因の大半は設置場所の問題。床の上・棚の下・押し入れ・金属製品の近くは電波が遮蔽・吸収される。鉄筋コンクリートの壁・床は電波を大幅に減衰させる。まずルーターを高い位置・家の中央部に移動するだけで改善するケースが多い。"},{"id":"W022","cat":"W","diff":5,"q":"光回線＋Wi-Fi 6ルーター環境で速度が思ったより出ない原因として誤っているのはどれか？","choices":["接続端末がWi-Fi 5以下で端末規格に引き下げられる（規定の運用と判断する）","多数端末の同時接続で帯域が分割される（規定の運用と判断する取り扱い）","2.4GHz帯接続のため5GHz帯より低速になっている（規定の運用と判断する）","Wi-Fi 6対応ルーターは必ず1Gbpsの回線速度を完全に引き出す"],"ans":3,"exp":"Wi-Fi 6ルーターが1Gbpsを完全に引き出すよう設計されているというのは誤り。実際の速度は端末のWi-Fi規格・ストリーム数・電波環境・距離等によって変動する。その他は速度が出ない実際の原因。"},{"id":"W024","cat":"W","diff":4,"q":"「スマートフォンのWi-Fi接続で5GHz帯に繋がらない」場合の原因として正しいのはどれか？","choices":["端末が5GHz帯に非対応、またはルーターから距離が遠く5GHz帯の電波が届いていない可能性がある","5GHz帯に繋がらない場合はルーターの設定でDFS（動的周波数選択）が有効になっているため常に5GHzが使えない状態","すべてのAndroidスマートフォンは技術基準上2.4GHz帯のみに対応するため、5GHz接続はiPhoneかPCでしか行えない","5GHz帯に繋がらない原因は常にルーター側の設定ミスであり、端末側の仕様が原因になることはない"],"ans":0,"exp":"5GHz帯に繋がらない主な原因は①端末が5GHz非対応（Wi-Fi 4/802.11n以下の一部は5GHz帯に対応していない）、②ルーターとの距離が遠く5GHz帯の電波が届かない、③ルーターの設定で5GHz帯のSSIDが別名になっており接続していない等。Androidもほぼ全ての現行スマートフォンは5GHz帯に対応している。"},{"id":"W025","cat":"W","diff":3,"q":"光回線のONUとWi-Fiルーターを繋ぐ「LANポート（WAN側）」と「LANポート（LAN側）」の正しい使い方はどれか？","choices":["ONUまたはHGWはルーターのWANポートに繋ぐ。PC等の宅内機器はルーターのLANポートまたはWi-Fi経由で接続する","ONUはルーターのLANポートに繋ぐ。WANポートはWAN側から宅内ネットワークへのアクセスを受け付ける受信専用ポート","ルーターのWANとLANはどちらに繋いでも自動認識するため、接続するポートを意識する必要はない","ONUとルーターはLANポート同士をクロスケーブルで繋ぐ。WANポートはプロバイダ指定の機器専用のため通常使用しない"],"ans":0,"exp":"WANポート（Wide Area Network）はインターネット側（ONU・HGW）と接続するポート。LANポート（Local Area Network）はPC・ゲーム機・NAS等の宅内機器と接続するポート。WANとLANを逆に繋ぐとインターネットに繋がらないため、機器を繋ぐ際はポートの種別を必ず確認する。"},{"id":"W026","cat":"W","diff":3,"q":"「Wi-Fiが繋がるのにインターネットに繋がらない」場合の原因として最も可能性が高いのはどれか？","choices":["ルーターのWAN設定が正しくない、またはONU・回線側に問題がある可能性が高い","Wi-FiのSSIDが他の機器と重複しているため通信パケットが衝突しインターネット接続が確立できない","端末のIPアドレスが手動設定のままになっておりDHCPサーバーからの自動取得に失敗している","ルーターのLANポートにONUを接続しているためルーターがインターネット側を認識できていない"],"ans":0,"exp":"「Wi-Fiには接続できるがインターネットに繋がらない」はルーター〜インターネット間の問題。PPPoE接続ならID/パスワードの入力ミス、IPoE（IPv6サービス）接続なら対応ルーターでないまたはv6オプション設定の問題、またはONU/HGWの故障・回線側の問題が主な原因。Wi-Fiパスワードが間違っていると接続自体がそもそもできない。"},{"id":"W027","cat":"W","diff":6,"q":"「ゲーム機（PS5等）でNATタイプが「2」または「3」になってしまう」場合の対処として正しいのはどれか？","choices":["NATタイプを改善するにはルーターのUPnPを有効化するか、ポート開放を設定する","PS5本体のネットワーク設定から「NATタイプ優先モード」を有効にすることで改善できる","NATタイプ2・3はIPv6 IPoE環境特有の制限のため、PPPoE接続に切り替えることで自動的にNATタイプ1になる","PS5をDMZホストに設定すれば全ポートが開放されNATタイプが改善されるが、IPoE環境では設定箇所がHGWになる"],"ans":0,"exp":"PS5等のNATタイプが「3（strict）」になると一部のマルチプレイができなくなる。対処法は①ルーターのUPnPを有効にする（多くの場合これで解決）②必要なポートを手動開放③HGWがある環境では市販ルーターをAPモードにして二重NATを解消④DS-Lite（transix/クロスパス等）環境ではポート開放不可のため固定IPオプションに変更が根本解決。"},{"id":"W028","cat":"W","diff":4,"q":"「Wi-Fi 6対応ルーターを購入したがWi-Fi 5時代より速度が上がった気がしない」原因として正しいのはどれか？","choices":["接続端末がWi-Fi 5以下の規格にしか対応しておらず、ルーターがWi-Fi 6でも端末の規格に合わせた通信になるため速度向上の恩恵がない","Wi-Fi 6ルーターはWi-Fi 5端末と互換性がないため、Wi-Fi 5端末では接続自体はできるが通信速度が大幅に低下する","Wi-Fi 6はWi-Fi 5と比較して速度向上よりも消費電力削減を主目的とした規格のため、速度差はほとんど生じない","Wi-Fi 6ルーターはWi-Fi 5端末の通信を最優先で処理するため、Wi-Fi 6端末の速度向上効果が相殺される"],"ans":0,"exp":"Wi-Fi 6の速度・効率改善を体感するには接続端末もWi-Fi 6対応である必要がある。スマホ・PCがWi-Fi 5（802.11ac）以下の場合、ルーターをWi-Fi 6に変えてもWi-Fi 5規格での通信となり速度向上の恩恵は少ない。Wi-Fi 6の効果が最も出るのはWi-Fi 6対応端末が多数同時接続する環境（OFDMA効果）。"},{"id":"W029","cat":"W","diff":4,"q":"「集合住宅でWi-Fiが不安定・速度が出ない」場合の対処として誤っているのはどれか？","choices":["チャネル帯域幅を最大の160MHzに広げると必ず安定性が増す","2.4GHz帯は干渉が多いため5GHz帯への切り替えが有効","メッシュWi-FiやAPを複数設置することで電波の死角を補える","Wi-Fiアナライザーで使用者が少ないチャンネルを確認して手動変更することで改善する場合がある"],"ans":0,"exp":"チャネル帯域幅160MHzに広げると使用する周波数帯域が最大になるため、他のWi-Fiとの重複が増え集合住宅等の混雑環境では逆に干渉が増加して不安定になることがある。2.4GHz→5/6GHzへの切り替え・チャンネル変更・メッシュ化は有効な対処法。集合住宅での安定化にはチャネル幅を狭める（20〜80MHz）方が有効な場合が多い。"},{"id":"W030","cat":"W","diff":4,"q":"「IPv6サービス（IPoE/IPv4 over IPv6（IPv6サービス））」に対応するルーターが必要な場面として正しいのはどれか？","choices":["フレッツ光ベースの回線（光コラボ含む）でIPv4 over IPv6（IPv6サービス）による高速接続を利用したい場合","auひかりでインターネット速度を最大化したい場合。au独自のIPoE方式はVNEサービス対応ルーターが必須","NURO光で2Gbpsの最大速度を引き出したい場合。NURO独自のIPoE方式では専用ルーターが必要","電力系光回線（eo光・コミュファ光等）でIPv6サービスを利用したい場合。各社独自VNEへの対応が必要"],"ans":0,"exp":"IPv6サービス対応ルーターが必要なのは、フレッツ光ベースの回線（光コラボ含む）でIPv4 over IPv6（IPv6サービス）による高速IPoE接続を利用したい場合。auひかりはKDDI独自のデュアルスタック構成のため別途の対応ルーターは不要。HGW（ひかり電話対応ゲートウェイ）がある環境ではHGWが設定を担当するため、後段の市販Wi-FiルーターはAPモードでOK。"},{"id":"N001","cat":"N","diff":4,"q":"2023年にNTTコミュニケーションズ（NTTコム）の法人向け事業・サービスを引き継いだ会社として正しいのはどれか？","choices":["NTTドコモビジネス","NTTデータ","NTTコミュニケーションズ","NTT東日本"],"ans":0,"exp":"2023年7月、NTTコミュニケーションズ（NTTコム）の法人向け通信事業がNTTドコモビジネスに統合された。OCNバーチャルコネクトやArcstar Universal One等のサービスも同社へ移管。個人向けOCNサービスはNTTドコモへ。"},{"id":"N002","cat":"N","diff":4,"q":"「OCNバーチャルコネクト」の現在の提供会社として正しいのはどれか？","choices":["NTTドコモビジネス（旧NTTコミュニケーションズから移管）","NTTコミュニケーションズ（再編後も商標・サービス提供は旧来の法人格が継続）","NTTドコモ（個人向けOCNサービスと一体化してNTTドコモに移管）","JPIX（VNEサービスの運用実態に基づきJPIXが提供会社として再整理）"],"ans":0,"exp":"OCNバーチャルコネクトはもともとNTTコミュニケーションズが開発・提供していたVNEサービス。2023年のNTTグループ再編によりNTTドコモビジネスに移管された。2025年時点でもOCNバーチャルコネクトのブランドは継続しているが、提供主体はNTTドコモビジネス。"},{"id":"N003","cat":"N","diff":3,"q":"2023年のNTTグループ再編で「個人向けOCNサービス（OCN光・OCNモバイルONE等）」を引き継いだ会社として正しいのはどれか？","choices":["NTTドコモ（個人向け部門）","NTTドコモビジネス（個人・法人を問わずOCNブランドをNTTドコモビジネスに統合）","NTTぷらら（個人向けコンテンツ・通信サービスをNTTぷららに集約）","NTTコミュニケーションズ（OCNは法人・個人ともに引き続きNTTコムが提供継続）"],"ans":0,"exp":"2023年のNTTグループ再編では法人向けをNTTドコモビジネス、個人向けをNTTドコモに集約。OCN光・OCNモバイルONE等の個人向けOCNサービスはNTTドコモの管轄となった。なおサービスブランド名「OCN」は維持されているものが多い。"},{"id":"N004","cat":"N","diff":3,"q":"「ひかりTV」の現在の提供会社として正しいのはどれか？","choices":["NTTドコモ（ひかりTV事業部門）","NTTぷらら（NTTグループ再編後もNTTぷららが独立事業者としてひかりTVを継続提供）","スカパーJSAT（ひかりTVのコンテンツ供給をスカパーJSATが引き受け提供会社となった）","NTTドコモビジネス（映像配信サービスを法人向けICTと一体化してNTTドコモビジネスが担当）"],"ans":0,"exp":"ひかりTVはもともとNTTぷらら（NTTグループ子会社）が提供するフレッツ光利用の映像配信サービスだったが、NTTグループ再編によりNTTドコモに統合された。2025年時点でひかりTVのサービス提供主体はNTTドコモ。"},{"id":"N005","cat":"N","diff":1,"q":"「ドコモ光」の現在の提供会社として正しいのはどれか？","choices":["NTTドコモ","NTTドコモビジネス","NTT東日本","NTTコミュニケーションズ"],"ans":0,"exp":"ドコモ光はNTTドコモが提供する光コラボレーションサービス。NTT東西からフレッツ光を卸受けしてプロバイダとセットで提供する。NTTグループ再編後も引き続きNTTドコモが提供主体。"},{"id":"N006","cat":"N","diff":3,"q":"2023年のNTTグループ再編の目的として正しいのはどれか？","choices":["個人向けをNTTドコモに、法人向けをNTTドコモビジネスに集約し、顧客接点を一本化して効率化するため","NTT東西のアクセスライン部門をNTTドコモに統合し、光回線の販売からインフラ管理まで一元化するため","NTTグループ各社の重複事業を整理し、外資規制の強化に対応した持株比率の見直しを行うため","NTTドコモを分社化してモバイル・固定・法人を別会社に切り分け、競争環境を整備するため"],"ans":0,"exp":"2023年のNTTグループ再編はグループ内の役割分担を整理し、個人顧客をNTTドコモ、法人顧客をNTTドコモビジネスに集約することで顧客接点の一本化と業務効率化を図るもの。NTT東西はアクセスラインインフラの管理・提供という役割は維持している。"},{"id":"N007","cat":"N","diff":3,"q":"NTTグループ再編後の「NTTドコモビジネス」の主な業務として正しいのはどれか？","choices":["法人向け通信・ICTサービスの提供","フレッツ光の光コラボ卸提供およびVNEサービスの管理・運用","個人向けMVNOサービスおよびahamo・irumo等の格安プランの提供","NTT東西が保有する光ファイバー網の設備投資計画の立案・管理"],"ans":0,"exp":"NTTドコモビジネスは旧NTTコミュニケーションズと旧NTTドコモの法人事業を統合した法人専業会社。OCNバーチャルコネクト・Arcstar Universal One・クラウドサービス等の法人向けICTサービスを提供する。個人向けサービスはNTTドコモが担当。"},{"id":"N008","cat":"N","diff":5,"q":"「ahamo光」が採用しているVNEサービスとIPv4 over IPv6（IPv6サービス）方式として正しいのはどれか？","choices":["NTTドコモビジネス（旧NTTコム）/ OCNバーチャルコネクト（MAP-E）","NTTドコモ / ドコモ独自IPv6サービス（MAP-E方式の派生型実装）","JPIX / v6プラス（MAP-E方式の標準実装と判断する規定上の運用）","インターネットマルチフィード / transix（DS-Lite）"],"ans":0,"exp":"ahamo光はNTTドコモが提供する光コラボで、VNEサービスはNTTドコモビジネス（旧NTTコム）のOCNバーチャルコネクト（MAP-E方式）を採用。PPPoE接続を提供せずIPv4 over IPv6（IPv6サービス）のみの提供となっている。"},{"id":"N009","cat":"N","diff":3,"q":"「NTTぷらら」がNTTグループ再編でどうなったかとして正しいのはどれか？","choices":["NTTドコモに吸収合併され、ぷららブランドのサービスはNTTドコモが継続提供","NTTドコモビジネスに統合され、法人向けIPTVサービスとして再編された","スカパーJSATとの合弁会社に移行し、ひかりTVのコンテンツ供給部門として独立した","NTT東日本の完全子会社として存続し、フレッツ光向けのIPTVサービスに特化した"],"ans":0,"exp":"NTTぷらら（ひかりTV・ぷららブロードバンドサービス等を提供）は2022年7月にNTTドコモに吸収合併された。ひかりTV・ぷらら光等のサービスはNTTドコモが引き継ぎ、ブランド名は一部維持されている。"},{"id":"N010","cat":"N","diff":3,"q":"NTTグループ再編後も「フレッツ光アクセスラインの管理」を担当するのはどこか？","choices":["NTT東日本・NTT西日本（変わらず）","NTTドコモ（個人向け販売窓口の移管に合わせてアクセスライン管理も統合）","NTTドコモビジネス（法人向けフレッツ光の管理を担当する部門として設備管理も移管）","NTTコミュニケーションズ（光コラボ事業のVNE管理に加えてアクセスライン管理も一元化）"],"ans":0,"exp":"NTTグループ再編はサービス提供の窓口を整理したもの。フレッツ光の物理インフラ（光ファイバー・ONU・工事）の管理はNTT東西が引き続き担当する。光コラボへの回線卸売りもNTT東西が行う。"},{"id":"N011","cat":"N","diff":5,"q":"「OCN for ドコモ光（OCNインターネット タイプB）」は、NTTグループ再編後にどのような位置付けになったか？","choices":["NTTドコモが提供するドコモ光の提携プロバイダとして継続し、OCNバーチャルコネクトを採用するプランとして存続","NTTドコモビジネスの法人向けサービスに統合され、個人向けOCN for ドコモ光は廃止された","NTT東日本の直販フレッツ光向けプロバイダとして再編され、ドコモ光との提携関係は解消された","NTTグループ再編を機にv6プラスへのVNE移行が完了し、OCNバーチャルコネクト採用プランは終了した"],"ans":0,"exp":"OCN for ドコモ光（OCNインターネット タイプB）はNTTグループ再編後もドコモ光の提携プロバイダとして継続提供されている。プロバイダとしてのOCNサービスはNTTドコモが管轄しており、IPv4 over IPv6（IPv6サービス）はOCNバーチャルコネクト（MAP-E）を採用。"},{"id":"N012","cat":"N","diff":3,"q":"2025年時点でNTTコミュニケーションズという会社は存在するか？","choices":["法人向け事業はNTTドコモビジネスに移管され、NTTコミュニケーションズとしての実質的な事業は大半が統合された","NTT持株会社に吸収合併され、法人格として消滅した（再編に伴い登記上も完全に消滅と判断する運用）","国際通信事業のみに特化した会社として分社化され、NTTグループ内で独立存続している（再編後の運用）","NTTドコモの完全子会社として存続し、OCNブランドの管理会社として機能している（再編後の運用と判断）"],"ans":0,"exp":"2023年のNTTグループ再編でNTTコミュニケーションズの法人向け事業はNTTドコモビジネスに統合された。社名自体が完全消滅したわけではないが、実質的な事業の大半はNTTドコモビジネスが担っており、「NTTコム」ブランドで呼ばれることは少なくなっている。"},{"id":"N013","cat":"N","diff":3,"q":"「ぷらら光（Plala）」のサービス提供会社として現在正しいのはどれか？","choices":["NTTドコモ（NTTぷららを吸収合併）","NTTぷらら（再編後も独立事業者として存続しぷらら光はNTTぷらら名義で継続提供）","NTTドコモビジネス（ぷらら光は法人向けサービスに転換しNTTドコモビジネスが担当）","NTT東日本（ぷらら光はフレッツ光の付加サービスとしてNTT東日本直販に統合）"],"ans":0,"exp":"NTTぷららは2022年7月にNTTドコモに吸収合併。ぷらら光・ひかりTV等のサービスはNTTドコモが引き継いだ。問い合わせ窓口・請求主体もNTTドコモとなっている。"},{"id":"N014","cat":"N","diff":3,"q":"NTTグループ再編において「個人向け」と「法人向け」のサービスがそれぞれどこに集約されたか正しいのはどれか？","choices":["個人向け→NTTドコモ、法人向け→NTTドコモビジネス","個人向け→NTTドコモ、法人向け→NTTコミュニケーションズ","個人向け→NTTぷらら、法人向け→NTTドコモビジネス","個人向け→NTTドコモビジネス、法人向け→NTTドコモ"],"ans":0,"exp":"NTTグループ再編の基本方針は「個人向けをNTTドコモ、法人向けをNTTドコモビジネス」に集約して顧客接点を明確化すること。これにより旧NTTコム・旧NTTぷらら等の事業が整理・統合された。"},{"id":"N016","cat":"N","diff":4,"q":"「NTTドコモビジネス」はいつ設立（または改称）されたか？","choices":["2023年","2021年","2019年","2025年"],"ans":0,"exp":"NTTドコモビジネスは2023年にNTTコミュニケーションズの法人向け通信・ICT事業をNTTドコモの法人事業部門と統合して設立された会社。旧NTTコムの法人向けサービス（OCNバーチャルコネクト・Arcstar等）を引き継ぎ、法人顧客への一元的なサービス提供を行う。"},{"id":"N017","cat":"N","diff":4,"q":"「ひかりTV for docomo」サービスの提供会社として正しいのはどれか？","choices":["NTTドコモ（NTTぷらら事業統合後）","NTTぷらら（ひかりTV for docomoはNTTぷららが独立サービスとして提供継続）","NTTドコモビジネス（法人向けIPTVサービスとして再編後はNTTドコモビジネスが担当）","スカパーJSAT（映像コンテンツ事業の統合によりひかりTV関連サービスをスカパーが一括担当）"],"ans":0,"exp":"ひかりTV for docomoはNTTドコモが提供するフレッツ光を使った映像配信サービス。旧NTTぷららが提供していたひかりTVをNTTドコモが吸収合併・統合した形で提供している。andlineTVが使うフレッツ・テレビとは別サービスだが同じフレッツ光インフラを使用する。"},{"id":"N018","cat":"N","diff":4,"q":"「OCNモバイルONE（MVNO）」のNTTグループ再編後の提供会社として正しいのはどれか？","choices":["NTTドコモ","NTTドコモビジネス","NTTコミュニケーションズ","NTTデータ"],"ans":0,"exp":"OCNモバイルONEはもともとNTTコミュニケーションズのMVNOサービスだったが、NTTグループ再編によりNTTドコモが管轄する個人向けサービスとして引き継がれた。2025年時点でのサービス提供主体はNTTドコモ。"},{"id":"N019","cat":"N","diff":3,"q":"NTTグループ再編後、「フレッツ光の光コラボへの卸売り（転用・事業者変更の手続き）」はどこが担当するか？","choices":["NTT東日本・NTT西日本（変わらず担当）","NTTドコモ（光コラボの個人向け窓口移管に伴い卸売り手続きもNTTドコモに一元化）","NTTドコモビジネス（法人向け光コラボの卸提供はNTTドコモビジネスに移管）","NTTコミュニケーションズ（光コラボ事業者への卸提供契約の管理をNTTコムが一括担当）"],"ans":0,"exp":"フレッツ光のアクセスラインインフラ・光コラボへの卸売り・転用や事業者変更の処理はNTTグループ再編後もNTT東日本・NTT西日本が担当する。グループ再編はサービス提供の窓口（営業・顧客対応）を整理したものであり、物理インフラ管理はNTT東西が引き続き担う。"},{"id":"B061","cat":"B","diff":3,"q":"「ドコモ光 タイプC」の説明として正しいのはどれか？","choices":["光コラボの標準プランで全国どこでも利用できる（規定上は全国共通運用と判断する取り扱い）","CATVの設備（独自回線）を使ってドコモが提供するインターネットサービス。","NTT東西の10GbpsプランのドコモブランドがタイプCと呼ばれる（規定）","フレッツ光のマンションタイプCを指す名称（規定上はマンション型運用と判断する）"],"ans":1,"exp":"ドコモ光タイプCはCATVの設備を使ってドコモが提供する光インターネットサービス。タイプA・タイプB（NTT東西のフレッツ光を使う）とは異なり、CATVの独自回線インフラを使う。提携CATVのサービスエリアが提供範囲となるため全国一律ではない。"},{"id":"B062","cat":"B","diff":4,"q":"「ドコモ光 タイプC」のアクセスラインについて正しいのはどれか？","choices":["提携ケーブルテレビ会社の独自回線（CATVの設備）を使用するためNTTのアクセスラインを使っていない","NTT東西のアクセスラインを使いつつ光コラボではなくNTT直販扱いに分類されるため、事業者変更の手続き区分が異なる","NTTとKDDIが第三セクター形式で共同運用する特定エリア向け中継専用回線を使用しており全国展開はされていない","フレッツ光クロス（10Gbps）回線を専用に割り当てた高速特化型の光コラボで、通常のタイプA/Bとは設備が異なる"],"ans":0,"exp":"ドコモ光タイプCはNTT東西のフレッツ光とは全く異なるCATVの独自回線インフラを使用する。そのため光コラボ間の「事業者変更」の対象外であり、タイプC→タイプA/Bへの変更は新規工事が必要になる場合がある。タイプA/BはNTTのアクセスラインを使用する光コラボ。"},{"id":"B063","cat":"B","diff":4,"q":"「ドコモ光 タイプC」のメリットとして正しいのはどれか？","choices":["CATVサービスをそのまま継続しながらドコモ光として請求を一本化しドコモ光セット割が適用できる","CATV回線を使うためフレッツ系より通信速度が安定しておりping値も低い傾向がある","NTTのIPv6サービスに対応しているためIPoE接続でタイプA/Bより優先的に帯域が確保される","CATV独自回線のためNTT東西の設備混雑の影響を受けず夜間帯でも速度低下が起きにくい"],"ans":0,"exp":"ドコモ光タイプCのメリットは既にCATVを利用しているユーザーが工事なしでドコモ光に切り替えられる点と、ドコモのスマートフォンとのセット割（ドコモ光セット割）が適用できる点。テレビ・電話サービスもCATVのまま継続できる。"},{"id":"B064","cat":"B","diff":4,"q":"「ドコモ光 タイプC」の注意点として正しいのはどれか？","choices":["IPv4 over IPv6の対応状況や速度・安定性がCATVの設備・エリアによって異なりフレッツ系と同等とは限らない","タイプCはCATV独自回線のためONUはお客様の私有物となり解約時の返却手続きが不要になっている","タイプCはNTTの基幹回線を経由しないためドコモ基地局の障害時に通信に影響が出やすい点に注意","タイプCからタイプA/Bへの変更は事業者変更承諾番号だけで申し込め工事もいっさい不要である"],"ans":0,"exp":"ドコモ光タイプCはCATVの独自回線を使うため、CATV事業者ごとにインフラ品質が異なる。IPv4 over IPv6（IPv6サービス）の対応状況もCATV事業者次第であり、フレッツ系のタイプA/Bと同じサービス品質とは限らない。タイプC→タイプA/Bへの変更は工事が伴う場合がある。"},{"id":"B065","cat":"B","diff":4,"q":"「ドコモ光 タイプA」「タイプB」「タイプC」の違いとして正しいのはどれか？","choices":["タイプA・B・Cは速度帯域の違い（A:100M・B:500M・C:1G）","タイプA・BはNTT東西のフレッツ光を使う光コラボで提携プロバイダが異なる。","タイプA・B・Cはどれも同じNTT回線を使い、プロバイダのみが異なる","タイプAは東日本エリア、タイプBは西日本エリア、タイプCは全国統一プラン"],"ans":1,"exp":"タイプAとタイプBはNTT東西のフレッツ光（光コラボ）を使うサービスで、提携プロバイダが異なる（タイプAの方が月額約220円安い）。タイプCはCATVの独自回線インフラを使うサービスで、アクセスライン自体がNTT東西のものではない点が大きく異なる。"},{"id":"B066","cat":"B","diff":3,"q":"「ドコモ光 タイプCのユーザー」がandline光SEに乗り換えたい場合の手続きとして正しいのはどれか？","choices":["事業者変更承諾番号を取得してandline光SEに申し込む（工事不要）","ドコモ光セット割が解除されるためドコモへの申し出は不要","転用承諾番号を取得してandline光SEに転用手続きする","タイプCはCATVの独自回線のため事業者変更は使えない。"],"ans":3,"exp":"ドコモ光タイプCはCATVの独自回線を使うため、NTTフレッツ系光コラボの「事業者変更」制度の対象外。andline光SE（フレッツ系光コラボ）への乗り換えには、CATV側（ドコモ光タイプC）の解約とandline光SEとしての新規工事（派遣工事）が必要。"},{"id":"B067","cat":"B","diff":3,"q":"次のうち「NTT東西のフレッツ光（アクセスライン）を使っていない」サービスはどれか？","choices":["@nifty光（フレッツベースの光コラボ）","ドコモ光タイプC（提携CATVの独自回線）","楽天ひかり（フレッツベースの光コラボ）","SoftBank光（フレッツベースの光コラボ）"],"ans":1,"exp":"SoftBank光・楽天ひかり・@nifty光はいずれもNTT東西のフレッツ光を卸受けした光コラボ。ドコモ光タイプCのみ提携CATVの独自回線（CATVの設備）を使用しており、NTT東西のアクセスラインを使用していない。"},{"id":"B068","cat":"B","diff":4,"q":"ドコモ光タイプCで利用している場合、「ドコモ光セット割」は適用できるか？","choices":["タイプCもドコモ光の一プランとして「ドコモ光セット割」が適用されドコモのスマートフォン料金が割引される","タイプCはCATV事業者との共同提供のためドコモ光セット割の対象外となっている","タイプCは別回線扱いのためdポイント特典のみ適用されセット割引は受けられない","タイプCはドコモのMNO回線と通信経路が分離しているためセット割の審査が別途必要"],"ans":0,"exp":"ドコモ光タイプCはタイプA・Bと同じく「ドコモ光」のプランの一つとして位置づけられるため、ドコモのスマートフォンとのセット割「ドコモ光セット割」が適用される。これがCATVサービスを継続しながらドコモのスマホセット割も受けたいユーザーがタイプCを選ぶ主な理由。"},{"id":"B069","cat":"B","diff":3,"q":"「ドコモ光 タイプC」の料金請求先として正しいのはどれか？","choices":["NTTドコモから一括請求される","NTT東西とドコモの2社からそれぞれ請求される","プロバイダ料金のみドコモ、回線料金はCATVから別々に請求される","提携CATV会社から直接請求される"],"ans":0,"exp":"ドコモ光タイプCはドコモ光の一プランとして、利用料金はNTTドコモから一括請求される。これはタイプA・Bと同じ。CATVの設備を使っていてもドコモが窓口となりプロバイダ料込みで請求する。"},{"id":"B070","cat":"B","diff":3,"q":"光コラボの「事業者変更」制度が使えないケースとして正しいのはどれか？","choices":["andline光SEからGMOとくとくBB光への変更","ドコモ光タイプCからandline光SEへの変更","楽天ひかりからドコモ光への変更","ドコモ光タイプAからSoftBank光への変更"],"ans":1,"exp":"光コラボ間の事業者変更制度はNTT東西のフレッツ光回線（アクセスライン）を共通基盤とするサービス間でのみ適用される。ドコモ光タイプCはCATVの独自回線を使うため、NTTフレッツ系の事業者変更制度の対象外。フレッツ系光コラボ同士（ドコモ光タイプA→andline光SE等）は事業者変更が使える。"},{"id":"B071","cat":"B","diff":2,"q":"「mineo（マイネオ）光」と「mineo（マイネオ）モバイル」の運営会社として正しいのはどれか？","choices":["ソフトバンク","KDDI","NTTドコモ","オプテージ株式会社（関西電力グループ）"],"ans":3,"exp":"mineo（マイネオ）はオプテージ株式会社（関西電力グループ）が提供するサービス。MVNOのmineo（モバイル）と光コラボのmineo光を展開する。eo光（電力系独自回線）も同社が提供するが、mineo光はNTTフレッツ光を卸受けした光コラボで全国展開している。"},{"id":"B072","cat":"B","diff":3,"q":"「フレッツ光クロス（10Gbps）」から「ドコモ光 10ギガ」への事業者変更について正しいのはどれか？","choices":["ドコモ光10ギガはフレッツ光クロスを使う光コラボなので事業者変更が可能だが、NTT東西での設備切替工事が伴うため工事日の調整が必要","ドコモ光10ギガはKDDI系の独自回線を基盤としているため新規開通工事が必要で、転用制度を使って申し込んでも開通しない","フレッツ光クロスは専用の10Gbps特殊回線のため光コラボへの転用制度が適用外とされており、乗り換え方法がない","事業者変更承諾番号を取得してオンラインで申し込みを完了させれば、設備切替は自動処理されるため工事日の調整は不要だ"],"ans":0,"exp":"フレッツ光クロス（NTT直販10Gbps）からドコモ光10ギガ（光コラボの10Gbpsプラン）への変更は転用手続きになる。ただしNTT東西での設備切替処理が発生するため工事日の調整が必要で、即日切り替えはできない。"},{"id":"B074","cat":"B","diff":3,"q":"フレッツ光と光コラボの提供エリアの関係として正しいのはどれか？","choices":["光コラボのエリアはフレッツ光より狭い","事業者ごとに全く異なる独自エリアを持つ","光コラボのエリアはフレッツ光より広い","光コラボはフレッツ光のエリアとほぼ一致する"],"ans":3,"exp":"光コラボはNTT東西のフレッツ光を卸受けして提供するため、提供エリアはフレッツ光の提供エリアとほぼ一致する。フレッツ光が使える地域なら原則として光コラボも申し込める。"},{"id":"B075","cat":"B","diff":3,"q":"「光コラボを解約後にフレッツ光（NTT直販）に戻す」場合の正式名称として正しいのはどれか？","choices":["新規申し込み（解約後は新規扱いとなる）","事業者変更","転用（フレッツへの再転用）","再転用（光コラボからフレッツ光への移行）"],"ans":3,"exp":"光コラボからNTT東西のフレッツ光（NTT直販）に戻すことを「再転用」と呼ぶ。フレッツ光への転用の逆方向の手続きで、事業者変更承諾番号を取得してNTT東西の窓口に申し込む。アクセスラインは変わらないため原則工事不要。"},{"id":"B076","cat":"B","diff":3,"q":"「NURO光 for マンション（共有タイプ）」の特徴として正しいのはどれか？","choices":["各部屋まで専有の光ファイバーを引き込む戸建てと同じ構成（戸建て同等の専有型として運用）","NURO光のマンションタイプはNTTのフレッツ光（光コラボ）として提供される（規定上の運用）","NURO光はマンションタイプを提供していない（戸建てプランのみの提供との規定上の運用）","建物の共用部分まで高速回線を引き込み、各部屋には共有の形で提供するプランで月額料金が抑えられる"],"ans":3,"exp":"NURO光 for マンション（共有タイプ）は建物共用部まで高速回線を引き込み、各部屋には共有帯域で提供するプラン。月額料金が安い代わりに時間帯によって帯域が他の入居者と共有される。新マンションプランではSONY製Wi-Fi 6対応ONUに統一されている。"},{"id":"B077","cat":"B","diff":4,"q":"「光コラボ」から「CATV系インターネット（J:COM NET等）」への乗り換えについて正しいのはどれか？","choices":["光コラボとCATV系はインフラが全く異なるため光コラボを解約してCATV系に新規加入する必要がある","光コラボとCATV系はNTTのバックボーンを共用しているため事業者変更番号で手続きが可能","光コラボからJ:COM NETへの乗り換えはNTT東西を経由した転用手続きで対応できる","CATV系はフレッツ光と設備協定を結んでいるため1回工事のみで光コラボから切り替えられる"],"ans":0,"exp":"光コラボはNTTフレッツ光アクセスラインを使い、J:COM NET等のCATV系はCATV独自のHFCインフラを使う。アクセスラインが根本的に異なるため光コラボの事業者変更制度は使えない。光コラボを別途解約してCATV系に新規加入（工事あり）する必要がある。"},{"id":"B078","cat":"B","diff":3,"q":"「ドコモ光 単独タイプ」の特徴として正しいのはどれか？","choices":["プロバイダが月額料金に含まれて最初から付属するドコモ光の標準プラン","ドコモ光回線だけの契約でインターネット接続には別途プロバイダ契約が必要","ドコモ光セット割の対象外となりスマホ割引が一切適用されない特殊なプラン","ひかり電話の契約が必須条件となり電話なしでは申し込めない回線プラン"],"ans":1,"exp":"ドコモ光単独タイプはプロバイダが含まれない回線のみのプラン。インターネット接続には別途プロバイダとの契約が必要（月額料金が別発生）。プロバイダをドコモ指定以外のものと組み合わせたい場合に使用する。ドコモ光セット割は適用可能。"},{"id":"B079","cat":"B","diff":4,"q":"「ドコモ光 タイプCで利用中、同じエリアのNURO光に乗り換えたい」場合の手続きとして正しいのはどれか？","choices":["タイプC（CATV回線）もNURO光もNTTフレッツ系ではないためタイプCの解約とNURO光の新規工事が別々に必要","タイプCはCATV、NURO光はNTT系のため転用承諾番号を使ってタイプCからNURO光へ1回の手続きで変更できる","タイプCとNURO光はどちらも非フレッツ系なので両社間で直接の回線切替申請ができる","NURO光はタイプCと同じ独自回線扱いのためドコモ窓口で一括して乗り換え手続きが完結する"],"ans":0,"exp":"ドコモ光タイプC（CATVの独自回線）もNURO光（NTTダークファイバー系独自回線）もフレッツ光系ではない。事業者変更・転用制度のいずれも使えず、タイプCを解約してNURO光に新規申し込み（宅内工事2回）が必要。どちらの解約・工事タイミングも別々に調整が必要。"},{"id":"B080","cat":"B","diff":4,"q":"「ひかりTV for docomo」と「andlineTV」は同じサービスか？","choices":["異なるサービス。ひかりTV for docomoはNTTドコモ（旧NTTぷらら）が提供するIPTVサービス","同じサービスで名称だけが異なる。どちらもNTTドコモが提供するIPTV型VODサービス","異なるサービス。ひかりTV for docomoはソフトバンクが提供する衛星放送向けのSTBサービス","同じ基盤だがandlineTVはIPTV方式、ひかりTV for docomoは同軸ケーブル経由の放送受信サービス"],"ans":0,"exp":"ひかりTV for docomoはNTTドコモ（旧NTTぷらら）が提供するIPTV（インターネットプロトコルテレビ）サービスで、VOD・ライブチャンネル等が中心。andlineTVはandline光SEのオプションで、フレッツ・テレビベースの同軸ケーブル経由の地デジ・BS放送受信サービス。提供形式・提供会社ともに異なる。"},{"id":"G037","cat":"G","diff":3,"q":"「ドコモ光セット割」を適用するために「ひかり電話（andline電話等）の契約が必要か？」について正しいのはどれか？","choices":["ひかり電話の契約は不要。ドコモ光とドコモのスマートフォン（対象プラン）の両方を契約していればセット割が適用される","ひかり電話の契約がない場合は通常割引の半額（最大550円/月）のみが適用され、満額適用には電話オプションが必要","ひかり電話を申し込むと固定電話基本料が割引される「ひかり電話セット割」が追加で上乗せされてさらにお得になる","ひかり電話（ドコモ光電話）の契約がセット割適用の必須条件で、電話なしの場合はスマホ割引が一切適用されない"],"ans":0,"exp":"ドコモ光セット割はドコモ光（タイプA/B/C/単独のいずれか）とドコモの対象スマートフォンプランの契約だけで適用される。ひかり電話の契約は必須条件ではない。この点がauスマートバリュー（auひかり電話が必須）との大きな違い。"},{"id":"G038","cat":"G","diff":4,"q":"「auスマートバリュー」と「ドコモ光セット割」の最大の違いはどれか？","choices":["auスマートバリューはauひかり電話（固定電話オプション）の契約が必須条件だが、ドコモ光セット割はひかり電話の契約が不要","auスマートバリューはドコモ・ソフトバンクのスマホでも、指定のauひかりプランと同時契約することで割引を適用できる","ドコモ光セット割はタイプC（CATV提携）のプランに限定して適用される制度で、タイプA/Bのユーザーは対象外だ","割引額の水準が最大の違いで、auスマートバリューはドコモ光セット割と比較して常に2倍以上の月額割引が設定されている"],"ans":0,"exp":"auスマートバリューはauひかりに加えてauひかり電話（固定電話オプション）の契約が必須条件。ドコモ光セット割はひかり電話（ドコモ光電話）の契約は不要でドコモ光契約のみでOK。この電話オプション要否が両者の最大の違い。"},{"id":"G039","cat":"G","diff":3,"q":"「SoftBank光 おうち割光セット」の割引対象として正しいのはどれか？","choices":["SoftBank回線の携帯電話（ガラケー）のみであり、他の手続きや機器は一切不要（規定上の特例運用）","SoftBank・Y!mobile・LINEMOのスマートフォン（プランによって割引額が異なる）","SoftBank・au・ドコモのスマートフォンすべて（規定上の3キャリア共通運用と判断する）","SoftBank回線のスマートフォンのみであり、他の手続きや機器は一切不要（規定上の運用と判断する）"],"ans":1,"exp":"SoftBank光のおうち割光セットはSoftBankのスマートフォンが対象（最大1,100円/月割引）に加え、Y!mobile（最大1,188円/月割引）・LINEMO（最大660円/月割引）のスマートフォンも割引対象となる。グループ内の複数ブランドをカバーしているのが特徴。"},{"id":"G040","cat":"G","diff":4,"q":"電力系光回線5社とKDDIスマホのセット割について正しいのはどれか？","choices":["電力系5社はスマホセット割が一切ない（KDDI系列だがスマホ提携なし・規定）","電力系5社はauスマートバリューの対象外（KDDI資本だが対象除外・規定）","電力系5社はKDDIと資本関係があり、auスマートバリューまたはUQ自宅セット割の対象","電力系5社はドコモ光セット割のみ対応（ドコモとの提携契約による特例・規定）"],"ans":2,"exp":"電力系光回線5社（eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光）はKDDIグループと資本関係があり、auスマートバリューおよびUQ自宅セット割の対象。ただし適用には光電話オプションの契約が必要。"},{"id":"G041","cat":"G","diff":3,"q":"「J:COM NET」とスマートフォンセット割について正しいのはどれか？","choices":["J:COM NETはドコモ光セット割が適用される（規定上はドコモとの提携運用と判断する）","J:COM NETにはスマートフォンとのセット割がない（規定上は全提携先と未連携の運用と判断する）","J:COMはauグループのため、au・UQモバイルとのセット割（auスマートバリュー等）が適用される","J:COMのスマートフォン（J:COM MOBILE）との組み合わせのみセット割が適用される"],"ans":2,"exp":"J:COM（JCOM株式会社）はKDDI（au）の連結子会社のため、J:COM NETはauスマートバリューまたはUQ自宅セット割の対象サービスとなっている。またJ:COM MOBILE（MVNO）との組み合わせ割引も提供している。"},{"id":"G042","cat":"G","diff":3,"q":"「楽天ひかりと楽天モバイルのセット割」について正しいのはどれか？","choices":["楽天ひかりは楽天モバイルとセット契約しても料金的な割引はなく、ポイント還元も一切付与されない仕組みになっている","楽天ひかりはソフトバンクと提携しており、ソフトバンクのスマホユーザーは月額料金から最大550円が割り引かれる","楽天ひかりはKDDIとの相互提携によりauスマートバリューの対象回線として認定されており、auスマホと組み合わせ可能","楽天ひかりと楽天モバイルをセット契約すると楽天モバイルの料金無料期間や楽天ポイント付与などの特典がある"],"ans":3,"exp":"楽天ひかりと楽天モバイルを組み合わせることで、楽天モバイルの月額料金無料期間の提供や楽天ポイントの付与など楽天グループとしてのセット特典がある（キャンペーン内容は時期により変動）。au・ソフトバンク・ドコモのセット割とは異なり、楽天グループ内での特典提供という形式。"},{"id":"G043","cat":"G","diff":3,"q":"「イッツコム」とスマートフォンのセット割について正しいのはどれか？","choices":["イッツコムはauスマートバリューおよびUQ自宅セット割の対象サービスとなっている","イッツコムは東急グループのCATV系サービスのため、スマートフォンとのセット割は一切提供されていない","イッツコムはドコモとの提携によりdポイント還元が受けられるが、auスマートバリューの対象外","イッツコムはソフトバンクグループと提携しており、ソフトバンクスマホとのセット割のみ提供している"],"ans":0,"exp":"イッツコム（イッツ・コミュニケーションズ）は東急グループだが、KDDIと提携しているためauスマートバリューおよびUQ自宅セット割の対象サービスとなっている。東急線沿線エリア限定のCATV系サービスながらauスマホとのセット割が使える。"},{"id":"G044","cat":"G","diff":3,"q":"「NURO光（戸建て標準プラン）」からのホームルーターへの乗り換えを検討しているお客様への案内として正しいのはどれか？","choices":["NURO光の速度とホームルーターの速度・安定性（特にping値）を比較し、オンラインゲーム・大容量アップロード等の用途には光回線が適している場合が多いことを案内","ホームルーターは5G回線を使うためNURO光より下り速度が高くなるケースが多く、乗り換えで体感速度が向上すると案内","NURO光は独自回線のため他社への乗り換えが難しく、ホームルーターへの乗り換えにはNURO光側に解約違約金が必ず発生すると案内","ホームルーターはIP固定オプションが標準で付属するため、固定IPが必要な法人用途にはNURO光より適していると案内"],"ans":0,"exp":"ホームルーター（5G/4G回線）はNURO光と比べると応答速度（ping値）が高く、アップロード速度が低い傾向がある。オンラインゲームの対戦・ビデオ会議・大容量データのバックアップには光回線の方が適している場合が多い。工事不要・場所を選ばないメリットとのトレードオフをお客様の用途に合わせて説明することが重要。"},{"id":"G045","cat":"G","diff":5,"q":"「VDSL方式のマンション（最大100Mbps程度しか出ない）でのインターネット速度改善策」としてホームルーターへの切り替えを提案する際の正しい案内はどれか？","choices":["ホームルーターへの切り替えはVDSLのボトルネックを回避できる可能性があるが、設置場所の電波環境によって速度が大きく変わる","VDSLの速度不満はホームルーターに乗り換えることで配線方式の制約を完全に回避でき、環境を問わず確実に解決できる","VDSL方式の速度不満を解決するにはマンション棟全体の配線工事が唯一の手段で、個人での対処方法は存在しない","VDSLからホームルーターへの変更にはNTT東西への工事申請と宅内の配線切替工事が法令上必要とされている"],"ans":0,"exp":"VDSLの配線方式（最大100Mbps程度）での速度不満に対し、ホームルーターは工事不要で切り替えられる選択肢。ただし5G対応ホームルーターでも窓際への設置が推奨され、電波強度・遮蔽物の影響を強く受ける。「アンテナが立っていても実際に速いとは限らない（プラチナバンドで繋がっている場合等）」ことを説明し、試用や電波確認を勧めるのが適切な案内。"},{"id":"G046","cat":"G","diff":5,"q":"「ホームルーターで速度が出ない原因」として「アンテナ（電波強度）が高いのに遅い」場合の最も可能性が高い理由はどれか？","choices":["高速な5Gの電波が障害物で遮断され、速度は遅いが届きやすいプラチナバンド（4G低周波数帯）で接続してしまっているため","アンテナ感度が高い場合は複数の基地局と同時に通信しようとする干渉が発生し、速度が低下する","ホームルーターのアンテナが高感度すぎると受信パワーが過大になり、内部で信号減衰処理が行われて速度が低下する","電波強度が高い状態が続くとホームルーター内部の熱保護機能が働き、速度を自動的に制限する仕様がある"],"ans":0,"exp":"ホームルーターで「電波は4本立っているのに速度が出ない」場合は、高速な5G（高い周波数帯：Sub6等）が壁・窓ガラスで遮断され、低速だが遮蔽物に強い4G・プラチナバンド（700〜900MHz帯等）で接続している可能性が高い。ホームルーターを窓際に置いても改善しない場合はこのシナリオが濃厚。"},{"id":"G047","cat":"G","diff":5,"q":"「ホームルーターの上り（アップロード）速度が遅い」問題について正しいのはどれか？","choices":["ホームルーターは携帯基地局の上り通信をシェアするため、下りと比べて上り速度が著しく遅い傾向がある","ホームルーターの上り速度は光回線と同等であり、上りが遅い場合は端末のアップロード設定を見直す必要がある","ホームルーターは上り通信の優先度を自動的に下げる省電力設計のため、上り専用モードに変更することで改善する","ホームルーターの上り速度不満はWi-Fiルーターを追加設置することで解消できる"],"ans":0,"exp":"ホームルーターは5G/4G携帯回線を使うため下り（ダウンロード）に比べて上り（アップロード）速度が低い傾向がある。写真・動画のクラウドバックアップ・オンライン会議での映像送信・ライブ配信等でボトルネックになりやすい。光回線は上下対称または上りも高速なプランが多く、アップロード重視の用途には光回線の方が適している。"},{"id":"G048","cat":"G","diff":2,"q":"ホームルーターの「設置場所」について正しいのはどれか？","choices":["窓際への設置が推奨される。5G（高い周波数帯）は直進性が強く壁で大きく減衰するため","部屋の中央・床から1m以上の高さへの設置が推奨される。電波を均等に全方向へ届けるため","ルーターと電子レンジを隣接させることで電波出力が安定するため、キッチン近くへの設置が推奨される","設置場所は速度に影響しないため、コンセントの近くであれば任意の場所でよい"],"ans":0,"exp":"ホームルーターで使う5G（Sub6・高い周波数帯）は直進性が強く壁や窓ガラスで大きく減衰する。窓際（特に基地局方向の窓）に設置することで5Gの電波を直接受信しやすくなり、速度・安定性が向上する場合が多い。設置場所の違いで速度が大きく変わることがある。"},{"id":"G049","cat":"G","diff":3,"q":"「ホームルーターと光回線の月額コスト比較」として一般的に正しいのはどれか？","choices":["マンション向け光回線に比べてホームルーターはやや高めになる傾向がある","ホームルーターは端末が無償提供されるため、月額料金は光回線より低く、トータルコストでも有利","戸建て向け光回線と比べるとホームルーターは大幅に安く、端末代金を含めても2年間で約5万円の節約になる","ホームルーターは光回線と月額料金がほぼ同等だが、工事費が不要なため初期コストで明確に有利"],"ans":0,"exp":"マンション向け光コラボ（月額4,000〜5,000円程度）と比べてホームルーター（月額4,000〜5,500円程度）はやや高い傾向がある。さらに端末代金（分割払いが多い）が加算されるため、トータルコストでは光回線の方が安くなるケースも多い。工事不要の利便性とのトレードオフをコスト面で丁寧に比較することが重要。"},{"id":"G050","cat":"G","diff":5,"q":"「オンライン対戦ゲームをメインに使いたいユーザー」に対して光回線とホームルーターのどちらを推奨するか、その根拠として正しいのはどれか？","choices":["光回線（特に有線LAN接続）を推奨する。ホームルーターは無線のためpingの応答速度が光回線より高くなる傾向があり、対戦ゲームでのラグの原因になりやすい","ホームルーターの5G回線は下り速度が光回線と同等かそれ以上になるケースも多く、オンライン対戦ゲームでも実用上問題になるほどのラグは発生しない","ホームルーターにはゲーム通信に特化したQoS低遅延専用モードが標準搭載されており、設定を有効にすると光回線より低いpingを実現できる","ホームルーターはIPv6 IPoEに標準対応しているためPPPoEの光回線よりパケットロスが少なく、対戦ゲームに最適な安定通信を提供できる"],"ans":0,"exp":"オンライン対戦ゲームはping値（レイテンシ）が重要。光回線の有線LAN接続は一般的にping値20〜40ms程度だが、ホームルーター（5G/4G無線）は60〜200ms程度になることがある。ラグや操作遅延は勝敗に直結するため、ゲーム重視ユーザーには光回線＋有線LAN接続を強く推奨する。"},{"id":"G051","cat":"G","diff":3,"q":"「光回線の工事ができない（賃貸で穴あけ不可・既存配管も使えない）」場合のインターネット手段として正しいのはどれか？","choices":["ホームルーター（5G/4G回線使用）またはモバイルWi-Fiルーターが有力な選択肢","CATV引き込みは壁穴あけ不要で工事が完了するため、光回線工事ができない賃貸でも導入できる","集合住宅向けの共用Wi-Fiサービスへの加入が最も安定した手段で、工事は一切不要","ホームルーターは固定設置のため、モバイルWi-Fiルーターと比較して速度・安定性の面で常に優れている"],"ans":0,"exp":"賃貸物件で光回線の工事（壁穴あけ・既存配管不使用）ができない場合の代替手段としてホームルーターやモバイルWi-Fiルーターが有効。工事不要で利用できるが速度・安定性・ping値は光回線と比べて劣る場合があることを説明した上で提案する。CATV引き込みも壁の配管を使う場合は工事が必要。"},{"id":"G052","cat":"G","diff":3,"q":"「5G対応ホームルーターを購入したが速度が4G時代と変わらない」場合の最も可能性が高い原因はどれか？","choices":["設置場所の5G電波が届いておらず、4Gで接続している可能性が高い","5G対応ホームルーターは初期設定の段階でファームウェア更新が必要で、更新前は4G相当の速度しか出ない","端末の5G設定がデフォルトでオフになっているため、設定メニューから手動で5Gを有効にする必要がある","契約プランが4G向けのままになっている場合があり、5Gプランへの変更手続きが完了していないと速度が上がらない"],"ans":0,"exp":"5Gの高い周波数帯（Sub6・3.5GHz/4.7GHz帯等）は直進性が強く壁や窓ガラスで大幅に減衰する。設置場所が室内深部や障害物が多い場所だと5G電波が届かず、カバー範囲の広い4G（プラチナバンド等の低い周波数帯）で接続してしまう。この状態では「電波は4本立っているが速度が遅い」という現象が起きる。窓際への移動や5Gエリアマップでの確認が有効。"},{"id":"G053","cat":"G","diff":3,"q":"「auひかりホーム（戸建て）」の「auスマートバリュー」の月額割引額として正しいのはどれか？","choices":["auスマートバリューの割引額は毎月変動する","auスマートフォン1台あたり月額5,500円（税込）","auスマートフォン1台あたり月額最大1,100円（税込）。","auスマートフォン1台あたり月額110円（税込）"],"ans":2,"exp":"auスマートバリューはauひかり等の対象ホームルーター・光回線とauスマートフォンをセットで使うことで、スマートフォン1台あたり最大1,100円（税込）/月の割引が適用される。家族全員のauスマートフォンに適用できるため、複数台持ちの家族ほど割引効果が大きい。適用には光電話オプションの契約も必要。"},{"id":"G054","cat":"G","diff":4,"q":"「コミュファ光」と「auスマートバリュー」の組み合わせで光電話の契約が必要か？","choices":["auスマートバリューはauひかりとの組み合わせのみ適用で他社は対象外","コミュファ光は電話サービスを提供していないためauスマートバリューは適用不可","光電話の契約は不要でインターネットのみの契約で適用される","コミュファ光でのauスマートバリュー適用にはコミュファ光電話（固定電話）の契約が条件"],"ans":3,"exp":"コミュファ光でauスマートバリューを適用するにはコミュファ光電話（VoIPの固定電話サービス）の契約が必要条件。これはauひかりと同じ条件。電話サービスなしのインターネットのみでは適用されない。電力系5社（eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光）は同様の条件が多い。"},{"id":"G055","cat":"G","diff":4,"q":"「ドコモ光セット割」と「auスマートバリュー」の違いとして正しいのはどれか？","choices":["auスマートバリューはひかり電話の契約が不要","両者とも光電話の契約が必須であり省略した場合は開通しない","ドコモ光セット割はひかり電話の契約なしで適用できる","ドコモ光セット割はドコモ以外のスマホでも適用できる"],"ans":2,"exp":"ドコモ光セット割はひかり電話の契約不要でドコモ光＋ドコモスマホ（対象プラン）だけで適用できる。auスマートバリューはauひかり電話（固定電話オプション）の契約が必須条件。この違いが両者の最大の差。"},{"id":"X026","cat":"X","diff":2,"q":"「with フレッツ」対応プロバイダの具体例として正しいのはどれか？","choices":["au（KDDI）・ソフトバンク・NTTドコモ","NTT東西の子会社のみであり、他の手続きや機器は一切不要","andline光SE・ドコモ光・楽天ひかり等の光コラボ事業者","OCN・BIGLOBE・@nifty・IIJmio等のISP"],"ans":3,"exp":"「with フレッツ」はNTT東西のフレッツ光回線に対応するISP（プロバイダ）との組み合わせで使う接続形態。対応プロバイダにはOCN・BIGLOBE・@nifty・IIJ・DTI・ASAHInet等の主要ISPが含まれる。au・ソフトバンク・ドコモは光コラボ事業者であり、「with フレッツ」ではなく光コラボとして分類される。"},{"id":"X027","cat":"X","diff":2,"q":"「with フレッツ」接続でIPv4 over IPv6（IPv6サービス）を使うために必要なこととして正しいのはどれか？","choices":["NTT東西へのv6オプション申し込みと、契約しているプロバイダのIPv4 over IPv6（IPv6サービス）への対応・申し込みが必要","v6オプションはプロバイダが自動で申し込んでくれるためユーザー側の手続きは不要だ（規定上の運用と判断する取り扱い上のルール）","NTT東西にv6オプションを申し込むだけで自動的にIPv4 over IPv6が使えるようになる（規定上の運用と判断する取り扱い）","IPv4 over IPv6（IPv6サービス）は光コラボ専用の技術のためwithフレッツ環境では利用できない（規定上の運用と判断する取り扱い）"],"ans":0,"exp":"「with フレッツ」環境でIPv4 over IPv6（IPv6サービス）を使うには、①NTT東西へのv6オプション申し込み（プロバイダが代行することが多い）と②契約プロバイダのIPv4 over IPv6（IPv6サービス）対応オプションへの申し込みが必要。光コラボでは自動提供されるケースが多いが、「with フレッツ」では手動での申し込みが必要な場合が多い。"},{"id":"X028","cat":"X","diff":4,"q":"フレッツ光（NTT直販）を利用中のユーザーが「プロバイダをOCNからIIJmioひかりに変えたい」と言っている。IIJmioひかりは光コラボだが、この変更はどのような手続きになるか？","choices":["「事業者変更」承諾番号をOCNから取得してIIJmioひかりに申し込む（光コラボへの転用扱いの手続きと判断する運用となる規定上の取り扱い）","OCNの解約手続きとIIJmioひかりへの転用申し込みを同時に行う（光コラボなのでNTT東西への転用申し込み手続きが必要となる運用となる）","同じNTT回線なので手続き不要で即日変更できる（フレッツ光と光コラボはNTT側で同一管理されているため簡略化される運用となる規定上の取り扱い）","フレッツ光（NTT直販）→IIJmioひかり（光コラボ）への変更は「転用」なので転用承諾番号をNTT東西から取得してIIJmioひかりに申し込む（OCNは別途解約）"],"ans":3,"exp":"フレッツ光（NTT直販2社契約）から光コラボへの変更は「転用」手続き。転用承諾番号をNTT東西から取得してIIJmioひかりに申し込む。OCNとの従来のプロバイダ契約は自動解約されないため、お客様がOCNに別途解約連絡が必要。"},{"id":"X029","cat":"X","diff":2,"q":"フレッツ光（NTT直販）の「ひかり電話の月額料金」はどこに支払うか？","choices":["スマートフォンキャリアとまとめて支払う（通信料合算運用と判断する取扱）","プロバイダとNTT東西の両方に支払う（規定上は2社請求運用と判断する取扱）","プロバイダ（OCN・BIGLOBE等）に支払う（ISP管轄運用と判断する取扱）","NTT東西に支払う（ひかり電話はNTT東西のフレッツ光の付加サービス）"],"ans":3,"exp":"ひかり電話はNTT東西のフレッツ光回線に付加するサービスのため、月額料金はNTT東西に支払う。フレッツ光（NTT直販）では「NTT東西への支払い（回線料＋ひかり電話料）」と「プロバイダへの支払い（接続料）」の2本立てになる。"},{"id":"X030","cat":"X","diff":3,"q":"「フレッツ光のNTT東西への月額支払い」に含まれるものとして正しいのはどれか？","choices":["プロバイダ料・ONU機器代・工事費すべてが含まれる（規定上の一括請求運用と判断する取り扱い）","インターネット接続料金（プロバイダ料）が含まれる（規定上のISP料金一体運用と判断する取扱）","光回線の回線使用料（フレッツ光料金）、およびひかり電話や映像サービス等の付加サービス料。","光回線使用料のみでひかり電話は別のサービス会社から請求される（規定上の運用と判断する取扱）"],"ans":2,"exp":"フレッツ光（NTT直販）でNTT東西に支払うのは「光回線の回線使用料（フレッツ光の月額）」と「ひかり電話等の付加サービス料」。インターネット接続料（プロバイダへの支払い）はプロバイダに別途支払う。この2本立て請求を1本化するのが光コラボへの転用の最大のメリット。"},{"id":"X031","cat":"X","diff":4,"q":"「フレッツ光（NTT直販）でIPv4 over IPv6（IPv6サービス）が使えるプロバイダ」として正しいのはどれか？","choices":["フレッツ光（NTT直販）ではIPv4 over IPv6は利用できず、光コラボへの転用が唯一の利用方法","OCN・BIGLOBE・@nifty等の対応プロバイダを選びIPv6オプションに申し込めば利用できるが、各プロバイダへの申し込みが必要","フレッツ光（NTT直販）では、NTT東西がすべてのプロバイダに自動でIPv4 over IPv6を適用するため追加申し込みは不要","フレッツ光（NTT直販）でIPv4 over IPv6を使うにはNTT東西に別途「IPoEオプション」を申し込む必要があり、プロバイダの手続きは不要"],"ans":1,"exp":"フレッツ光（NTT直販）でもIPv4 over IPv6（IPv6サービス）は利用可能。OCN（OCNバーチャルコネクト）・BIGLOBE（v6プラス互換）・@nifty（v6プラス）・IIJmioひかり（transix）等のIPv6サービス対応プロバイダを選び、各プロバイダのIPv6オプションに申し込む必要がある。光コラボと異なり自動適用ではないケースが多い。"},{"id":"X032","cat":"X","diff":4,"q":"「フレッツ光のv6オプション」のNTT東西への申し込みを「プロバイダが代行する」理由として正しいのはどれか？","choices":["v6オプションには月額費用が発生するためプロバイダが費用を立て替えて申し込む","NTT東西はエンドユーザーからのv6オプション直接申し込みを制度上受け付けていない","v6オプションはNTT東西ではなくプロバイダが独自に提供するサービスのためプロバイダに申し込む","プロバイダが選択したVNEサービスに紐付くため、プロバイダが代行してNTT東西にv6オプションを申請する"],"ans":3,"exp":"v6オプションはNTT東西のNGN設備内でIPv6接続を管理する機能だが、どのVNEサービスを使うかはプロバイダが決める。そのためプロバイダがNTT東西へのv6オプション申し込みをユーザーの代わりに代行するのが一般的な流れ。光コラボでも同様の仕組みで自動的に設定されることが多い。"},{"id":"X033","cat":"X","diff":4,"q":"フレッツ光（NTT直販）のユーザーが「プロバイダのIPv6サービス（IPv4 over IPv6（IPv6サービス））を申し込んだがIPv6で接続できない」場合の確認事項として正しいのはどれか？","choices":["光回線を一旦解約して新規申し込みを行えばv6オプションがリセットされて使えるようになる","ルーターを工場出荷状態にリセットすればv6オプションの設定が自動で再取得される","プロバイダのDNSサーバーアドレスを手動で設定するとIPv6接続が有効になる","v6オプションの設定がNTT東西のNGN設備に正しく反映されているか確認する。"],"ans":3,"exp":"IPv6サービスが使えない場合の主な原因はv6オプションの設定未完了またはエラー。プロバイダを通じてv6オプションの申し込み状況をNTT東西のNGN設備で確認してもらうのが最初のステップ。v6オプションが正しく設定されれば、対応ルーターで自動的にIPv6サービスが使えるようになる。"},{"id":"X034","cat":"X","diff":4,"q":"「フレッツ光（NTT直販）からandline光SE（光コラボ）への転用」と「フレッツ光（NTT直販）+OCNから別のフレッツ光+BIGLOBEへのプロバイダ変更」の違いとして正しいのはどれか？","choices":["転用は転用承諾番号が必要な契約形態の変更、プロバイダ変更はフレッツ光を維持しISPだけを変える別手続き","どちらも転用承諾番号が必要で、手続きの違いは申し込み先がNTT東西か事業者かの違いだけ","転用には工事が伴うがプロバイダ変更は工事不要、という点だけが異なる同系統の手続き","転用はインターネット上で完結できるが、プロバイダ変更はNTT東西の店舗窓口への来店が必要"],"ans":0,"exp":"転用はフレッツ光（NTT直販）という契約形態そのものを光コラボに変える手続きで転用承諾番号が必要。プロバイダ変更はフレッツ光（NTT直販）という形態を維持したまま、対応するISPだけを変える手続き（転用承諾番号不要・工事不要・即日可能なことが多い）。根本的に異なる手続き。"},{"id":"X035","cat":"X","diff":4,"q":"「フレッツ光（NTT直販）で複数のプロバイダを同時に契約する」使い方として実際のユースケースに近いのはどれか？","choices":["用途・家族ごとにプロバイダを使い分けたり、乗り換え時の移行期間中に旧・新プロバイダを一時並行契約するケースがある","フレッツ光（NTT直販）では複数プロバイダ同時契約が公式に禁止されているため、実際には使い分けはできない","複数プロバイダを同時契約すると月額料金が合算されNTT東西から割引が適用される正規の利用方法","複数プロバイダ同時契約はNTTの設備上1回線に1プロバイダしか同時接続できないため、物理的に切り替えながら使う必要がある"],"ans":0,"exp":"フレッツ光（NTT直販）の特徴は複数のプロバイダを同時に契約できること。用途・家族ごとに異なるプロバイダを使い分けたり、プロバイダ乗り換え時に旧・新プロバイダを一時並行して安全に移行するケースで活用できる。光コラボではプロバイダが固定されるためこの使い方はできない。"},{"id":"A031","cat":"A","diff":1,"q":"「光回線」と「ADSL（フレッツADSL）」の最大の違いとして正しいのはどれか？","choices":["光回線は有料、ADSLは無料（規定上の運用）","光回線は光ファイバーを使い高速・長距離でも安定。","光回線は戸建て専用、ADSLは集合住宅専用（規定）","光回線は夜間のみ使用可能、ADSLは24時間使用可能"],"ans":1,"exp":"光回線は光ファイバーを使うため最大1Gbps〜10Gbpsの高速通信が可能で距離による速度低下がほぼない。ADSLは既存の電話線（メタル線）を使うため最大速度が数十Mbps程度で、電話局からの距離が遠いほど速度が大幅に低下する。NTT東西はADSLの新規受付を2023年に終了した。"},{"id":"A032","cat":"A","diff":2,"q":"「PPPoEのユーザーID」の一般的な形式として正しいのはどれか？","choices":["ルーターのMACアドレス（製造番号と紐づく機器固有ID）","xxxxx@provider.ne.jp（メールアドレス形式）","012-3456-7890（電話番号形式の10〜11桁の数字列）","数字6桁のPINコード（プロバイダ発行のセキュリティ番号）"],"ans":1,"exp":"PPPoE接続で使うユーザーIDは一般的に「xxxxx@provider.ne.jp」のようなメールアドレス形式。プロバイダから開通案内とともに通知される。IPv6サービス（IPoE）ではこのID/パスワードは不要だが、PPPoE接続時はルーターに設定が必要。"},{"id":"A033","cat":"A","diff":2,"q":"「IPv4のプライベートアドレス」として正しいのはどれか？","choices":["2001:db8::1（IPv6アドレスの表記例・規定上の運用）","192.168.1.1（宅内ルーターのデフォルトゲートウェイに使われる）","203.0.113.1（インターネット上のグローバルアドレスの例）","8.8.8.8（GoogleのパブリックDNSアドレスの例）"],"ans":1,"exp":"192.168.x.x、172.16.x.x〜172.31.x.x、10.x.x.xがIPv4のプライベートアドレス範囲。宅内LANでの機器のアドレス割り当てに使われ、インターネット上には出ない。ルーターのNATによってグローバルIPアドレスに変換されインターネットに接続する。"},{"id":"A034","cat":"A","diff":3,"q":"「インターネット接続の速度が光回線の『下り最大1Gbps』に達しない」最も根本的な理由として正しいのはどれか？","choices":["下り最大1Gbpsはベストエフォート（理論上の最大値）であり、実際の速度は時間帯の混雑・端末のNIC規格・Wi-Fi区間の性能・接続ルーターの処理能力など多くの要因で変動する","光回線事業者がユーザーごとに利用状況を分析して上限速度を個別設定しており、高負荷ユーザーには意図的に速度制限をかけて網全体の公平性を保っているから","プロバイダのバックボーンサーバーが同時接続中のユーザー数をリアルタイムで計測し、均等分配アルゴリズムによって各ユーザーの速度を自動調整する仕様のため","NTT東西がフレッツ網全体の安定運用のため技術基準に基づき各ユーザーの帯域を上限900Mbpsに制御しており、1Gbpsに達しない仕様になっているから"],"ans":0,"exp":"光回線の「最大○Gbps」はベストエフォート（最善努力型）の理論最大値。実際の速度は①時間帯の混雑（PPPoEなら網終端装置のボトルネック）②端末のNIC（最大1Gbpsのポートなら1Gbpsが上限）③Wi-Fiの規格と電波環境④ルーターの処理速度（特にWANルーティング性能）など多要因で決まる。"},{"id":"A035","cat":"A","diff":3,"q":"「光回線の工事費無料キャンペーン」の仕組みとして正しいのはどれか？","choices":["工事費は国の「光インフラ整備補助制度」によって全額補助されており、事業者・ユーザーともに負担が一切発生しない","光コラボ事業者が工事費を「月割引」で相殺する形式が多く、一定期間内の解約では割引を受けていない残額が一括請求されることがある","工事費無料キャンペーンは新規申し込みに限らず他社からの乗り換え・事業者変更・転用でも例外なく全員に適用される","NTT東西が全ユーザーを対象に工事費を永続的に無料とする制度を設けており、光コラボ各社もこれに準拠して無料提供している"],"ans":1,"exp":"光コラボの「工事費無料キャンペーン」は実際には月額から一定額を割り引いて工事費を相殺する形式（実質無料）が多い。そのため契約期間中の途中解約では割引を受けていない工事費の残額が一括請求される。NURO光の44,000円工事費の「実質無料」もこの仕組み。"},{"id":"A036","cat":"A","diff":3,"q":"「光回線の開通工事の立ち会いが不要」なケースとして正しいのはどれか？","choices":["すべての光回線工事は法令上必ず技術者の立ち会いが義務付けられており省略は不可","土日祝の工事は技術者のシフト都合により基本的に立ち会いが免除されている","転用・事業者変更で無派遣工事になる場合や、既設の光コンセントを利用した無派遣工事の場合は立ち会い不要。","マンション・集合住宅の場合は管理組合が立ち会いを代行するため入居者は常に不要"],"ans":2,"exp":"光回線工事で立ち会いが不要になるのは「無派遣工事」の場合。転用・事業者変更で既存回線をそのまま使う場合や、既設の光コンセントがある場合に無派遣工事となることが多い。ONUが郵送されお客様がセルフ取り付けを行う。新規引き込み工事（派遣工事）は必ず立ち会いが必要。"},{"id":"A037","cat":"A","diff":3,"q":"「光回線の月額料金の違い（光コラボ vs フレッツ光NTT直販）」として一般的に正しいのはどれか？","choices":["光コラボとフレッツ光（NTT直販）は卸価格規制によって月額料金は法律で同一に設定されており差は生じない","光コラボは回線料＋プロバイダ料を一体化しており、フレッツ光（NTT直販）の合計とほぼ同等かやや安い場合が多い","光コラボはプロバイダ料込みのため、フレッツ光（NTT直販）の回線料のみと比較すると必ず2倍以上の料金になる","フレッツ光（NTT直販）はNTT公式のため品質保証コストが上乗せされており、光コラボと比較して常に割安に設定されている"],"ans":1,"exp":"フレッツ光（NTT直販）はNTT東西への回線料（4,950円程度）＋プロバイダ料（1,000〜2,000円程度）の2本払い。光コラボはこれを一体化した料金設定で、多くの場合フレッツ直販の合計とほぼ同等かやや安い設定になっている。ただしキャンペーン・割引の有無で変わるため一概には言えない。"},{"id":"A038","cat":"A","diff":4,"q":"「光回線の固定IPアドレスオプション」を必要とするユースケースとして正しいのはどれか？","choices":["VPNサーバー・Webサーバー・NASの外部公開・IPカメラ遠隔監視など外部から特定IPで常にアクセスが必要な用途","大容量ファイルをクラウドに高速アップロードする際に通信を安定させてタイムアウトを防ぐ用途","複数デバイスを同時接続した際に帯域を均等に割り当てるQoS優先制御が必要な用途","オンライン会議でping値を常時20ms以下に維持するための法人向けSLA保証が必要な用途"],"ans":0,"exp":"固定IPアドレスオプションが必要なのは外部から自宅サーバー・NAS等に決まったアドレスで接続し続けたい用途。通常のWebブラウジング・動画視聴・ファイルDLは宅内からの発信（アウトバウンド）通信のため、IPアドレスが変動しても問題ない。MAP-E・DS-LiteはNATにより標準では固定IPが使えないため、こうした用途には固定IPオプションが必要。"},{"id":"A039","cat":"A","diff":4,"q":"「光回線のONUのランプ（LEDインジケーター）」で「PONランプが消灯・点滅」している場合の意味として正しいのはどれか？","choices":["光信号が届いていない可能性がある。","ONUのファームウェア更新中なので30分待てばよい","Wi-Fiが切れているためルーターを再起動する","ONUが省電力モードに入っているため問題なし"],"ans":0,"exp":"ONUのPONランプ（Passive Optical Network）は光信号の受信状態を示す。消灯・点滅している場合は光信号が届いていない可能性が高く、光ファイバーの断線・コネクタの緩み・局舎側の障害等が考えられる。ONUとONUコネクタの接続を確認し、改善しない場合はNTT東西または光コラボ事業者に問い合わせる。"},{"id":"A040","cat":"A","diff":2,"q":"「光回線の速度測定（スピードテスト）」において正確な回線速度を測るために必要なことはどれか？","choices":["スマートフォンのWi-Fi接続で速度測定
