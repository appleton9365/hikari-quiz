ドコモ光→andline光SE）手続きの名称として正しいのはどれか？","choices":["光コラボ間の乗り換え手続き「事業者変更」","フレッツ光から切り替える「転用」手続き","新規で回線を引く「新規工事申し込み」","プロバイダだけを変える「プロバイダ変更」"],"ans":0,"exp":"光コラボ間の乗り換えは「事業者変更」と呼ぶ。「転用」はフレッツ光（NTT直販）→光コラボの場合に使う用語であり、光コラボ同士の乗り換えには使わない。"},{"id":"C079","cat":"C","diff":1,"q":"光回線を「解約」した場合と「事業者変更」した場合の違いとして正しいのはどれか？","choices":["事業者変更はアクセスラインを引き継ぐため工事不要だが解約は回線終了","解約の方が手続きが簡単で事業者変更は非常に複雑な手順が必要","事業者変更は費用がかかるが解約なら費用は一切かからない","解約後は同じ住所で二度と光回線を申し込むことができない"],"ans":0,"exp":"事業者変更はNTT東西のアクセスライン（光ファイバー）をそのまま引き継ぐため工事不要。解約はアクセスライン契約が終了し、再申し込みすると新規工事が必要になる。"},{"id":"C080","cat":"C","diff":1,"q":"集合住宅（マンション）で光回線を申し込む際に必要な手続きとして正しいのはどれか？","choices":["建物オーナーや管理会社の許可が必要な場合がある","マンション全室に同時に光回線を引く工事が発生する","区分所有者（各住人）全員の書面同意が必要となる","竣工から10年以内の建物でないと申し込みができない"],"ans":0,"exp":"集合住宅での光回線引き込みは共用部への設備設置が必要なため、建物オーナーや管理会社の許可が必要な場合がある。既に光回線設備が導入済みの建物では不要のことも多い。"},{"id":"C081","cat":"C","diff":1,"q":"「ホームゲートウェイ（HGW）」が設置されるのは主にどのような場合か？","choices":["ひかり電話（光電話）サービスを契約した場合に設置される","古いONUで無線LANが使えない環境に設置される","フレッツ光クロス（10Gbps）プランに申し込んだ場合","プロバイダのメールアドレスを新たに取得した場合"],"ans":0,"exp":"HGW（ホームゲートウェイ）はひかり電話サービスを契約した場合に設置される。ONUにIP電話アダプターとルーター機能が統合された複合機器で、ルーターとしても機能する。"},{"id":"C082","cat":"C","diff":1,"q":"光回線工事で「光ファイバーを室内に引き込む経路」として最も一般的なのはどれか？","choices":["エアコンダクト孔や既設の電話配管を通じて引き込む","窓ガラスに専用のスリットを加工して引き込む","屋根裏のスペースを通じて天井から引き込む","壁に新規でコンクリートの穴をあけて引き込む"],"ans":0,"exp":"光ファイバーの宅内引き込みはエアコンダクト孔や既設の電話配管を活用するのが一般的。穴あけ工事は既存経路が使えない場合の最終手段で、事前に確認が必要。"},{"id":"C083","cat":"C","diff":1,"q":"光回線の「初期契約解除制度」が適用できる期間として正しいのはどれか？","choices":["契約書面を受け取った日から8日以内に手続きが必要","申し込み日から30日以内であれば解除ができる","開通工事完了日から14日以内が対象期間となる","契約書面を受け取った日から30日以内が対象期間"],"ans":0,"exp":"光回線の初期契約解除制度は契約書面を受領した日から8日以内に申し出る必要がある。工事費等の実費を除いて解除でき、解約金は発生しない。"},{"id":"C084","cat":"C","diff":1,"q":"光回線の申し込みに必要な本人確認書類として一般的に認められているのはどれか？","choices":["公的機関が発行した運転免許証やマイナンバーカード","大学や専門学校が発行した顔写真付き学生証","勤務先の企業が発行した顔写真付き社員証","金融機関が発行した顔写真のないキャッシュカード"],"ans":0,"exp":"光回線申し込みには公的機関が発行した運転免許証やマイナンバーカード、健康保険証などが必要。大学の学生証や会社の社員証など民間発行のものは原則認められない。"},{"id":"C085","cat":"C","diff":1,"q":"光回線の「2年定期契約（2年縛り）」について正しいのはどれか？","choices":["定期契約ありを選ぶと月額料金が安くなる代わりに解約金が発生する","定期契約なしを選んでも解約時に違約金が発生する場合がある","2年縛りは法律で廃止されており現在の光コラボには存在しない","2年定期契約中はいかなる理由があっても解約することができない"],"ans":0,"exp":"多くの光コラボでは定期契約あり・なしを選択でき、定期契約ありの方が月額料金が安い。ただし契約期間中の解約には解約金（違約金）が発生するデメリットがある。"},{"id":"C086","cat":"C","diff":1,"q":"「光回線の引越し（住所変更）」手続きについて正しいのはどれか？","choices":["新居でも同じ光コラボを継続する場合は移転工事が必要","引越しをしても自動的に新居でそのまま使い続けられる","引越し先が同じ市区町村の場合は移転工事が不要となる","引越し先でも開通済みのONUをそのまま持参して使える"],"ans":0,"exp":"光回線の引越しは新居での移転工事（開通工事）が必要。同じ光コラボを継続しても、物理的な光ファイバー回線は新居で新たに引き込まなければならない。"},{"id":"D066","cat":"D","diff":3,"q":"「PPPoE接続」の説明として正しいのはどれか？","choices":["IDとパスワードを使ってプロバイダに認証接続する方式","IPアドレスを自動取得してそのまま接続する方式","光ファイバーを直接インターネットに繋ぐ物理接続方式","Wi-Fiを通じてルーターがインターネットに接続する方式"],"ans":0,"exp":"PPPoEはPoint-to-Point Protocol over Ethernetの略で、プロバイダから発行されたIDとパスワードを使って認証接続する方式。フレッツ光＋プロバイダ契約の従来型接続方式。"},{"id":"D067","cat":"D","diff":3,"q":"「IPoE接続（ネイティブ方式）」の説明として正しいのはどれか？","choices":["ID不要でIPv6アドレスを自動取得するIPoE接続","IDとパスワードでプロバイダ認証するPPPoE接続","光回線を物理的に直結するアクセスライン接続","SIMカードを使うモバイルデータ通信接続"],"ans":0,"exp":"IPoEはIPv6アドレスを自動取得して認証なしで接続するネイティブ方式。PPPoEのような輻輳（混雑）が起きにくく、夜間でも速度が安定しやすい。"},{"id":"D068","cat":"D","diff":3,"q":"「IPv4」と「IPv6」の最大の違いとして正しいのはどれか？","choices":["IPv6はIPv4より扱えるアドレス数が飛躍的に多い","IPv6はIPv4より通信速度が常に速い","IPv6は無線通信専用でIPv4は有線通信専用","IPv6はスマートフォン専用のプロトコルである"],"ans":0,"exp":"IPv4は約43億個のアドレスしか持てず枯渇が問題になったが、IPv6は128ビットのアドレス空間を持ち事実上無制限のアドレス数を確保できる。"},{"id":"D069","cat":"D","diff":2,"q":"「IPアドレス」の説明として正しいのはどれか？","choices":["インターネット上の機器を識別するための数字の住所","インターネット接続のIDとパスワードをまとめた文字列","Wi-Fiの電波を識別するための名前（SSID）","光回線の回線番号として使われる固有の番号"],"ans":0,"exp":"IPアドレスはインターネット上の機器（PC・スマートフォン等）を識別するための番号（住所）。郵便の住所と同様に、この番号を使ってデータの送受信先を特定する。"},{"id":"D070","cat":"D","diff":2,"q":"「プロバイダ（ISP）」の役割として正しいのはどれか？","choices":["光回線をインターネットに繋ぐ接続サービスを提供する会社","光ファイバーを自宅に引き込む工事を担当する会社","Wi-Fiの管理とセキュリティ対策を行うクラウド会社","スマートフォンの通話料金を管理・請求する会社"],"ans":0,"exp":"プロバイダ（インターネットサービスプロバイダ/ISP）は光回線をインターネットに繋ぐ接続サービスを提供する会社。フレッツ光はアクセスライン、プロバイダはインターネット接続を担う。"},{"id":"D071","cat":"D","diff":4,"q":"「DNS（ドメインネームシステム）」の主な役割として正しいのはどれか？","choices":["ドメイン名をIPアドレスに変換する「電話帳」の仕組み","Wi-Fiのパスワードを管理して不正接続を防ぐ仕組み","光回線の速度をプロバイダに定期的に報告する仕組み","メール送受信の管理とスパム除去を行う仕組み"],"ans":0,"exp":"DNSはwww.google.comなどのドメイン名をIPアドレスに変換する「電話帳」のような仕組み。DNSがないとWebサイトにドメイン名でアクセスできずIPアドレスを直接入力する必要がある。"},{"id":"D072","cat":"D","diff":4,"q":"「グローバルIPアドレス」と「プライベートIPアドレス」の違いとして正しいのはどれか？","choices":["グローバルIPはネット上で一意の住所でプライベートIPは宅内用住所","グローバルIPは無料で取得しプライベートIPは有料で取得する","グローバルIPはIPv6専用でプライベートIPはIPv4専用","グローバルIPは固定されプライベートIPは毎回変わる"],"ans":0,"exp":"グローバルIPアドレスはインターネット上で一意（世界で1つ）のアドレスで外部との通信に使う。プライベートIPアドレスは家庭内LAN等のローカルネットワーク内でのみ使われる住所。"},{"id":"D073","cat":"D","diff":3,"q":"「ルーター」の主な役割として正しいのはどれか？","choices":["インターネットと家庭内の複数機器の間で通信を振り分ける","光ファイバーの光信号を電気信号に変換する終端装置","インターネット上のWebページを表示するソフトウェア","プロバイダのIDとパスワードを保管するクラウドサービス"],"ans":0,"exp":"ルーターはインターネット（WAN側）と家庭内の複数機器（LAN側）の間に立ち、IPアドレスの振り分けやNAT変換を行う機器。Wi-Fiルーターはさらに無線LAN機能も持つ。"},{"id":"D074","cat":"D","diff":2,"q":"光回線で「夜間に速度が遅くなりやすい」接続方式はどれか？","choices":["PPPoE接続（プロバイダ認証を経由する従来方式）","IPoE接続（認証なしのネイティブIPv6方式）","フレッツ光クロスの10Gbps高速プラン回線","auひかりの独自ダークファイバー回線接続"],"ans":0,"exp":"PPPoE接続はプロバイダのNGNゲートウェイを経由するため、夜間の混雑時に速度低下しやすい。IPoE（ネイティブ方式）はPPPoEゲートウェイを経由しないため混雑の影響を受けにくい。"},{"id":"D075","cat":"D","diff":2,"q":"「IPv4 over IPv6（IPv6サービス）」を利用するメリットとして正しいのはどれか？","choices":["PPPoEの混雑ポイントを回避して速度が安定しやすくなる","スマートフォンのモバイルデータ通信量を節約できる","光回線の月額料金が自動的に割引されて安くなる","Wi-Fiルーターの電波が届く範囲が拡大される"],"ans":0,"exp":"IPv4 over IPv6（IPv6サービス）はIPv6 IPoEを使ってPPPoEの混雑ポイントを迂回してIPv4通信を行う技術。夜間の速度低下を改善しやすく、多くの光コラボで標準提供されている。"},{"id":"D076","cat":"D","diff":3,"q":"「MAP-E」と「DS-Lite」はどちらの接続技術の一種か？","choices":["IPv4 over IPv6サービスの実装方式","Wi-Fiの通信速度を定義するIEEE標準規格","光ファイバー敷設工事の種別を示す規格名","メール送受信の認証に使われるプロトコル名"],"ans":0,"exp":"MAP-EもDS-LiteもIPv4 over IPv6（IPv6サービス）の実装方式。IPv6 IPoEを使いながらIPv4通信を行うためのトンネリング技術で、プロバイダやVNE事業者によって採用方式が異なる。"},{"id":"D077","cat":"D","diff":2,"q":"「VNE事業者」の役割として正しいのはどれか？","choices":["IPoEネットワークとインターネットを繋ぐ事業者","光ファイバーを全国に敷設して管理する事業者","お客様宅にWi-Fiルーターを設置する会社","光コラボの月額料金の決済を代行する事業者"],"ans":0,"exp":"VNE（Virtual Network Enabler）事業者はNTT東西のIPoEネットワークとインターネットを相互接続する役割を持つ事業者。JPIX（v6プラス）やインターネットマルチフィード（transix）等がある。"},{"id":"D078","cat":"D","diff":2,"q":"「Wi-Fiの2.4GHz帯」の特徴として正しいのはどれか？","choices":["5GHz帯より電波が届く範囲が広く壁を通過しやすい","5GHz帯より通信速度が速く混雑しにくい周波数帯","電子レンジやBluetoothとの干渉が起きにくい帯域","屋外専用の周波数帯であり室内では利用できない帯域"],"ans":0,"exp":"2.4GHz帯は波長が長いため壁や床を通過しやすく電波が遠くまで届きやすい。ただし電子レンジやBluetoothと同じ周波数帯のため干渉が起きやすく、5GHz帯より混雑しやすい傾向がある。"},{"id":"D079","cat":"D","diff":2,"q":"「Wi-Fiの5GHz帯」の特徴として正しいのはどれか？","choices":["2.4GHz帯より速いが電波の届く距離が短く壁に弱い","2.4GHz帯より遅いが電波が遠くまで届く周波数","電子レンジと同じ周波数帯で干渉が起きやすい","Wi-Fi 4（11n）以前の機器は対応していない規格"],"ans":0,"exp":"5GHz帯は2.4GHz帯より高速で電子レンジ等との干渉が少ないが、波長が短いため壁や床を透過しにくく電波の届く範囲が狭い。近距離での通信に向いている。"},{"id":"D080","cat":"D","diff":4,"q":"「DHCP（動的ホスト構成プロトコル）」の役割として正しいのはどれか？","choices":["ネットワーク内の機器に自動でIPアドレスを割り当てる","Wi-Fiのパスワードを自動で更新してセキュリティを守る","光回線の開通工事日をお客様に自動で通知する役割","プロバイダへの認証情報を自動で送信して接続する"],"ans":0,"exp":"DHCPはネットワーク内の機器（PC・スマートフォン等）にIPアドレスを自動で割り当てるプロトコル。DHCPサーバー（通常はルーター）が各機器に適切なIPアドレスを配布する。"},{"id":"G078","cat":"G","diff":1,"q":"「ドコモ光」はどの会社が提供しているサービスか？","choices":["NTTドコモが提供する光コラボサービス（全国展開）","NTT東西がドコモユーザー向けに直接提供する回線","ソフトバンクがドコモユーザー向けに提供するサービス","KDDIとドコモが共同で運営する独自回線サービス"],"ans":0,"exp":"ドコモ光はNTTドコモが提供する光コラボサービス。NTT東西のフレッツ光回線を卸売りして提供しており、ドコモのスマートフォンとのセット割「ドコモ光セット割」が適用できる。"},{"id":"G079","cat":"G","diff":1,"q":"「SoftBank光」はどの会社が提供しているサービスか？","choices":["ソフトバンクが提供する全国展開の光コラボサービス","NTT東西がソフトバンクユーザー向けに提供する回線","auひかりと同じKDDIグループの光回線サービス","ワイモバイルが単独で運営する独自の光回線サービス"],"ans":0,"exp":"SoftBank光はソフトバンクが提供する光コラボサービス。NTT東西のフレッツ光回線を使い、ソフトバンクスマートフォンとのセット割「おうち割 光セット」が適用できる。"},{"id":"G080","cat":"G","diff":1,"q":"「auひかり」の回線の仕組みとして正しいのはどれか？","choices":["KDDIが自社で整備したダークファイバー独自回線を使用する","NTT東西のフレッツ光を卸売りした光コラボである","電力会社の光ファイバーを借りて提供するサービス","NTTとKDDIが共同で管理するハイブリッド回線である"],"ans":0,"exp":"auひかりはKDDIが自社で整備したダークファイバー（独自回線）を使用する。フレッツ光とは別の物理回線のため、全国どこでも使えるわけではなくエリア確認が必要。"},{"id":"G081","cat":"G","diff":1,"q":"「NURO光」の回線の仕組みとして正しいのはどれか？","choices":["ソニーグループのSo-netがNTTダークファイバーを借用して運営する独自回線サービス","NTT東西のフレッツ光を卸売りした光コラボサービス（規定上の運用と判断する取り扱い）","電力会社の光ファイバーを借りて提供するサービス（規定上の運用と判断する取り扱い）","楽天グループが独自に敷設した光ファイバー回線サービス（規定上の運用と判断する取り扱い）"],"ans":0,"exp":"NURO光はソニーグループのSo-netが提供する独自回線（ダークファイバー系）サービス。NTT東西のダークファイバーを借りて独自網と組み合わせて運営している。最大2Gbpsの高速回線が特徴だが、提供エリアが主要都市圏に限られる。"},{"id":"G082","cat":"G","diff":1,"q":"「eo光」はどの地域で提供されている光回線サービスか？","choices":["関西電力グループ（オプテージ）が提供する関西エリア限定サービス","九州電力グループが提供する九州エリア限定サービス","中部電力グループが提供する東海エリア限定サービス","四国電力グループが提供する四国エリア限定サービス"],"ans":0,"exp":"eo光は関西電力グループのオプテージが提供する電力系光回線サービス。大阪・京都・兵庫・滋賀・奈良・和歌山の関西2府4県が主な提供エリア。"},{"id":"G083","cat":"G","diff":1,"q":"「ドコモ光セット割」が適用されると何が割引になるか？","choices":["ドコモのスマートフォンの月額料金が割引になる","ドコモ光自体の毎月の月額料金が割引になる","ドコモのスマートフォン本体の購入価格が割引になる","光回線の開通工事費が無料になる工事費割引特典"],"ans":0,"exp":"ドコモ光セット割はドコモ光とドコモのスマートフォンをセットにすることで、スマートフォンの月額料金が割引になる特典。ドコモ光自体の料金が下がるわけではない。"},{"id":"G084","cat":"G","diff":1,"q":"「auスマートバリュー」が適用されると何が割引になるか？","choices":["auのスマートフォンの月額料金が割引になる","auひかり自体の月額料金が割引になる","auのスマートフォン本体の購入代金が割引になる","au PAYの手数料が無料になるサービス"],"ans":0,"exp":"auスマートバリューはauひかり（または対象の光回線）とauスマートフォンをセットにすることで、スマートフォンの月額料金が割引になる特典。"},{"id":"G085","cat":"G","diff":1,"q":"「光コラボ」が「独自回線（auひかり・NURO光等）」と比べて一般的に優れている点はどれか？","choices":["NTT東西のエリア内なら全国ほぼどこでも利用できる","すべての光コラボはauひかりより通信速度が速い","光コラボは開通工事費が一切かかることがない","どのスマートフォンとも必ずセット割が使える仕組み"],"ans":0,"exp":"光コラボはNTT東西のフレッツ光回線を使うため、NTT東西のエリア（ほぼ全国）であれば利用できる。auひかりやNURO光は独自回線のためエリアが限定される。"},{"id":"G086","cat":"G","diff":1,"q":"「J:COM NET（J:COM）」の回線の仕組みとして正しいのはどれか？","choices":["自社のCATVネットワークを利用したインターネットサービス","NTT東西のフレッツ光を卸売りした光コラボである","KDDIの光ファイバーを借りて提供するサービス","電力会社の光ファイバーを使ったエリア限定サービス"],"ans":0,"exp":"J:COM NETはJ:COM（ジェイコム）が自社のCATVネットワークを使って提供するインターネットサービス。光コラボではないため転用・事業者変更の対象外で、乗り換えには新規工事が必要。"},{"id":"G087","cat":"G","diff":1,"q":"「SoftBank光 おうち割 光セット」はどのスマートフォンに適用できるか？","choices":["ソフトバンクまたはワイモバイルのスマートフォン回線","NTTドコモ契約のスマートフォン・データ通信回線","auまたはUQモバイルのスマートフォン通信回線","格安SIM（MVNO）各社のスマートフォン通信回線"],"ans":0,"exp":"SoftBank光の「おうち割 光セット」はソフトバンクまたはワイモバイルのスマートフォンを対象にスマートフォンの月額料金を割引する特典。他社スマートフォンには適用されない。"},{"id":"G088","cat":"G","diff":1,"q":"「光コラボ」から「独自回線（auひかり・NURO光等）」へ乗り換える場合の工事について正しいのはどれか？","choices":["独自回線は別のアクセスラインのため新規工事が必要になる","事業者変更手続きで工事なしに切り替えられる","転用承諾番号を取得すれば工事なしで切り替えられる","光コラボの解約後60日以内であれば工事が免除される"],"ans":0,"exp":"auひかりやNURO光は光コラボとは別の物理回線を使う独自回線のため、乗り換えには新規開通工事が必要。事業者変更（工事なし）は光コラボ同士の乗り換えにのみ使える制度。"},{"id":"G089","cat":"G","diff":1,"q":"「ホームルーター（home 5G等）」の最大のメリットとして正しいのはどれか？","choices":["工事不要でコンセントを挿すだけで使い始められる","光回線より常に通信速度が安定して高速に使える","月額料金が光回線より常に安くコスパが高い","どこに設置しても同じ電波強度で快適に使える"],"ans":0,"exp":"ホームルーターの最大のメリットは開通工事が不要なこと。コンセントに挿すだけですぐ使えるため、工事の日程調整が不要で引越し直後や賃貸物件でも気軽に導入できる。"},{"id":"G090","cat":"G","diff":1,"q":"「楽天ひかり」のセット割の対象となるスマートフォンはどれか？","choices":["楽天モバイルとセットで光回線料金が割引になる","ドコモのスマートフォンとのセットで割引が使える","auのスマートフォンとのセットで割引が使える","ソフトバンクとのセットで月額料金が割引になる"],"ans":0,"exp":"楽天ひかりは楽天モバイルとのセットで月額割引が適用される。楽天ひかりと楽天モバイルをセットにすると楽天ひかりの月額料金が1年間無料になるキャンペーンが過去に実施されていた。"},{"id":"G091","cat":"G","diff":1,"q":"「電力系光回線（eo光・コミュファ光等）」に共通する特徴として正しいのはどれか？","choices":["各地域の電力会社グループが運営する独自回線サービス","NTT東西のフレッツ光を卸売りした光コラボサービス","全国展開しており日本全国どこでも利用できるサービス","KDDIグループが統一して運営している光回線サービス"],"ans":0,"exp":"eo光・コミュファ光・ビビック光・メガエッグ・ピカラ光はいずれも各地域の電力会社グループが運営する独自回線サービス。それぞれ提供エリアが限られており全国展開はしていない。"},{"id":"G092","cat":"G","diff":1,"q":"「ドコモ光」の申し込みで「タイプA」と「タイプB」の違いとして正しいのはどれか？","choices":["選べるプロバイダの種類がタイプAとタイプBで異なる","タイプAは戸建て向けでタイプBはマンション向けの料金プラン","タイプAはPPPoE専用でタイプBはIPoE専用の接続方式","タイプAは2年縛りなしでタイプBは2年縛りありのプラン"],"ans":0,"exp":"ドコモ光のタイプAとタイプBは選べるプロバイダが異なる区分。タイプAはdocomo net・GMOとくとくBB等、タイプBはNTTコムに限られる。月額料金はタイプAの方が220円安く、選択肢が多く料金が安いタイプAが契約者の9割以上を占める。"},{"id":"W043","cat":"W","diff":2,"q":"「Wi-Fi」とは何か、正しい説明はどれか？","choices":["無線でインターネットに接続する通信規格の総称","光ファイバーを使った有線接続の規格の名前","スマートフォンのSIMカードを使った通信方式","ルーターメーカーが定めた独自接続規格の名称"],"ans":0,"exp":"Wi-FiはIEEE 802.11シリーズの無線LAN規格を使った製品に与えられる認定ブランド名の総称。Wi-Fi Allianceが認定しており、対応機器同士は相互接続できる。"},{"id":"W044","cat":"W","diff":2,"q":"「Wi-Fiルーター」を光回線に繋ぐ場合、接続するポートとして正しいのはどれか？","choices":["WANポート（インターネット側）にONUを接続する","LANポートにONUを繋げばインターネットに接続できる","Wi-FiルーターにはONUを繋がず空中で無線接続する","どのポートに繋いでも自動認識して設定される"],"ans":0,"exp":"Wi-FiルーターのWANポート（インターネット側）にONUまたはHGWをLANケーブルで接続する。LANポートはPCや家電など宅内機器を繋ぐためのポートで、ONUを繋ぐと動作しない。"},{"id":"W045","cat":"W","diff":2,"q":"「Wi-Fiのパスワード（暗号化キー）」が設定されている目的として正しいのはどれか？","choices":["無断でWi-Fiに接続されないようにするセキュリティ設定","Wi-Fiの通信速度を上げるための認証最適化設定","ルーターのIPアドレスを変更するための暗号化設定","プロバイダへの月額料金の支払いに必要な認証情報"],"ans":0,"exp":"Wi-Fiのパスワードは第三者が無断でWi-Fiネットワークに接続することを防ぐセキュリティ設定。パスワードなし（オープン）の場合、近隣の誰でもWi-Fiに接続できてしまう。"},{"id":"W046","cat":"W","diff":3,"q":"「Wi-Fi 6（IEEE 802.11ax）」はWi-Fi 5（802.11ac）と比べてどのような特徴があるか？","choices":["多数の端末が同時接続しても速度低下しにくい技術","Wi-Fi 5より通信可能距離が大幅に短くなった規格","5GHz帯のみ対応で2.4GHz帯は利用できない規格","ルーター1台に1端末しか繋げない新しい通信規格"],"ans":0,"exp":"Wi-Fi 6はOFDMAやMU-MIMO等の技術により多数の端末が同時接続する環境での効率が改善された。スマートフォン・PC・スマート家電等を多数繋ぐ家庭に向いている。"},{"id":"W047","cat":"W","diff":2,"q":"「Wi-FiのSSID」とは何か、正しい説明はどれか？","choices":["Wi-Fiネットワークを識別するためのネットワーク名","Wi-Fi接続時に入力するパスワード（暗号化キー）","ルーターの製造番号を示すMACアドレスの別名","プロバイダから自動で割り当てられるグローバルIP"],"ans":0,"exp":"SSIDはService Set Identifierの略で、スマートフォンやPCがWi-Fiの一覧に表示するネットワーク名のこと。複数のWi-Fiが飛んでいる環境でどのネットワークに繋ぐか識別するために使う。"},{"id":"W048","cat":"W","diff":2,"q":"Wi-FiルーターのランプのうちWi-Fiの電波状態を示すランプが消灯している場合、最初に確認すべきことはどれか？","choices":["ルーターの無線LAN機能がオフになっていないか確認する","プロバイダに連絡してWi-Fiを復旧してもらう","光回線自体が断線していないか工事業者を呼ぶ","スマートフォンを再起動してWi-Fi一覧を更新する"],"ans":0,"exp":"Wi-Fiランプが消灯している場合はまずルーター本体の無線LAN機能のスイッチがオフになっていないかを確認する。物理スイッチやボタンで無線機能をオフにしている場合がある。"},{"id":"W049","cat":"W","diff":2,"q":"「有線LAN（LANケーブル接続）」と「Wi-Fi（無線LAN）」の比較として正しいのはどれか？","choices":["有線LANの方が速度や安定性に優れるがケーブル配線が必要","Wi-Fiの方が常に有線LANより高速で安定している","有線LANは光回線専用でWi-Fiはホームルーター専用","有線LANはセキュリティが低くWi-Fiの方が安全"],"ans":0,"exp":"有線LANはケーブルで直接繋ぐため電波干渉や速度低下がなく安定性・速度ともに優れる。ただしケーブル配線が必要なデメリットがある。ゲームや動画編集には有線が推奨される。"},{"id":"W050","cat":"W","diff":2,"q":"「Wi-Fiルーターの設置場所」で避けるべき場所として正しいのはどれか？","choices":["電子レンジやコードレス電話のすぐ近く","家の中心に近い棚の上など高い位置","障害物の少ないリビングの中央付近","テレビやゲーム機から1m以上離れた場所"],"ans":0,"exp":"電子レンジは2.4GHz帯と同じ周波数を使うためWi-Fiと干渉しやすい。コードレス電話も同様。これらの機器の近くにルーターを置くと電波が不安定になるため避ける。"},{"id":"W051","cat":"W","diff":3,"q":"光回線の宅内に「ホームゲートウェイ（HGW）がある環境」でWi-Fiルーターを追加する場合の正しい設定はどれか？","choices":["Wi-FiルーターをAPモード（ブリッジモード）に設定して接続する","Wi-FiルーターをPPPoEルーターモードに設定して接続する","HGWのWAN側にWi-FiルーターのLANポートを繋ぐ","HGWの電源を切ってからWi-Fiルーターに置き換える"],"ans":0,"exp":"HGWがある環境でWi-Fiルーターを追加する場合はAPモード（アクセスポイントモード/ブリッジモード）に設定する。ルーターモードのまま繋ぐと二重NATになり通信トラブルが起きやすい。"},{"id":"W052","cat":"W","diff":2,"q":"「Wi-Fi接続なのにインターネットに繋がらない」場合にまず確認すべきことはどれか？","choices":["ルーターのWAN側（ONUとの接続）が正しいか確認する","Wi-Fiパスワードを変更して端末を再接続し直す","プロバイダに回線の復旧作業を電話で依頼する","スマートフォンのSIMカードを抜き差しして確認する"],"ans":0,"exp":"Wi-Fiには繋がるがインターネットに接続できない場合はWAN側（ルーターとONUの接続）に問題がある可能性が高い。LANケーブルの抜き差しやルーターの再起動を最初に試す。"},{"id":"W053","cat":"W","diff":2,"q":"「Wi-Fiルーターの再起動」が有効なトラブルシューティングとして正しいのはどれか？","choices":["ルーター内部のメモリのゴミがクリアされ動作が改善される","Wi-Fiのパスワードがリセットされて新しいパスワードになる","再起動でルーターのファームウェアが最新に更新される","再起動するとプロバイダとの契約情報が再確認される"],"ans":0,"exp":"ルーターの再起動（電源オフ→オン）は内部メモリをクリアして動作が改善する効果がある。ネットが繋がらない・速度が遅いなどのトラブルでまず試すべき基本対処法。"},{"id":"W054","cat":"W","diff":3,"q":"「Wi-Fiに接続しているのに速度が遅い」場合、まず確認すべき原因として正しいのはどれか？","choices":["電波の弱い2.4GHz帯に接続していないか確認する","プロバイダに速度改善を依頼するよう連絡する","Wi-Fiルーターを購入し直して新品に交換する","ONUをルーターの真横に移動して近づける"],"ans":0,"exp":"Wi-Fi速度が遅い場合はまず接続している周波数帯を確認する。混雑しやすい2.4GHz帯に接続していると速度が出にくいため、より高速な5GHz帯（またはWi-Fi 6対応の5GHz帯）に切り替えることで改善する場合が多い。"},{"id":"W055","cat":"W","diff":3,"q":"「Wi-Fiルーターの規格名」の読み方として正しいのはどれか？","choices":["Wi-Fi 5はIEEE 802.11acでWi-Fi 6はIEEE 802.11ax","Wi-Fi 5はIEEE 802.11nでWi-Fi 6はIEEE 802.11ac","Wi-Fi 5はIEEE 802.11gでWi-Fi 6はIEEE 802.11n","Wi-Fi 5はIEEE 802.11axでWi-Fi 6はIEEE 802.11be"],"ans":0,"exp":"Wi-Fi規格はWi-Fi 4=802.11n、Wi-Fi 5=802.11ac、Wi-Fi 6=802.11ax、Wi-Fi 7=802.11beという対応関係。ルーターやスマートフォンの仕様表記ではIEEE規格名で記載されることが多い。"},{"id":"W056","cat":"W","diff":4,"q":"「Wi-FiルーターのAPモード（アクセスポイントモード）」の説明として正しいのはどれか？","choices":["ルーター機能を無効にしてアクセスポイントとして動作するモード","インターネットに直接接続するルーターとして動作するモード","Wi-Fi電波を中継して届く範囲を広げる中継器モード","PPPoE認証でプロバイダにログインするための専用モード"],"ans":0,"exp":"APモード（アクセスポイントモード/ブリッジモード）はルーター機能（NAT・DHCP）を無効にし、Wi-Fiアクセスポイントとしてのみ機能するモード。HGW配下に市販ルーターを追加する場合に使う。"},{"id":"W057","cat":"W","diff":3,"q":"「Wi-Fiルーターのファームウェア更新」の目的として正しいのはどれか？","choices":["セキュリティの脆弱性を修正したり機能を改善するために行う","Wi-Fiの電波強度を上げて通信速度を向上させるために行う","ルーターのSSID（Wi-Fi名）とパスワードを最新に更新する","プロバイダとの接続設定を自動で最適化するために行う"],"ans":0,"exp":"ファームウェア更新はルーターのソフトウェアを最新版に更新する作業で、セキュリティの脆弱性修正や動作安定性の向上が主な目的。定期的な更新がセキュリティ上重要。"},{"id":"A061","cat":"A","diff":1,"q":"「光コラボ」「独自回線」「フレッツ光（NTT直販）」の3種類の光回線で共通していることはどれか？","choices":["いずれも光ファイバーを使ってインターネットに接続する","いずれもNTT東西が所有する光ファイバーを使っている","いずれもセット割でスマートフォン料金が安くなる","いずれも全国どこでも同じ料金で申し込みができる"],"ans":0,"exp":"光コラボ・独自回線・フレッツ光のいずれも光ファイバーを使ってインターネットに接続する「光回線」という点は共通。ただし使用する光ファイバーの所有者や管理者はそれぞれ異なる。"},{"id":"A062","cat":"A","diff":1,"q":"「NTT東日本」と「NTT西日本」のサービスエリアの境界として正しいのはどれか？","choices":["富山・長野・静岡の各県を東西に分ける境界がある","北海道と本州の間（津軽海峡）が境界になっている","東京都と神奈川県の間が東西の境界になっている","NTT東西の境界は存在せず全国一体で運営している"],"ans":0,"exp":"NTT東日本は北海道・東北・関東・甲信越エリアを、NTT西日本は東海・北陸・近畿・中国・四国・九州エリアを担当する。富山・長野・静岡の3県が東西の境界に位置する。"},{"id":"A063","cat":"A","diff":1,"q":"「光コラボ」のプロバイダ選択について正しいのはどれか？","choices":["基本的に申し込む光コラボのプロバイダが決まっており、フレッツ光のように自由に別会社から選ぶことはできない","どの光コラボでもプロバイダを自由に別会社から選択できる（規定上は事業者ごとの自由選択制と判断する運用）","光コラボは申し込み後にマイページからプロバイダを無料で変更できる（規定上の自由切替の運用と判断する）","光コラボのプロバイダはNTT東西が自動で割り当てる（規定上はNTT東西の管理運用と判断する取り扱い）"],"ans":0,"exp":"光コラボは基本的にアクセスラインとプロバイダがセットになったサービスで、フレッツ光のように自由にプロバイダを選ぶことはできない。ただしドコモ光のように複数プロバイダから選べる光コラボも存在する（タイプA：18社、タイプB：6社）。プロバイダを変えたい場合は別の光コラボ事業者への事業者変更が必要。"},{"id":"A064","cat":"A","diff":1,"q":"「光回線の通信速度」のカタログ表記「最大1Gbps」の正しい理解はどれか？","choices":["技術上の理論最大値で実際の速度は環境により大幅に変わる","利用者全員が常に保証される最低限の速度を示している","1秒間に1GBのデータを転送できるという保証速度","混雑のない深夜帯に測定した平均速度を示している"],"ans":0,"exp":"光回線のカタログ掲載速度「最大1Gbps」は技術上の理論値（ベストエフォート）であり、保証速度ではない。実際の速度は時間帯・回線の混雑・宅内のWi-Fi環境などにより大幅に変わる。"},{"id":"A065","cat":"A","diff":1,"q":"「光コラボ」の事業者はNTT東西から見てどのような立場か？","choices":["NTT東西から回線を卸売りして購入している「卸売り先」","NTT東西と対等に光ファイバーを共同管理するパートナー","NTT東西の子会社として出資を受けて運営する会社","NTT東西が業務委託した代理販売業者の一形態"],"ans":0,"exp":"光コラボ事業者はNTT東西からアクセスライン（フレッツ光）を卸売りで購入し、自社ブランドのサービスとして再販する。NTT東西は光回線の「卸売り元」、光コラボ事業者は「卸売り先」の関係。"},{"id":"A066","cat":"A","diff":1,"q":"日本の光回線事業においてNTT東西が果たしている役割として正しいのはどれか？","choices":["全国の光ファイバーインフラを敷設・保有・管理する","光コラボ各社の月額料金と品質を審査して認定する","インターネット通信速度を法律で管理する団体","すべての光回線事業者の請求代行を行う機関"],"ans":0,"exp":"NTT東西は全国の光ファイバーインフラ（アクセスライン）を敷設・保有・維持管理する事業者。光コラボはこのインフラを卸売りで使用する。NTT東西はサービスの品質管理や認定機関ではない。"},{"id":"A067","cat":"A","diff":1,"q":"「フレッツ光」の「フレッツ」とは何を意味するか？","choices":["NTT東西が提供する光ファイバー接続サービスのブランド","光ファイバーの通信規格を定める国際標準の名称","NTTの親会社・日本電信電話の旧社名の略称","光コラボ全体の総称としてNTTが定めたブランド名"],"ans":0,"exp":"フレッツはNTT東西が提供する光ファイバーを利用したインターネット接続サービス（FTTH）のブランド名。「フレッツ光」はフレッツブランドの光ファイバーサービスの総称。"},{"id":"A068","cat":"A","diff":1,"q":"「光コラボ」はどの年頃から始まったサービスか？","choices":["2015年頃からNTT東西が光コラボ制度を開始した","2000年頃からADSL終了に伴い開始されたサービス","2020年頃に5G普及に合わせて始まったサービス","1995年頃からインターネット普及と同時に始まった"],"ans":0,"exp":"光コラボ（光コラボレーションモデル）は2015年2月にNTT東西が開始した制度。それ以前はフレッツ光とプロバイダを別々に契約する形式が主流だった。"},{"id":"A069","cat":"A","diff":1,"q":"「FTTH」とは何の略か、正しい説明はどれか？","choices":["光ファイバーを家庭まで直接引き込む通信方式の総称","固定電話のデジタル化を推進する業界団体の略称","無線Wi-Fiの通信速度を保証する国際規格の略称","フレッツ光の技術仕様を定めるNTT社内規格の略称"],"ans":0,"exp":"FTTHはFiber To The Homeの略で、光ファイバーケーブルを家庭（建物）まで直接引き込む通信方式の総称。光コラボもauひかりもNURO光もすべてFTTHサービスに分類される。"},{"id":"A070","cat":"A","diff":1,"q":"「光回線」と「ADSL」の最大の違いとして正しいのはどれか？","choices":["光回線は光ファイバーを使いADSLは既存の電話線（銅線）を使う","光回線は無線でADSLは有線で通信する方式の違い","光回線は個人向けでADSLは法人向けの通信サービス","光回線はNTT専用でADSLは民間事業者専用の設備"],"ans":0,"exp":"光回線は光ファイバーケーブルを使って光の信号で通信するのに対し、ADSLは既存の電話線（銅線）を使って電気信号でデータを伝送する。光回線の方が速度・安定性ともに優れる。"},{"id":"E054","cat":"E","diff":1,"q":"andline光SEを申し込む際に必要な「転用承諾番号」はどこで取得するか？","choices":["NTT東日本または西日本のマイページで発行する","andline光SEの申し込みページで自動発行される","現在利用中のプロバイダに連絡して発行してもらう","NTTドコモの店舗または電話窓口で発行する"],"ans":0,"exp":"転用承諾番号はNTT東日本（フレッツ光利用中のエリア）またはNTT西日本のマイページ・お客様センターで取得する。andline光SEへの転用申し込みに必要な番号で有効期限は15日間。"},{"id":"E055","cat":"E","diff":1,"q":"andline光SEの「マンション（集合住宅）プラン」の対象となる建物として正しいのはどれか？","choices":["集合住宅（アパート・マンション等）に居住している場合","自宅の一部を賃貸に貸し出しているすべての戸建て","住所が同じ複数世帯が同時申し込みをする場合","2階建て以上の戸建て住宅はマンションプラン対象"],"ans":0,"exp":"andline光SEのマンションプランは集合住宅（アパート・マンション等）に居住している場合に適用されるプラン。戸建て住宅はファミリー（戸建て）プランが対象になる。"},{"id":"E056","cat":"E","diff":1,"q":"andline光SEの「andline電話」の説明として正しいのはどれか？","choices":["光回線を使ったIP電話サービスで固定電話番号が持てる","スマートフォン専用のIP電話アプリサービス","NTTのひかり電話とは異なる別の物理回線を使う電話","固定電話機がなくてもスマートフォンで利用できる"],"ans":0,"exp":"andline電話は光回線（IP技術）を使ったIP電話サービスで、固定電話番号（市外局番付き）を持つことができる。ホームゲートウェイ（HGW）に電話機を接続して使用する。"},{"id":"E057","cat":"E","diff":1,"q":"andline光SEに申し込む際に「事業者変更承諾番号」が必要なのはどのような場合か？","choices":["他の光コラボ（ドコモ光等）から乗り換える場合","フレッツ光（NTT直販）から乗り換える場合","新築など初めて光回線を引く新規申し込みの場合","auひかりなど独自回線から乗り換える場合"],"ans":0,"exp":"事業者変更承諾番号は光コラボ間の乗り換え（事業者変更）で必要な番号。他の光コラボからandline光SEへの乗り換え時に現在の光コラボ事業者から取得する（有効期限15日間）。"},{"id":"E058","cat":"E","diff":1,"q":"andline光SEで「工事の立会い」が必要なのはどのような場合か？","choices":["宅内への新規引き込み工事（派遣工事）が発生する場合","無派遣工事の場合も必ず在宅して立ち会いが必要","工事の種類にかかわらず全件で立会いが義務付けられる","光コラボからの事業者変更の場合のみ立会いが必要"],"ans":0,"exp":"宅内工事（派遣工事）では工事担当者が自宅に入って作業するため在宅・立会いが必要。無派遣工事は局内の切り替えのみで完了するため立会い不要でONUのセルフ設置作業のみ行う。"},{"id":"E059","cat":"E","diff":1,"q":"andline光SEの「IPv4 over IPv6（IPv6サービス）」の利用開始に追加で必要なものはどれか？","choices":["対応したIPv6サービス対応ルーターの準備が必要","別途月額オプション料金の申し込みが必要","NTT東西への個別申請と審査が必要になる","プロバイダとは別にVNE事業者と契約が必要"],"ans":0,"exp":"andline光SEのIPv4 over IPv6（IPv6サービス）は追加料金なしで利用できるが、対応ルーター（andline光SEが採用するv6プラス対応機器）の準備が必要。HGWがある場合は内蔵機能で対応可能。"},{"id":"E060","cat":"E","diff":1,"q":"andline光SEの「解約」を申し込む際の正しい手順として最初にすべきことはどれか？","choices":["andline光SEカスタマーサポートに連絡して手続きする","NTT東西に直接連絡してアクセスライン解約を申し込む","インターネットのマイページから即日で解約できる","解約金が発生しない契約更新月を確認してから申し込む"],"ans":0,"exp":"andline光SEの解約はandline光SEのカスタマーサポートデスクへ連絡して手続きを行う。NTT東西への連絡は不要で、andline光SE側が代理でアクセスラインの手続きも行う。"},{"id":"F029","cat":"F","diff":1,"q":"「andlineTV（フレッツ・テレビ）」はどのような仕組みでテレビ放送を届けるサービスか？","choices":["光ファイバー回線を通じてテレビ放送を配信するサービス","アンテナを屋根に設置して電波を受信するサービス","ケーブルテレビの同軸ケーブルで提供するサービス","衛星（BS/CS）から直接受信する光テレビサービス"],"ans":0,"exp":"andlineTVはNTT東西のフレッツ・テレビサービスを利用して光ファイバー回線を通じてテレビ放送信号を配信する光テレビサービス。アンテナ工事なしでテレビを視聴できる。"},{"id":"F030","cat":"F","diff":1,"q":"「andlineTV」を申し込むための前提条件として正しいのはどれか？","choices":["andline光SEの契約者であることが前提条件","テレビアンテナの設置工事が事前に完了していること","NTT東西のひかり電話を契約していること","フレッツ光の既存利用者であることが前提条件"],"ans":0,"exp":"andlineTVはandline光SEの付加サービスのため、andline光SEを契約していることが前提条件。光回線なしでandlineTVのみの申し込みはできない。"},{"id":"F031","cat":"F","diff":1,"q":"「andlineTV（フレッツ・テレビ）」で視聴するために宅内に設置が必要な専用機器はどれか？","choices":["映像用回線終端装置（V-ONU）","Wi-Fiルーターとテレビのセット","フレッツ・テレビ専用のアンテナ端子","テレビチューナー内蔵のホームゲートウェイ"],"ans":0,"exp":"andlineTVの視聴にはV-ONU（映像用回線終端装置）の設置が必要。V-ONUは光ファイバーからテレビ放送信号を取り出す専用機器で、宅内のテレビには同軸ケーブルで接続する。"},{"id":"F032","cat":"F","diff":1,"q":"「分波器」はどのような用途で使う機器か？","choices":["地デジとBS/CS信号を2系統に分離する機器","1つの電波信号を複数のテレビへ分配する機器","テレビ電波が弱い場合に信号を増幅する機器","テレビとレコーダーを繋ぐための変換アダプター"],"ans":0,"exp":"分波器（ブランチャー）は1本の同軸ケーブルで送られてくる地上デジタル（地デジ）信号とBS/CS衛星放送信号を2系統に分離する機器。地デジとBS両方を見る際に使う。"},{"id":"F033","cat":"F","diff":1,"q":"「分配器」はどのような用途で使う機器か？","choices":["1つのテレビ信号を複数のテレビへ均等に分ける機器","地デジとBS/CS信号を1本のケーブルに混合する機器","テレビの電波を強くして遠い部屋まで届ける機器","アンテナ線の断線を修復するための接続アダプター"],"ans":0,"exp":"分配器は1つの放送信号を2〜4台のテレビへ均等に分ける機器。分配するたびに信号レベルが低下するため、台数が多い場合はブースター（増幅器）との組み合わせが必要になることがある。"},{"id":"F034","cat":"F","diff":1,"q":"andlineTVで「地デジとBSの両方」を視聴したい場合に必要な機器として正しいのはどれか？","choices":["分波器（地デジとBS信号を分離する機器）が必要","分配器を使えば地デジとBS両方が視聴できる","地デジ専用アンテナとBS専用アンテナを別々に用意する","V-ONUから地デジ・BS用に2本の同軸ケーブルを引く"],"ans":0,"exp":"V-ONUから出力される同軸ケーブルには地デジとBS/CS信号が混在しているため、テレビで両方を視聴するには分波器で信号を分離する必要がある。テレビに直接接続する際に使う。"},{"id":"F035","cat":"F","diff":1,"q":"andlineTVの「テレビ回線工事」で工事担当者が実施する主な作業はどれか？","choices":["V-ONUの設置と宅内テレビへの同軸ケーブルの接続工事","Wi-Fiルーターの設定とテレビチャンネルのスキャン","アンテナをベランダに取り付けて角度を調整する工事","テレビ本体に専用アプリをインストールして設定する"],"ans":0,"exp":"andlineTVの工事ではV-ONU（映像用回線終端装置）を設置し、宅内のテレビ端子（同軸ケーブル）へ接続する工事を行う。既存の宅内配線が使える場合は比較的短時間で完了する。"},{"id":"N025","cat":"N","diff":1,"q":"「NTTドコモ」が提供する光回線サービスの名称として正しいのはどれか？","choices":["ドコモ光（光コラボサービス）","フレッツ光（NTT直販サービス）","auひかり（独自回線サービス）","ドコモ光ネクスト（独自回線サービス）"],"ans":0,"exp":"NTTドコモが提供する光回線サービスは「ドコモ光」。NTT東西のフレッツ光回線を卸売りした光コラボサービスで、ドコモのスマートフォンとのセット割「ドコモ光セット割」が使える。"},{"id":"N026","cat":"N","diff":1,"q":"2023年のNTTグループ再編で「OCN（オーシーエヌ）」の個人向けサービスはどこに移管されたか？","choices":["NTTドコモ（ドコモに吸収・統合された）","NTT東西（NTT直販サービスとして継続）","ソフトバンク（競合他社に売却された）","KDDI（グループ外に移管された）"],"ans":0,"exp":"2023年のNTTグループ再編でOCNの個人向けサービス（OCN光・OCNモバイルONE等）はNTTドコモに移管・統合された。以後「OCN光」はドコモが管理するサービスになった。"},{"id":"N027","cat":"N","diff":1,"q":"「NTTコミュニケーションズ（NTTコム）」の現在の状況として正しいのはどれか？","choices":["法人向け事業がNTTドコモビジネスに統合された","個人向けOCNサービスを現在も独立して提供中","NTT東西に吸収されてフレッツ光に統合された","ソフトバンクへの事業売却により廃業になった"],"ans":0,"exp":"NTTコミュニケーションズは2023年のNTTグループ再編で法人向け事業をNTTドコモビジネスに統合し、個人向けOCNサービスはNTTドコモへ移管された。"},{"id":"N028","cat":"N","diff":1,"q":"「NTTドコモビジネス」はどのような業務を主に担当する会社か？","choices":["法人・企業向けのICT・通信サービスを提供する会社","個人向けのスマートフォン販売を専門に行う会社","NTT東西のフレッツ光工事を全国で管理する会社","光コラボ事業者への卸売り認定を審査する会社"],"ans":0,"exp":"NTTドコモビジネスは旧NTTコミュニケーションズの法人向け事業を引き継いだ会社で、法人・企業向けのICTサービス・クラウド・ネットワーク等を提供する。OCNバーチャルコネクトもここが提供。"},{"id":"N029","cat":"N","diff":1,"q":"「ひかりTV」は現在どの会社が提供しているサービスか？","choices":["NTTドコモ（2023年の再編でNTTぷららから移管）","NTT東西（フレッツ光オプションとして直接提供）","ソフトバンク（光BBユニット経由で提供する）","KDDI（auひかりとセットで提供するサービス）"],"ans":0,"exp":"ひかりTVはもともとNTTぷららが提供していたが、2023年のNTTグループ再編でNTTドコモに統合・移管された。現在はNTTドコモがひかりTVサービスを提供している。"},{"id":"X046","cat":"X","diff":1,"q":"「フレッツ光（NTT直販）」の月額料金の請求はどこから来るか？","choices":["NTT東日本またはNTT西日本から直接請求される","プロバイダ（ISP）がフレッツ光料金をまとめて請求","光コラボ事業者を通じて間接的に請求が届く","NTTドコモがフレッツ光料金をまとめて請求する"],"ans":0,"exp":"フレッツ光（NTT直販）はNTT東西のサービスのため、月額料金はNTT東日本またはNTT西日本から請求される。プロバイダ料金は別途プロバイダから請求される（2本立て）。"},{"id":"X047","cat":"X","diff":1,"q":"「フレッツ光（NTT直販）」の最大のデメリットとして正しいのはどれか？","choices":["回線料金とプロバイダ料金が別々に請求される2本立て","フレッツ光は全国で利用できないエリアが多い","フレッツ光はスマートフォンとのセット割が使えない","フレッツ光はIPv6（IPoE）接続が利用できない"],"ans":0,"exp":"フレッツ光はNTT東西への回線料金とプロバイダへのプロバイダ料金が別々に請求される「2本立て」がデメリット。光コラボはこれがまとめて1本の請求になる点がメリット。"},{"id":"X048","cat":"X","diff":1,"q":"「フレッツ光」から「光コラボ（andline光SE等）」に転用するメリットとして最も多い動機はどれか？","choices":["月額料金がセット割でまとめて安くなる場合が多い","フレッツ光より通信速度が速くなるため","プロバイダを自由に変更できるようになるため","NTT東西への直接支払いが不要になるため"],"ans":0,"exp":"フレッツ光から光コラボへの転用の主なメリットは①回線とプロバイダがまとまり窓口・請求が1本化される②ドコモ光セット割・おうち割光セット等のスマホとのセット割が適用できる場合がある、の2点。通信速度はフレッツ光と物理インフラが同じのため変わらない。"},{"id":"X049","cat":"X","diff":1,"q":"「フレッツ光クロス（10Gbps）」の最大通信速度として正しいのはどれか？","choices":["最大10Gbps（ギガビット毎秒）","最大1Gbps（ギガビット毎秒）","最大100Mbps（メガビット毎秒）","最大2Gbps（ギガビット毎秒）"],"ans":0,"exp":"フレッツ光クロスは最大10Gbpsの高速通信が可能なNTT東西のサービス。通常のフレッツ光ネクスト（最大1Gbps）と異なり対応エリアや対応ルーターの条件が厳しい。"},{"id":"T001","cat":"T","diff":1,"q":"双方向LNP（番号ポータビリティ）が開始された日として正しいのはどれか？","choices":["2024年1月31日","2025年1月14日","2023年10月1日","2026年4月1日"],"ans":1,"exp":"双方向LNPは2025年1月14日に開始された。それ以前は主にNTT加入電話から他社への片方向のみだったが、2025年以降は全事業者間で双方向に番号を持ち運びできるようになった。"},{"id":"T002","cat":"T","diff":1,"q":"双方向LNPの対象となる番号として正しいのはどれか？","choices":["050番号（IP電話番号）","0AB-J番号（03・06等の10桁固定電話番号）","090・080・070の携帯電話番号","0120・0800のフリーダイヤル番号"],"ans":1,"exp":"双方向LNPの対象は0AB-J番号（03・06等の市外局番を含む10桁の固定電話番号）のみ。050番号（IP電話）は対象外のため番号ポータビリティは不可。"},{"id":"T003","cat":"T","diff":1,"q":"双方向LNPの手続き方式として正しいのはどれか？","choices":["転出元と転入先の両事業者に個別に申し込む2ステップ方式","移転先事業者に申し込むだけで完結するワンストップ方式","NTT東西に申し込んでから各事業者に通知が届く集中管理方式","総務省の電気通信番号管理センターへ直接申し込む一元管理方式"],"ans":1,"exp":"双方向LNPはワンストップ方式を採用しており、移転先事業者に申し込むだけで手続きが完結する。転出元事業者への連絡は不要。引き止め行為も全面禁止されている。"},{"id":"T004","cat":"T","diff":1,"q":"INSネット（ISDN）の新規販売が終了した日として正しいのはどれか？","choices":["2022年3月31日","2023年12月31日","2024年8月31日","2028年12月31日"],"ans":2,"exp":"INSネット64・1500は2024年8月31日に新規販売を終了した。サービス自体の提供終了予定は2028年12月31日。移行相談があった場合は原則アナログ戻し経由でひかり電話への移行を案内する。"},{"id":"T005","cat":"T","diff":1,"q":"INSネット（ISDN）のサービス提供終了予定日として正しいのはどれか？","choices":["2025年3月31日","2026年12月31日","2027年3月31日","2028年12月31日"],"ans":3,"exp":"INSネット（ISDN）のサービス提供終了予定は2028年12月31日。2024年8月31日に新規販売は終了済みだが、既存契約者は2028年末まで利用継続可能。"},{"id":"T007","cat":"T","diff":1,"q":"光回線へ移行する際のNTT加入電話の「加入権（施設設置負担金）」の扱いとして正しいのはどれか？","choices":["光回線へ移行した時点で自動的に解約扱いになる","「休止」扱いになり、一定期間内なら復活できる","加入権は光コラボ事業者に自動的に移管される","加入権は光回線の開通工事費に充当され返金される"],"ans":1,"exp":"光回線へ移行する際、NTT加入電話の加入権（施設設置負担金）は「休止」扱いになる。休止から10年間申し出がない場合は約款上解約扱いとなる（NTTからの事前通知なし）。"},{"id":"T008","cat":"T","diff":1,"q":"双方向LNP（番号ポータビリティ）の正しい説明はどれか？","choices":["NTT加入電話から他社へのみ番号を持ち運べる一方向の仕組み","2025年1月14日以降、全事業者間で双方向に番号を持ち運びできる仕組み","スマートフォンの電話番号を固定電話へ持ち運ぶための特別制度","光コラボ間でのみ番号を持ち運べる光回線専用の制度"],"ans":1,"exp":"双方向LNPは2025年1月14日に開始し、全事業者間で双方向に0AB-J番号を持ち運べる。それ以前はNTT加入電話から他社への片方向のみだった。移転先事業者への申し込みだけで完結するワンストップ方式。"},{"id":"T009","cat":"T","diff":2,"q":"MA（番号区画）を跨ぐ場合の番号ポータビリティの可否として正しいのはどれか？","choices":["MA跨ぎでも同一の市外局番なら番ポは可能（規定上の運用と判断する取扱）","MA（番号区画）を跨ぐ場合は番ポ不可となり、例外は認められていない","MA跨ぎは原則不可だが事業者間合意があれば特例で可能（規定の運用）","MAが異なっても引越し後3か月以内であれば番ポできる（規定の運用）"],"ans":1,"exp":"MA（番号区画）を跨ぐ場合は番号ポータビリティが不可（例外なし）。「市外局番が変わるから不可」という説明は因果関係が逆で誤り。正しくは「MAを跨ぐから番ポ不可→結果として市外局番も通常変わる」。"},{"id":"T010","cat":"T","diff":2,"q":"フレッツ光から光コラボへ転用・事業者変更した際のひかり電話オプションの扱いとして正しいのはどれか？","choices":["ひかり電話は自動解約されるため、新たに申し込みが必要（規定上の運用と判断する取扱）","変更先コラボが同じオプションを提供している場合は自動で変更先との契約に切り替わる","ひかり電話はNTT東西との直接契約のため、光コラボ変更時も変わらずNTT東西との契約が継続する","オプションは全て一旦解約され、変更先での新規申込が必要になる（規定上の運用と判断する取扱）"],"ans":1,"exp":"転用・事業者変更時、ひかり電話オプションは変更先コラボが同じオプションを提供していれば自動で切り替わる。変更先が提供しない場合はNTT東西との直接契約に切り替わり継続。コラボ独自サービス（独自メール等）のみ別途解約・再申込が必要。"},{"id":"T011","cat":"T","diff":2,"q":"光回線移行時に加入権「休止」にした後、何年間申し出がなければ約款上解約扱いになるか？","choices":["5年間","10年間","15年間","20年間"],"ans":1,"exp":"NTT加入電話の加入権（施設設置負担金）は、光回線移行時に「休止」扱いにできる。休止から10年間申し出がない場合は約款上解約扱いとなる（NTTからの事前通知なし）。加入権と番ポの可否は独立した概念のため、番ポの可否には直接影響しない。"},{"id":"T012","cat":"T","diff":2,"q":"ひかり電話専用番号（NTT加入電話発番でない番号）のアナログ戻し可否として正しいのはどれか？","choices":["同一MA内であればアナログ戻しが可能（同一エリア内の特例措置と判断する運用）","アナログ戻し不可。NTT加入電話・INSネット発番の番号のみアナログ戻し可能","双方向LNP対応事業者経由なら例外的にアナログ戻しが可能（規定の特例運用と判断）","光コラボ事業者の判断によって可否が異なる（事業者ごとの個別運用と判断する）"],"ans":1,"exp":"アナログ戻しが可能な番号はNTT加入電話・INSネットで最初に発番された番号のみ。ひかり電話専用番号・auひかり電話・NURO光でんわ等の独自回線発番の番号はアナログ戻し不可。NTT西日本公式でも明確に不可と案内している。"},{"id":"T013","cat":"T","diff":2,"q":"光コラボの事業者変更前に「NTT東西への情報開示承諾」が必要となるサービスとして正しいのはどれか？","choices":["インターネット接続のみ利用中の場合（オプションが何も付帯していない単独契約のケース）","ひかり電話を契約している場合（他にリモートサポート・フレッツTV伝送・出張修理オプション）","andlineTVを契約している場合（自動引き継ぎ対象だがNTTへの個別承諾が必要）","v6プラスを利用中の場合（IPoE接続中はNTTへの個別承諾が必要となるケース）"],"ans":1,"exp":"事業者変更前に情報開示承諾が必要なサービスはひかり電話・リモートサポートサービス・フレッツ・テレビ伝送サービス・出張修理オプション。各サービスごとにNTT東西への個別の情報開示承諾手続きが必要。"},{"id":"T014","cat":"T","diff":2,"q":"J:COM PHONEの双方向LNP対応について正しいのはどれか？","choices":["J:COMは双方向LNP対応18社に含まれていないため番ポ不可（規定上の運用と判断する取扱）","KDDIと技術接続しているためKDDI経由で双方向LNP対応済み（2025年1月14日から）","CATVサービスは双方向LNPの対象外のため番ポ不可（規定上の運用と判断する取り扱い）","J:COMは独自の番号管理システムを使うため双方向LNP未対応（規定上の運用と判断する）"],"ans":1,"exp":"J:COMは双方向LNP対応18社に直接含まれていないが、KDDIの回線を利用しているためKDDI経由で2025年1月14日から双方向LNP対応済み。「J:COMは18社外だから不可」という案内は誤り。"},{"id":"T015","cat":"T","diff":2,"q":"andline電話（andline光SEの電話サービス）の正確な提供形態として正しいのはどれか？","choices":["andline（アイキューブ・マーケティング）が独自開発したIP電話サービス","NTT東西のひかり電話をOEM提供として提供するサービス","KDDIのauひかり電話をベースにしたOEMサービス","総務省認可の第二種電気通信事業として独立提供するIP電話"],"ans":1,"exp":"andline電話はNTT東西のひかり電話をOEM提供として提供するサービス。フレッツ光から転用時はひかり電話が自動的にandline電話として引き継がれる。発番はNTT東西による0AB-J番号。"},{"id":"T016","cat":"T","diff":2,"q":"SoftBank Airやドコモhome 5Gなど「ホームルーター電話」で発番した番号のアナログ戻し可否として正しいのはどれか？","choices":["ホームルーター事業者が双方向LNP対応18社のため、アナログ戻しが可能","他社光回線への番号持ち出しは可能だが、NTT加入電話へのアナログ戻しは不可","同一MAのNTT加入電話であればアナログ戻しが可能","ホームルーター電話発番の番号はいかなる場合も番ポ不可"],"ans":1,"exp":"ホームルーター電話（SoftBank Air「おうちのでんわ」、ドコモhome 5G「homeでんわ」等）での発番はNTT加入電話発番ではないため、アナログ戻し（NTT加入電話への番ポ）は不可。他社光回線への番号持ち出しは双方向LNPで可能。"},{"id":"T017","cat":"T","diff":2,"q":"INSネット（ISDN）からの移行相談に対する基本的な案内として正しいのはどれか？","choices":["INSネットは2028年まで継続するため急いで移行する必要はない","原則としてアナログ戻し経由でひかり電話（光電話）への移行を案内する","INSネットからの番ポはMA跨ぎ規制の適用外のため自由に移行できる","INSネットはIP電話への移行のみ対応しており、ひかり電話への移行は不可"],"ans":1,"exp":"INSネット（ISDN）からの移行は、原則としてアナログ戻し（NTT加入電話に一旦移行）を経由してひかり電話（光電話）へ移行する対応を案内する。INSネット発番の番号はNTT加入電話・INSネット発番のためアナログ戻し可能。"},{"id":"T018","cat":"T","diff":2,"q":"2024年11月NTT東西が発表した双方向LNP対応事業者の数として正しいのはどれか？","choices":["12社","15社","18社","24社"],"ans":2,"exp":"2024年11月にNTT東西が公式発表した双方向LNP対応事業者は18社。NTTドコモビジネス・NTT東西・KDDI・ソフトバンク・楽天モバイル・オプテージ・中部テレコミュニケーション（ctc）等が含まれる。"},{"id":"T019","cat":"T","diff":3,"q":"「同じ市外局番0428なのに番ポできない」というケースの正しい理由はどれか？","choices":["0428エリアは特殊な番号区画のため双方向LNPの対象外とされている","MA（番号区画）が異なるため番ポ不可。市外局番が同じでもMAが別の場合がある","市外局番が変わらないケースは番ポ可能のはずで、案内が誤っている","同じ市外局番内でも事業者が異なる場合は双方向LNP対応18社の確認が優先される"],"ans":1,"exp":"青梅（0428）と福生（0428）は同じ市外局番0428でもMAが異なるため番ポ不可。「市外局番が変わるから不可」という因果関係は逆。正しくは「MAを跨ぐから番ポ不可→市外局番も通常変わる」。同一市外局番≠同一MA。"},{"id":"T020","cat":"T","diff":3,"q":"番ポ可否を判断する実務フローの「Step2」の内容として正しいのはどれか？","choices":["移転先事業者が双方向LNP対応18社かどうかの確認（規定上のStep2の運用扱い）","アナログ戻し可否の判定（NTT加入電話への番ポを希望する場合のみ実施）","事務ステータスの確認（未払い・名義不一致・解約済み等）の運用上のチェック項目","MA（番号区画）跨ぎかどうかの確認（規定上のStep2の運用扱いと判断）"],"ans":1,"exp":"番ポ可否フローはStep1：MA判定（跨ぎなら即終了）、Step2：アナログ戻し可否判定（NTT加入電話への番ポ希望時のみ）、Step3：移転先事業者のLNP対応確認、Step4：事務ステータス確認。Step2はNTT加入電話へ戻したい場合のみ実施。"},{"id":"T021","cat":"T","diff":3,"q":"auひかり電話の双方向LNP対応について正しいのはどれか？","choices":["auひかりは独自回線のため双方向LNPの適用外で番ポ不可","KDDIが双方向LNP対応18社の一つのため、auひかり電話も双方向LNP対応","auひかり電話はアナログ回線発番のためNTT加入電話へのアナログ戻しが可能","auひかり電話への番ポは可能だが、auひかり電話からの番ポは不可"],"ans":1,"exp":"KDDIが双方向LNP対応18社の一員のため、auひかり電話も双方向LNPに対応している。ただしauひかり電話はKDDI発番のため、NTT加入電話へのアナログ戻しは不可。auひかり電話への持ち込み・持ち出しはどちらも可能。"},{"id":"T022","cat":"T","diff":3,"q":"名義が故人（相続前）のまま番ポを申し込んだ場合の対応として正しいのはどれか？","choices":["双方向LNP対応事業者間であれば名義不一致でも番ポが可能","実務上手続き不可。番ポ前に名義変更（または承継手続き）が必要","戸籍謄本を提出すれば名義不一致のまま番ポが認められる","番ポ後に名義変更をすればよいため、まず番ポを進める"],"ans":1,"exp":"名義不一致のまま番ポを申し込むことは実務上手続き不可。先に名義変更（承継）手続きを完了させる必要がある。死亡・相続時は承継手続き（手数料無料）が先。"},{"id":"T023","cat":"T","diff":3,"q":"電話契約者が死亡した場合の番ポ手順として正しいのはどれか？","choices":["相続人が申し込めば名義変更なしで番ポ手続きを進められる","先に名義変更（承継）手続きを完了させてから番ポを申し込む","番ポ手続きと名義変更を同時並行で進めることが推奨される","死亡した場合の番ポは制度上一切できないため番号変更が必要"],"ans":1,"exp":"死亡・相続時は、まず名義変更（承継）手続きを完了させてから番ポを申し込む。承継手数料は無料。名義変更なしに番ポは実務上不可。"},{"id":"T024","cat":"T","diff":3,"q":"光コラボの事業者変更時、旧事業者の「コラボ独自サービス」（独自メール・独自セキュリティ等）の扱いとして正しいのはどれか？","choices":["新しい光コラボ事業者が同等サービスを提供していれば自動で引き継がれる","コラボ独自サービスは自動引き継ぎされず、旧事業者での解約と新事業者での再申込が別途必要","コラボ独自サービスはNTT東西が管理するため事業者変更後も自動で継続する","事業者変更承諾番号を取得する際に自動解約されるため追加の手続きは不要"],"ans":1,"exp":"ひかり電話・フレッツTV等のNTT東西サービスは自動引き継ぎされるが、光コラボ事業者の独自サービス（独自メール・独自セキュリティ・独自ひかりTVなど）は自動では引き継がれない。旧事業者での解約手続きと新事業者での再申込が必要。"},{"id":"T025","cat":"T","diff":3,"q":"「青梅（0428）から福生（0428）に引越しした際に現在の電話番号を維持したい」という相談への正しい対応はどれか？","choices":["同じ市外局番0428内なので番ポ可能と案内する（規定上は同一番号での運用継続が可能と判断する取り扱い）","MA（番号区画）が異なるため番ポ不可。引越し先のMAで新番号を発番するしかないと案内する","双方向LNP対応事業者経由なら同一市外局番内のMA跨ぎは例外的に可能と案内する（規定上の運用）","市外局番が変わらない場合は番ポできるとはっきり伝える（規定上は同一エリア継続の運用と判断する）"],"ans":1,"exp":"青梅（0428）と福生（0428）は同じ市外局番0428を持つが、MAが異なるため番ポは不可。「市外局番が同じ＝同一MA」は誤り。MA跨ぎの番ポは例外なく不可のため、引越し先のMAで新番号の発番を案内する。"},{"id":"T026","cat":"T","diff":3,"q":"「NURO光でんわ」の電話サービス提供会社として正しいのはどれか？","choices":["NTT東西（ひかり電話のOEM・規定上の運用扱い対象）","KDDI（auひかり電話のOEM・規定上の運用扱い対象）","ソニーネットワークコミュニケーションズ（NURO光の運営会社）","ソフトバンク（おうちのでんわのOEM・規定上の運用扱い対象）"],"ans":2,"exp":"NURO光でんわはNURO光の運営会社であるソニーネットワークコミュニケーションズが提供する。NURO光はKDDI・NTT東西とは別の独自インフラを持つため、光コラボ事業者変更制度は使えない。"},{"id":"T027","cat":"T","diff":3,"q":"双方向LNP対応18社の中に含まれる事業者として正しいのはどれか？","choices":["J:COM（ジェイコム）","オプテージ（eo光の運営会社）","NTTコミュニケーションズ（旧会社）","IIJmio（インターネットイニシアティブジャパン）"],"ans":1,"exp":"オプテージはeo光を運営する関西エリアの通信事業者で双方向LNP対応18社の一員。J:COMは18社に直接含まれないがKDDI経由で対応済み。NTTコミュニケーションズはNTTドコモビジネスに統合済みで独立した記載はない。"},{"id":"T028","cat":"T","diff":3,"q":"光回線の「初期契約解除（クーリングオフ）」を行う際の番ポ対応義務として正しいのはどれか？","choices":["初期契約解除の場合は番ポも同時にキャンセルされる（規定上は連動キャンセルの運用と判断する）","初期契約解除を申し出た場合、事業者に番ポ申込への対応義務があり並行して手続きできる","初期契約解除期間中は番ポの申し込みができない（規定上は手続き禁止期間の運用と判断する）","初期契約解除後は番号が一時的に失効するため新番号での再申込が必要（規定上の運用）"],"ans":1,"exp":"初期契約解除（8日以内）を申し出た場合でも、事業者には番ポ申込への対応義務がある。初期契約解除と番ポを並行して手続きできる。"},{"id":"T029","cat":"T","diff":4,"q":"「フレッツ光（ひかり電話あり）からauひかりへ乗り換える際に番号を維持したい」という相談への正しい対応はどれか？","choices":["フレッツ光はNTT系・auひかりはKDDI独自回線でインフラが異なるため番ポ不可と案内する（規定上の運用と判断する取扱）","ひかり電話番号からauひかり電話への番ポは可能。KDDIが対応18社のためワンストップで手続きできると案内する","事業者変更承諾番号を取得してauひかりに申し込めば番号を維持できると案内する（規定上の運用と判断する取り扱い）","同一MA内であれば番ポ可能だが別MAの場合は不可と確認してから案内する（規定上の運用と判断する取り扱い上のルール）"],"ans":1,"exp":"インフラが異なっても番ポは可能。KDDIは双方向LNP対応18社のためauひかり電話への番ポはワンストップで手続きできる。「インフラが異なるから不可」は誤り。なお事業者変更承諾番号はフレッツ光→auひかりには使えない（auひかりは独自回線）。"},{"id":"T030","cat":"T","diff":4,"q":"「コミュファ光の電話サービスからandline電話への乗り換えで番号を維持したい」という相談への正しい対応はどれか？","choices":["コミュファ光はCATVではなくNTT東西系光コラボのため事業者変更承諾番号で対応可能と案内する","ctc（中部テレコミュニケーション）は双方向LNP対応18社の一つのため、番ポは可能と案内する","コミュファ光はKDDI系の独自回線のため番ポ不可と案内する（規定上の運用と判断する取り扱い）","コミュファ光電話はNTT発番ではないためアナログ戻しで対応すると案内する（規定上の運用と判断）"],"ans":1,"exp":"コミュファ光の運営会社である中部テレコミュニケーション（ctc）は双方向LNP対応18社の一員。コミュファ光電話からandline電話（ひかり電話）への番ポは可能。"},{"id":"T031","cat":"T","diff":4,"q":"「ひかり電話専用番号（NTT加入電話発番でない番号）をNTT加入電話に戻したい」という相談への正しい対応はどれか？","choices":["同一MA内ならアナログ戻しが可能（NTT発番でなくても問題なし）と案内する（運用ルール上の取り扱い）","ひかり電話専用番号はNTT加入電話発番ではないためアナログ戻し不可。番号変更を受け入れるか検討が必要と案内する","双方向LNP対応事業者経由なら例外的にアナログ戻しが可能と案内する（運用ルール上の取り扱い）","休止中の加入権があれば番号を復活できる（NTT東西の特別措置）と案内する（運用ルール上の取り扱い）"],"ans":1,"exp":"アナログ戻しはNTT加入電話・INSネットで最初に発番された番号のみ可能。ひかり電話専用番号（光回線へ移行後に新規発番された番号）はアナログ戻し不可。番号変更の受け入れか、現状維持（ひかり電話・他社電話サービスの継続）かを検討するよう案内する。"},{"id":"T032","cat":"T","diff":4,"q":"「NTT加入電話を光回線移行時に10年以上休止のままにしていた。加入権を復活させたい」という相談への正しい対応はどれか？","choices":["休止期間に関わらず、加入権は申請すればいつでも復活できる（規定上の特例措置の運用と判断する取り扱い）","休止から10年以上経過している場合は約款上解約扱いとなっており、番号の復活は原則不可と案内する","10年を超えていても手数料を支払えば復活できる特例制度がある（規定上の特例措置の運用と判断する取り扱い）","加入権の復活はNTTドコモへ申請すれば対応可能（規定上はNTTドコモの管轄運用と判断する取り扱い）"],"ans":1,"exp":"NTT加入電話の加入権は休止から10年間申し出がない場合、約款上は解約扱いとなる（NTTからの事前通知なし）。10年超過後は原則として番号復活は不可。116への問い合わせを勧めつつ、復活が難しい旨を丁寧に伝える。"},{"id":"T033","cat":"T","diff":4,"q":"「SoftBank光（おうちのでんわあり）からフレッツ光に乗り換える際に番号を維持したい」という相談への正しい対応はどれか？","choices":["SoftBank光は光コラボのため事業者変更承諾番号でフレッツ光に番号ごと移行できる","ソフトバンクは双方向LNP対応18社のため、おうちのでんわからひかり電話への番ポが可能と案内する","SoftBank光のおうちのでんわはソフトバンク発番のためアナログ戻し不可と案内する","おうちのでんわの番号は0AB-J番号でないため番ポ対象外と案内する"],"ans":1,"exp":"ソフトバンクは双方向LNP対応18社の一員。おうちのでんわからひかり電話への番ポは可能（ワンストップ方式）。なおSoftBank光→フレッツ光への乗り換えは事業者変更承諾番号で可能だが、おうちのでんわからの番ポはLNPで別途手続きが必要。"},{"id":"T034","cat":"T","diff":4,"q":"「ひかり電話・フレッツTV伝送・リモートサポート・出張修理オプションを全部使っている」お客様の事業者変更前に案内すべき手続きとして正しいのはどれか？","choices":["ひかり電話1サービスのみ情報開示承諾が必要で、他のサービスは不要（規定上は1サービスのみの運用と判断する取り扱い上のルール）","ひかり電話・リモートサポート・フレッツTV伝送・出張修理オプションの各サービスごとに個別のNTT東西への情報開示承諾が必要と案内する","4サービス分をまとめて一括で情報開示承諾できる手続きがあると案内する（規定上の特例措置の運用と判断する取り扱い上のルール）","情報開示承諾は不要で事業者変更承諾番号取得のみで対応できると案内する（規定上の簡易運用と判断する取り扱い上のルール）"],"ans":1,"exp":"情報開示承諾はひかり電話・リモートサポートサービス・フレッツ・テレビ伝送サービス・出張修理オプションの各サービスごとに個別にNTT東西への手続きが必要。一括申請はできないため、該当する全サービスについて個別に承諾手続きをするよう案内する。"},{"id":"T035","cat":"T","diff":4,"q":"「現在使っている050番号をandline電話に番ポしたい」という相談への正しい対応はどれか？","choices":["050番号も0AB-J番号同様に双方向LNPの対象のため番ポ可能と案内する","050番号は双方向LNPの対象外のため番ポ不可。0AB-J番号の新規発番での契約となる","050番号のまま光回線に乗り換えれば自動的に0AB-J番号に変換される","050番号は総務省の審査を経れば例外的にアナログ戻し相当の手続きが可能"],"ans":1,"exp":"双方向LNPの対象は0AB-J番号（03・06等）のみで、050番号（IP電話番号）は対象外。050番号をandline電話に番ポすることはできない。andline電話を使いたい場合は0AB-J番号を新規発番して契約することになる。"},{"id":"T037","cat":"T","diff":5,"q":"「NTT加入電話→フレッツ光（ひかり電話）→事業者変更→andline電話という経緯の番号をNTT加入電話に戻したい（アナログ戻し）」という相談への正しい対応はどれか？","choices":["ひかり電話専用番号に変わっているためアナログ戻し不可と案内する","NTT加入電話発番の番号のため、現在ひかり電話であってもアナログ戻し可能と案内する","事業者変更の経緯があるためNTT東西に確認が必要と案内する","同一MA内であることを確認してからアナログ戻し可否を判断すると案内する"],"ans":1,"exp":"アナログ戻しの可否はその番号が最初にどこで発番されたかで決まる。NTT加入電話発番の番号は、現在ひかり電話・事業者変更後でもアナログ戻し可能。経路がNTT加入電話→ひかり電話→事業者変更→andline電話でも、発番元はNTT加入電話のためアナログ戻しが可能。"},{"id":"T038","cat":"T","diff":5,"q":"「auひかり電話（KDDI発番）からNTT加入電話に戻してから光コラボに移りたい」という相談への正しい対応はどれか？","choices":["auひかり電話はKDDI発番のためアナログ戻し不可。番号変更の上でNTT加入電話を新規契約するか、そのまま別の光回線の電話サービスへ番ポするかを提案する","KDDIが双方向LNP対応18社なのでauひかり電話からNTT加入電話へのアナログ戻しが可能と案内する（規定上の特例運用と判断する取り扱い）","auひかり電話は独自回線のため一旦解約してフレッツ光を新規契約すればNTT発番番号が取得できると案内する（規定上の特例運用と判断する取扱）","同一MAであればauひかり電話からNTT加入電話へのアナログ戻しが例外的に可能と案内する（規定上の特例運用と判断する取り扱い上の特例ルール）"],"ans":0,"exp":"auひかり電話はKDDI発番のためNTT加入電話へのアナログ戻しは不可。「KDDIが18社だから戻せる」は誤り。選択肢は①番号変更の上でNTT加入電話を新規契約して光コラボへ転用、②そのまま双方向LNPで別の光回線電話サービスへ番ポ、のいずれか。"},{"id":"T039","cat":"T","diff":5,"q":"「別MA（番号区画）へ引越しした先でも今の電話番号を使いたい」という相談への正しい対応はどれか？","choices":["引越し後3か月以内に申請すれば別MA引越し後でも番ポ可能な特例制度があると案内する","MA跨ぎのため番ポ不可。引越し先のMAで新番号を発番するしかないと丁寧に案内する","双方向LNP対応18社経由なら別MA引越し後でも番ポが認められる場合があると案内する","工事費を追加で負担すれば例外的にMA跨ぎの番ポが認められることがあると案内する"],"ans":1,"exp":"MA（番号区画）跨ぎの番ポは例外なく不可。引越し先のMAで新しい電話番号を発番するしかない旨を丁寧に案内する。「同一市外局番だから可能」も誤り（市外局番が同じでもMAが異なる場合がある）。"},{"id":"T040","cat":"T","diff":5,"q":"「NTT加入電話発番・現在ひかり電話・加入権休止15年・同一MA・andline電話への番ポを希望」という相談への正しい対応はどれか？","choices":["加入権が約款上解約扱いになっているため、番ポの前に加入権を復活させる必要があると案内する","番ポ自体は可能。加入権は約款上すでに解約扱いだが番ポの可否には直接影響しないと案内する","加入権休止15年を超えているためNTT発番番号としての資格を失い、アナログ戻し・番ポいずれも不可と案内する","同一MAなので番ポは可能だが加入権の扱いについては116への問い合わせが必要と案内する"],"ans":1,"exp":"番ポの可否と加入権の状態は独立した概念。加入権が約款上解約扱いになっていても、番号の発番がNTT加入電話であれば番ポは可能。同一MAで双方向LNP対応事業者への番ポのため問題なし。加入権については「休止15年=約款上解約」と説明しつつも番ポには影響しない旨を案内する。"},{"id":"H006","cat":"H","diff":3,"q":"SoftBank Airで「おうちのでんわ」として発番した番号を持つお客様が、フレッツ光に乗り換えてひかり電話でも同じ番号を使いたいと希望。正しい案内はどれか？","choices":["SoftBank Airはソフトバンク独自回線のため番ポ不可と案内する（規定により番号維持の手段なしと判断する運用上の取り扱い）","ソフトバンクは双方向LNP対応18社のため番ポは可能。ただしSoftBank Air発番のためNTT加入電話へのアナログ戻しは不可と案内する","同一MAであればSoftBank Air発番でもNTT加入電話へのアナログ戻しが可能と案内する（規定の運用上の特例措置と判断）","おうちのでんわは050番号のため双方向LNPの対象外と案内する（IP電話扱いの特殊規定による運用の判断と取り扱い・規定上）"],"ans":1,"exp":"ソフトバンクは双方向LNP対応18社の一員のため、おうちのでんわからひかり電話への番ポはワンストップで可能。ただしSoftBank Air発番の番号はNTT加入電話発番ではないためアナログ戻し不可。"},{"id":"H007","cat":"H","diff":4,"q":"「NTT加入電話発番・光回線移行で加入権休止8年・現在事業者変更手続き中（承諾番号取得済み）・andline電話への番ポ希望」のお客様への正しい案内はどれか？","choices":["加入権休止8年は10年未満のため、一旦アナログ戻しをしてからandline電話に番ポする手順が必要（規定上の運用上の取り扱いとして判断する）","番ポは可能。加入権は休止8年でまだ有効。事業者変更と並行して番ポの申し込みができる。加入権が休止10年に近づいている場合は意思表示の確認も案内するとよい","事業者変更手続き中は番ポの申し込みができないため、事業者変更完了後に改めて申し込む必要がある（規定上の運用上の取り扱いと判断する）","加入権休止8年以上は事実上解約扱いとなりNTT発番資格を失うため番ポ不可（規定上の運用上の取り扱いと判断する取り扱い上のルール）"],"ans":1,"exp":"番ポは可能。NTT加入電話発番の番号で同一MA内かつ双方向LNP対応事業者へのため問題なし。加入権は休止8年で10年未満のためまだ有効。残り2年を切る場合は加入権の意思表示（継続か解約か）を案内するとよい。事業者変更中でも番ポは並行して申し込める。"},{"id":"H008","cat":"H","diff":4,"q":"「青梅市（0428）から同じ0428エリアの福生市への引越し後にandline光SEとandline電話を申し込みたい。番号は今の番号のままにしたい」というお客様への正しい案内はどれか？","choices":["市外局番0428で統一されているため番ポ可能と案内する（同一番号での運用継続が可能と判断する規定上の取り扱い）","0428は同一エリアだが青梅MAと福生MAは異なるため番ポ不可。引越し先のMAで新番号を発番する必要があると案内する","引越し後3か月以内に申請すれば同一市外局番内のMA跨ぎは例外的に可能と案内する（規定上の特例措置と判断する運用）","andline電話はひかり電話OEMのためNTT発番番号ならMA跨ぎでも対応可能と案内する（規定上の特例措置）"],"ans":1,"exp":"青梅（0428）と福生（0428）は同じ市外局番でもMAが異なるため番ポ不可。「市外局番が同じ＝番ポ可能」は誤り。MA（番号区画）跨ぎは例外なく番ポ不可のため、引越し先のMAで新番号を発番する必要がある。"},{"id":"H009","cat":"H","diff":5,"q":"「NTT加入電話→INSネット64（ISDN）→andline光SEを新規導入→ひかり電話で今の番号を維持したい」という経緯のお客様への正しい案内はどれか？","choices":["INSネット発番の番号はアナログ戻し不可のため番ポできない（規定によりNTT発番扱いから除外と判断する運用）","INSネット発番の番号はNTT加入電話・INSネット発番扱いのためアナログ戻し可能。andline電話への番ポが可能と案内する","INSネット64は2024年8月に販売終了しているため番号の有効性を確認してから判断する運用と回答する（規定）","NTT加入電話→INSネットの経緯があるため現在の発番元確認がNTT東西への問い合わせが必要となる運用（規定）"],"ans":1,"exp":"INSネット（ISDN）はNTT東西が提供するサービスであり、INSネット発番の番号はNTT加入電話・INSネット発番として扱われるためアナログ戻し可能。andline電話への番ポも可能。INSネットが2024年8月に販売終了していることと番号の可否は別問題。"},{"id":"H010","cat":"H","diff":5,"q":"「NTT加入電話発番・フレッツ光でひかり電話中・同一MAで引越し済み・加入権休止12年・NTT加入電話（アナログ戻し）に戻したい」という相談への正しい対応はどれか？","choices":["加入権休止12年は10年超えのため約款上解約扱いとなり、アナログ戻しも番ポも不可と案内する（番号は失効・規定により権利が消滅と判断する運用）","アナログ戻し自体は可能（NTT発番・同一MA）。ただし加入権は休止12年で約款上解約扱いのため、加入権なしの新規契約（施設設置負担金を再度支払う形）となることを案内する","同一MA内なので加入権の状態に関係なくアナログ戻しが可能と案内する（NTT発番の権利が永続的に保護される・規定による特例措置と判断する運用）","アナログ戻しはNTT発番かつ同一MAのため可能。加入権も12年の休止があっても自動復活する（NTT東西の特別措置・規定による特例措置と判断する運用）"],"ans":1,"exp":"アナログ戻し可否はNTT発番かつ同一MAが条件→両方満たすため可能。ただし加入権（施設設置負担金）は休止12年で約款上解約扱い。番号のアナログ戻し自体は可能だが、加入権なしの新規契約として施設設置負担金の再支払いが必要になることを案内する。"},{"id":"H011","cat":"H","diff":3,"q":"NURO光でんわ（ソニーネットワークコミュニケーションズ発番）からフレッツ光のひかり電話へ番号を維持して乗り換えたい。正しい案内はどれか？","choices":["NURO光でんわはソニーネットワークコミュニケーションズ発番のためアナログ戻し不可だが、双方向LNPでひかり電話への番ポは可能","NURO光は独自回線のためどのような番ポも一切不可と案内する（規定上は番号維持の手段なしと判断する運用上の取り扱い）","NURO光でんわはNTT東西OEMサービスのためNTT加入電話への戻しも可能と案内する（規定上は特例措置の運用と判断する）","同一MAであればNURO光でんわからNTT加入電話へアナログ戻し相当の番ポが可能（規定上の運用上の特例措置と判断する取り扱い）"],"ans":0,"exp":"NURO光でんわはソニーネットワークコミュニケーションズ発番のためアナログ戻し（NTT加入電話へ）は不可。ただしソニーネットワークコミュニケーションズも双方向LNP対応事業者と技術接続しているため、ひかり電話への番ポはワンストップで可能。"},{"id":"H012","cat":"H","diff":4,"q":"「NTT加入電話（発番・休止なし現在も有効）→同一MAでandline光SEへ転用→andline電話を追加申し込み予定→NTT加入電話は解約せずに維持したい」という相談への正しい対応はどれか？","choices":["転用するとNTT加入電話は自動解約されるため、電話番号の維持には番ポが必要と案内する（規定上は転用と同時に自動失効と判断する運用上の取り扱い上の特例ルール）","転用はインターネット契約（回線）のみの変更のため、NTT加入電話は別途解約しない限り並行して継続できる。ただしandline電話も追加すると2つの電話番号が発番された状態になる","NTT加入電話とandline電話は同一番号で共存できるため、そのままandline電話を申し込めばよい（規定上は番号統合扱いとなる運用上の取り扱い）と判断する","転用後はNTT東西との直接契約が全て終了するためNTT加入電話も自動解約される（規定上は自動失効する運用となる規定上の取り扱いと判断する取り扱い上の特例ルール）"],"ans":1,"exp":"転用（フレッツ光→光コラボ）はインターネット回線部分の変更のみ。NTT加入電話は別契約のため、解約しない限り維持可能。ただしandline電話（ひかり電話）を追加申し込みすると別の番号が発番されるため、2つの固定電話番号を持つことになる。"},{"id":"H013","cat":"H","diff":4,"q":"「NTT加入電話発番・ひかり電話継続中・事業者変更で別の光コラボに移行直後（事業者変更完了済み）・今度はandline電話への番ポを希望」という相談への正しい対応はどれか？","choices":["事業者変更直後は一定期間番ポができないクーリング期間があるため、3か月後に申し込むよう案内する","NTT加入電話発番で同一MAであれば事業者変更直後でも番ポの申し込みは可能と案内する","事業者変更と番ポは同時に手続きできないため、まずandline光SEの申し込みを先に行うよう案内する","事業者変更後は発番元が変わるためアナログ戻し・番ポいずれも確認が必要と案内する"],"ans":1,"exp":"事業者変更後でも番号の発番元（NTT加入電話）は変わらないため番ポは可能。事業者変更直後のクーリング期間という制度は存在しない。同一MA・NTT発番・双方向LNP対応事業者であれば即時申し込み可能。"},{"id":"H014","cat":"H","diff":5,"q":"「NTT加入電話発番・光回線移行で加入権休止3年・別MAへ引越し・ひかり電話継続中・現在のひかり電話番号のままNTT加入電話に戻したい（アナログ戻し希望）」という相談への正しい対応はどれか？","choices":["加入権休止3年なので有効。同一MA内の引越しであればアナログ戻し可能と案内する","MA跨ぎで引越ししているためアナログ戻し不可。引越し先のMAで新たにNTT加入電話を新規契約するしかないと案内する","NTT発番かつ加入権休止3年以内のため、MA跨ぎでも例外的にアナログ戻しが可能と案内する","アナログ戻し可否はMA跨ぎとは関係ないため、NTT発番であれば問題なく対応できると案内する"],"ans":1,"exp":"アナログ戻し（NTT加入電話への番ポ）もMA跨ぎは不可。NTT発番・加入権有効という条件を満たしていても、別MAへの引越しがあるためアナログ戻しは不可。引越し先のMAでNTT加入電話を新規契約するしかない旨を案内する。"}];

const RETRY_QI=7;           // 学習リトライ発動位置（0始まり=8問目）

let state={};

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}

// v29: 出題プールを構築する。フルセット/シングルセット共通。
// 全問題を「カテゴリ別×難易度別」でインデックス化して返す。
// 出題の都度、PRに応じて動的に1問選ぶ方式に変更。
function buildQuiz(mode){
  const byCatDiff={};
  CAT_KEYS.forEach(c=>{byCatDiff[c]={};});
  QB.forEach(q=>{
    if(!byCatDiff[q.cat])byCatDiff[q.cat]={};
    if(!byCatDiff[q.cat][q.diff])byCatDiff[q.cat][q.diff]=[];
    byCatDiff[q.cat][q.diff].push(q);
  });
  // 各カテゴリ×難易度の中身をシャッフル
  for(const c in byCatDiff){
    for(const d in byCatDiff[c]){
      byCatDiff[c][d]=shuffle(byCatDiff[c][d]);
    }
  }
  return {byCatDiff:byCatDiff,usedIds:new Set()};
}

// v30: PRに応じて1問選ぶアダプティブ選択ロジック
// cfg: コース設定（STD または SC[mode]）
function pickByPR(byCatDiff,pr,cfg,usedIds,catUsage,forceCat,forceDiffBoost){
  const sc=cfg;
  // target_diff: PRを丸めて整数化（+強制ブースト分）
  let targetDiff=Math.round(pr)+(forceDiffBoost||0);
  // 動的上限：dynamicCeilのコースはPRに応じて上限を伸ばす（最大★7）
  const dynMax=sc.dynamicCeil?Math.min(PR_MAX,Math.max(sc.diffMaxBase,Math.round(pr)+1)):sc.diffMaxBase;
  // 候補難易度のレンジ：target±1、ただしコースの下限〜動的上限内
  let preferLo=Math.max(sc.diffMin,targetDiff-1);
  let preferHi=Math.min(dynMax,targetDiff+1);
  if(preferLo>preferHi){preferLo=preferHi=Math.max(sc.diffMin,Math.min(dynMax,targetDiff));}

  // 出題対象のカテゴリ（forceCatがあればそれだけ）
  const catList=forceCat?[forceCat]:sc.cats;

  // カテゴリの優先順位：出題回数が少ない順にシャッフル
  const sortedCats=shuffle([...catList]).sort((a,b)=>{
    const ua=catUsage[a]||0;
    const ub=catUsage[b]||0;
    return ua-ub;
  });

  // 第1段階：希望難易度レンジ内で候補カテゴリを順に探す
  for(const cat of sortedCats){
    if(!byCatDiff[cat])continue;
    // 希望難易度を target に近い順に並べる
    const diffOrder=[];
    for(let d=preferLo;d<=preferHi;d++)diffOrder.push(d);
    diffOrder.sort((a,b)=>Math.abs(a-targetDiff)-Math.abs(b-targetDiff));
    for(const d of diffOrder){
      const pool=byCatDiff[cat][d];
      if(!pool||pool.length===0)continue;
      for(const q of pool){
        if(!usedIds.has(q.id))return q;
      }
    }
  }

  // 第2段階：セット内のカテゴリで、セット範囲全体（diffMin〜dynMax）に拡張
  for(const cat of sortedCats){
    if(!byCatDiff[cat])continue;
    const diffOrder=[];
    for(let d=sc.diffMin;d<=dynMax;d++)diffOrder.push(d);
    diffOrder.sort((a,b)=>Math.abs(a-targetDiff)-Math.abs(b-targetDiff));
    for(const d of diffOrder){
      const pool=byCatDiff[cat][d];
      if(!pool||pool.length===0)continue;
      for(const q of pool){
        if(!usedIds.has(q.id))return q;
      }
    }
  }

  // 第3段階：最終フォールバック。セット範囲外も含む全カテゴリから探す（全問出尽くした場合等）
  for(const cat of CAT_KEYS){
    if(!byCatDiff[cat])continue;
    for(let d=1;d<=PR_MAX;d++){
      const pool=byCatDiff[cat][d];
      if(!pool||pool.length===0)continue;
      for(const q of pool){
        if(!usedIds.has(q.id))return q;
      }
    }
  }
  return null;
}

// v29: PR変動計算
function updatePR(pr,qDiff,correct){
  if(correct){
    const delta=PR_GAIN_BASE*Math.max(PR_GAIN_MIN,qDiff-pr+1);
    return Math.min(PR_MAX,pr+delta);
  } else {
    const delta=PR_LOSS_BASE*Math.max(PR_LOSS_MIN,pr-qDiff+1);
    return Math.max(PR_MIN,pr-delta);
  }
}

// v30: 次に出題する1問を準備（state.questions[state.current]に格納）
function prepareNextQuestion(){
  const qi=state.current;
  const cfg=getCfg(state.mode);

  // 学習リトライ判定：終盤(RETRY_QI問目)でかつ間違えたカテゴリがある場合
  let forceCat=null;
  if(qi===RETRY_QI&&state.wrongCats.length>0&&Math.random()<RETRY_PROBABILITY){
    forceCat=state.wrongCats[Math.floor(Math.random()*state.wrongCats.length)];
  }

  // 5連続正解時の強制★アップ
  const forceDiffBoost=(state.consecCorrect>=5)?1:0;

  const q=pickByPR(state.byCatDiff,state.pr,cfg,state.usedIds,state.catUsage,forceCat,forceDiffBoost);
  if(!q)return null;

  state.usedIds.add(q.id);
  state.catUsage[q.cat]=(state.catUsage[q.cat]||0)+1;
  return q;
}

function startQuiz(mode){
  const built=buildQuiz(mode);
  state={
    mode,
    byCatDiff:built.byCatDiff,
    usedIds:built.usedIds,
    questions:[],          // 出題済み問題の履歴（renderQ時に参照）
    current:0,score:0,
    pr:PR_INIT,            // プレイヤーレート
    consecCorrect:0,       // 連続正解数
    wrongStreak:0,         // 連続不正解数（クールダウン判定用）
    catUsage:{},           // カテゴリ別出題回数（偏り回避用・10問通し）
    wrongCats:[],          // 間違えたカテゴリのリスト（学習リトライ用）
    diagAnswers:[],        // 初期診断（最初3問）の正誤履歴
    answered:false,
    log:[],
    skipped:new Set()
  };
  // TOPボタン：誤タップ進捗消失を防ぐため確認ダイアログ必須
  const topBtn=document.getElementById('btn-top');
  topBtn.onclick=function(){
    if(confirm('TOP画面に戻ると、いまの進捗は失われます。よろしいですか？')){restartQuiz();}
  };
  // 最初の1問を準備
  const q=prepareNextQuestion();
  if(!q){alert('問題プールが空です');return;}
  state.questions.push(q);
  showScreen('quiz');renderQ();
}

function restartQuiz(){_stopAllVid();_streakFireOn=false;_streak=0;showScreen('title');}
function showScreen(n){['title','quiz','cooldown','finale','review'].forEach(s=>document.getElementById('screen-'+s).classList.add('hidden'));document.getElementById('screen-'+n).classList.remove('hidden');}

function renderStars(diff){
  const oni=diff>=6||state.mode===4;const max=oni?7:5;const d=Math.min(diff,max);
  return '<span style="color:#f59e0b">'+'★'.repeat(d)+'</span><span style="color:#374151">'+'☆'.repeat(max-d)+'</span>';
}

function renderQ(){
  const qi=state.current;
  if(qi>=state.questions.length){showFinale();return;}
  const q=state.questions[qi];
  // バッジ：標準コースは難易度ティア、難易度別コースはコース名
  let bdg;
  if(state.mode===-1){bdg=tierBadge(q.diff);}
  else{const sc=SC[state.mode];bdg={text:sc.badge,cls:sc.cls};}
  document.getElementById('set-badge').textContent=bdg.text;
  document.getElementById('set-badge').className='set-badge '+bdg.cls;
  document.getElementById('score-cur').textContent=state.score*10;
  document.getElementById('score-total').textContent=100;
  document.getElementById('progress-fill').style.width=(qi/TOTAL_QUESTIONS*100)+'%';
  document.getElementById('q-num').textContent='Q'+(qi+1)+' / '+TOTAL_QUESTIONS;
  document.getElementById('diff-stars').innerHTML=renderStars(q.diff);
  document.getElementById('cat-tag').textContent=CN[q.cat]||q.cat;
  document.getElementById('q-text').textContent=q.q;

  const shuffledIdxs=shuffle([0,1,2,3]);
  const el=document.getElementById('choices');el.innerHTML='';
  const lb=['Ａ','Ｂ','Ｃ','Ｄ'];
  shuffledIdxs.forEach((origIdx,dispPos)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.setAttribute('data-label',lb[dispPos]);
    btn.setAttribute('data-orig',origIdx);
    btn.type='button';
    btn.textContent=q.choices[origIdx];
    btn.addEventListener('click',()=>selectAns(origIdx),{passive:false});
    el.appendChild(btn);
  });

  const logEntry=state.log.find(l=>l.qi===qi);
  if(logEntry){
    showAnswered(logEntry.userAns,logEntry.correct,q,true);
  } else {
    document.getElementById('feedback').classList.remove('show');
    document.getElementById('btn-next').classList.remove('show');
    state.answered=false;
  }

  const backBtn=document.getElementById('btn-back');
  const newBack=backBtn.cloneNode(true);backBtn.parentNode.replaceChild(newBack,backBtn);
  if(qi>0){newBack.style.visibility='visible';newBack.addEventListener('click',()=>goBack(),{passive:false})}
  else{newBack.style.visibility='hidden'}

  const skipBtn=document.getElementById('btn-skip');
  const newSkip=skipBtn.cloneNode(true);skipBtn.parentNode.replaceChild(newSkip,skipBtn);
  if(!logEntry){
    newSkip.style.visibility='visible';
    newSkip.addEventListener('click',()=>skipQ(),{passive:false});
  } else {
    newSkip.style.visibility='hidden';
  }
}

function showAnswered(userAns,correct,q,readonly){
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(btn=>{
    btn.disabled=true;
    const origIdx=parseInt(btn.getAttribute('data-orig'));
    if(origIdx===q.ans)btn.classList.add(correct?'correct':'show-correct');
    if(origIdx===userAns&&!correct)btn.classList.add('wrong');
  });
  const fb=document.getElementById('feedback');
  const fbH=document.getElementById('fb-header');
  fb.classList.add('show');
  if(correct){fbH.className='feedback-header ok';fbH.innerHTML='✅ 正解！'}
  else{fbH.className='feedback-header ng';fbH.innerHTML='❌ 不正解　正解：「'+q.choices[q.ans]+'」'}
  document.getElementById('fb-exp').textContent=q.exp;

  const bn=document.getElementById('btn-next');
  bn.classList.add('show');
  const newBn=bn.cloneNode(true);bn.parentNode.replaceChild(newBn,bn);
  newBn.classList.add('show');
  if(readonly){
    newBn.addEventListener('click',()=>nextQ(),{passive:false});
  } else {
    newBn.addEventListener('click',state.wrongStreak>=3?()=>showCooldown():()=>nextQ(),{passive:false});
  }
  document.getElementById('btn-skip').style.visibility='hidden';
}

function selectAns(origIdx){
  if(state.answered)return;
  state.answered=true;
  const qi=state.current;
  const q=state.questions[qi];
  const correct=q.ans===origIdx;

  // PR更新
  state.pr=updatePR(state.pr,q.diff,correct);

  if(correct){
    state.score++;
    state.wrongStreak=0;
    state.consecCorrect++;
    // 連続正解ボーナス
    if(state.consecCorrect===3){state.pr=Math.min(PR_MAX,state.pr+STREAK3_BONUS);}
    else if(state.consecCorrect===5){state.pr=Math.min(PR_MAX,state.pr+STREAK5_BONUS);}
    _playCorrectEffect();
    _streakCorrect();
  } else {
    state.wrongStreak++;
    state.consecCorrect=0;
    // 連続不正解ペナルティ
    if(state.wrongStreak===3){state.pr=Math.max(PR_MIN,state.pr-STREAK3_PENALTY);}
    else if(state.wrongStreak===5){state.pr=Math.max(PR_MIN,state.pr-STREAK5_PENALTY);}
    // 間違えたカテゴリを記録（学習リトライ用）
    if(!state.wrongCats.includes(q.cat)){state.wrongCats.push(q.cat);}
    _playWrongEffect();
    _streakReset();
  }

  // 初期診断（標準コースの最初3問のみ）
  if(state.mode===-1&&qi<DIAG_QUESTIONS){
    state.diagAnswers.push(correct);
    if(state.diagAnswers.length===DIAG_QUESTIONS){
      const correctCount=state.diagAnswers.filter(x=>x).length;
      const diagPRs=[DIAG_PR_0,DIAG_PR_1,DIAG_PR_2,DIAG_PR_3];
      // 診断結果と現在のPRを平均化（突発的なゆらぎを抑えつつ診断を反映）
      const diagPR=diagPRs[correctCount];
      state.pr=(state.pr+diagPR)/2;
    }
  }

  state.log=state.log.filter(l=>l.qi!==qi);
  state.log.push({qi,qObj:q,userAns:origIdx,correct});
  showAnswered(origIdx,correct,q,false);
}

function nextQ(){
  _stopWrongEffect();
  state.current++;

  // 全10問終了判定
  if(state.current>=TOTAL_QUESTIONS){showFinale();return;}

  // 既に出題済みの位置に戻った場合（goBack→nextQ）は既存問題を再表示
  if(state.questions[state.current]){
    renderQ();
    return;
  }

  // 次の問題を準備
  const q=prepareNextQuestion();
  if(!q){showFinale();return;}
  state.questions[state.current]=q;
  renderQ();
}

function skipQ(){
  state.skipped.add(state.current);
  state.current++;
  if(state.current>=TOTAL_QUESTIONS){showFinale();return;}
  // 既に出題済みなら再表示
  if(state.questions[state.current]){renderQ();return;}
  // スキップ時も次の問題を準備
  const q=prepareNextQuestion();
  if(!q){showFinale();return;}
  state.questions[state.current]=q;
  renderQ();
}

function goBack(){
  if(state.current>0){state.current--;state.answered=true;renderQ();}
}

function showCooldown(){
  state.wrongStreak=0;
  showScreen('cooldown');
  const btn=document.getElementById('btn-cooldown-continue');
  const newBtn=btn.cloneNode(true);btn.parentNode.replaceChild(newBtn,btn);
  newBtn.addEventListener('click',()=>{
    showScreen('quiz');
    // v29: クールダウン明けは現在の問題が解答済みなので、次の問題に進む
    nextQ();
  },{passive:false});
}

function showReview(){
  showScreen('review');
  const correct=state.log.filter(l=>l.correct).length;
  document.getElementById('review-stats').textContent=correct+' / '+TOTAL_QUESTIONS+'問正解（'+correct*10+'点 / 100点）';
  const list=document.getElementById('review-list');list.innerHTML='';
  state.questions.forEach((q,qi)=>{
    const log=state.log.find(l=>l.qi===qi);
    const skipped=state.skipped.has(qi);
    const div=document.createElement('div');
    const isCorrect=log&&log.correct;
    div.className='review-item '+(skipped?'':'')+(isCorrect?'correct-item':log?'wrong-item':'');
    let badge='';
    if(skipped)badge='<span class="review-badge" style="background:#1c2538;color:#94a3b8;border:1px solid #2a3550">スキップ</span>';
    else if(!log)badge='<span class="review-badge" style="background:#1c2538;color:#94a3b8;border:1px solid #2a3550">未回答</span>';
    else if(isCorrect)badge='<span class="review-badge ok">正解 ✅</span>';
    else badge='<span class="review-badge ng">不正解 ❌</span>';
    const choicesHtml=q.choices.map((c,i)=>{
      let cls='review-choice';
      if(i===q.ans)cls+=' correct';
      else if(log&&log.userAns===i&&!log.correct)cls+=' wrong';
      const mark=i===q.ans?'✅ ':'';
      return '<div class="'+cls+'">'+mark+c+'</div>';
    }).join('');
    div.innerHTML='<div class="review-q-num">Q'+(qi+1)+' '+badge+'</div>'
      +'<div class="review-q-text">'+q.q+'</div>'
      +'<div class="review-choices">'+choicesHtml+'</div>'
      +'<div class="review-exp">'+q.exp+'</div>';
    list.appendChild(div);
  });
}

const _vidC=document.getElementById('vid-confetti');
const _vidR=document.getElementById('vid-rain');
const _vidF=document.getElementById('vid-fire');
_vidC.style.opacity='0.70';
_vidR.style.opacity='0.30';
_vidF.style.opacity='0.50';

let _vidUnlocked=false;
document.addEventListener('touchstart',()=>{
  if(_vidUnlocked)return;
  _vidUnlocked=true;
  [_vidC,_vidR,_vidF].forEach(v=>{
    v.style.display='block';v.style.visibility='hidden';v.load();
    v.play().then(()=>{v.pause();v.currentTime=0;v.style.display='none';v.style.visibility='';}).catch(()=>{v.style.display='none';v.style.visibility='';});
  });
},{once:true,passive:true});

function _stopVid(v){v.pause();v.classList.remove('active');v.currentTime=0;v.style.display='none';}
function _playVid(v,fromStart){v.style.display='block';v.classList.add('active');if(fromStart!==false){v.currentTime=0;}const p=v.play();if(p&&p.catch)p.catch(()=>{});}
function _stopAllVid(){_stopVid(_vidC);_stopVid(_vidR);_stopVid(_vidF);}

let _confettiTimer=null;
function _playCorrectEffect(){
  _stopVid(_vidR);_stopVid(_vidC);_playVid(_vidC);
  if(_confettiTimer)clearTimeout(_confettiTimer);
  _confettiTimer=setTimeout(()=>{_stopVid(_vidC);if(_streakFireOn){_playVid(_vidF);}},4000);
}
function _playWrongEffect(){
  _stopVid(_vidC);_stopVid(_vidF);_playVid(_vidR);
  document.body.classList.add('shaking');
  setTimeout(()=>document.body.classList.remove('shaking'),500);
}
function _stopWrongEffect(){_stopVid(_vidR);}

let _streak=0;let _streakFireOn=false;let _streakPopTimer=null;
function _streakCorrect(){
  _streak++;state.correctStreak=_streak;
  if(_streak>=3){
    _streakFireOn=true;
    if(_vidF.paused||_vidF.style.display==='none'||!_vidF.classList.contains('active')){_playVid(_vidF);}
    _showStreakPopup(_streak);
  }
}
function _streakReset(){
  _streak=0;state.correctStreak=0;
  if(_streakFireOn){_streakFireOn=false;_stopVid(_vidF);}
  const p=document.getElementById('streak-popup');
  if(_streakPopTimer)clearTimeout(_streakPopTimer);
  p.classList.remove('show');
}
function _showStreakPopup(n){
  const p=document.getElementById('streak-popup');
  document.getElementById('streak-fires').textContent='🔥🔥🔥';
  document.getElementById('streak-text').textContent=n+'連続正解！';
  if(_streakPopTimer)clearTimeout(_streakPopTimer);
  p.classList.remove('show');void p.offsetWidth;p.classList.add('show');
  _streakPopTimer=setTimeout(()=>{p.classList.remove('show');},1500);
}
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible'&&_streakFireOn){
    setTimeout(()=>{_playVid(_vidF,false);},300);
  }
});
function _playFinaleEffect(pts){
  _stopAllVid();
  if(pts>=92){_playVid(_vidF);}
  else if(pts<=51){_playVid(_vidR);}
}
function _stopFinaleEffect(){_stopAllVid();}
</script>
<script>
(function(){
  var cv=document.getElementById('bgnet');if(!cv)return;
  var ctx=cv.getContext('2d'),W=0,H=0,dpr=Math.min(window.devicePixelRatio||1,2),pts=[],on=false;
  function hx(h){h=(h||'').trim().replace('#','');if(h.length===3)h=h.split('').map(function(c){return c+c}).join('');var n=parseInt(h||'60a5fa',16);return[(n>>16)&255,(n>>8)&255,n&255];}
  var rgb=hx(getComputedStyle(document.documentElement).getPropertyValue('--accent2')||'#60a5fa'),RGB=rgb.join(',');
  function rnd(a,b){return a+Math.random()*(b-a);}
  function build(){pts=[];var n=Math.max(38,Math.min(64,Math.round(W*H/13000)));for(var i=0;i<n;i++)pts.push({x:rnd(0,W),y:rnd(0,H),vx:rnd(-0.12,0.12),vy:rnd(-0.12,0.12)});}
  function size(){var r=cv.getBoundingClientRect();W=Math.round(r.width)||window.innerWidth;H=Math.round(r.height)||window.innerHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);build();}
  function draw(){ctx.clearRect(0,0,W,H);var i,j;
    for(i=0;i<pts.length;i++){var p=pts[i];p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
    var D=130;
    for(i=0;i<pts.length;i++)for(j=i+1;j<pts.length;j++){var a=pts[i],b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);if(d<D){ctx.strokeStyle='rgba('+RGB+','+(1-d/D)*0.18+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    for(i=0;i<pts.length;i++){ctx.fillStyle='rgba('+RGB+',0.55)';ctx.beginPath();ctx.arc(pts[i].x,pts[i].y,1.5,0,6.28);ctx.fill();}
  }
  function topShown(){var s=document.getElementById('screen-title'),pw=document.getElementById('pw-screen');var pwOn=pw&&pw.style.display!=='none'&&pw.offsetParent!==null;return s&&!s.classList.contains('hidden')&&s.offsetParent!==null&&!pwOn;}
  function tick(){
    if(topShown()){if(!on){on=true;cv.style.opacity='1';size();}draw();}
    else if(on){on=false;cv.style.opacity='0';ctx.clearRect(0,0,W,H);}
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize',function(){if(on)size();});
  size();tick();
})();
</script>
