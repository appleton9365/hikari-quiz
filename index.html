アプリを使い複数回計測して平均を取る方法","有線LANケーブル（CAT5e以上）でPCをルーターに直接接続した状態でスピードテストを行う。","スピードテストは回線が空いている深夜0時以降に実施しないと正確な値が得られない","複数のスピードテストサービスで同時計測し最も高い値を実効速度として採用する方法"],"ans":1,"exp":"正確な光回線の速度測定には有線LAN（イーサネット）接続でPCをルーターに直結した状態でのスピードテストが必要。Wi-Fi接続では無線区間の速度・電波環境がボトルネックとなり、光回線本来の速度が測れない。測定サービスはfast.com・speedtest.net等が一般的。"},{"id":"C046","cat":"C","diff":2,"q":"光回線の「開通前確認」でお客様に確認すべき最重要事項として正しいのはどれか？","choices":["お客様の年収と職業（与信審査のため申告書類で本人確認する運用ルール）","現在の回線種別と、ひかり電話・テレビサービスの有無、宅内の光コンセントの有無","お客様のスマートフォンの機種と契約キャリアの組み合わせ詳細を確認","使用しているWi-Fiルーターのメーカー名・購入時期および型番を確認"],"ans":1,"exp":"開通前確認で最初に確認すべきは①現在の回線種別（転用・事業者変更・新規工事のどれか判断）②ひかり電話の有無（転用時に自動引き継ぎ対象）③テレビサービスの有無（andlineTV転用対象）④宅内に光コンセントがあるか（無派遣工事の可否判断）。これらで手続きの流れが決まる。"},{"id":"C047","cat":"C","diff":2,"q":"光回線の「開通工事の所要時間」として一般的なのはどれか？","choices":["概ね1〜2時間（配線の引き込みや機器設置を含む）","工事日当日は終日立会いが必要で省略不可（規定）","半日（4〜6時間）かかる（建物状況問わず一律）","10〜20分程度（NTTが宅外で簡易対応のみ実施）"],"ans":0,"exp":"光回線の派遣工事（新規引き込み・機器設置）の所要時間は概ね1〜2時間。建物の状況・工事内容によって変動するが、多くの場合は2時間以内に完了する。無派遣工事（無立ち会い）の場合は工事員が来ないためお客様の作業は郵送されたONUの接続のみ。"},{"id":"C048","cat":"C","diff":3,"q":"「光回線の工事後にインターネットに繋がらない」場合のトラブルシューティング手順として正しいのはどれか？","choices":["すぐに新しいWi-Fiルーターを購入して交換することで解決できる（規定上の運用と判断する取り扱い）","一度解約して再申し込みをすれば工事がやり直されて接続できるようになる（規定上の運用と判断する取扱）","まずプロバイダのサポートに電話して遠隔操作で設定を一括修正してもらう（規定上の運用と判断する取扱）","ONUのPONランプ確認→LAN接続確認→接続方式確認→PPPoEならID/パスワード設定確認の順"],"ans":3,"exp":"工事後の不通トラブルの切り分け手順は①ONUのPONランプが点灯しているか確認②ONUとルーターのLAN接続を確認③PPPoE接続ならルーターへのID/パスワード設定を確認④IPv6サービス（IPoE）接続ならルーターの自動設定を待つ（数分かかる場合がある）。これで解決しなければプロバイダ・NTT東西に問い合わせ。"},{"id":"C049","cat":"C","diff":3,"q":"「光回線の転用・事業者変更で無派遣工事になった場合」にお客様が自分で行うことはどれか？","choices":["宅内の光コンセントから外壁までの光ファイバーを自分で引き込む作業","ルーターの管理画面を開いてIPv6接続のIDとパスワードを手動で入力する","郵送されてきたONUを宅内の光コンセントに差し込み電源を入れる（セルフ取り付け）。","NTT東西のサポートセンターに電話して工事完了を自分で報告する"],"ans":2,"exp":"無派遣工事では工事員が来ないため、お客様が郵送されたONUを光コンセントに差し込み電源を入れることでセルフ開通する。光信号の接続はNTT東西の設備側で処理される。PPPoE接続の場合はさらにルーターへのID/パスワード設定が必要だが、IPv6サービス（IPoE）の場合は設定不要。"},{"id":"C050","cat":"C","diff":3,"q":"2年縛りのある光コラボで「契約更新月以外」に解約した場合について正しいのはどれか？","choices":["解約金は発生しない（2年縛りでも例外的に無料となる）","解約金は月額料金の1年分が一括請求される（高額違約金）","契約更新月以外の解約では規定の解約金が発生する","解約金はNTT東西が徴収する（光コラボ事業者ではない）"],"ans":2,"exp":"2年縛りのある光コラボ（ドコモ光・SoftBank光等）では2年ごとの更新月以外に解約すると解約金が発生する。andline光SEは2年縛りなし・解約金なしが特徴。お客様が現在2年縛りの光コラボ利用中なら更新月の確認が重要。"},{"id":"C051","cat":"C","diff":3,"q":"「光回線の乗り換え時に旧サービスの解約を忘れた」場合の影響として正しいのはどれか？","choices":["旧サービスの月額料金が引き続き請求され続ける二重払い状態になる","旧サービスは解約忘れを検知するとNTT東西が自動停止するため実害は生じない","旧サービスの自動解約は乗り換え完了の3か月後に行われるため短期間の重複は無害","旧サービスは新サービスの開通日に自動的に回線が物理切断されるため課金も自動停止する"],"ans":0,"exp":"光コラボへの転用・事業者変更時に旧サービス（旧プロバイダや旧光コラボ）の解約を忘れると二重払いになる。特に多いのはフレッツ光（NTT直販）から光コラボに転用した際に旧プロバイダへの解約連絡を忘れるケース。andline光SEの重要事項説明でも「旧プロバイダとの契約は自動解約されない」と明記している。"},{"id":"C052","cat":"C","diff":2,"q":"「光回線の申し込みから開通まで」の一般的な期間として正しいのはどれか？","choices":["工事費を割増で支払えばどんな場合でも翌営業日開通が保証される（規定上の運用と判断する取り扱い）","転用・事業者変更（無派遣）で数日〜2週間程度、新規工事（派遣）で1〜3週間程度かかるのが一般的。","どの申し込み方法でも必ず申し込み当日に開通手続きが完了する（規定上の運用と判断する取り扱い）","繁忙期・閑散期を問わず全国一律で常に3か月かかるのが標準的な期間（規定上の運用と判断する取扱）"],"ans":1,"exp":"光回線の申し込みから開通までの期間は、転用・事業者変更（無派遣工事）で数日〜2週間、新規工事（派遣工事）で1〜3週間が一般的。引っ越しシーズン（3〜4月）等の繁忙期は工事混雑で1か月以上かかることもある。余裕を持ったスケジュールでの申し込みを案内することが重要。"},{"id":"C053","cat":"C","diff":3,"q":"「光回線の解約後に同じ住所で再申し込み」した場合の工事について正しいのはどれか？","choices":["解約後の再申し込みはNTT東西の規定によりすべて新規の派遣工事が必須とされており、過去に使用した光コンセントがあってもセルフ開通は認められない","同一住所・同一アクセスラインの再申し込みでは残置配線が使える場合があり、無派遣工事（光コンセント流用）で開通できるケースがある。ただし設備状況次第","解約直後（翌日以降）に同一住所で再申し込みすれば工事は全額免除されており、24時間以内の再申し込みに限りいつでも工事なしで開通できる","解約後6か月以内の再申し込みであれば設備の状態にかかわらず必ず無派遣工事（セルフ開通）が適用されるとNTT東西の内部規定で定められている"],"ans":1,"exp":"同一住所での再申し込み時に光コンセントや過去の引き込み配線が残置されている場合は、無派遣工事（セルフ取り付け）で開通できる可能性がある。ただしNTT東西の設備状況によって異なり、残置配線がない場合や老朽化して使用不可の場合は派遣工事が必要になる。"},{"id":"C054","cat":"C","diff":4,"q":"「光コラボの事業者変更で開通が遅れる原因」として正しいのはどれか？","choices":["v6オプション競合やNTT東西の処理混雑・繁忙期の工事日程調整等が遅延の主な原因","光コラボ事業者が加入者の信用審査を行うため審査期間中は開通処理が自動的に停止される","NTT東西の設備が旧事業者から新事業者へ物理的に切り替わるまで最低30日の保留期間がある","繁忙期は光ファイバーケーブルの供給不足が発生するため新規工事分を優先する制度がある"],"ans":0,"exp":"事業者変更の遅延原因は①v6オプション競合（旧事業者の廃止処理が完了しないと新事業者の新設処理ができない）②NTT東西の処理混雑③繁忙期の工事スケジュール（特に3〜4月は1か月以上待つこともある）。これらがわかっていれば適切な開通予定の案内ができる。"},{"id":"C055","cat":"C","diff":4,"q":"「光回線の申し込みで必要な本人確認書類」として一般的に必要なのはどれか？","choices":["運転免許証・マイナンバーカード・健康保険証等の本人確認書類と支払い方法に応じた書類","住民票の写し（3か月以内）とNTT東西発行の回線登録番号通知書の2点が必須","本人確認書類に加えて過去6か月分の公共料金領収書と在籍確認書類が必要","マイナンバーカードのみが唯一の有効な本人確認書類として認められている"],"ans":0,"exp":"光回線の申し込みには本人確認書類（運転免許証・マイナンバーカード・健康保険証等）と支払い方法の確認書類（口座情報またはクレジットカード）が必要。andline光SEはオンライン申し込みで本人確認書類の画像アップロードが必要。法人契約の場合は登記簿謄本・印鑑証明等が追加で必要になる場合がある。"},{"id":"D041","cat":"D","diff":6,"q":"「IPv6のグローバルユニキャストアドレス」の特徴として正しいのはどれか？","choices":["192.168.x.xや10.x.x.xと同等のプライベートアドレス空間で、IPv6においてもNATを使ってLAN内のみで使用するアドレス","fe80::で始まるリンクローカルアドレスのことで、同一セグメント内の機器同士が自動的に割り当てて通信に使用するアドレス","IPv4のNATと同等の機能を持ち、複数のプライベートIPv6アドレスを1つのグローバルアドレスに変換するためのアドレス","2001:やfc00:等で始まるインターネット上で一意のアドレスで、IPoE接続時に端末に割り当てられてインターネット通信に使われる"],"ans":3,"exp":"IPv6グローバルユニキャストアドレスはインターネット上で一意のアドレス（2001:db8::等で始まる）。IPoE接続時に端末に割り当てられ、IPv6対応のWebサイト・サービスへの直接接続に使われる。fe80::で始まるリンクローカルアドレスはLAN内のみで有効でインターネットには到達しない。"},{"id":"D042","cat":"D","diff":4,"q":"「IPv6サービス（IPv4 over IPv6（IPv6サービス））」を使っているかどうかを確認する方法として正しいのはどれか？","choices":["スピードテストを実施して測定速度が1Gbps以上であればIPv6サービス使用中と判断できる","契約プロバイダのマイページにログインして接続状況でIPv6使用中と表示されるか確認する","https://test-ipv6.com/等のIPv6テストサイトでIPv6アドレスが付与されているか確認する。","接続中のWi-Fiルーターの電源ランプが青色点灯していればIPv6接続中を意味する"],"ans":2,"exp":"IPv6サービス（IPoE）の使用確認には「https://test-ipv6.com/」等のIPv6テストサイトが最も手軽。サイトにアクセスするとIPv6で接続できているかどうかが表示される。またWindowsのコマンドプロンプトで「ipconfig」を実行してグローバルIPv6アドレス（2001:等で始まる）が割り当てられていれば使用中。"},{"id":"D043","cat":"D","diff":3,"q":"「固定IPアドレス（光回線の法人向けオプション等）」が必要なユースケースとして正しいのはどれか？","choices":["4K・8K動画のストリーミング視聴や大容量コンテンツの高速ダウンロードなど、大量データの受信が必要な用途","自宅のIoT家電や防犯カメラをスマートフォンから外出先でリモート操作・監視するための用途","通常のWebブラウジング・オンライン会議・動画視聴など一般家庭で発生する大半のインターネット通信","外部からVPNで固定IPアドレスへの接続や、外部公開サーバーのDNS登録が必要な用途"],"ans":3,"exp":"固定IPアドレスが必要なユースケースは①VPNサーバーの運用（社員がリモートから固定IPにVPN接続）②Webサーバー・メールサーバー等のIPアドレスをDNSに登録③外部からの固定IPによるアクセス制御等。通常のWebブラウジング・動画視聴等は発信側（アウトバウンド）通信のため固定IPは不要。"},{"id":"D044","cat":"D","diff":6,"q":"「OCNバーチャルコネクトのMAP-E方式」がv6プラス（MAP-E）と実装が異なる点として正しいのはどれか？","choices":["どちらもMAP-E方式だがIPアドレス・ポート割り当てルール等の実装細部が異なるため、v6プラス対応のみでOCNバーチャルコネクト非対応のルーターが存在する","OCNバーチャルコネクトはDS-Lite方式を採用しており、MAP-E方式のv6プラスとは接続方式が根本的に異なる","どちらも同一の規格に完全準拠しているため、v6プラス対応ルーターはすべてOCNバーチャルコネクトにも対応している","OCNバーチャルコネクトはIPv4 over IPv6ではなくIPv6ネイティブのみ対応であり、v6プラスとは利用できるIPバージョンが異なる"],"ans":0,"exp":"OCNバーチャルコネクトとv6プラスはどちらもMAP-E方式だが、IPアドレス・ポート番号の割り当てルール（BRアドレス・CEIDRなど）が異なる独自実装。そのためルーターはOCNバーチャルコネクトとv6プラスのそれぞれに個別対応している必要があり、v6プラス対応のみでOCNバーチャルコネクト非対応のルーターが存在する。"},{"id":"D045","cat":"D","diff":5,"q":"「DS-Lite方式（transix/クロスパス等）でポート開放できない問題」への実務的な対処法として正しいのはどれか？","choices":["固定IPオプション変更・PPPoE動的IP追加・VPNサービス利用など用途に応じた解決策を選ぶ","DS-Lite環境ではルーターの設定を変更することでVNE側のNAT制限を回避しポート開放が可能になる","DS-Lite環境のポート開放はONUの再起動とルーターのファームウェア更新を行うことで解消される","DS-Lite環境ではIPv6のポートを代わりに開放することでIPv4ポート開放と同等の効果が得られる"],"ans":0,"exp":"DS-Lite方式はVNE側でNAT処理するためポート開放が不可。対処法は①固定IPオプション（IPIP方式）への変更で専用グローバルIPを取得②PPPoE動的IP追加オプションでポート開放が必要な用途のみPPPoE経由③SynologyのQuickConnect等クラウド中継を使うサービスへの移行など。用途と費用を天秤にかけて提案する。"},{"id":"D046","cat":"D","diff":3,"q":"「光回線の上り（アップロード）速度と下り（ダウンロード）速度」の関係として正しいのはどれか？","choices":["フレッツ光系は非対称（下り最大1Gbps・上り200Mbps等）。","光回線は光ファイバーを上下で共用するため上りと下りは常に同じ対称速度になる","光回線はアップロード優先設計のため上り速度が下りより必ず速くなる仕様になっている","上り・下り速度は混雑状況に応じてプロバイダが毎月調整するため月ごとに変動する"],"ans":0,"exp":"フレッツ光系（光コラボ含む）の多くは下り最大1Gbpsに対して上り最大200Mbps（ファミリー・ギガラインプラン等）という非対称構成。一方auひかりの一部プランや独自回線系は上下対称（1Gbps/1Gbps）。上り速度が重要なライブ配信・大容量アップロード等の用途では上り速度を確認することが重要。"},{"id":"D047","cat":"D","diff":5,"q":"「IPv6サービス（IPoE）接続中にVPN（L2TP/IPSec等）が繋がらない」場合の原因として正しいのはどれか？","choices":["MAP-E・DS-Lite環境ではIPv4のポートが制限・共有されており、VPNに使うポートが利用できない場合がある。","VPN接続ができない場合はルーターのファームウェアが古いことが主因のため、最新ファームに更新するだけで大半のケースで解決する","IPv6サービス（IPoE）はOSI参照モデルのL3以上のプロトコルに非対応のため、VPN通信はハードウェア的に利用不可だ","IPv6サービスはTCPのHTTPS（ポート443）通信にのみ最適化されており、UDPベースのVPN通信は技術的に使えない"],"ans":0,"exp":"MAP-E・DS-Lite環境ではIPv4のポートが複数ユーザーで共有・制限されているため、VPNで使うUDP500（IKE）・UDP4500（NAT-T）等のポートが割り当てられていない場合に接続できなくなる。解決策は①固定IPオプション（IPIP方式）でポート制限を解除②PPPoE動的IP追加オプションでVPN通信をPPPoE経由にする③SSL-VPN（HTTPS/TCP443）に切り替える等。"},{"id":"D048","cat":"D","diff":5,"q":"「IPoEのIPv6サービス接続でDNSが機能しない（ドメイン名でアクセスできない）」場合の原因として正しいのはどれか？","choices":["VNEまたはプロバイダのDNSサーバー（IPv6）が正しく設定されていない可能性がある","IPoE環境ではDNSがIPv4のみに対応するため、IPv6で名前解決するには専用ソフトが必要","DNSの不具合はONUの故障を示しており、ONUの交換をNTTに依頼する必要がある","IPoE環境ではDHCPによるDNS自動配布はなく、常に手動でDNSを設定する仕様になっている"],"ans":0,"exp":"IPoE（IPv6）環境ではDHCPv6またはRA（Router Advertisement）でDNSサーバーのIPv6アドレスが自動配布される。ルーターがこの自動設定を正しく受け取れていない場合にDNS障害が発生する。ルーターの管理画面でIPv6のDNS設定を確認するか、手動でGoogle（2001:4860:4860::8888等）やCloudflare（2606:4700:4700::1111等）のIPv6 DNSを設定する。"},{"id":"D049","cat":"D","diff":5,"q":"「IPv4 over IPv6（IPv6サービス）が有効になっているのにIPv4専用サイトに繋がらない」場合の確認事項として正しいのはどれか？","choices":["ルーターのIPv4 over IPv6（IPv6サービス）設定が正しく動作しているか確認する","ONUの再起動を行い物理的な回線リセットをかけることがIPv4専用サイト接続の最初の対処法","端末のDNSキャッシュをクリアする。IPv4 over IPv6が有効な環境では古いDNSキャッシュが接続を妨げる","プロバイダのIPv4サービスが一時停止されていないかマイページで契約状態を確認する"],"ans":0,"exp":"IPv4 over IPv6（IPv6サービス）が有効でもIPv4サイトに繋がらない場合、ルーターのVNE接続設定に問題がある可能性が高い。ルーター管理画面でVNEへの接続状態（「v6プラス接続中」等の表示）を確認。接続できていなければ①ルーターが使用するVNEサービスに対応しているか②ルーターとONUの接続を確認③ONU・ルーターの再起動を試みる。"},{"id":"D050","cat":"D","diff":5,"q":"「MAP-Eの固定IPオプション（v6プラス固定IP等）」と「通常のMAP-E（共有IP）」の最大の違いとして正しいのはどれか？","choices":["固定IPオプションではIPIPトンネリング方式に切り替わり専用グローバルIPv4アドレスが1つ割り当てられるため、全ポートが使用可能になりポート開放制限がなくなる","固定IPオプションではIPv6グローバルアドレスのみが固定になる仕組みで、IPv4アドレスは引き続き複数ユーザーで共有されポート制限も維持される","固定IPオプションに申し込むとMAP-EからDS-Lite方式へ自動的に切り替わり、VNE事業者のサーバー側で専用IPv4アドレスが割り当てられて固定IPが実現される","固定IPオプションを適用すると接続パケットがVNEの優先ルーティングキューで処理されるため通信の優先度が上がり実効速度が通常と比べて2倍以上に改善される"],"ans":0,"exp":"通常のMAP-E（共有IP）では複数ユーザーでIPv4アドレスを共有しポート番号が制限される。固定IPオプション（v6プラス固定IP・クロスパス固定IP等）ではIPIPトンネリング方式に切り替わり、専用のグローバルIPv4アドレスが1つ割り当てられる。ポート制限がなくなるためVPN・ゲームサーバー・NAS外部公開等が可能になる。"},{"id":"A041","cat":"A","diff":1,"q":"「光回線のインターネット接続」において「プロバイダ（ISP）」が担当する役割として正しいのはどれか？","choices":["NTT東西のアクセスラインとインターネットを繋ぎ、DNS・メール等のサービスを提供する","光ファイバーを電柱から建物まで引き込む開通工事の手配と施工を担当する役割","スマートフォンの基地局通信を管理しモバイルデータ通信を提供する役割","Wi-Fiルーターの販売・レンタルと初期設定のサポートを行う役割"],"ans":0,"exp":"プロバイダ（ISP）はNTT東西のアクセスライン（光ファイバー）とインターネットを繋ぐゲートウェイを運営し、IPアドレスの割り当て・DNSサーバー・メールサーバー等を提供する。光コラボではこの役割を光コラボ事業者が一括して担う。"},{"id":"A042","cat":"A","diff":2,"q":"「光回線の速度が夜間に遅くなる」問題を根本的に解決する手段として最も効果的なのはどれか？","choices":["プロバイダを上位プランにアップグレードして帯域保証オプションを追加契約する","PPPoE接続からIPv4 over IPv6（IPv6サービス）接続に切り替える","光回線を1Gbpsから10Gbpsの上位プランに変更して物理的な帯域を拡張する","毎晩決まった時間にルーターを自動再起動するスケジュール設定を有効にする"],"ans":1,"exp":"夜間の速度低下はPPPoE接続での網終端装置（NTE）の混雑が主因。IPv4 over IPv6（IPv6サービス）に切り替えると網終端装置を迂回するためこの問題を根本解決できる。10Gbpsプランに変更しても接続方式がPPPoEのままでは夜間の混雑問題は残る。"},{"id":"A043","cat":"A","diff":2,"q":"「光回線のONUとルーターの違い」として正しいのはどれか？","choices":["ONUはNTT東西から貸与されてプロバイダが保守管理し障害時はプロバイダが翌営業日以内に交換対応、ルーターはNTT東西が設置して直接管理する","ONUとルーターは物理的に一体化された同一機器で、宅内工事時に設置されるHGWと呼ばれる複合機器の名称がメーカーによって異なるだけである","ONUは光信号をデジタル信号に変換する回線終端装置。ルーターはLAN内の複数端末をインターネットに接続し、NAT・DHCP・ファイアウォール機能を担う別の機器","ONUはWi-Fi電波を発射してスマートフォンや端末に無線接続を提供する無線親機で、ルーターは光信号をデジタルに変換する有線専用機器である"],"ans":2,"exp":"ONUは光ファイバーの光信号をデジタル信号に変換するだけの回線終端装置。責任分解点はONUまでで、ONU以降はお客様管理。ルーターはNAT（アドレス変換）・DHCP（IPアドレス自動割当）・ファイアウォール機能を担い、宅内の複数端末をインターネットに接続する機器。"},{"id":"A044","cat":"A","diff":2,"q":"光回線のメリットとして誤っているのはどれか？","choices":["光配線方式なら戸建てと同等の速度が出る場合がある","ADSLと比べて高速かつ距離による速度低下が少ない","光回線を契約すると固定IPアドレスが無料で付与される","電磁波干渉を受けにくく安定した通信が可能"],"ans":2,"exp":"固定IPアドレスは標準では付与されない（動的IP割り当て）。固定IPが必要な場合は別途有料オプションの申し込みが必要。その他の選択肢は正しい光回線のメリット。"},{"id":"A045","cat":"A","diff":3,"q":"「光コラボ事業者がNTT東西に支払う卸料金」について正しいのはどれか？","choices":["光コラボ事業者がNTT東西に支払う卸料金は電気通信事業法で厳密に非公開とされており、ユーザーの月額料金設定には法的に関与できない","光コラボ事業者はNTT法の競争促進条項により最初の5年間は無償で回線を利用できる特例制度が認められており、6年目以降から有償になる","NTT東西が全光コラボ事業者の売上を一元管理し、ユーザー数に応じた適正比率でインフラ整備コストを分担させる仕組みになっている","光コラボ事業者はNTT東西に卸電気通信役務の対価（回線の卸料金）を支払い、エンドユーザーにはその上に自社のサービス料金を乗せて提供する"],"ans":3,"exp":"光コラボのビジネスモデルは、NTT東西から回線を卸値で調達して（卸電気通信役務）、プロバイダ料込みでエンドユーザーに提供する仕組み。NTT法により卸提供義務があるため光コラボが成立している。"},{"id":"A046","cat":"A","diff":3,"q":"「光コラボの事業者変更手続き」でお客様が注意すべき「繁忙期」のリスクはどれか？","choices":["繁忙期は需要増加により月額料金が通常の1.5倍程度に値上がりすることがある","繁忙期はキャンペーンが集中するため事業者変更の工事費が期間限定で無料になる","繁忙期はNTT東西の受付システムが停止するため事業者変更の申し込み自体ができない","繁忙期は工事・切替の処理が混雑し、開通まで通常より長く（1か月以上）かかる場合がある"],"ans":3,"exp":"3〜4月の引越しシーズンは光回線の申し込みが集中し、NTT東西の処理やエ事のスケジュールが混雑する。通常2週間程度の事業者変更が1か月以上かかることもある。引越しに合わせた光回線の乗り換えは余裕を持ったスケジュールを組むことが重要。"},{"id":"A047","cat":"A","diff":3,"q":"フレッツ光のエリア確認について正しいのはどれか？","choices":["NTT東日本と西日本は隣接する都道府県で一部エリアが重複して提供されている","山間部・離島等ではエリア外になる場合があり、NTT東西の公式サイトで住所入力確認できる","エリア外の地域でも追加工事費を支払えばNTT東西が特例で必ず対応してくれる","フレッツ光は日本国内の全住所・全建物で例外なく利用可能なユニバーサルサービスである"],"ans":1,"exp":"フレッツ光はNTT東西の提供エリア内が対象。山間部・離島・一部農村地域ではエリア外になることがある。NTT東西の公式サイトで住所入力によるエリア確認が可能。NTT東西の担当エリアは重複しない。"},{"id":"A048","cat":"A","diff":3,"q":"「光コラボ事業者の問い合わせ窓口が一本化されるメリット」について正しいのはどれか？","choices":["光コラボ事業者の問い合わせ窓口は公式スマートフォンアプリ経由のAIチャットサポートのみとなっており、電話や対面での問い合わせにはすべての事業者が対応していない","フレッツ光（NTT直販）は回線トラブルはNTT東西、接続トラブルはプロバイダと窓口が分散するが、光コラボは回線・接続・機器等すべてを光コラボ事業者の1か所に問い合わせできる","光コラボへ乗り換えた後も回線設備の保守はNTT東西が担うため、回線トラブルについては引き続きNTT東西への直接問い合わせが必要になり、実質的に窓口が2か所に増える","光コラボ事業者はすべて総務省の電気通信サービス品質ガイドラインにより、ユーザー向けカスタマーサポートを24時間365日提供することが法律で義務付けられている"],"ans":1,"exp":"フレッツ光（NTT直販）の2社契約では、回線障害はNTT東西へ、接続設定はプロバイダへと問い合わせ先が分かれる。光コラボはandline光SEのカスタマーサポートなど1か所に集約されており、どのトラブルでも最初の連絡先が明確というメリットがある。"},{"id":"A049","cat":"A","diff":4,"q":"「光回線で固定グローバルIPアドレスを取得する主な方法」として正しいのはどれか？","choices":["プロバイダの固定IPオプション（有料）に申し込む、またはIPoE環境ではIPIPトンネリング方式の固定IPオプションを利用する","ルーターのDHCP設定でMACアドレスとIPアドレスを紐付けすれば外部からも固定IPとして扱われる","NTT東西のNGN網に優先接続申請を行うと担当者がIPv4アドレスを固定割り当てに変更してくれる","DDNS（ダイナミックDNS）サービスに登録するとドメイン名が固定されIPアドレスも自動的に固定化される"],"ans":0,"exp":"通常の光回線契約ではIPv4アドレスは動的割り当て（毎回変わる可能性がある）。固定IPが必要な場合はプロバイダの固定IPオプション（月額数百〜数千円）に申し込む。IPoE環境（MAP-E/DS-Lite）では通常の固定IPオプションはなく、IPIPトンネリング方式の固定IPサービス（v6プラス固定IP等）を利用する。IPv6のグローバルアドレスはプレフィックス委任で固定に近いが厳密な固定保証ではない。"},{"id":"A050","cat":"A","diff":3,"q":"「光回線とモバイルデータ通信（スマートフォンのテザリング等）の違い」として正しいのはどれか？","choices":["光回線は有線接続では安定した高速通信が可能でping値が低い","光回線は上り帯域が下りより広く確保されているため動画配信に最適化されている","モバイルデータ通信は5G対応エリアでは光回線と同等のping値と安定性が保証される","光回線はISP経由のため通信が暗号化されるがテザリングは平文で送受信される"],"ans":0,"exp":"光回線（特に有線LAN接続）はping値が低く（20〜40ms程度）安定した高速通信が可能。テザリング（スマートフォン経由の5G/4G）はping値が高め（50〜200ms）で電波状況・基地局の混雑に影響される。オンラインゲームや安定性重視の用途には光回線が適し、テザリングは外出先でのモバイル用途向け。"},{"id":"B081","cat":"B","diff":2,"q":"「WiMAX（UQ WiMAX）」は光回線と比較してどのような分類になるか？","choices":["光コラボの一種（NTT東西経由の再販モデル）","NTT東西が提供する独自サービスの一種となる","CATV系の独自回線（自前設備を利用する型）","固定回線ではなくモバイルブロードバンド回線。"],"ans":3,"exp":"WiMAX（UQ WiMAX）はKDDI系のモバイルブロードバンドサービス。WiMAX 2+や5Gの無線通信を使うため光回線とは根本的に異なる。自宅でホームルーターとして使うことも可能（工事不要）だが、光回線と比べてping値が高く安定性が劣る傾向がある。"},{"id":"B082","cat":"B","diff":2,"q":"「NURO光の提供会社」として正しいのはどれか？","choices":["KDDI","NTTドコモ","ソニーネットワークコミュニケーションズ株式会社","ソフトバンク株式会社"],"ans":2,"exp":"NURO光はソニーネットワークコミュニケーションズ株式会社（ソニーグループ）が提供する独自回線サービス。NTTのダークファイバーを使って独自の通信ネットワークを構築して提供している。標準で下り最大2Gbps。"},{"id":"B083","cat":"B","diff":2,"q":"「ドコモ光」の正式サービス名はどれか？","choices":["ドコモフレッツ光（フレッツ光ドコモ統合プラン）","ドコモ光（NTTドコモが提供する光コラボレーション）","フレッツ光コラボ ドコモプラン（NTT東西との連携契約）","NTTドコモ 光ファイバーサービス（FTTH直販コース）"],"ans":1,"exp":"「ドコモ光」がNTTドコモが提供する光コラボレーションサービスの正式サービス名。タイプA（月額安い・指定プロバイダ）、タイプB（月額高い・指定プロバイダ）、タイプC（CATV利用）、単独タイプの4種類がある。"},{"id":"B084","cat":"B","diff":2,"q":"「SoftBank光」の提供会社として正しいのはどれか？","choices":["ソフトバンク株式会社","ヤフー株式会社（Yahoo! Japan）","NTTドコモ","KDDI"],"ans":0,"exp":"SoftBank光はソフトバンク株式会社が提供する光コラボ。NTTフレッツ光を卸受けして回線とプロバイダをセットで提供する。IPv4 over IPv6（IPv6サービス）はBBIXのIPv6高速ハイブリッド（光BBユニット専用）を採用。"},{"id":"B085","cat":"B","diff":3,"q":"「光コラボを利用中のお客様がNURO光に乗り換えたい」場合の手続きとして正しいのはどれか？","choices":["光コラボの解約と同時にNURO光の新規申し込みを行い、宅内・屋外の工事（原則2回）を別途手配する","現在の光コラボから事業者変更承諾番号を取得してNURO光のサイトから工事なしで申し込める","光コラボからNURO光へはNTT東西の転用制度を使って物理工事なしで乗り換えることができる","NURO光はNTT東西の回線を使う光コラボなので事業者変更の手続きだけで切り替えられる"],"ans":0,"exp":"NURO光はNTTのダークファイバーを使う独自回線。光コラボ間の事業者変更制度は使えない。光コラボを解約してNURO光に新規申し込みを行い、宅内工事（NURO側業者）と屋外工事（NTT側業者）の原則2回の工事が必要。"},{"id":"B086","cat":"B","diff":3,"q":"「auひかりの提供エリア確認」で最も重要な点はどれか？","choices":["auひかりは電話で問い合わせないとエリア確認できない（技術的・制度的に手段がない・規定の運用と判断する取り扱い）","auひかりは独自回線のため1棟単位でエリア確認が必要。隣の建物が対応していても自分の建物が未対応のケースが頻繁にある","auひかりのエリアはau携帯の電波が届く場所と同じ（モバイルとの一体運用となる規定上の取り扱いと判断）","NTTフレッツ光のエリアと完全に一致しているため、フレッツが使える場所なら必ずauひかりも使える運用と判断"],"ans":1,"exp":"auひかりはKDDIの独自回線のため、エリア確認は建物単位（1棟ごと）で行う必要がある。集合住宅ではKDDIの設備が建物内に導入されていることが条件のため、隣の建物が対応していても自分の建物は未対応という状況が多い。事前のエリア確認が特に重要。"},{"id":"B087","cat":"B","diff":3,"q":"「andline光SEからドコモ光への事業者変更」で注意すべき点はどれか？","choices":["事業者変更はandline光SEから他社へはできない（技術的・制度的に手段がない・規定）","どちらも光コラボなので事業者変更が可能だが、ドコモ光はプロバイダ（タイプA/B/単独）の選択が必要。","工事が必要なので工事費が発生する（アクセスラインの切り替えが必須となる規定の運用と判断）","ドコモ光はNTT直販なので転用手続きが必要であり省略した場合は開通しない（規定の運用と判断）"],"ans":1,"exp":"andline光SE→ドコモ光への乗り換えは光コラボ間の事業者変更。andline光SEから事業者変更承諾番号を取得してドコモ光に申し込む。ドコモ光はタイプA/B（プロバイダセットプラン）か単独タイプかの選択が必要。工事は原則不要（アクセスライン共通）。"},{"id":"B088","cat":"B","diff":3,"q":"「光コラボのブランド力の違い」として正しいのはどれか？","choices":["光コラボのアクセスラインはすべてNTT東西が設計・管理するため、どの事業者を選んでも通信品質・速度・サポート対応の水準は完全に同一であり差は生じない","使うアクセスラインは同じでも、プロバイダの品質・サポート・IPv4 over IPv6（IPv6サービス）のVNEサービス・スマホセット割の有無など、事業者ごとに差異がある","アクセスラインがすべて共通なため技術的な通信品質はどの事業者でも完全に同一となっており、光コラボ選びでは月額料金の安さのみを基準にして選択すれば問題ない","光コラボは総務省の電気通信役務提供規則により全登録事業者が同一の料金水準・同一の通信品質でサービスを提供することを義務付けられているため差異は存在しない"],"ans":1,"exp":"光コラボはアクセスライン（物理回線）が共通でも、採用するVNEサービス（v6プラス・OCNバーチャルコネクト等）・プロバイダのサポート品質・スマホセット割の対象キャリア・料金・特典などが事業者ごとに異なる。単純に「どれでも同じ」ではなく、利用者の状況に合わせた選択が必要。"},{"id":"B089","cat":"B","diff":4,"q":"「光コラボ間の事業者変更」をお客様が自分でできないケースはどれか？","choices":["ドコモ光10ギガ（フレッツ光クロス）から他社の1Gbps光コラボへの変更","同じ光コラボ間での1Gbpsプランの乗り換えで双方が同一VNEを利用している場合","v6オプションを契約していない状態での光コラボ間の事業者変更","ひかりTVのSTBオプションを契約中に光コラボ間の事業者変更を行う場合"],"ans":0,"exp":"通常の光コラボ間（1Gbpsプラン同士）の事業者変更はほぼセルフで手続き可能。ただしドコモ光10ギガ（フレッツ光クロスベース）から他社の1Gbpsプランへの変更は、NTT東西での設備ダウングレード工事が発生するため一人では完結できない。工事日の調整が必要。"},{"id":"B090","cat":"B","diff":3,"q":"「フレッツ光ネクスト（NTT直販）のマンションタイプ」の配線方式として存在しないのはどれか？","choices":["光配線方式（各部屋まで光ファイバー直接引き込み）","電力線通信（PLC）方式","VDSL方式（既存電話線を使用）","LAN配線方式（LANケーブルを使用）"],"ans":1,"exp":"フレッツ光ネクストのマンションタイプの配線方式は「VDSL方式」「光配線方式」「LAN配線方式」の3種類。電力線通信（PLC：Power Line Communication）はコンセントの電力線を通信に使う技術で、フレッツ光の配線方式としては存在しない。"},{"id":"B091","cat":"B","diff":4,"q":"「光コラボとフレッツ光（NTT直販）の技術的な違い」として正しいのはどれか？","choices":["物理的なアクセスラインは同じNTT東西のインフラを使用し技術的な差はない","光コラボはNTT東西のNGN設備を専有区画で利用するためフレッツ光より通信品質が安定している","光コラボはONUにファームウェア制限がかかっており一部のIPoE接続方式が利用できない","光コラボはバックボーン接続をNTT東西に依存するため深夜帯にフレッツ光より速度低下しやすい"],"ans":0,"exp":"光コラボもフレッツ光（NTT直販）も物理的には全く同じNTT東西のアクセスライン（光ファイバー・ONU）を使用する。技術的な差は一切ない。異なるのは契約形態（1社か2社か）・請求方法・プロバイダの種類・サポート窓口・セット割の有無など商流面のみ。"},{"id":"B092","cat":"B","diff":3,"q":"「NUROの『2Gbps』と一般的な光コラボの『1Gbps』の実効速度の比較」として正しいのはどれか？","choices":["理論値はNURO光が2倍だが、実測速度は時間帯・端末・環境に大きく左右される。","NURO光の2Gbpsは実測でも必ず1Gbps光コラボの2倍の速度が出る（規定）","NURO光2Gbpsは全ユーザーに一律保証される（規定上の運用と判断する取り扱い）","1Gbps光コラボはNURO光より必ず遅い（規定上の運用と判断する取り扱い）"],"ans":0,"exp":"理論値NURO光2Gbpsの恩恵を受けるには有線LAN接続かつPC側のNICが2.5GbEや10GbEに対応している必要がある。多くのPCは1GbEのNICを搭載しており、最大1Gbpsが上限になる。Wi-Fi経由では現行のWi-Fi 6で最大4.8Gbps程度が理論値だが実測は環境依存。NURO光2Gbpsの恩恵を実感できる環境かどうかの確認が重要。"},{"id":"B093","cat":"B","diff":2,"q":"「@nifty光が採用しているIPv4 over IPv6（IPv6サービス）方式」として正しいのはどれか？","choices":["OCNバーチャルコネクト（MAP-E）","IPv6高速ハイブリッド（IPIP）","transix（DS-Lite）","v6プラス（MAP-E）"],"ans":3,"exp":"@nifty光はJPIXのv6プラス（MAP-E方式）を採用したIPv4 over IPv6（IPv6サービス）を提供している。v6プラス対応ルーターが必要で、割り当てられたポート範囲内での限定的なポート開放が可能。"},{"id":"B094","cat":"B","diff":3,"q":"「光コラボの新規申し込みと転用・事業者変更」で開通までの期間が最も短いのはどれか？","choices":["どの手続きも処理にかかる日数は同じで開通時期に差はない","繁忙期に限り転用・事業者変更が新規申し込みより大幅に時間がかかる","転用・事業者変更（既存アクセスラインをそのまま使うため無派遣工事が多い）","新規申し込み（光ファイバーの新規引き込み工事が不要なため最速で開通できる）"],"ans":2,"exp":"転用・事業者変更（無派遣工事）はNTT東西の設備上での切替処理のみで、工事員が宅内に来ないため数日〜2週間程度で開通するケースが多い。新規申し込みは光ファイバーの引き込み工事（派遣工事）が必要なため工事日の調整を含めて1〜3週間かかるのが一般的。"},{"id":"B095","cat":"B","diff":4,"q":"「NURO光 for Home（戸建てプラン）」の月額料金が1年後に大幅に上がる理由として正しいのはどれか？","choices":["初年度割引が適用されており2年目から正規の月額料金になるため","NURO光は年次更新型の契約形態で更新時に消費税改定分が自動加算されるため","2年目以降はNUROの設備維持費が利用者に転嫁される仕組みになっているため","初年度は国の光回線整備補助金が適用されるため実質負担が低いが2年目から補助が切れるため"],"ans":0,"exp":"NURO光の戸建てプランは「初年度月額0円」等の初年度大幅割引が適用されるキャンペーンが多い。2年目から正規の月額料金（税込み5,200円前後等）になるため初年度との差が大きい。申し込み時にキャンペーン終了後の料金を必ず確認・案内することが重要。"},{"id":"B096","cat":"B","diff":3,"q":"「電力会社の光回線（eo光・コミュファ光等）からandline光SE（光コラボ）への乗り換え」について正しいのはどれか？","choices":["電力系光回線は独自インフラのためNTTのアクセスラインとは異なる。","電力系光回線から光コラボへの乗り換えは総務省の規制により制度上認められていない","電力系光回線はフレッツ光を電力会社が卸受けしたものなので転用手続きが使える","電力系光回線もNTT東西の回線を使っているため事業者変更で乗り換えが可能だ"],"ans":0,"exp":"eo光・コミュファ光等の電力系光回線はNTT東西とは無関係の独自インフラ。光コラボの「転用」「事業者変更」は使えない。電力系光回線の解約（解約金・解約月の確認が重要）とandline光SEの新規申し込み・工事が別々に必要。"},{"id":"B097","cat":"B","diff":3,"q":"「光コラボ全体のシェア」について正しいのはどれか？","choices":["光コラボはフレッツ光（NTT直販）の契約数を大幅に上回りフレッツ光回線を使う家庭では主流となっている","光コラボとフレッツ光（NTT直販）の契約数はほぼ同数で二分しており2030年に光コラボが逆転する見込み","フレッツ光（NTT直販）は廃止されており現在は実質すべての契約が光コラボに集約されている","光コラボのシェアは都市部に限られており郊外・地方ではフレッツ光（NTT直販）が主流のまま"],"ans":0,"exp":"光コラボは2015年のサービス開始以降急速に普及し、フレッツ光（NTT直販）の契約数を大幅に超えた。請求一本化・スマホセット割等のメリットから移行が進み、現在ではフレッツ光回線ユーザーの過半数以上が光コラボを利用していると言われる。フレッツ光（NTT直販）は廃止されていない。"},{"id":"B098","cat":"B","diff":3,"q":"「光コラボの選び方のポイント」として最も重要なのはどれか？","choices":["使用するVNEサービスの方式・スマートフォンとのセット割・サポート体制・解約金の有無を総合的に確認する","プロバイダの月額料金の安さを最優先に比較し通信速度の実測値が次の確認ポイントになる","工事費無料キャンペーンの有無とキャッシュバック総額で比較するのが最も重要な判断軸","ONUのメーカーとWi-Fi規格の対応状況を確認しIEEE 802.11ax対応かどうかを選ぶ基準にする"],"ans":0,"exp":"光コラボ選びのポイントは①VNEサービス（v6プラス/OCNバーチャルコネクト等）とルーターの対応確認②スマホキャリアとのセット割（ドコモ/au/SoftBankなど）③サポート品質・窓口の利便性④解約金・縛り期間の有無⑤料金の総額（工事費実質無料の条件等）。料金のみで判断すると後々のトラブルになる。"},{"id":"B099","cat":"B","diff":3,"q":"「光コラボのサービス品質」においてNTT東西のアクセスラインが共通であることから言えることはどれか？","choices":["アクセスラインが共通なので事業者が違っても速度・品質・料金はまったく同じである（規定上の運用と判断する取り扱い上のルール）","回線物理部分（アクセスライン）は同一だが、プロバイダの接続品質・VNEサービスの混雑・サポート品質等は事業者ごとに異なる","優秀なプロバイダを選ぶと同じ回線でも通信速度が2倍以上になることがある（規定上の運用と判断する取り扱い上のルール）","NTT東西のアクセスラインが共通なので光コラボはどれを選んでも速度と安定性は完全に同一だ（規定上の運用と判断する取り扱い）"],"ans":1,"exp":"光コラボ間でアクセスライン（光ファイバー・ONU）は同一のNTT東西インフラを使う。ただしプロバイダ側の設備（バックボーン回線の品質・VNEサービスの混雑度）や採用するVNEサービス（v6プラス vs OCNバーチャルコネクト等）、サポート品質は事業者ごとに差がある。"},{"id":"B100","cat":"B","diff":2,"q":"「So-net光プラス」が採用しているIPv4 over IPv6（IPv6サービス）方式として正しいのはどれか？","choices":["OCNバーチャルコネクト（MAP-E）","クロスパス（DS-Lite）","v6プラス（MAP-E）","transix（DS-Lite）"],"ans":2,"exp":"So-net光プラスはNTTフレッツ光を卸受けした光コラボで、IPv4 over IPv6（IPv6サービス）はJPIXのv6プラス（MAP-E）を採用している。v6プラス対応ルーターでの利用が可能。"},{"id":"C056","cat":"C","diff":2,"q":"「光回線の開通工事を土日・祝日に依頼する場合」の追加費用について正しいのはどれか？","choices":["土日・祝日は逆に工事費が割引される","土日・祝日は工事が対応していないため平日のみであり、他の手続きや機器は一切不要","土日・祝日は平日と同一料金で追加費用はない","土日・祝日の工事には割増工事料（3,300円税込程度）が加算される"],"ans":3,"exp":"光回線の派遣工事を土日・祝日に行う場合、割増工事料が加算される（andline光SEでは3,300円税込）。平日に比べてコストが高くなる点をお客様に事前に案内することが重要。"},{"id":"C057","cat":"C","diff":2,"q":"「andline光SEの工事前確認で必ず確認すべき事項」として最も重要なのはどれか？","choices":["現在の回線種別、ひかり電話・テレビサービスの有無、光コンセントの有無、工事日程の希望","お客様のスマートフォンのOSと現在使用中のキャリアの組み合わせと最新機種の確認のみ","月額料金の支払い方法の確認のみであり、他の手続きや機器は一切不要であり工事も省略","お客様が使用しているテレビのメーカー（andlineTV対応確認のため）と最新機種"],"ans":0,"exp":"開通前確認で必ず確認すべきは①現在の回線種別（手続き種別の判断：転用/事業者変更/新規）②ひかり電話の有無（自動引き継ぎ対象）③andlineTVの有無④光コンセントの有無（無派遣工事の可否）⑤工事希望日（平日/土日祝の確認）。これらが手続き設計の基礎情報。"},{"id":"C058","cat":"C","diff":3,"q":"「光回線の工事でアパートの管理会社に連絡が必要な場合」として正しいのはどれか？","choices":["転用・事業者変更でも必ず管理会社に連絡が必要であり省略した場合は開通しない（規定の運用）","無派遣工事の場合は管理会社への連絡は不要（共用部に立ち入りなしのため・規定の運用と判断）","新規の光ファイバー引き込み工事が伴う場合（共用スペースへの立ち入りや壁への固定が必要）","ひかり電話を申し込む場合のみ管理会社の許可が必要であり省略した場合は開通しない（規定）"],"ans":2,"exp":"光回線の新規引き込み工事では共用スペース（MDF室等）への立ち入りや壁への光キャビネット固定が発生するため、管理会社・オーナーへの事前連絡・許可が必要。無派遣工事（ONUのセルフ取付）や転用・事業者変更（設備変更なし）の場合は管理会社への連絡は原則不要。"},{"id":"C059","cat":"C","diff":3,"q":"「転用承諾番号」はどこで取得するか？","choices":["総務省の電気通信番号管理システムのWebサイトにアクセスして取得する","NTT東西の転用受付窓口（0120番号）またはNTT東西の転用申し込みWebサイトで取得する","andline光SEのカスタマーサポートセンターに電話して発行を依頼する","現在契約中のプロバイダ（OCNやぷらら等）の窓口に連絡して発行してもらう"],"ans":1,"exp":"転用承諾番号はNTT東西の転用受付窓口（NTT東日本：0120-111-480、NTT西日本：0120-116-000等）またはWeb申し込みサイトで取得する。有効期限は15日間。取得後にandline光SEに申し込む際に番号を入力する。プロバイダではなくNTT東西への申し込みが必要な点に注意。"},{"id":"C060","cat":"C","diff":3,"q":"「事業者変更承諾番号」の取得先と有効期限として正しいのはどれか？","choices":["現在利用中の光コラボ事業者から取得・有効期限15日間","NTT東西から取得・有効期限30日間（規定の運用）","総務省から取得・有効期限180日間（規定の運用）","新しい光コラボ事業者から取得・有効期限30日間"],"ans":0,"exp":"事業者変更承諾番号は現在利用中の光コラボ事業者のカスタマーサポートに申し込んで取得する。有効期限は発行日を含む15日間。2022年7月以降の新規申込者は発行手数料無料。取得後は速やかに乗り換え先に申し込む。"},{"id":"C061","cat":"C","diff":3,"q":"「光回線の契約において未成年者が申し込む場合」の注意点として正しいのはどれか？","choices":["未成年者でも本人の意思があれば保護者の同意なしに単独で契約できる","高校生（16歳以上）であれば学生証を提示することで単独申し込みが認められる","未成年者（18歳未満）が申し込む場合は原則として親権者等の法定代理人の同意・署名が必要","成人年齢が引き下げられた現在でも20歳未満は光回線の申し込みができない"],"ans":2,"exp":"光回線サービスは電気通信サービス契約のため、未成年者（18歳未満）が申し込む場合は親権者等の法定代理人の同意・署名が必要。成人年齢は2022年4月から18歳に引き下げられたため、18歳・19歳は単独で契約可能。"},{"id":"C062","cat":"C","diff":3,"q":"「光回線の引越し手続き」でお客様が最初に確認すべきことは何か？","choices":["引越し先の住所でも同じ光コラボが利用できるかのエリア確認","引越し先でルーターを新しく買い直す（規定上の運用と判断）","引越し前に必ず光回線を解約する（規定上の連動解約運用）","引越し先のインターネット回線は自動的に継続される（規定）"],"ans":0,"exp":"引越し手続きの最初のステップは引越し先のエリア確認。同じ光コラボが使えるエリアならば転居手続き（工事が必要なことが多い）、エリア外なら解約と新規申し込みが必要。早めの確認と手続きが引越し後のインターネット空白期間を防ぐ。"},{"id":"C063","cat":"C","diff":3,"q":"「光回線の解約時に端末（ONU等）を返却しない場合」の対応として正しいのはどれか？","choices":["ONU等のレンタル機器を返却しない場合は事業者から機器の損害相当額が請求されることがある","ONU等はNTT東西の管理物のため光コラボ事業者への返却は不要でNTT東西に直接返送する","解約後30日以内に返却すれば損害金は発生せず30日を過ぎると自動的に所有権が移転する","光コラボのONUはすべて購入型のため解約後の返却義務はなく廃棄しても問題ない"],"ans":0,"exp":"ONU等の宅内機器はNTT東西（または光コラボ事業者）からのレンタル品。解約後に指定期間内に返却しない場合は機器の損害相当額が請求されることがある。解約時には返却方法・返却先・期限をしっかり確認することが重要。"},{"id":"C064","cat":"C","diff":3,"q":"「光回線の速度保証型サービス」について正しいのはどれか？","choices":["一般消費者向けの光回線はほぼすべてベストエフォート型で速度保証はない","光コラボは法律上最低速度の保証義務があり100Mbps以下になった場合は料金が減額される","フレッツ光（NTT直販）のみ最大速度の80%を保証するSLA制度が標準適用されている","一般向け光回線は夜間帯に限り最低速度保証が適用されNTT東西が品質を監視している"],"ans":0,"exp":"一般家庭向けの光回線サービス（andline光SE・ドコモ光・SoftBank光等）は「ベストエフォート型」で速度保証はない。「最大1Gbps」は理論上の上限値。法人向けの「帯域保証型」（SLAあり）サービスは契約帯域を保証するが、月額数万〜数十万円の高額プランになる。"},{"id":"C065","cat":"C","diff":3,"q":"「光回線の申し込みから契約成立のタイミング」について正しいのはどれか？","choices":["オンラインの申し込みフォームを送信した瞬間に自動的に契約が成立する","オペレーターから重要事項の説明を受けた時点で契約が法的に成立する","開通工事が完了した時点（切替完了）で契約が成立するサービスが多い。","初回の月額料金が口座から引き落とされた時点ではじめて契約が成立する"],"ans":2,"exp":"光回線サービスは一般的に開通工事の完了（切替完了）をもって契約成立とするサービスが多い。そのため工事完了前（工事着手前）はキャンセル可能でキャンセル料も発生しない。andline光SEも工事実施前のキャンセルは料金が発生しない。初期契約解除制度は開通案内書受領後8日以内。"},{"id":"C066","cat":"C","diff":3,"q":"「光回線サービスの初期契約解除制度（クーリングオフに類似）」の特徴として正しいのはどれか？","choices":["開通案内書受領後8日以内に解除可能だが工事が実施された場合は工事費の負担が生じる","契約書面受領後8日以内であれば工事済みでも全額返金でキャンセルが可能","初期契約解除は開通前のみ有効で工事完了後は一切適用されない","光回線の初期契約解除は訪問販売の場合のみ適用されオンライン申込には適用されない"],"ans":0,"exp":"電気通信事業法に基づく初期契約解除制度は、書面受領後8日以内に契約解除できる制度。ただし光回線の場合は訪問販売のクーリングオフとは異なり、工事が実施されていた場合は工事費の発生分は負担する必要がある。8日以内でも工事済みの場合は工事費が発生する点に注意。"},{"id":"C067","cat":"C","diff":3,"q":"「新築戸建てへの光回線新規申し込み」で注意すべき点として正しいのはどれか？","choices":["新築戸建ては建設時に光コンセントが標準装備されるため追加工事は一切不要（規定上の運用と判断する取り扱い）","新築物件は住宅メーカーがNTT東西と提携しているため工事費が全額無料になる（規定上の運用と判断する取扱）","新築の場合は電柱から建物への光ファイバー引き込みが初めてになるため、電柱の場所・引き込み可能な経路の確認が必要。","新築物件は配管が整備済みのため必ず無派遣工事で開通でき工事員の立ち会いも不要（規定上の運用と判断する取扱）"],"ans":2,"exp":"新築戸建てへの光回線新規引き込みは、電柱から建物へのルートの確保・適切な引き込み口の確認が必要。電柱の位置・道路状況・建物の構造によっては引き込み工事が困難または特殊工事が必要になるケースがある。新築でも光コンセントがない場合は派遣工事が必要。"},{"id":"C068","cat":"C","diff":2,"q":"「光回線の月額料金の請求サイクル」について正しいのはどれか？","choices":["月払い（毎月請求）が基本で、開通月から請求が開始","請求なし（無料サービス・規定上は無料扱いの運用）","3か月ごとにまとめて請求（規定上の特例運用扱い）","年払いのみであり、他の手続きや機器は一切不要"],"ans":0,"exp":"光回線の月額料金は月払いが基本。andline光SEは開通月以降3か月目の10日から初回請求開始というやや特殊な設計。解約月は日割りにならず1か月分請求される（開通月は日割り計算）。この非対称な計算方法はお客様案内で確認が必要。"},{"id":"C069","cat":"C","diff":3,"q":"「光回線の工事で『エアコンダクト』を使う場合」の説明として正しいのはどれか？","choices":["エアコンダクトを使った引き込みは集合住宅の共用部分でのみ認められている方法","エアコンの冷媒配管を通すダクト（スリーブ）を光ファイバーの引き込み経路として使用する方法。","エアコンの電源配線用ダクトは電気工事士法の規制があるため光回線工事には転用できない","エアコンダクトを光回線工事に使用する場合は通常の2倍の工事費が必要になる"],"ans":1,"exp":"エアコンダクト（スリーブ）を使った光ファイバー引き込みは、エアコンの冷媒管が通っている壁の穴（スリーブ）を光ファイバーの通り道として利用する方法。新たな壁穴あけが不要なため、壁穴あけ不可の賃貸物件でよく使われる代替手段。ただしスリーブのサイズや向きによって利用できない場合もある。"},{"id":"C070","cat":"C","diff":4,"q":"「光コラボからフレッツ光（NTT直販）に戻す際の費用」について正しいのはどれか？","choices":["再転用はアクセスラインが変わらないため工事費は原則発生しないがプロバイダを個別契約する費用・手間が発生する","フレッツ光（NTT直販）への再転用は新規工事扱いとなり標準工事費が全額発生する","光コラボからフレッツ光への戻しはNTT東西の審査が必要で最低3か月の審査期間がある","再転用後はNTT東西の設備が専有区画に切り替わるため月額料金が光コラボより高くなる"],"ans":0,"exp":"光コラボからフレッツ光（NTT直販）への再転用はアクセスラインが変わらないため工事費は原則不要。ただし2社契約（NTT東西＋プロバイダ）に戻るため、プロバイダを新たに個別契約する費用・手間が発生する。スマホセット割も失われる可能性があるため、再転用のメリット・デメリットを整理してから判断する必要がある。"},{"id":"D051","cat":"D","diff":2,"q":"「IP（インターネットプロトコル）アドレス」の説明として正しいのはどれか？","choices":["インターネットに接続する機器を識別するための数字のアドレス（住所に相当）","Wi-Fiのパスワード（暗号化キー）のことを指す技術用語の通称","光回線の通信速度を表す単位（bpsの上位互換規格を意味する）","ルーターのモデル番号（製造シリアル）を意味する識別番号の通称"],"ans":0,"exp":"IPアドレスはインターネット上で機器を識別するための数字の住所。IPv4は32ビットで「192.168.1.1」のように表現し、IPv6は128ビットで「2001:db8::1」のように表現する。インターネット上に公開されるグローバルIPアドレスと、宅内のプライベートIPアドレスがある。"},{"id":"D052","cat":"D","diff":2,"q":"「IPv4アドレスの枯渇問題」の説明として正しいのはどれか？","choices":["IPv4アドレスの枯渇問題はNATによるプライベートIPの活用とWi-Fiルーターの家庭普及によって技術的・実用的にすでに完全に解決されている","IPv4は32ビットで約43億個しかアドレスが存在せず、インターネット接続機器の爆発的増加により利用可能なグローバルIPv4アドレスが事実上枯渇した問題","IPv4アドレスはIANAが未使用ブロックを毎年定期的に新規発行し続けており、現在も供給は継続しているため枯渇という問題は実質的に存在しない","IPv4のアドレス不足問題はITUがRIR（地域インターネットレジストリ）を通じて毎年の割り当て枠を増加させることで継続的かつ段階的に解決されている"],"ans":1,"exp":"IPv4は32ビットで約43億個のアドレスしか存在しない。スマートフォン・IoT機器の急増により事実上枯渇しており、NAT（プライベートIPアドレスで宅内を管理）やIPv4 over IPv6（IPv6サービス）でのIPv4アドレス共有で対処している。IPv6（128ビット・約340澗個）への移行が進んでいる。"},{"id":"D053","cat":"D","diff":5,"q":"「IPv4 over IPv6（IPv6サービス）を使っている環境でVoIP通話（IP電話）が使えない」場合の原因として正しいのはどれか？","choices":["IPv4 over IPv6（IPv6サービス）環境ではVoIP通話は一切使えない（仕様上の制約のため・規定）","MAP-E・DS-Lite環境ではVoIPで使うポート（UDP5004等）が割り当てられていない場合がある。","光電話はPPPoE専用のため必ずPPPoEに切り替えが必要であり省略した場合は開通しない（規定）","VoIPはルーターを変えれば必ず使える（IPv6対応ルーターであれば例外なく動作する・規定）"],"ans":1,"exp":"MAP-EやDS-Liteでは使用できるIPv4ポートが制限される。ひかり電話（andline電話等）はHGWがVoIPを直接処理するため通常問題ない。しかし市販のVoIPアダプター（一般的なSIPアダプター等）ではMAP-Eの割り当てポート外の番号を使う場合に通話できなくなる場合がある。"},{"id":"D054","cat":"D","diff":4,"q":"「IPoE接続でIPv6サイトにアクセスする場合」と「PPPoE接続でIPv6サイトにアクセスする場合」の違いとして正しいのはどれか？","choices":["どちらもまったく同じ速度でIPv6サイトにアクセスできる","PPPoEの方がIPv6サイトへのアクセスが速い","IPoEではIPv6サイトにアクセスできない（技術的・制度的に手段がない）","IPoEはIPv6ネイティブ接続のため網終端装置を迂回して高速アクセス。"],"ans":3,"exp":"IPoEはIPv6の通信路をネイティブに使うため網終端装置を迂回し、IPv6サイトへのアクセスが高速。PPPoEでもIPv6サイト閲覧は可能だが（デュアルスタックの場合）、接続の際に網終端装置を経由するため夜間の混雑の影響を受ける。IPoEが普及した理由はIPv6サイトへの高速アクセスとIPv4 over IPv6（IPv6サービス）の両立にある。"},{"id":"D055","cat":"D","diff":3,"q":"「光コラボで使われるVNEサービスを変更したい」場合の方法として正しいのはどれか？","choices":["使用中のルーターの管理画面のWAN詳細設定からVNEサービスをプルダウンメニューで選択して任意に切り替えることができる","VNEサービスはプロバイダが決定するため、VNEを変更したい場合は別のVNEを採用するプロバイダへの事業者変更が必要","NTT東西が運用するNGN設備管理ポータルにISP事業者経由で申請することで、ユーザーが希望するVNEを任意に選択・変更できる","VNEサービスは光回線の契約時に選択した設定がNGN設備に永久登録されるため、一度決まると契約中は変更する手段が存在しない"],"ans":1,"exp":"VNEサービスはプロバイダが選択・採用するもので、ユーザーが独自に変更できない。v6プラスからtransixに変えたい場合はそのVNEを採用するプロバイダへの事業者変更が必要。ただしenひかりはユーザーがv6プラスとtransixを選択・切り替えできる例外的なサービス。"},{"id":"D056","cat":"D","diff":5,"q":"「IPv4 over IPv6（IPv6サービス）環境でのゲーム機（Nintendo Switch等）のオンラインプレイ」について正しいのはどれか？","choices":["Nintendo SwitchはIPv6サービスに完全対応しているので問題なし","通常のオンラインプレイはMAP-E環境でも問題なくできる場合が多い。","IPv4 over IPv6（IPv6サービス）環境ではゲーム機のオンラインプレイが完全に不可能","ゲーム機はPPPoE接続専用のため必ずPPPoEに変更が必要"],"ans":1,"exp":"Nintendo Switch等のゲーム機は通常のオンラインプレイ（サーバーに接続する形式）ではMAP-E環境でも動作する。問題が出やすいのはNAT越えが必要なP2P通信・特定のポートを必要とするゲームサーバー立ち上げ・UPnPが正常に動作しないケース。「NATタイプB」が出てプレイは可能だが一部機能が制限される場合がある。"},{"id":"D057","cat":"D","diff":6,"q":"「IPv6のステートレスアドレス自動設定（SLAAC）」の説明として正しいのはどれか？","choices":["ルーターからのRAをもとに端末がDHCPv6サーバーなしで自動的にIPv6アドレスを生成する仕組み","DHCPv6サーバーが端末のMACアドレスを元にIPv6アドレスを一意に割り当てる仕組み","端末がIPv4アドレスをもとにIPv6アドレスを自動変換しデュアルスタック接続を実現する仕組み","ルーターがIPv6プレフィックスをNTTから取得し配下全端末に同一アドレスを配布する仕組み"],"ans":0,"exp":"SLAAC（Stateless Address Autoconfiguration）はIPv6の仕組みで、ルーターがRA（Router Advertisement）でネットワークプレフィックスを通知し、端末が自身のMACアドレス等を元に自動でIPv6グローバルアドレスを生成する。DHCPv6サーバーが不要で管理が簡素化される。IPoE接続時にスマホ・PCが自動でIPv6アドレスを取得するのはこの仕組みによる。"},{"id":"D058","cat":"D","diff":6,"q":"「Ping（ICMP Echo）が通らないのにWebブラウジングができる」原因として最も考えられるのはどれか？","choices":["ファイアウォールがICMPを遮断しているが、HTTPSのTCP443等は通している状態","DNSサーバーに障害が発生しており名前解決はできないがキャッシュでWebのみ表示される状態","ルーターのNAT変換が飽和しICMPのみ処理できなくなっているがTCP通信は維持される状態","Wi-Fi電波干渉によりICMPパケットのみ欠落するが大きいTCPパケットは通信できる状態"],"ans":0,"exp":"PingはICMP（Internet Control Message Protocol）を使うが、セキュリティ上の理由でWindowsファイアウォール・ルーターのファイアウォール設定・クラウドサービス側がICMPを遮断することがある。WebブラウジングはTCP/443（HTTPS）を使うため遮断されない。Pingが通らないからといってインターネット接続が切れているとは限らない。"},{"id":"D059","cat":"D","diff":6,"q":"「IPv4 over IPv6（IPv6サービス）環境でDMZホスト機能（特定端末への全ポート転送）を使いたい」場合の注意点はどれか？","choices":["MAP-E環境ではポート範囲が制限されているため完全なDMZ（全ポート転送）は不可能","MAP-E環境でもDMZホスト機能はルーター側で完全に処理されるため支障なく利用できる","MAP-E環境ではDMZホスト機能は使えないが、代わりにIPv6でのDMZ設定で同等の効果を得られる","MAP-E環境でのDMZ利用はVNEへの申請が必要で審査通過後に全ポートが解放される"],"ans":0,"exp":"MAP-E方式ではIPv4ポートが割り当て範囲内に制限されるため、完全なDMZホスト（全ポートを特定端末に転送する機能）は利用できない。v6プラス固定IPオプション等のIPIPトンネリング方式に変更すると専用グローバルIPが付与され全ポートが使えるため、DMZホスト相当の設定が可能になる。"},{"id":"D060","cat":"D","diff":5,"q":"「フレッツ 光クロス（10Gbps）でのIPoE/VNEサービス」について正しいのはどれか？","choices":["フレッツ光クロスはPPPoE認証方式のみに対応した設計となっており、IPoE（IPv6）接続は技術仕様上サポートされていない","フレッツ光クロスは10Gbpsに対応したVNEの利用が必要で、フレッツ光ネクストで使えるVNEが全て使えるわけではない。対応VNEの確認が必要","フレッツ光クロスにはNGN設備のIPv6ルーティング機能が実装されておらず、IPoEによるIPv6接続機能を技術的に利用することができない","フレッツ光クロスとフレッツ光ネクストは完全に同一のNGN設備・認証システムを共有しているため、ネクストで使えるVNEはすべてクロスでも利用できる"],"ans":1,"exp":"フレッツ光クロス（10Gbps）はフレッツ光ネクストとは異なるNGN設備を使うため、対応するVNEサービスが限定される。フレッツ光ネクストで使えるVNE（v6プラス・OCNバーチャルコネクト等）が全て使えるわけではなく、光コラボ事業者・プロバイダが10Gbps対応VNEに対応しているかの確認が必要。"},{"id":"D061","cat":"D","diff":3,"q":"「IPv4 over IPv6（IPv6サービス）の普及によってPPPoE接続が完全になくなったか？」について正しいのはどれか？","choices":["PPPoE接続は現在も有効で並存している。IPv4 over IPv6（IPv6サービス）が主流でもPPPoEが必要なケースもある","電気通信事業法の2022年改正によりレガシーインフラの廃止が義務付けられ、PPPoE接続は現在法律で新規提供が禁止されている","ahamo光をはじめとする新規光コラボサービスはIPoEへの完全移行を宣言しており、新規申し込み時はPPPoEのみを標準接続方式として提供している","2020年以降に開通したすべての光コラボではPPPoE接続が技術的に完全廃止されており、IPoEへの一本化が業界標準として確立された"],"ans":0,"exp":"PPPoE接続は現在も並存しており完全になくなったわけではない。IPoE（IPv4 over IPv6（IPv6サービス））が主流になりつつあるが、PPPoEのみ対応の業務システム・VPN・固定IP等でPPPoEが必要なケースがある。また一部のプロバイダはIPv4 over IPv6（IPv6サービス）とPPPoEの両方を同一回線で並列利用できるオプションを提供している。"},{"id":"D062","cat":"D","diff":6,"q":"「IPoE接続後にルーターのPPPoEセッション設定が残っている状態」について正しいのはどれか？","choices":["ルーターにPPPoEの設定が残っているとIPv4 over IPv6の自動設定が正常に行われず、PPPoEで接続してしまう場合がある","PPPoEの設定とIPoEの設定はルーターの内部で完全に独立しており、両方の設定が残っていても互いに影響しない（規定）","PPPoEの設定が残っていてもIPoEが優先されるため、特に問題は生じない（規定上の運用と判断する取り扱い上のルール）","IPoE接続後にPPPoEのセッション設定が残っていると、ルーターが2つのグローバルIPを同時取得し速度が向上する"],"ans":0,"exp":"ルーターにPPPoEの接続設定が残っている状態でIPoEを利用しようとすると、PPPoEが優先されてIPv4 over IPv6（IPv6サービス）が有効にならないケースがある。特にフレッツ光（NTT直販）からIPv4 over IPv6（IPv6サービス）対応プロバイダに変更した際にPPPoEの旧設定が残っていると問題が起きやすい。IPv4 over IPv6（IPv6サービス）のみを使う場合はPPPoE設定を削除するのが基本。"},{"id":"D063","cat":"D","diff":3,"q":"「フレッツ光のIPv4 over IPv6（IPv6サービス）で使う『v6オプション』の廃止申請」はどういう場面で必要か？","choices":["光コラボ事業者変更時、旧事業者のv6オプション廃止処理が残ったまま新設しようとすると競合する","プロバイダを変更するたびに旧プロバイダのv6オプションが残存するため、変更のたびに廃止申請が必ず必要になる","光回線を解約する際の最終手続きとして総務省ガイドラインでv6オプションの廃止申請が義務付けられており必ず必要になる","Wi-Fiルーターを交換するとNGN設備がMACアドレス変更を検知してv6オプションが無効化されるから"],"ans":0,"exp":"v6オプション廃止申請が特に問題になるのは光コラボ間の事業者変更時。新事業者がNGN設備にv6オプションを新設しようとしても旧事業者のv6オプションが残っていると競合する。旧事業者が確実にv6オプション廃止処理を完了させることが重要で、これが遅れるとIPoEが使えない期間が生じる。"},{"id":"D064","cat":"D","diff":5,"q":"「MAP-E方式でポート開放を試みたが、ゲームのサーバーとして外部から接続が来ない」場合の対処として正しいのはどれか？","choices":["まず自分に割り当てられているIPv4ポートの範囲を確認し、使用したいポートが割り当て範囲内かどうかを確認する。","ルーターの電源を一度切ってから再起動するだけで割り当てポートがリセットされて解決する","MAP-EからDS-Liteに接続方式を変更すると全ポートが自由に使えるようになる","MAP-Eでは全ポートが標準で開放済みのためルーターのポートフォワード設定の問題だ"],"ans":0,"exp":"MAP-E環境で特定ポートが使えない場合、まずそのポートが自分の割り当て範囲内かをv6プラスのポートチェッカー（JPIX提供）等で確認する。割り当て外のポートは使用不可のため、割り当て範囲内のポートで代替するか、固定IPオプション（IPIP方式・全ポート使用可）への変更を検討する。DS-Liteに変えると逆にポート開放が全くできなくなる。"},{"id":"D065","cat":"D","diff":5,"q":"「IPoE接続でインターネットが使えるようになった際のルーターの動作」として正しいのはどれか？","choices":["対応ルーターがVNEサービスのサーバーと自動通信し、MAP-EのルールセットやIPIPのトンネル設定を自動取得して接続する。ユーザーの手動設定はほぼ不要","IPoE対応ルーターは電源投入後にNTT東西のサーバーへ自動接続し、プロバイダのIDとパスワードをIPoE経由で自動取得する","IPoE接続はルーターの自動設定ではなくONUが自動設定を完了させるため、ルーターはブリッジモードで使用する必要がある","IPoE対応ルーターでもDS-Lite方式のみ自動設定に対応しており、MAP-E方式は手動でポートマッピングの入力が必要"],"ans":0,"exp":"IPoE対応ルーター（v6プラス対応等）は電源を入れるとVNEサービスのサーバーと自動通信し、MAP-Eのルールセット（使用できるIPアドレス・ポート範囲等）やIPIPのトンネル設定を自動取得する。PPPoEのようにID/パスワードを手動入力する必要がなく、セットアップが容易なのが特徴。"},{"id":"E031","cat":"E","diff":1,"q":"andline光SEの「プロバイダ」として正しいのはどれか？","choices":["BIGLOBE（KDDIグループ提供）","ぷらら（NTTドコモ提供）","andline（アイキューブ・マーケティング提供）","OCN（NTTドコモビジネス提供）"],"ans":2,"exp":"andline光SEは株式会社アイキューブ・マーケティングが提供する光コラボ。回線とandlineブランドのプロバイダサービスがセットになっており、窓口・請求が1本化されている。"},{"id":"E032","cat":"E","diff":2,"q":"andline光SEで「ひかり電話を申し込まない場合（ONU設置のみ）」に設置される機器はどれか？","choices":["ONU（回線終端装置）のみ。ルーター機能はないためWi-Fiを使う場合は別途Wi-Fiルーターが必要","ONUとWi-Fiルーターが一体化した複合機（HGW）がセットで設置され、工事当日からWi-Fiがすぐ使える","スマートフォンとタブレット向けの専用モバイルアダプターが設置されWi-Fiによるネット接続が自動で有効になる","HGW（ホームゲートウェイ）が設置されルーター機能とWi-Fi機能が最初から使える状態になるため他の機器は不要"],"ans":0,"exp":"ひかり電話を申し込まない場合はONU（光信号変換のみの機器）が設置される。ONUにはルーター機能がないため、インターネットを使うにはONUの後段に市販のルーター（有線のみの場合はハブでも可）またはWi-Fiルーターを接続する必要がある。"},{"id":"E033","cat":"E","diff":2,"q":"andline電話で「携帯電話宛の通話料金」として正しいのはどれか？","choices":["携帯電話宛は1分あたり一定料金（固定電話宛より高め）","固定電話宛と同じく税込8.8円／3分の全国一律料金","通話料は完全無料（音声通話オプションに含まれる）","1時間あたり定額制（1時間ごとに自動課金される）"],"ans":0,"exp":"andline電話は固定電話宛が8.8円（税込）/3分だが、携帯電話宛は料金体系が異なり固定電話宛より高い。携帯電話宛の具体的な料金は重要事項説明書を確認すること。なお0120や0800等の無料番号は通話料無料。"},{"id":"E034","cat":"E","diff":2,"q":"andline光SEの「新規申し込みに必要なもの」として正しいのはどれか？","choices":["スマートフォンのみで申し込める（書類は事後郵送で対応可能・原本不要）","本人確認書類と支払い方法の確認書類、および転用の場合は転用承諾番号","印鑑証明書と住民票（発行3ヶ月以内の正本）の2点が必須書類となる","パスポートのみ有効（運転免許証や保険証では受付不可・規定により）"],"ans":1,"exp":"andline光SEの申し込みに必要なのは①本人確認書類（運転免許証・マイナンバーカード・健康保険証等）②支払い方法の確認（口座振替の場合は金融機関の口座情報、クレジットカードの場合はカード情報）③転用の場合は転用承諾番号、事業者変更の場合は事業者変更承諾番号。"},{"id":"E035","cat":"E","diff":3,"q":"andline光SEの「最低利用期間なし・解約金なし」の意味として正しいのはどれか？","choices":["他社への乗り換えも違約金なしで手続きが完了し、申し込み当日からandlineの回線を解約して即日切り替えが可能","解約の申し出さえすれば月の途中でも日割り計算が適用されるためいかなる状況でも費用が一切発生しない","最低利用期間の縛りや解約金（違約金）は発生しないが、解約月は日割りにならず1か月分の月額料金が請求される","解約手続きは一切不要でandlineへの通知なく利用を停止すれば翌月から自動的に解約処理が完了する"],"ans":2,"exp":"andline光SEは最低利用期間の縛りなし・解約金なしが特徴。ただし解約月の月額料金は日割りにならず1か月分が請求される。また解約希望月の15日までにカスタマーサポートへ連絡が必要。15日以降の連絡は翌月末解約になる。"},{"id":"E036","cat":"E","diff":3,"q":"andline光SEを「フレッツ光から転用した場合」のONUについて正しいのはどれか？","choices":["転用後はスマートフォンがONUの代わりになる","フレッツ光で使っていたONUをそのまま継続使用する","転用するとONUが新しいものに自動交換される","転用後はONUを購入する必要がある"],"ans":1,"exp":"フレッツ光からandline光SEへの転用ではアクセスラインが変わらないため、使用しているONUをそのまま継続使用できる。機器の交換・購入は基本的に不要。ひかり電話を新規追加する場合はHGWへの交換工事が発生することがある。"},{"id":"E037","cat":"E","diff":3,"q":"andline電話で「0120・0800番号（フリーダイヤル）への発信」について正しいのはどれか？","choices":["0120・0800番号への発信は通話料無料（受信者が負担するフリーダイヤル）","0120・0800番号への発信は通話料が発生する（規定上の運用と判断する取扱）","0120番号はandline電話からは発信できない（技術的・制度的に手段がない）","0120・0800番号への発信は着信専用のため発信できない（規定上の運用）"],"ans":0,"exp":"0120・0800番号（フリーダイヤル・フリーフォン）はかけた側の通話料が無料で受信者（企業等）が通話料を負担するサービス。andline電話からも発信可能で通話料は無料。重要事項説明書にも明記されている。"},{"id":"E038","cat":"E","diff":3,"q":"andline光SEの「IPアドレスの割り当て方式」として正しいのはどれか？","choices":["固定グローバルIPが必要な場合でも月額オプション料金は発生せず、申し込みフォームから無料で取得できる仕組みになっている","IPv4 over IPv6（IPv6サービス）環境では複数ユーザーでIPv4アドレスを共有（MAP-Eによるポート分割）","IPv6アドレスも複数ユーザーで共有する仕組みのため、端末ごとに異なるIPv6アドレスが自動割り当てられることはない","全ユーザーに固定グローバルIPv4アドレスが自動的に割り当てられるため、VPNや外部公開サーバーの設定が追加費用なしで行える"],"ans":1,"exp":"andline光SEのIPv4 over IPv6（IPv6サービス）環境では、IPv4グローバルアドレスは複数ユーザーで共有（MAP-Eによるポート分割）する動的・共有型。IPv6グローバルアドレスはプレフィックス委任で各端末に付与される。固定グローバルIPv4が必要な場合は別途オプション申し込みが必要。"},{"id":"E039","cat":"E","diff":3,"q":"andline光SEで「ひかり電話（andline電話）を使用中に地震が発生し停電した場合」のリスクとして正しいのはどれか？","choices":["andline電話はIP電話のため停電時は一切の通話ができない（緊急通報含む）","andline電話は停電時も緊急通報（110・119）のみ自動的にメタル回線へ切り替わり発信できる","andline電話はUPS（無停電電源装置）が内蔵されているため停電時も数時間は通話可能","andline電話は停電時は発信こそできないが、着信のみ緊急回線経由で受けることができる"],"ans":0,"exp":"andline電話はIP電話（光回線を使ったVoIP）のため、停電時は光回線設備が動作せず緊急通報（110・119・118）を含む一切の通話ができない。これは通常の固定電話（メタル回線）と大きく異なる点。重要事項説明書でも明記されており、申し込み時に必ず案内する必要がある。"},{"id":"E040","cat":"E","diff":2,"q":"andline光SEの「サービス提供エリア」について正しいのはどれか？","choices":["NTT東西のフレッツ光の提供エリアとほぼ一致する。山間部・離島等のフレッツ光エリア外では利用不可","NTT東日本エリア（関東・東北・北海道・甲信越）のみの提供で、NTT西日本エリアでは利用不可","首都圏・政令指定都市を中心に展開しており、人口5万人未満の市区町村では提供エリア外になる場合がある","andline独自の光ファイバー網を整備しているため、NTTフレッツ光エリアと提供範囲は一致しない"],"ans":0,"exp":"andline光SEはNTT東西のフレッツ光を卸受けした光コラボのため、提供エリアはフレッツ光の提供エリアとほぼ一致する。NTT東日本・NTT西日本両エリアに対応しており全国展開している。フレッツ光エリア外（山間部・離島等）では利用できない。"},{"id":"F021","cat":"F","diff":2,"q":"andlineTVで「BSプレミアム（現・BS4K・BS8K等のNHK BSチャンネル）」を視聴するために必要な機器として正しいのはどれか？","choices":["CASカードの別途購入が必要であり省略した場合は開通しない（規定上の運用と判断する取り扱い）","パラボラアンテナ（衛星アンテナ）の設置が必要であり省略した場合は開通しない","andlineTVとV-ONUが設置されていれば追加機器なしでBS放送が視聴可能","専用のセットトップボックスを購入する必要がある（規定上の運用と判断する取り扱い）"],"ans":2,"exp":"andlineTV（フレッツ・テレビ）はNTTの光ファイバーを通じてBS放送の信号を配信するため、屋外にパラボラアンテナを設置する必要がない。これがandlineTVの最大のメリットの一つ。V-ONUから同軸ケーブルでテレビに繋ぐだけでBS放送を視聴できる。"},{"id":"F022","cat":"F","diff":2,"q":"andlineTVを解約した場合、V-ONUはどうなるか？","choices":["V-ONUはお客様の購入品なので手元に残る","V-ONUはandline光SEのレンタル機器のため返却が必要","解約後はV-ONUが自動的にONUに切り替わる","V-ONUはそのままインターネット用ONUとして使い続けられる"],"ans":1,"exp":"V-ONU（映像用回線終端装置）はandlineTVのサービス機器としてレンタルされているため、andlineTV解約後は返却が必要。返却しない場合は機器損害相当額が請求されることがある。解約時の返却手順はandlineカスタマーサポートに確認すること。"},{"id":"F023","cat":"F","diff":3,"q":"「テレビが映らなくなった（BS含む）」場合の最初の確認として正しい順序はどれか？","choices":["まず近隣の家電量販店または電気工事業者に連絡してアンテナ設備の点検と調査を依頼する","まずandlineのプロバイダサポートセンターに電話して遠隔診断の予約を入れる","まずWi-Fiルーターの電源を一度抜いて10秒以上待ってから再起動し、接続状況が改善するか確認する","V-ONUの電源・ランプ確認→同軸ケーブル接続確認→テレビのチャンネルスキャン確認の順"],"ans":3,"exp":"andlineTVの映像不良の初期確認手順は①V-ONUの電源がONになっているか・ランプ状態の確認②V-ONUとテレビ間の同軸ケーブルの接続確認（抜け・断線）③テレビ側でチャンネルスキャン（初回設定の確認）。これらで解決しない場合は機器側の問題やNTT側の設備問題の可能性があるためandlineカスタマーサポートへ。"},{"id":"F024","cat":"F","diff":4,"q":"「andlineTVの映像が時々乱れる・モザイク状になる」場合の原因として最も可能性が高いのはどれか？","choices":["同軸ケーブルや接続部分の劣化・緩み、または分配器を使用している場合の信号レベルの低下","プロバイダのネットワーク障害によりテレビ信号の配信が不安定になっている","宅内のWi-Fiルーターが発する電波がテレビの受信アンテナに干渉している","インターネットの通信速度が低下してテレビ映像のデータ転送が追いつかない"],"ans":0,"exp":"andlineTVの映像乱れ（ブロックノイズ・モザイク）の最も多い原因は同軸ケーブルの劣化・コネクタの緩み・接続不良、または分配器使用による信号レベルの低下。andlineTVはWi-Fi経由ではなく同軸ケーブルで映像を伝送するため、インターネットの速度やWi-Fi環境とは無関係。"},{"id":"F025","cat":"F","diff":3,"q":"andlineTVで「4Kテレビ」を使用する場合について正しいのはどれか？","choices":["4Kテレビに付属の同軸ケーブルをV-ONUに接続するだけでandlineTVが自動的に4K出力モードに切り替わり、地デジ・BS4Kすべてのチャンネルが自動的に4K画質で視聴できる","andlineTV（フレッツ・テレビ）で配信するのは標準のBS/地デジ放送であり、4K放送（BS4K等）の視聴には別途4K対応チューナーや4K放送対応のセットトップボックス等が必要な場合がある","andlineTVはNHK BS4K・BS8Kを含む現在放送中のすべての4K放送チャンネルに完全対応済みで、4Kテレビと同軸ケーブルで接続するだけで追加機器一切不要で視聴できる","andlineTVは4K対応テレビとの同軸ケーブル接続に対応しておらず、4Kテレビに接続しようとすると映像信号フォーマットの規格不一致によりテレビ側がエラーを表示して映像が映らない"],"ans":1,"exp":"andlineTV（フレッツ・テレビ）はNHK BS4K・BS8K等の4K放送には対応しておらず（2025年時点）、配信するのは標準のBS放送・地デジ放送。4K放送を視聴するには別途パラボラアンテナ（BS4K対応）や専用チューナーが必要になる場合がある。"},{"id":"F026","cat":"F","diff":3,"q":"「andlineTVのテレビ1台接続工事費」として正しいのはどれか？","choices":["7,150円（税込）","19,800円（税込）","無料","55,000円（税込）"],"ans":0,"exp":"andlineTVのテレビ1台への接続工事費は7,150円（税込）。2〜4台の複数台接続工事は21,780円（税込）。テレビ回線工事費（3,300円または8,250円）とは別に発生する費用。"},{"id":"F027","cat":"F","diff":3,"q":"「andlineTVを申し込んでいるお客様がケーブルテレビ（CATV）のインターネットへ乗り換えたい」場合の注意点として正しいのはどれか？","choices":["andlineTVはNTTのフレッツ光に紐付いたサービスのため、CATVインターネットへの乗り換えではandlineTVを解約する必要がある","andlineTVはIPベースのサービスのため、インターネット回線がCATVに変わっても継続して利用できる","andlineTVはNTT東西以外の回線でも利用可能なため、CATVインターネット乗り換え後も解約手続きは不要","andlineTVはケーブルテレビ事業者との提携サービスのため、CATVへの乗り換えで自動的にCATV版に切り替わる"],"ans":0,"exp":"andlineTVはNTT東西のフレッツ・テレビを使ったサービスのため、CATVのインターネット（CATVの独自インフラ）への乗り換えではandlineTVを解約する必要がある。CATVのテレビサービスへの加入は別途申し込みが必要。乗り換えによるテレビ視聴の空白期間に注意する。"},{"id":"F028","cat":"F","diff":3,"q":"「テレビアンテナ（UHFアンテナ）を使った地デジ受信」と「andlineTV（フレッツ・テレビ）での地デジ受信」の違いとして正しいのはどれか？","choices":["アンテナ受信は電波の強弱・天候の影響を受けやすい","andlineTV（フレッツ・テレビ）もアンテナ受信と同様に台風時は受信障害が発生しやすい","UHFアンテナは建物内部への設置が法律で禁じられているためandlineTVより維持コストが高い","andlineTV（フレッツ・テレビ）は電波を使わないため地デジの放送エリア外でも視聴できる"],"ans":0,"exp":"UHFアンテナ（屋外アンテナ）は電波の強弱・建物の遮蔽・大雨・台風等の天候で受信状態が左右される。andlineTV（フレッツ・テレビ）は光回線経由のため天候の影響を受けず安定した受信が可能。ただしandlineTVはエリア外や月額料金等の制約がある。マンションでアンテナ設置が難しい場合にandlineTVが有効な選択肢になる。"},{"id":"G056","cat":"G","diff":2,"q":"「MVNO（格安SIM）のインターネット回線」と光回線の最大の違いはどれか？","choices":["MVNOはスマートフォン用のモバイルデータ通信サービスで、固定の光回線ではない。","MVNOはNTT東西の光ファイバー設備をMNO経由で間接的に使用する固定回線サービスの一種","MVNOと光回線はどちらもIP通信基盤を使うため実質的に同じインフラを共有しており技術的な差はない","MVNOは通信キャリアが保有する専用バックボーンを使うため一般の光回線よりも必ず高速で安定している"],"ans":0,"exp":"MVNOはMNO（NTTドコモ・au・SoftBank・楽天モバイル）の回線を借りて提供するスマートフォン用モバイルデータ通信サービス。固定の光回線（有線インフラ）とは根本的に異なる。光回線は固定の高速・安定通信が強みで、MVNOはどこでも持ち歩ける利便性が強み。"},{"id":"G057","cat":"G","diff":2,"q":"「auひかり」と「ドコモ光」のエリア確認方法の違いとして正しいのはどれか？","choices":["ドコモ光はサポートセンターへの電話のみでしかエリア確認ができない（規定上の運用と判断する取り扱い）","auひかりもドコモ光もNTTの同じエリア確認ページで一括して調べられる（規定上の運用と判断する取扱）","auひかりはエリア制限が一切なく日本全国どこでも申し込めるサービスだ（規定上の運用と判断する取扱）","ドコモ光はフレッツ光エリア＝利用可能だが、auひかりは独自回線のため建物単位でKDDIのエリア確認が必須"],"ans":3,"exp":"ドコモ光はNTTフレッツ光を使う光コラボのため、フレッツ光の提供エリアがそのまま利用可能エリア。auひかりはKDDI独自回線のため、建物ごとにKDDI公式サイトでエリア確認が必要。隣の建物が対応済みでも自分の建物が未対応というケースが頻繁にある。"},{"id":"G058","cat":"G","diff":3,"q":"「NTTドコモのスマートフォンを使っている家族のいるお客様」に最もセット割がお得な光回線の組み合わせはどれか？","choices":["ドコモ光（ドコモ光セット割：ドコモスマートフォン1台あたり最大1,100円/月割引）","auひかり（auスマートバリューはdocomoには非適用・規定上の運用と判断する取扱）","SoftBank光（SoftBankスマホとのセット割なし・規定上の運用と判断する）","NURO光（NTTドコモのスマホとのセット割なし・規定上の運用と判断する取扱）"],"ans":0,"exp":"NTTドコモのスマートフォンを使っている場合、ドコモ光が最もセット割のメリットが大きい。ドコモ光セット割でドコモのスマートフォン（対象プラン）の月額料金から最大1,100円/台を割引。家族全員がドコモユーザーなら割引額が大きくなる。"},{"id":"G059","cat":"G","diff":3,"q":"「地方のCATV会社（ケーブルテレビ）のインターネットサービス」の特徴として正しいのはどれか？","choices":["地方のCATV系インターネットはすべてNTTのフレッツ光を卸受けした光コラボ（規定上の運用と判断する）","地方CATVはNTT東西の子会社が運営している（規定上は資本提携先の連携契約による運用と判断する）","地方のCATV会社は独自のHFCインフラを持ち、そのエリア限定でインターネットサービスを提供する。","地方CATVはauひかりと同じ独自回線のため速度が速い（規定上はKDDIとの提携契約の運用と判断する）"],"ans":2,"exp":"地方のCATV会社（ケーブルテレビ）は独自のHFC（光ファイバー＋同軸ケーブル）インフラを持ち、そのサービスエリア内でインターネット・テレビ・電話サービスを提供する。NTTのフレッツ光系とは無関係で、光コラボの転用・事業者変更制度の対象外。乗り換えには解約と新規加入（工事あり）が必要。"},{"id":"G060","cat":"G","diff":3,"q":"「インターネット回線乗り換えを検討しているお客様への提案フロー」として正しい手順はどれか？","choices":["①現回線種別確認②不満・要望確認③回線種別検討④手続き種別確認⑤費用・タイミング確認の順","スマホのキャリアとのセット割額だけを基準にして最適な回線を提案する","まずandline光SEのメリットを説明してお客様に申し込みを促すことが最優先だ","月額料金が最も安い光回線を即座に提案してお客様の負担を最小化する"],"ans":0,"exp":"光回線の乗り換え提案で重要なのは①現在の回線種別（どの乗り換え手続きが使えるか）②お客様の不満や要望（速度/安定性/料金/スマホセット割/テレビサービス等）③これらを踏まえた適切な回線の提案④手続きの複雑さ・工事の有無・解約金⑤乗り換えタイミング（縛り期間の確認）。このフローを踏まえることで的確な提案が可能。"},{"id":"G061","cat":"G","diff":3,"q":"「ひかり電話からスマートフォンのみ（固定電話廃止）への移行を検討しているお客様」への案内として正しいのはどれか？","choices":["ひかり電話を解約してスマートフォンのみにする場合、0AB-J番号は廃番になる","ひかり電話の0AB-J番号はMNP制度を利用してスマートフォンに転入できるため、番号を引き継いだまま固定電話を廃止できる","ひかり電話を解約するとルーターがレンタル品の場合は返却が必要になり、インターネット回線も同時に解約となる","ひかり電話のオプション解約は光回線本体の解約を伴わないため、番号廃番を避けながらインターネット利用を継続できる"],"ans":0,"exp":"ひかり電話（0AB-J番号）をスマートフォンにMNPする制度は存在しない（2025年時点）。ひかり電話を解約すると0AB-J番号は廃番になる。一方でスマートフォンがあれば緊急通報（110・119）は可能。月額550円のandline電話料が不要になる等のコスト面でのメリットを案内する。"},{"id":"G062","cat":"G","diff":3,"q":"「光回線の速度が遅い場合に事業者変更で改善できるか？」について正しいのはどれか？","choices":["原因がプロバイダのバックボーン混雑やVNEサービスの品質である場合は事業者変更で改善できる可能性がある","事業者変更ではアクセスラインも変わるため、VDSL方式の速度制限も解消されて速度が向上する","光コラボ間の事業者変更ではNTT東西の物理回線が変わるため、どのような原因でも速度改善が期待できる","事業者変更は速度改善に効果がなく、速度が遅い場合は回線自体の解約・新規申し込みが唯一の解決策"],"ans":0,"exp":"光コラボ間の事業者変更でアクセスライン（NTT東西の物理回線）は変わらない。速度改善が期待できるのは「プロバイダ側のバックボーン混雑」や「VNEサービスの品質差」が原因の場合。VDSL方式・棟内配線の問題・ONUから端末までの機器的なボトルネックは事業者変更では改善しない。"},{"id":"G063","cat":"G","diff":4,"q":"「光回線とスマートフォンのセット割」を最大限活用するための戦略として正しいのはどれか？","choices":["光回線事業者の中で月額料金が最も安い事業者を選ぶことがセット割の有無に関わらず長期的に最もコストを抑える方法","光回線の品質はどの事業者でも同一のため、スマホのキャリアとは無関係に自分の予算に合った光回線を自由に選べばよい","家族全員が使っているスマートフォンのキャリアに対応した光回線を選ぶことで、スマホ複数台のセット割を最大化できる","スマホのセット割よりも申し込み特典としてWi-Fiルーターが無料でもらえる光回線の方が初年度コストが低く実質的にお得になる"],"ans":2,"exp":"光回線とスマホのセット割を最大化するには、家族が使っているスマートフォンのキャリアに合わせた光回線を選ぶことが重要。ドコモユーザーが多い家族はドコモ光、auユーザーはauひかり（またはUQモバイルならauひかりや電力系）、SoftBankユーザーはSoftBank光が最もセット割の恩恵を受けやすい。"},{"id":"G064","cat":"G","diff":3,"q":"「マンションで光配線方式のandline光SEを利用中だが、Wi-Fiが遅い部屋がある」問題の解決策として最も根本的なのはどれか？","choices":["Wi-Fiルーターを家の中央に移動する、または電波が届かない部屋にメッシュWi-FiのサブノードやWi-Fi中継器を設置する","光回線の速度プランをより高速なプランに変更することでWi-Fiの届く範囲が拡大し、遠い部屋でも速度が改善する","プロバイダをIPv4 over IPv6対応に変更することで電波の回り込みが改善され、遠い部屋まで届きやすくなる","ONUをマンション共用部からできるだけ遠い個室に移設することで電波の分散が改善される"],"ans":0,"exp":"Wi-Fiが届かない部屋の問題は光回線側ではなくWi-Fi環境の問題。光回線やプロバイダを変更しても解決しない。最も根本的な解決策はWi-Fiルーターの設置場所の最適化（家の中央・高い位置）とメッシュWi-Fiやアクセスポイントの追加設置。有線LANでバックホールを繋ぐとさらに安定する。"},{"id":"G065","cat":"G","diff":3,"q":"「複数の光回線サービスを同じ住所で同時に契約する」ことはできるか？","choices":["同一住所へのフレッツ光は原則1回線。","2回線引き込むと料金が半額になる","全ての組み合わせで自由に複数回線が引ける","できない（同じ住所への複数回線は禁止）"],"ans":0,"exp":"同じ住所へのフレッツ光（NTT東西）回線は原則1回線まで（法人・マルチセッション対応の例外あり）。ただしauひかり（独自回線）とandline光SE（フレッツ系）のような異なるインフラの組み合わせなら両方引き込むことは可能（費用は2倍になる）。バックアップ回線や業務用途での2回線活用には、異種インフラの組み合わせが現実的。"},{"id":"G066","cat":"G","diff":3,"q":"「スマートフォンのテザリングを光回線の代わりに使うことのデメリット」として正しいのはどれか？","choices":["テザリングによる自宅でのインターネット接続は携帯電話法の規定で商業利用が禁止されており、個人の自宅利用も許可制になっている","テザリングは5G対応スマートフォンを使えばping・速度・安定性のすべてにおいて光回線と完全に同等の通信品質を実現できる","テザリングはスマートフォンのSoCに過大な負荷をかけるため継続使用によってCPUが損傷しスマートフォンが壊れるリスクがある","テザリングは通信量のデータ容量制限がある・ping値が高い・安定性が光回線より低い・上り速度が遅い等の制約がある。"],"ans":3,"exp":"スマートフォンのテザリング（インターネット共有）のデメリットは①データ通信容量制限（使いすぎると速度制限）②ping値が高い（オンラインゲーム・リモートワークで不利）③無線回線のため安定性が低い④上り速度が遅い（バックアップ・ビデオ会議で不利）⑤スマートフォンのバッテリー消耗。一時的な使用や低通信量の用途には有効。"},{"id":"G067","cat":"G","diff":3,"q":"「光回線の乗り換えにかかる費用」の主な内訳として正しいのはどれか？","choices":["乗り換え先の初期費用が発生する。","工事費のみが発生し解約金は発生しない","乗り換えには政府の認可が必要なため手数料が高い","乗り換えは常に無料で費用が一切発生しない"],"ans":0,"exp":"光回線の乗り換え費用は①乗り換え先の契約事務手数料（4,000〜5,000円程度）②派遣工事が必要な場合の工事費③現在の回線の解約金（2年縛りがある場合）④現在の回線の工事費残債（「実質無料」キャンペーン中に解約する場合）等が発生する場合がある。andline光SEは解約金なしのため③は不要。"},{"id":"G068","cat":"G","diff":3,"q":"「イッツコムの提供エリアを超えてSoftBank光に乗り換えたい」場合の手続きとして正しいのはどれか？","choices":["イッツコムはCATV系でSoftBank光はNTTフレッツ系光コラボのため、アクセスラインが根本的に異なる。","転用承諾番号をNTT東西から取得してSoftBank光のサイトから転用申し込みができる","イッツコムから事業者変更承諾番号を取得してSoftBank光に申し込む手続きで乗り換えられる","イッツコムはNTT東西の回線を借りているためSoftBank光への事業者変更が使える"],"ans":0,"exp":"イッツコムはCATV系（東急グループ）のHFCインフラを使うサービス。SoftBank光はNTT東西フレッツ光を使う光コラボ。インフラが全く異なるため事業者変更・転用は不可。イッツコムを解約してSoftBank光の新規申し込み・工事が必要。イッツコムにも解約金の有無・タイミングを確認すること。"},{"id":"G069","cat":"G","diff":3,"q":"「自宅のネットワーク機器（ルーター・ONU・HGW）のランプが全消灯した」場合のトラブルシューティングとして正しいのはどれか？","choices":["まずコンセント・電源ケーブルの接続確認と電源スイッチの確認を行う","まずONUのPONランプを確認し、消灯していればNTT東西への問い合わせを最初のステップとする","全消灯はファームウェアの破損が最も多い原因のため、まず製造元サポートへ連絡して復旧手順を確認する","ルーターとONUを同時にリセットし、最低30分待機してから再起動することをまず試みる"],"ans":0,"exp":"ランプ全消灯の最初の確認は①コンセントの接続確認・電源タップのスイッチ確認②機器の電源ボタンの確認（誤って押された等）③ブレーカーの確認。これらで電源が確認できたらONUのPONランプで回線側の問題かを判断する。PONランプ消灯なら回線側（NTT東西・光コラボ事業者への問い合わせ）、PON点灯でWAN接続ランプ消灯なら設定の問題を疑う。"},{"id":"G070","cat":"G","diff":2,"q":"「光回線のベストエフォート型サービス」における「最大1Gbps」の意味として正しいのはどれか？","choices":["理論上の最大値で、実際の速度は時間帯・端末・Wi-Fi環境等によって変動する","常時1Gbpsが保証された最低速度で実際はそれ以上の速度が出ることが多い","技術的な仕様上1Gbpsを超える速度が出ることは絶対にない上限制限値を意味する","1Gbpsが最低保証値として契約書に明記されている品質保証型サービスの基準値だ"],"ans":0,"exp":"「最大1Gbps」はベストエフォート型サービスの理論上の上限値。実際の速度は夜間の混雑（PPPoEなら網終端装置）・Wi-Fi区間の性能・端末のNIC規格・プロバイダの設備品質等により変動し、多くの場合は理論値より低くなる。「速度保証ではない」ことをお客様にしっかり案内することが重要。"},{"id":"N021","cat":"N","diff":2,"q":"「NTTグループ全体の持株会社」として正しいのはどれか？","choices":["日本電信電話株式会社（NTT）","NTTホールディングス（2023年の再編でNTTが持株機能を分離してNTTホールディングスを設立）","NTTドコモ（モバイル・固定・法人を統括する中核会社としてグループ全体の持株機能を担う）","NTT東日本（固定通信インフラを管轄するNTT東日本がグループの中核持株会社を兼務）"],"ans":0,"exp":"日本電信電話株式会社（NTT）はNTTグループ全体の持株会社。NTT東日本・NTT西日本・NTTドコモ・NTTドコモビジネス・NTTデータ等の事業会社を傘下に持つ。グループ全体の経営方針・資本戦略を担う。"},{"id":"N022","cat":"N","diff":2,"q":"「NTT東日本・NTT西日本の事業範囲」として正しいのはどれか？","choices":["フレッツ光等の固定電話・光ブロードバンドのアクセスラインインフラの整備・維持・提供","NTT東西はフレッツ光の個人向け販売も直接担当しており、光コラボ事業者と並行してエンドユーザーへのサービス提供も行っている","NTT東西はアクセスラインの管理に加え、光コラボ事業者向けVNEサービスの技術基準策定・認定業務も担当している","NTT東西はフレッツ光の設備管理のほか、ドコモ光・andline光SEなどの料金設定にも関与している"],"ans":0,"exp":"NTT東日本・NTT西日本（NTT東西）はフレッツ光などの固定電話・光ブロードバンドのアクセスライン（ラストワンマイル）インフラを担当する地域通信会社。NTT東日本は東日本17都道府県、NTT西日本は西日本30府県を担当。光コラボへの回線卸売りもNTT東西が行う。"},{"id":"N023","cat":"N","diff":2,"q":"NTTグループ再編後の「NTTドコモ」の主な事業として正しいのはどれか？","choices":["個人向けモバイル通信・光回線（ドコモ光）・コンテンツサービスの提供","モバイル通信に加えNTTコムから引き継いだ法人向けICT事業も統合して個人・法人を一元担当","モバイル通信と光回線に加えNTT東西のアクセスライン設備の保守・管理業務も再編後に統合","NTTグループの個人向け事業会社として再編されたが、ドコモ光の販売代理はNTT東西が引き続き担当"],"ans":0,"exp":"NTTグループ再編後のNTTドコモは個人向けサービスを一元化。ahamo・irumo・eximo等のモバイルサービス・ドコモ光（光コラボ）・ひかりTV・OCNモバイルONE等の個人向けサービスを担当。法人向けはNTTドコモビジネスが担当する役割分担。"},{"id":"N024","cat":"N","diff":5,"q":"「OCNバーチャルコネクトの商標」は現在どこが保有しているか？","choices":["NTTドコモビジネス（NTTグループ再編でNTTコムの事業を引き継いだ会社）","JPIX（v6プラスとの統合計画に基づきOCNバーチャルコネクトの商標管理がJPIXに移管）","NTTドコモ（個人向けOCNサービスの移管に伴いOCNブランド全体の商標もNTTドコモが保有）","NTT持株会社（グループ共通ブランドとしてNTT本社が一括管理）"],"ans":0,"exp":"OCNバーチャルコネクトはもともとNTTコミュニケーションズが開発したVNEサービスで商標もNTTコムが保有していたが、2023年のNTTグループ再編によりNTTドコモビジネスがNTTコムの法人向け事業を引き継いだ。OCNバーチャルコネクトの商標・サービス提供主体はNTTドコモビジネスに移管されている。"},{"id":"W031","cat":"W","diff":3,"q":"「ルーターのファームウェア更新」の重要性として正しいのはどれか？","choices":["ファームウェア更新によりセキュリティ脆弱性の修正・新VNEサービスへの対応・安定性の向上等が行われる","ルーターのファームウェアは出荷時に最終版が書き込まれており、その後の更新は不要で更新すると不具合の原因になる","ファームウェア更新は最大通信速度を向上させるためのもので、セキュリティとは直接の関係はない","ファームウェア更新を行うとVNEサービスへの接続設定がリセットされるため、更新後は再設定が必要"],"ans":0,"exp":"ルーターのファームウェア更新は①セキュリティ脆弱性の修正（不正アクセス防止）②新しいVNEサービスへの対応追加（例：OCNバーチャルコネクトからv6プラスへの対応）③バグ修正・安定性向上④新機能追加などのために重要。メーカーの公式サイトで最新ファームウェアを確認し定期的に更新することが推奨される。"},{"id":"W032","cat":"W","diff":4,"q":"「Wi-Fiルーターの最大接続台数」について正しいのはどれか？","choices":["最大接続台数は理論値であり、接続台数が増えるほど各端末への帯域が分割され速度・応答性が低下する","最大接続台数はルーターが保証する同時通信台数であり、超過しても接続自体はできるが保証外の動作になる","Wi-Fiルーターの最大接続台数はIPアドレスの枯渇上限を示しており、速度低下とは直接関係しない","最大接続台数に達するとルーターは新規接続を物理的にブロックするため、既存の接続には一切影響が出ない"],"ans":0,"exp":"Wi-Fiルーターの最大接続台数は理論値で、接続台数が増えると各端末への割り当て帯域が減少する。スマホ・PC・IoT機器・ゲーム機等が多数同時接続する環境ではOFDMA（Wi-Fi 6）対応の高性能ルーターが有効。2x2アンテナの廉価品では多端末接続時に通信が不安定になりやすい。"},{"id":"W033","cat":"W","diff":5,"q":"「Wi-FiルーターをIPv4 over IPv6（IPv6サービス）で使う場合の具体的な手順」として正しいのはどれか？","choices":["①VNEサービス対応ルーターをONUに接続②管理画面でIPv4 over IPv6を有効化③VNEサーバーへの接続が自動完了。ID/パスワードの手動入力は不要","①ルーターをONUに接続②プロバイダから郵送されるIPoE認証コードを管理画面に手動入力③認証完了後にIPv4 over IPv6が有効になる","①VNEサービス対応ルーターをHGWのLANポートに接続②ルーターをルーターモードに設定③IPv6アドレスをNTT東西のサイトで手動申請する","①ルーターをONUに接続②PPPoE接続を一度確立してからIPv4 over IPv6モードへ手動で切り替える③切り替え後はPPPoE設定を無効化する"],"ans":0,"exp":"IPv4 over IPv6（IPv6サービス）対応ルーターの設定手順は①対応ルーターをONUに接続②ルーターの管理画面でIPv4 over IPv6（IPv6サービス）機能を有効化（製品によっては自動検出）③VNEサーバーとの接続が自動完了。PPPoEのようなID/パスワード手動入力は不要。設定完了後はIPv4 over IPv6（IPv6サービス）のルーティングが自動的に機能する。"},{"id":"W034","cat":"W","diff":6,"q":"「Wi-Fiルーターの『QoS（Quality of Service）機能』」の説明として正しいのはどれか？","choices":["特定のアプリケーション・端末・通信種別に優先的に帯域を割り当てる機能","接続端末の台数を制限して無許可のデバイスをブロックするセキュリティ制御機能","Wi-Fiチャネルを自動最適化して周囲の電波干渉を回避し通信品質を維持する機能","ルーターの発熱を監視してCPU負荷が高まると処理速度を自動制御して安定性を保つ機能"],"ans":0,"exp":"QoS（Quality of Service）はルーターが通信の優先度を制御する機能。帯域が混雑している状況でも特定の端末・アプリケーション（ゲーム・ビデオ会議等）への帯域を優先的に確保できる。例えば「PS5のゲーム通信を最高優先度にする」「ビデオ会議の帯域を常に確保する」等の設定が可能。"},{"id":"W035","cat":"W","diff":4,"q":"「ゲーミングルーター」の特徴として正しいのはどれか？","choices":["高性能プロセッサ・多アンテナ・QoS機能・低レイテンシ最適化等の特徴を持ち、ゲーム端末への帯域優先・ping値低減に優れる","ゲーミングルーターは一般ルーターと同じハードウェアを使用しており、差別化要素はゲームUIや管理アプリのみ","ゲーミングルーターはゲーム会社と提携したルーターであり、対応ゲームタイトルのサーバーに専用ルートで優先接続する機能を持つ","ゲーミングルーターは5GHz帯の電波出力を法定上限を超えて増強しており、通常ルーターより電波到達距離が2倍以上になる"],"ans":0,"exp":"ゲーミングルーター（ROGやROG RAPTUREシリーズ等）は高性能CPUにより低レイテンシ処理・QoS機能でゲーム通信を優先・安定したWi-Fi接続を実現する特化型製品。通常のルーターとの差は環境・用途によって異なるが、オンライン対戦ゲームをメインに使う場合は効果が実感しやすい。"},{"id":"W036","cat":"W","diff":5,"q":"「Wi-Fi接続でのIPv4 over IPv6（IPv6サービス）の動作確認」として正しいのはどれか？","choices":["スマートフォンはWi-Fi経由でIPv4 over IPv6（IPv6サービス）が使えない","有線LAN接続の端末のみがIPv4 over IPv6（IPv6サービス）の恩恵を受けられる","Wi-Fi接続でもIPv4 over IPv6（IPv6サービス）は使える。","Wi-Fi接続ではIPv4 over IPv6（IPv6サービス）は使えない"],"ans":2,"exp":"IPv4 over IPv6（IPv6サービス）はルーターがVNEサービスに接続することで実現する。ルーターに繋がっているすべての端末（Wi-Fi・有線LAN問わず）がIPv4 over IPv6（IPv6サービス）の恩恵を受けられる。Wi-Fiで接続しているスマートフォン・PC・ゲーム機も同様にIPv4 over IPv6（IPv6サービス）で通信する。"},{"id":"W037","cat":"W","diff":5,"q":"「HGW（ホームゲートウェイ）配下の市販Wi-FiルーターをAPモードにする理由」として正しいのはどれか？","choices":["HGWが既にルーター機能を持つためWi-FiルーターはAPモードにして二重NATを防ぐ","HGWのルーター機能とWi-FiルーターのDHCP機能を同時に有効にすることでIPアドレスの冗長割り当てが実現し、接続安定性が向上する","APモードにするとWi-FiルーターのファイアウォールがHGWと連動して強化される","HGW配下でWi-FiルーターをルーターモードのままにするとIPv6アドレスが二重に付与されIPv6サービスの速度が向上する"],"ans":0,"exp":"HGW（ひかり電話対応ゲートウェイ）はONU機能＋ルーター機能（NAT・DHCP・IPv4 over IPv6（IPv6サービス）設定）を内蔵している。この後段に市販Wi-FiルーターをルーターモードでつなぐとNATが2重になりポート開放が機能しない・NATタイプが悪化する問題が発生する。市販Wi-FiルーターをAPモード（ブリッジモード）にするとルーター機能が無効化され、Wi-Fiアクセスポイントとしてのみ動作する。"},{"id":"W038","cat":"W","diff":6,"q":"「Wi-Fi 6の『TWT（Target Wake Time）』機能」の説明として正しいのはどれか？","choices":["ルーターと端末が通信スケジュールを事前に取り決め、不要な時間帯は端末の無線モジュールをスリープにして省電力化","ルーターが電波を時間帯別に強弱制御し、深夜帯に消費電力を自動で下げる機能","ルーター側で複数端末の通信タイミングをずらして割り当て、OFDMAと組み合わせることで最大通信速度を向上させる機能","バッテリー駆動端末に優先的に高速レーンを割り当て、充電時間を短縮する機能"],"ans":0,"exp":"TWT（Target Wake Time）はWi-Fi 6で導入された省電力機能。ルーターと端末が通信スケジュール（いつ起動してデータを送受信するか）を事前に調整し、送受信が不要な時間帯は端末の無線モジュールをスリープ状態にする。IoT機器（スマートセンサー等）やスマートフォンのバッテリー持続時間の改善に効果的。"},{"id":"W039","cat":"W","diff":5,"q":"「光回線のGbE（1Gbps）対応の有線LANポート」と「10GbE（10Gbps）対応ポート」の確認方法として正しいのはどれか？","choices":["デバイスマネージャー（Windows）またはシステム情報（Mac）のネットワークアダプターの仕様で最大速度を確認する","ルーターのWAN側に接続したLANケーブルの規格（CAT5e・CAT6等）で判断できる","タスクマネージャーで現在の通信速度を確認し、1Gbpsに達していれば10GbEポート搭載と判断できる","LANポート横のLEDランプがオレンジ点灯なら1GbE、緑点灯なら10GbEと規格化されている"],"ans":0,"exp":"PCが10GbE対応かどうかはOSのデバイス情報で確認できる。Windowsはデバイスマネージャー→ネットワークアダプター→対象NICのプロパティ→リンク速度欄で確認。Macはシステム情報→ネットワーク→インターフェース一覧で確認。フレッツ光クロス（10Gbps）の恩恵を受けるにはPCのNICが10GbE対応が必要。"},{"id":"W040","cat":"W","diff":6,"q":"「ルーターのWAN側MACアドレスの固定（MACアドレスクローニング）」が必要になる場面として正しいのはどれか？","choices":["ISPや一部のサービスがMACアドレスで接続認証している場合に、旧ルーターから新ルーターへ交換した際に旧ルーターのMACアドレスを新ルーターに設定することで再認証なしに接続できる手法","IPv6 IPoE環境でVNEサービスがルーターを識別するために必要で、ルーター交換時に旧機器のMACアドレスを引き継がないとIPv6サービスに再接続できない","PPPoE認証においてプロバイダがユーザーIDの代わりに接続端末のMACアドレスを照合して認証する一部の光コラボで必要な設定で、IDとパスワードを毎回入力する手間が省ける","MACアドレスクローニングはルーターのWAN側識別情報を任意の値に書き換える機能のため、設定を変更した場合はプロバイダへの接続機器変更届の提出が利用規約上必要になる"],"ans":0,"exp":"MACアドレスクローニングはルーター交換時に旧機器のMACアドレスを新機器に設定する機能。一部のCATVサービスや古いISPではMACアドレスで接続機器を管理している場合があり、ルーター交換後に認証失敗・接続不可になるケースがある。この場合にMACアドレスクローニングで旧MACアドレスを継承すると解決できる。"},{"id":"W041","cat":"W","diff":6,"q":"「Wi-Fiの『SSIDステルス（SSID非表示）』設定」について正しいのはどれか？","choices":["SSIDステルスはWi-Fiのネットワーク名（SSID）を一覧に表示しない設定","SSIDステルスはルーターのMACアドレスを定期的に変更して追跡・特定を困難にするプライバシー保護機能","SSIDステルスを有効にするとWPA3以上の暗号化が強制され、WPA2接続の端末は自動的に切断される","SSIDステルスは家庭内LAN専用の隠しチャネルを作成し、メインSSIDとは別のセキュアなネットワークを提供する"],"ans":0,"exp":"SSIDステルスはWi-Fi一覧にネットワーク名を表示しない設定で、不特定多数からの接続試行を減らす簡易的な対策。ただし専用のWi-Fiスキャナーツールを使えばステルスSSIDも検出可能で、高度な攻撃者には無効。Wi-Fiの主なセキュリティ対策はWPA3（またはWPA2-AES）による強固な暗号化と複雑なパスワードの設定。"},{"id":"W042","cat":"W","diff":4,"q":"「IPv4 over IPv6（IPv6サービス）対応ルーターの選び方」で最初に確認すべきことはどれか？","choices":["まず自分のプロバイダが採用しているVNEサービスを確認し、そのVNEサービスの公式動作確認済みリストに掲載されているルーターを選ぶ","IPv4 over IPv6対応と記載されたルーターであればVNEサービスを問わず動作するため、対応表記のある製品から予算で選べばよい","まずルーターのWi-Fi規格（Wi-Fi 6/6E等）を確認し、最新規格に対応した製品がIPv4 over IPv6にも自動対応している","IPv4 over IPv6対応ルーターの選定ではプロバイダへの互換性確認より、有線ポート数とWi-Fi速度スペックの確認が最優先"],"ans":0,"exp":"IPv4 over IPv6（IPv6サービス）対応ルーターの選定で最重要なのはVNEサービスとの互換性確認。v6プラス・OCNバーチャルコネクト・transix・クロスパス等はどれもMAP-EかDS-Liteだが実装が異なる。プロバイダまたはVNE事業者（JPIX・インターネットマルチフィード等）の公式動作確認済みルーターリストで自分の環境に合った機器を選ぶことが最も確実。"},{"id":"E041","cat":"E","diff":1,"q":"andline光SEの戸建てプランの月額料金として正しいのはどれか？","choices":["月額4,600円（税込）","月額6,600円（税込）","月額3,500円（税込）","月額5,720円（税込）"],"ans":0,"exp":"andline光SEの戸建てプランは月額4,600円（税込）。マンションプランは月額3,500円（税込）でシンプルな料金体系。契約期間の縛りなし・解約金なし。"},{"id":"E042","cat":"E","diff":1,"q":"andline光SEの集合住宅（マンション）プランの月額料金として正しいのはどれか？","choices":["月額5,500円（税込）","月額4,600円（税込）","月額3,500円（税込）","月額2,200円（税込）"],"ans":2,"exp":"andline光SEのマンションプランは月額3,500円（税込）。戸建てプランの4,600円より安く、業界最安値水準。解約金なし・縛りなし。"},{"id":"E043","cat":"E","diff":1,"q":"andline光SEの「最低利用期間」と「解約金」について正しいのはどれか？","choices":["最低1年・解約金あり","最低利用期間なし・解約金なし","最低6ヶ月・解約金なし","最低2年・解約金あり"],"ans":1,"exp":"andline光SEは最低利用期間の定めがなく、解約金（違約金）も発生しない。重要事項説明書に「いつでも解約の申し出ができ、解約金は発生しません」と明記。これがandline光SEの大きな特徴の一つ。"},{"id":"E044","cat":"E","diff":1,"q":"andline光SEのIPv4 over IPv6（IPv6サービス）の採用VNEとして正しいのはどれか？","choices":["v6プラス（MAP-E）","transix（DS-Lite）","OCNバーチャルコネクト（MAP-E）","BBIXのIPv6高速ハイブリッド"],"ans":0,"exp":"andline光SEはJPIXのv6プラス（MAP-E方式）を採用したIPv4 over IPv6（IPv6サービス）を無料で提供。夜間の混雑時も速度が安定しやすい。v6プラス対応ルーターが必要。"},{"id":"E045","cat":"E","diff":2,"q":"andline光SEの「10ギガプラン」の月額料金として正しいのはどれか？","choices":["月額6,105円（税込）","月額4,600円（税込）","月額8,800円（税込）","月額10,000円（税込）"],"ans":0,"exp":"andline光SE 10ギガプランは月額6,105円（税込）。通常の1ギガプランより2,000円程度高いが、他社の10ギガプランより安い水準。10ギガにはCAT6A以上のLANケーブルと10GbE対応ルーターが必要。"},{"id":"E046","cat":"E","diff":2,"q":"andline光SE 10ギガプランで必要なルーターの接続仕様として正しいのはどれか？","choices":["10ギガ対応ルーター（10GbE）とCAT6A以上のLANケーブルが必要","通常の1GbEポートのルーターでも10Gbpsの速度をフルに活用できる","Wi-Fi 6対応ルーターであれば有線LANポートの規格は問わない","andlineが指定する専用レンタルルーター以外は接続して使えない"],"ans":0,"exp":"andline光SE 10ギガを活かすには10GbE対応のルーターとCAT6A以上のLANケーブルが必要。andlineでは10ギガ対応Wi-Fiルーターのレンタル（月額550円）を提供しており、キャンペーン適用で永年無料になる場合もある。"},{"id":"E047","cat":"E","diff":2,"q":"andline光SEの「開通月の料金」について正しいのはどれか？","choices":["開通月は契約日から月末まで日割り計算される","開通月はまとめて翌月に請求される","開通月は月額料金が無料","開通月は1ヶ月分まるごと請求される"],"ans":0,"exp":"andline光SEは開通月（利用開始月）は契約日から月末まで日割り計算される。一方、解約月は日割りにならず1ヶ月分まるごと請求されるという非対称な設計。この点はお客様への案内で確認が必要。"},{"id":"E048","cat":"E","diff":2,"q":"andline光SEの「工事費（派遣工事）」の支払い方法として正しいのはどれか？","choices":["一括払いまたは12分割払いから選択できる","工事費は常に無料（規定の特典として適用）","一括払いのみ可能（規定により分割は不可）","分割払いのみ可能（規定により一括は不可）"],"ans":0,"exp":"andline光SEの派遣工事費（19,800円税込）は一括払いまたは12分割払い（1,650円/月）から選択できる。分割払いは派遣工事を要する新規契約工事料のみ可能。キャンペーン適用で工事費が実質無料になる場合もあるが、分割払い期間中の解約では残債が発生する。"},{"id":"E049","cat":"E","diff":2,"q":"andline光SEの「契約事務手数料」はいくらか？","choices":["9,900円（税込）","4,378円（税込）","2,200円（税込）","無料"],"ans":1,"exp":"andline光SEの契約事務手数料は4,378円（税込）。申し込み時に1回のみ発生する初期費用。キャンペーンで無料になる場合もある。工事費とは別途発生する費用。"},{"id":"E050","cat":"E","diff":2,"q":"andline光SEの「土日・祝日の派遣工事」における追加費用として正しいのはどれか？","choices":["追加費用なし（平日と同じ）","1,100円（税込）の追加","3,300円（税込）の追加","11,000円（税込）の追加"],"ans":2,"exp":"andline光SEで土日・祝日に派遣工事を行う場合、通常の工事費に加えて3,300円（税込）の割増工事費が発生する。工事日の選択時に平日か土日祝かを確認して案内することが重要。"},{"id":"E051","cat":"E","diff":1,"q":"andline光SEの「IPv4 over IPv6（IPv6サービス）」の利用に追加料金はかかるか？","choices":["v6プラス対応ルーターのレンタル料のみ必要","月額1,100円の追加料金が必要","月額550円の追加料金が必要","追加料金なし（無料で利用可能）"],"ans":3,"exp":"andline光SEのIPv4 over IPv6（IPv6サービス）（v6プラス）は追加料金なしで無料利用可能。これはandline光SEのメリットの一つ。利用にはv6プラス対応ルーターが必要（お客様自身で用意するか別途レンタル）。"},{"id":"E052","cat":"E","diff":2,"q":"andline光SEのサポート窓口（カスタマーサポートデスク）の電話番号として正しいのはどれか？","choices":["116（NTT代表番号）","0120-978-736（無料）","0120-946-579（無料）","0570-783-600（有料）"],"ans":1,"exp":"andlineのカスタマーサポートデスクは0120-978-736（無料通話）。営業時間は10:00〜19:00（年末年始除く）。解約希望月の15日までにこの番号への連絡が必要。"},{"id":"E053","cat":"E","diff":2,"q":"andline光SEの申し込みフォームから確認の電話が来るまでの流れとして正しいのはどれか？","choices":["VNE事業者であるJPIXのサポートセンターから申し込み内容の確認と審査結果の通知が電話で来る","申し込みフォームを送信して決済が確認された時点で自動的に開通処理とNTT東西への工事申請が始まる","申し込み後にandlineから電話で内容確認がある（クレジットカード登録者から順次連絡）","NTT東西の開通受付センターから工事日程の候補日と時間帯の確認電話が直接お客様のもとへ来る"],"ans":2,"exp":"andline光SE申し込み後、andlineSE申込相談窓口（0120-946-579）からお申し込み内容の確認電話が来る。クレジットカード登録者から順次連絡。電話以外での連絡はしていない。"},{"id":"B101","cat":"B","diff":1,"q":"「ドコモ光」の月額料金（マンション・タイプA・2年定期契約）として正しいのはどれか？","choices":["月額3,500円（税込）","月額5,720円（税込）","月額6,380円（税込）","月額4,400円（税込）"],"ans":3,"exp":"ドコモ光マンションタイプA（2年定期契約）は月額4,400円（税込）。タイプBは4,620円と220円高い。戸建てタイプAは5,720円。タイプAの方がプロバイダの選択肢も多く（18社）お得。"},{"id":"B102","cat":"B","diff":1,"q":"「ドコモ光」の月額料金（戸建て・タイプA・2年定期契約）として正しいのはどれか？","choices":["月額4,620円（税込）","月額7,370円（税込）","月額5,720円（税込）","月額4,400円（税込）"],"ans":2,"exp":"ドコモ光戸建てタイプA（2年定期契約）は月額5,720円（税込）。タイプBは5,940円と220円高い。定期契約なしにすると7,370円と大幅に高くなる。2年定期契約が基本。"},{"id":"B103","cat":"B","diff":2,"q":"「ドコモ光 タイプA」と「タイプB」の月額料金の差として正しいのはどれか？","choices":["タイプAはタイプBより毎月110円安い","タイプBはタイプAより毎月550円安い","タイプAとタイプBは同額","タイプAはタイプBより毎月220円安い"],"ans":3,"exp":"ドコモ光はタイプAがタイプBより毎月220円安い。マンションでも戸建てでも、1ギガでも10ギガでも、定期契約ありでもなしでもこの差額は一定。選択肢が多く安いタイプAが契約者の9割以上を占める。"},{"id":"B104","cat":"B","diff":2,"q":"「ドコモ光 タイプA」と「タイプB」の選べるプロバイダ数として正しいのはどれか？","choices":["タイプAは6社・タイプBは18社","タイプAは18社・タイプBは6社","タイプAもタイプBも同数（10社）","タイプAのみプロバイダを選べる"],"ans":1,"exp":"ドコモ光1ギガはタイプAが18社のプロバイダから選択可能で月額が安い。タイプBは6社から選べるが月額が220円高い。料金・プロバイダ選択肢の両面からタイプAが有利なことが多い。"},{"id":"B105","cat":"B","diff":2,"q":"「ドコモ光 2年定期契約」中途解約時の解約金（戸建て）として正しいのはどれか？","choices":["戸建て・マンション共通10,000円（旧プラン同額・廃止前）","戸建て：5,500円（税込）、マンション：4,180円（税込）","解約金なし（2022年の改定で完全撤廃され全プラン廃止）","月額料金の6ヶ月分（戸建て・マンション共通の算出方式）"],"ans":1,"exp":"ドコモ光2年定期契約の解約金は戸建て5,500円・マンション4,180円（いずれも税込、2022年7月以降申し込み分）。更新月（満了月・翌月・翌々月）に解約すれば解約金は発生しない。andline光SEと異なり解約金があることに注意。"},{"id":"B106","cat":"B","diff":1,"q":"「ドコモ光 1ギガ タイプA」でandline光SEから乗り換える場合の手続きとして正しいのはどれか？","choices":["ドコモショップに直接来店しないとタイプAへの申し込み手続きが完了しない","転用承諾番号をNTT東西から取得してからドコモ光のサイトで申し込む","auひかりと同様にKDDI設備への新規引き込み工事が必要になる","事業者変更承諾番号をandlineから取得してドコモ光に申し込む"],"ans":3,"exp":"andline光SE（光コラボ）からドコモ光（光コラボ）への乗り換えは「事業者変更」。andlineカスタマーサポートに事業者変更承諾番号（有効15日）を申請し、ドコモ光に申し込む。アクセスラインが変わらないため工事は原則不要。"},{"id":"B107","cat":"B","diff":2,"q":"「ドコモ光 10ギガ タイプA・2年定期契約」の月額料金として正しいのはどれか？","choices":["月額5,720円（税込）","月額6,380円（税込）","月額10,000円（税込）","月額8,030円（税込）"],"ans":1,"exp":"ドコモ光10ギガ タイプA（2年定期契約）は月額6,380円（税込）。戸建て・マンション共通料金。定期契約なしにすると8,030円と大幅に高くなる。"},{"id":"X036","cat":"X","diff":1,"q":"「フレッツ光ネクスト ファミリー・ギガラインプラン」の最大通信速度として正しいのはどれか？","choices":["下り最大200Mbps","下り最大10Gbps","下り最大1Gbps","下り最大500Mbps"],"ans":2,"exp":"フレッツ光ネクスト ファミリー・ギガラインプランは下り最大1Gbpsのサービス。andline光SEも同じFTTHアクセス回線を使用する。10GbpsはフレッツSuperHighSpeedタイプ（フレッツ光クロス）のプラン。"},{"id":"X037","cat":"X","diff":1,"q":"フレッツ光（NTT直販）をandline光SE（光コラボ）に乗り換える場合の手続き名称として正しいのはどれか？","choices":["再転用","新規申し込み","転用","事業者変更"],"ans":2,"exp":"フレッツ光（NTT直販2社契約）→光コラボ（1社契約）への切り替えを「転用」と呼ぶ。NTT東西から転用承諾番号（有効15日）を取得してandline光SEに申し込む。アクセスラインは変わらないため工事は基本不要（無派遣）。"},{"id":"X038","cat":"X","diff":1,"q":"「転用承諾番号」の有効期限として正しいのはどれか？","choices":["15日間","7日間","90日間","30日間"],"ans":0,"exp":"転用承諾番号の有効期限は取得日から15日間。15日以内にandline光SE等の光コラボに申し込みが完了している必要がある。事業者変更承諾番号も同じく有効期限は15日間。期限切れの場合は再取得が必要。"},{"id":"X039","cat":"X","diff":1,"q":"「事業者変更承諾番号」の有効期限として正しいのはどれか？","choices":["30日間","60日間","90日間","15日間"],"ans":3,"exp":"事業者変更承諾番号の有効期限は取得日（発行日）を含む15日間。転用承諾番号も同じく15日間。光コラボからandline光SEへの乗り換え時に必要。2022年7月以降は発行手数料無料。"},{"id":"X040","cat":"X","diff":2,"q":"フレッツ光（NTT直販）からandline光SEに転用した後、旧プロバイダ（OCN等）との契約はどうなるか？","choices":["NTT東西が転用手続きの完了通知を旧プロバイダへ自動送信するため、旧プロバイダ側で解約手続きが自動的に処理される","転用後も旧プロバイダとの契約は継続するため、お客様が別途解約手続きをしないと二重払いになる","andline光SEの開通が確認された時点でNTT東西のシステムが旧プロバイダへ解約信号を送信して自動解約される","転用後1か月は旧プロバイダのサービスが並行して継続提供され、翌月1日に自動解約されるため二重払いにはならない"],"ans":1,"exp":"フレッツ光からandline光SEに転用しても、旧プロバイダ（OCN・BIGLOBE等）との契約は自動解約されない。お客様が旧プロバイダに個別に解約手続きをしなければ二重払いになる。andline光SEの重要事項説明書でも必ず案内が必要な事項。"},{"id":"X041","cat":"X","diff":2,"q":"フレッツ光からandline光SE（光コラボ）への転用で「ひかり電話」はどうなるか？","choices":["ひかり電話は廃止になる（新たにandline電話として申し込みが必要となる）","ひかり電話番号が変わる（光コラボでは新規番号が自動採番される運用）","ひかり電話は光コラボでは使えない（光コラボ転用時は強制廃止される規定）","転用と同時にandline電話として自動的に引き継がれる（電話番号も継続）"],"ans":3,"exp":"フレッツ光のひかり電話は光コラボへの転用時に自動的にandline電話として引き継がれる。電話番号もそのまま継続利用できる。ただしお客様の現在の契約状況によっては引き継ぎができない場合もあるため事前確認が必要。"},{"id":"X042","cat":"X","diff":2,"q":"フレッツ光（NTT直販）の「転用承諾番号」はどこで取得するか？","choices":["andline光SEのサポートに電話して取得","現在のプロバイダ（OCN等）に申し込んで取得","総務省のWebサイトから取得","NTT東西の転用受付窓口（電話またはWeb）で取得"],"ans":3,"exp":"転用承諾番号はNTT東西の転用受付窓口で取得する（NTT東日本：0120-111-480等）。プロバイダではなくNTT東西への申請が必要。取得後15日以内にandline光SE等の光コラボに申し込む。"},{"id":"X043","cat":"X","diff":2,"q":"andline光SEから他の光コラボへの「事業者変更承諾番号」はどこで取得するか？","choices":["乗り換え先の新事業者から発行される（変更先の事業者で取得する手続きの運用）","NTT東西から取得（NTT東西のサポート窓口に申請して発行する手続きの運用）","andlineカスタマーサポートデスク（0120-978-736）に申し込んで取得","総務省に申請して取得（公的機関の管轄手続きで発行される運用となる規定）"],"ans":2,"exp":"光コラボからの事業者変更承諾番号は現在利用中の光コラボ事業者（andlineの場合はカスタマーサポートデスク：0120-978-736）に申し込んで取得する。転用承諾番号はNTT東西から取得するのと対照的。有効期限は15日間。"},{"id":"X044","cat":"X","diff":2,"q":"「光コラボ」と「フレッツ光（NTT直販）」で物理的に異なるものはどれか？","choices":["NTT東西のNGN設備（光コラボでは独自NGNに分離される）","光ファイバーのアクセスライン（光コラボは独自配線を使用する）","契約形態（1社か2社か）・請求先・プロバイダの種類","ONUの基本機能（光コラボ専用ONUに置換される）"],"ans":2,"exp":"光コラボもフレッツ光（NTT直販）も物理的なアクセスライン・ONUの基本機能・NGN設備は同じ。異なるのは契約の窓口（光コラボ事業者かNTT直販か）・請求先（1本か2本か）・プロバイダの種類など商流面のみ。"},{"id":"X045","cat":"X","diff":2,"q":"「光コラボへ転用後、フレッツ光（NTT直販）に戻す」手続きの名称として正しいのはどれか？","choices":["新規申し込み","事業者変更","転用","再転用"],"ans":3,"exp":"光コラボからフレッツ光（NTT直販）に戻すことを「再転用」と呼ぶ。事業者変更承諾番号を取得してNTT東西に申し込む。アクセスラインは変わらないため工事不要。ただし2社契約（NTT東西＋プロバイダ個別契約）に戻るため手間が増える。"},{"id":"A051","cat":"A","diff":1,"q":"「光コラボレーション（光コラボ）」の仕組みとして正しいのはどれか？","choices":["NTT東西が光回線をISP事業者に卸し、そのISP事業者がエンドユーザーに回線とプロバイダをセットで提供するサービスモデル","光コラボ事業者がNTT東西から独立して自社で全国の光ファイバー網を設計・整備し、独自の設備でサービスを提供するモデル","NTT東西と光コラボ事業者が建設・維持コストを50:50で折半して共同でインフラを整備・運営する合弁事業モデル","光コラボとは既存の電話用メタル回線に光信号変換アダプターを設置することで高速インターネット通信を可能にする技術の名称"],"ans":0,"exp":"光コラボ（光コラボレーション）はNTT東西が光回線（フレッツ光）をISP事業者に卸価格で提供し（卸電気通信役務）、そのISP事業者がエンドユーザーに回線とプロバイダをセットで提供するサービスモデル。2015年2月から開始。"},{"id":"A052","cat":"A","diff":1,"q":"「光コラボ」のメリットとして正しいのはどれか？","choices":["光コラボを使うとIPv4 over IPv6（IPv6サービス）が自動的に無料になる","フレッツ光（NTT直販）より通信速度が必ず速い（規定上は専用優遇仕様による運用と判断する）","NTT東西とプロバイダへの2本の請求が1本に一本化され、料金管理がシンプルになる","光コラボはプロバイダを自由に変更できる（規定上は事業者変更扱いの手続きで対応可能と判断する）"],"ans":2,"exp":"光コラボのメリットは「請求の一本化」。フレッツ光（NTT直販）では回線料をNTT東西へ、プロバイダ料を別途支払う2本請求になるが、光コラボは1社に支払うだけで済む。またスマホとのセット割が使える点も大きなメリット。"},{"id":"A053","cat":"A","diff":1,"q":"「光コラボ」に転用した後、物理的な光ファイバー回線（アクセスライン）はどうなるか？","choices":["切替処理の間だけ一時的に無線回線で代替接続されその後光回線に戻る","光コラボ事業者の設備に合わせた新しい光ファイバーに物理的に交換される","以前のフレッツ光と全く同じ光ファイバーをそのまま使い続ける","光コラボ事業者が独自に敷設した専用光ファイバーに物理的に切り替わる"],"ans":2,"exp":"光コラボへの転用はあくまで契約形態・請求形態の変更であり、物理的な光ファイバー（NTT東西のアクセスライン）は転用前後で全く変わらない。そのため転用は原則工事不要で完了する。"},{"id":"A054","cat":"A","diff":2,"q":"「光コラボの事業者変更」で工事が不要な理由として正しいのはどれか？","choices":["光コラボ事業者同士が協定に基づき互いの工事を代行する取り決めがあるため（規定上の運用と判断する取扱）","NTT東西が競争促進の観点から光コラボ間の工事実施を法令で禁止しているため（規定上の運用と判断する取扱）","光コラボ事業者が事業者変更に伴う工事費をすべて全額負担する制度があるため（規定上の運用と判断する取扱）","光コラボ間の乗り換えはNTT東西の設備上での論理的な切替のみであり、物理的なアクセスラインが変わらないため"],"ans":3,"exp":"光コラボ同士の「事業者変更」はNTT東西のシステム上での契約切替処理のみで完結する。物理的な光ファイバーやONUはそのまま使い続けるため工事員の派遣が不要（原則無派遣）。"},{"id":"A055","cat":"A","diff":2,"q":"「光コラボ」と「auひかり」を比較したとき、アクセスラインの違いとして正しいのはどれか？","choices":["光コラボもauひかりもどちらもNTT東西の光ファイバー設備を使っており、アクセスライン上の違いは存在しない","光コラボはNTT東西の光ファイバー、auひかりはKDDIが独自に構築した回線（ダークファイバー等）を使う","auひかりはフレッツ光の法人向けブランド名であり、アクセスラインはフレッツ光と同一のNTT東西設備を使用している","auひかりはNTT東西の設備を使いつつKDDIが独自運用するため通信品質がSLA（品質保証）で保証されており光コラボより速い"],"ans":1,"exp":"光コラボ（ドコモ光・SoftBank光・andline光SE等）はNTT東西のフレッツ光アクセスラインを使う。auひかりはKDDI独自のネットワーク（ダークファイバー等）を使うため、事業者変更制度の対象外。乗り換えには工事が必要。"},{"id":"A056","cat":"A","diff":3,"q":"「光コラボのプロバイダ変更」について正しいのはどれか？","choices":["光コラボはどの事業者も回線とプロバイダが一体のため、プロバイダのみの変更は一切できない","プロバイダ変更の可否は事業者次第で、ドコモ光は複数提携ISPから選べるため変更できる","光コラボのプロバイダ変更にはNTT東西が発行する転用承諾番号の取得が必須となる","光コラボはプロバイダ変更のたびに開通工事が必要で、数日の通信断が発生する"],"ans":1,"exp":"光コラボのプロバイダ変更可否は事業者によって異なる。ドコモ光のように複数の提携プロバイダ（タイプA/B）から選べる事業者では、ドコモ光の契約はそのままにプロバイダのみを変更できる（事務手数料3,300円・工事不要）。一方、SoftBank光やandline光SEのように単一ISPと一体型の事業者では、プロバイダのみの変更はできず、別の光コラボへの事業者変更が必要になる。"},{"id":"A057","cat":"A","diff":2,"q":"「光コラボ」の「事業者変更承諾番号」の発行手数料について正しいのはどれか？","choices":["2022年7月以降は新規申込者に対して無料","手数料は事業者によって異なる（規定上の運用）","1件3,300円（税込）の発行手数料が必要","1件11,000円（税込）の発行手数料"],"ans":0,"exp":"事業者変更承諾番号の発行手数料は2022年7月以降の新規申込者に対して無料化された。以前は事業者によって費用が発生していた。有効期限は15日間で、この期間内に新事業者への申し込みを完了させる必要がある。"},{"id":"A058","cat":"A","diff":1,"q":"「光コラボのプロバイダ名」に「光」がついている（例：ドコモ光・SoftBank光・楽天ひかり）のはなぜか？","choices":["光回線の速度の速さを視覚的にアピールするためのマーケティング上の命名ルール（規定上の運用と判断する取り扱い）","各社がNTTから独立して自社の光ファイバー網を保有していることを示すブランド戦略（規定上の運用と判断する取扱）","光コラボ事業者がNTT東西のフレッツ光回線と自社のプロバイダサービスをセット提供するサービスに「光」を冠しているため","NTT東西がすべての光コラボ事業者に対してサービス名に「光」を含めるよう義務付けているため（規定上の運用と判断する）"],"ans":2,"exp":"光コラボ各社（ドコモ光・SoftBank光・andline光SE等）はNTT東西のフレッツ光を卸受けしてプロバイダとセットで提供するサービスに独自ブランド名をつけている。物理的な回線はどれも同じNTT東西のアクセスライン。"},{"id":"A059","cat":"A","diff":2,"q":"「光コラボ」利用中に「転用承諾番号」は必要か？","choices":["光コラボ利用中でも転用承諾番号が必要でNTT東西ではなくドコモショップで取得できる（規定上の運用と判断する取り扱い）","転用承諾番号も事業者変更承諾番号もどちらも同じ番号で兼用できる仕組みになっている（規定上の運用と判断する取扱）","転用承諾番号はフレッツ光（NTT直販）→光コラボへの転用時に必要。光コラボ→光コラボへの乗り換えは「事業者変更承諾番号」を使う","光コラボ利用中の乗り換えには転用承諾番号が必要でandlineのサポートから取得する（規定上の運用と判断する取り扱い）"],"ans":2,"exp":"転用承諾番号はフレッツ光（NTT直販）→光コラボへの切替時のみ使う（有効15日）。光コラボ→光コラボへの乗り換えは「事業者変更承諾番号」（有効15日）を使う。取得先も異なる（転用はNTT東西、事業者変更は現在の光コラボ事業者）。"},{"id":"A060","cat":"A","diff":2,"q":"「光コラボ」の代表的なサービス名として正しいのはどれか？","choices":["ドコモ光・SoftBank光・andline光SE・楽天ひかり","NURO光・J:COM NET・イッツコム","フレッツ光ネクスト・フレッツ光クロス","auひかり・eo光・コミュファ光"],"ans":0,"exp":"光コラボの代表例はドコモ光・SoftBank光・andline光SE・楽天ひかり・@nifty光・BIGLOBE光等。auひかりはKDDI独自回線（光コラボではない）、eo光は電力系独自回線、NURO光はダークファイバー系独自回線、フレッツ光はNTT直販で光コラボではない。"},{"id":"G071","cat":"G","diff":2,"q":"「ドコモ光」と「andline光SE」の最大の違いとして正しいのはどれか？","choices":["どちらもNTTフレッツ光コラボでブランド名が違うだけで中身は同じサービスだ","andline光SEではIPv6サービスが月額オプション扱いだがドコモ光は無料で使える","andline光SEはKDDI独自回線でドコモ光はNTT回線という違いがある","ドコモ光はドコモスマホとのセット割があるがandline光SEにはセット割がない"],"ans":3,"exp":"ドコモ光とandline光SEはどちらもNTTフレッツ光を使う光コラボで物理インフラは同じ。最大の違いはドコモ光にはドコモスマホとのセット割（最大1,100円/月）があるのに対し、andline光SEにはスマホセット割がない点。andline光SEは縛りなし・解約金なし・低月額が強みで、ドコモスマホを多く持つ家族にはドコモ光が有利な場合もある。"},{"id":"G072","cat":"G","diff":2,"q":"「ドコモ光」と「SoftBank光」の最大の違いとして正しいのはどれか？","choices":["どちらもNTTフレッツ光を使う光コラボだがIPv4 over IPv6（IPv6サービス）の方式が異なる（ドコモ光はプロバイダ依存、SoftBank光はBBIX独自方式）","SoftBank光はKDDIが敷設・管理する独自光ファイバー回線を利用しており、NTT系光コラボ間の事業者変更制度の適用対象外のため乗り換えには工事が必要になる","ドコモ光はNTT東西から取得した総務省認定の回線品質保証（SLA）を契約に含んでいるためSoftBank光より安定性が高く、その分必ず月額料金が高く設定されている","両サービスはNTTフレッツ光を共通基盤として使っており、ブランド名と対象キャリアのみが異なるだけで通信技術仕様・月額料金・VNE方式まですべて完全に同一だ"],"ans":0,"exp":"ドコモ光はプロバイダによってVNE（v6プラス・OCNバーチャルコネクト等）が異なり市販対応ルーターが使える。SoftBank光はBBIXの独自方式（IPv6高速ハイブリッド・光BBユニット専用）でv6プラス対応ルーターは使えない。IPv4 over IPv6（IPv6サービス）の仕組みが根本的に異なる。"},{"id":"G073","cat":"G","diff":2,"q":"「andline光SE」のメリットとして他の大手光コラボとの比較で最も特徴的なのはどれか？","choices":["andline光SEは光コラボの中で唯一JPIXのv6プラスに対応しており、他社では利用できない専用接続方式が使える","andline光SEは10ギガプランを他社より低遅延・高速の独自NGN設備で提供しており、速度比較で常に上位に位置している","縛りなし・解約金なし・月額が安い（戸建て4,600円・マンション3,500円）の三拍子が揃っている","andline光SEはNTTドコモとの公式提携によりドコモスマートフォンとのセット割引が最大1,100円/月適用される"],"ans":2,"exp":"andline光SEの最大の特徴は「縛りなし（最低利用期間なし）・解約金なし・月額の安さ（戸建て4,600円・マンション3,500円）」の組み合わせ。ドコモ光・SoftBank光は2年縛りと解約金があり月額も高め。まず試してみたいユーザーに向いている。"},{"id":"G074","cat":"G","diff":3,"q":"「ドコモ光 定期契約なし」プランの戸建て月額料金として正しいのはどれか？","choices":["月額4,400円（タイプA・マンション同等料金）","月額7,370円（タイプA・定期契約なし）","月額9,900円（タイプB・割引適用なし）","月額5,720円（タイプA・2年定期と同額）"],"ans":1,"exp":"ドコモ光タイプA・戸建て・定期契約なしは月額7,370円（税込）。2年定期契約（5,720円）と比べて月額1,650円も高くなる。長期利用前提なら2年定期契約の方が大幅に安い。"},{"id":"G075","cat":"G","diff":3,"q":"「ドコモ光」の「単独タイプ」の特徴として正しいのはどれか？","choices":["スマートフォンとのセット契約が必須条件で、単独タイプはドコモスマホなしでは申し込みができないプランになっている","ドコモ光回線のみでプロバイダは別途個別に契約が必要。月額はタイプA/Bより安いが別途プロバイダ料金が必要","ドコモ光単独タイプはセット割の適用対象外とされており、ドコモスマホとセットにしても割引が一切受けられない","プロバイダがあらかじめ含まれた最安プランで、タイプA/Bより月額が低くプロバイダの追加契約も不要になっている"],"ans":1,"exp":"ドコモ光単独タイプはプロバイダ料金が含まれない回線のみのプラン（マンション2年定期：4,180円）。タイプA/Bより月額は安いが別途プロバイダ料金が発生するため合計コストはタイプA/Bより高くなることが多い。ドコモ光セット割は適用可能。"},{"id":"G076","cat":"G","diff":3,"q":"「andline光SEからドコモ光（タイプA）に乗り換える理由」として最もよくある動機はどれか？","choices":["ドコモ光はandline光SEと異なり解約金がないため乗り換えコストが低い（規定上の運用と判断する取り扱い上のルール）","andline光SEの通信速度や安定性への不満が主な乗り換え動機になっている（規定上の運用と判断する取り扱い上のルール）","andline光SEはIPv4 over IPv6（IPv6サービス）に非対応のため速度改善を求めて乗り換える","ドコモのスマートフォンを複数台持っており、ドコモ光セット割（最大1,100円/月×台数）の方がトータルで安くなる場合があるため"],"ans":3,"exp":"andline光SEからドコモ光に乗り換える主な動機は「ドコモ光セット割」。ドコモスマホが多い家族ほどセット割（最大1,100円/月×台数）の恩恵が大きく、月額の差額を逆転することがある。ただしドコモ光は2年縛り・解約金ありの点に注意。"},{"id":"G077","cat":"G","diff":3,"q":"「フレッツ光（NTT直販）からandline光SEに転用」か「ドコモ光に転用」かの選択で重要な基準はどれか？","choices":["接続時に使用するONUの機種が異なるため対応サービスを確認する必要がある（規定上の運用と判断する取り扱い上のルール）","ドコモのスマホを持っているか（セット割）と縛りなし・解約金なしを重視するか（andline光SE）のどちらを優先するかが判断基準","転用手続きにかかる手数料がandline光SEとドコモ光で異なることが判断基準になる（規定上の運用と判断する取り扱い上のルール）","NTT東西の光ファイバーの品質がandline光SEとドコモ光で異なるため確認が必要だ（規定上の運用と判断する取り扱い上のルール）"],"ans":1,"exp":"フレッツ光からの転用先選択では①ドコモスマホを多く持っていてセット割を最大化したい→ドコモ光②縛りなし・解約金なし・低月額を重視する→andline光SEが基本的な判断基準。どちらもフレッツ光系光コラボのため物理インフラは同じ。"},{"id":"B110","cat":"B","diff":2,"q":"「SoftBank光のIPv4 over IPv6（IPv6サービス）」に必要な機器として正しいのはどれか？","choices":["v6プラスまたはOCNバーチャルコネクト対応の一般市販Wi-Fiルーターで利用できる","ソフトバンクが提供する「光BBユニット」のみ対応（市販ルーターは使えない）","特別な機器は不要でONUに直接接続するだけでIPv4 over IPv6が自動で有効になる","transix（DS-Lite）対応の市販Wi-Fiルーターであれば機種を問わず利用可能だ"],"ans":1,"exp":"SoftBank光のIPv4 over IPv6（IPv6サービス）はBBIXの「IPv6高速ハイブリッド」方式で、ソフトバンクが提供する「光BBユニット」専用。v6プラスやtransix等の一般的な市販対応ルーターは使えない。SoftBank光で市販ルーターを使うとPPPoE接続になる。"},{"id":"B111","cat":"B","diff":2,"q":"「楽天ひかりのIPv4 over IPv6（IPv6サービス）」で採用しているVNEとして正しいのはどれか？","choices":["JPIX（v6プラス・MAP-E）","BBIX（IPv6高速ハイブリッド・IPIP）","インターネットマルチフィード（transix・DS-Lite）","アルテリア・ネットワークス（クロスパス・DS-Lite）"],"ans":3,"exp":"楽天ひかりはアルテリア・ネットワークスが提供するクロスパス（Xpass）をVNEとして採用。IPv4 over IPv6（IPv6サービス）の方式はDS-Lite（可変IP）または固定IPの場合はIPIPトンネリング。クロスパス対応ルーターが必要。"},{"id":"B112","cat":"B","diff":2,"q":"「IIJmioひかりのIPv4 over IPv6（IPv6サービス）」で採用しているVNEとして正しいのはどれか？","choices":["インターネットマルチフィード（transix・DS-Lite）","JPIX（v6プラス・MAP-E方式・規定上の運用）","アルテリア・ネットワークス（クロスパス・DS-Lite）","NTTドコモビジネス（OCNバーチャルコネクト・MAP-E）"],"ans":0,"exp":"IIJmioひかりはインターネットマルチフィード（IIJも株主）のtransix（DS-Lite方式）を採用したIPv4 over IPv6（IPv6サービス）を提供。transix対応ルーターが必要。DS-Liteのためポート開放はできない。"},{"id":"B113","cat":"B","diff":2,"q":"「@nifty光のIPv4 over IPv6（IPv6サービス）」で採用しているVNEとして正しいのはどれか？","choices":["アルテリア・ネットワークス（クロスパス・DS-Lite）","インターネットマルチフィード（transix・DS-Lite）","BBIX（IPv6高速ハイブリッド）","JPIX（v6プラス・MAP-E）"],"ans":3,"exp":"@nifty光はJPIXのv6プラス（MAP-E方式）を採用。v6プラス対応ルーターで利用可能。andline光SE・SoftBank光・ドコモ光の一部プロバイダと同じVNEのため、同じv6プラス対応ルーターが使える。"},{"id":"B114","cat":"B","diff":3,"q":"「v6プラス（JPIX）」と「transix（インターネットマルチフィード）」の最大の違いとして正しいのはどれか？","choices":["v6プラスはJPIXが全国に配備するサーバー数がtransixより多く処理能力が高いため、transixと比較した実効通信速度が常に2〜3倍程度速くなる傾向がある","v6プラスはMAP-E方式（NATをルーター側で処理・ポート範囲内での開放可）、transixはDS-Lite方式（NATをVNE側で処理・ポート開放不可）","v6プラスはDS-Lite方式を採用していてNATの処理をVNE事業者のサーバー側で行い、transixはMAP-E方式でNATをルーター側で処理するという根本的な違いがある","v6プラスとtransixはどちらもJPIXが提供するIPv6サービスでブランド名の違いだけであり、技術仕様・速度・対応ルーターはまったく同一だ"],"ans":1,"exp":"v6プラスはMAP-E方式でNATをルーター側で処理。割り当てポート範囲内での限定的なポート開放が可能。transixはDS-Lite方式でNATをVNE（クラウド）側で処理。ポート開放が一切できない代わりに設定が簡単。この違いがゲームやサーバー運用で重要になる。"},{"id":"B115","cat":"B","diff":3,"q":"「OCNバーチャルコネクト（NTTドコモビジネス提供）」の方式として正しいのはどれか？","choices":["DS-Lite方式（IPv4 over IPv6のトンネリング技術の一種）","PPPoE方式の改良版（PPPoE+IPoEのハイブリッド型）","MAP-E方式（v6プラスと同じプロトコルだが実装が異なる）","IPIP方式（IPv4 over IPv4の独自プロトコル）"],"ans":2,"exp":"OCNバーチャルコネクトはv6プラスと同じMAP-E方式だが、IPアドレス・ポート番号の割り当てルールの実装が異なる。そのためv6プラス対応のみのルーターではOCNバーチャルコネクト環境では動作しないケースがある。ルーター選定時は両方の対応確認が必要。"},{"id":"B116","cat":"B","diff":3,"q":"次のVNEサービスのうち「ポート開放が可能（割り当て範囲内）」なのはどれか？","choices":["OCNバーチャルコネクト（MAP-E）は完全にポート開放不可","v6プラス（MAP-E）","クロスパス可変IP版（DS-Lite）","transix（DS-Lite）"],"ans":1,"exp":"MAP-E方式（v6プラス・OCNバーチャルコネクト）はNATをルーター側で処理するため、割り当てられたポート番号の範囲内でのポート開放が可能。DS-Lite方式（transix・クロスパス可変IP版）はNATをVNE側で処理するため完全にポート開放不可。"},{"id":"B117","cat":"B","diff":3,"q":"「SoftBank光のBBIX・IPv6高速ハイブリッド」の方式として正しいのはどれか？","choices":["DS-Lite方式（光BBユニット不要）","MAP-E（v6プラスと共通方式）","v6プラスと同じMAP-E独自方式","IPIP独自方式（光BBユニット専用）"],"ans":3,"exp":"SoftBank光のBBIX・IPv6高速ハイブリッドはMAP-EでもDS-LiteでもなくIPIP独自方式。ソフトバンクが提供する光BBユニット専用に設計されており、市販のv6プラス・transix対応ルーターでは利用できない。SoftBank光独自の制約として覚える。"},{"id":"B118","cat":"B","diff":3,"q":"「VNEサービスを比較したとき、固定IPオプションを使う場合の共通の方式」として正しいのはどれか？","choices":["固定IPオプションを契約してもMAP-E方式のままで固定アドレスが割り当てられる仕組みだ（規定上の運用と判断する取り扱い上の特例ルール）","固定IPオプション（v6プラス固定IP・クロスパス固定IP・transix固定IP等）はいずれもIPIPトンネリング方式に切り替わり専用グローバルIPが付与される","固定IPオプションに申し込むとVNEがDS-Lite方式に自動的に切り替わる仕組みになっている（規定上の運用と判断する取り扱い上の特例措置）","VNEサービスによって固定IPの提供方式は完全にバラバラで共通点はまったく存在しない（規定上は事業者ごとの個別運用と判断する取り扱い上の特例）"],"ans":1,"exp":"v6プラス・クロスパス・transixどのVNEの固定IPオプションも、通常のMAP-E/DS-Lite方式からIPIPトンネリング方式に切り替わり、専用のグローバルIPv4アドレスが1つ割り当てられる。全ポートが使用可能になりポート開放制限がなくなる。"},{"id":"B119","cat":"B","diff":2,"q":"「enひかりのIPv4 over IPv6（IPv6サービス）」の特徴として他の光コラボと大きく異なる点はどれか？","choices":["SoftBank光と同様にBBIXの光BBユニットが必須でないと接続できない仕様になっている","enひかりはIPv4 over IPv6（IPv6サービス）に現時点では非対応でPPPoEのみ提供している","VNEをv6プラス（MAP-E）とtransix（DS-Lite）の2種類から選択・切り替えできる珍しい光コラボ","enひかりはJPIXとは別に自社開発の独自VNEサービスを保有して運営している"],"ans":2,"exp":"enひかりはv6プラス（JPIX・MAP-E）とtransix（インターネットマルチフィード・DS-Lite）の2種類のVNEから選択・切り替えができる珍しい光コラボ。他社は基本的にVNEが固定されており選べない。ゲーム用途（MAP-E・ポート開放）か安定重視（DS-Lite）かで選べる。"},{"id":"B120","cat":"B","diff":2,"q":"「v6プラス（MAP-E）」に対応したルーターを選ぶ際に重要な確認事項はどれか？","choices":["ルーターのメーカーがNTT東西またはNTTグループ傘下のブランドであるNTT-ATの認定製品であること","LANポートが4ポート以上ありすべてのポートが1Gbpsのギガビットイーサネットに対応していること","Wi-Fi 6（802.11ax）以上の最新規格で2.4GHz/5GHzデュアルバンドに対応したルーターであること","JPIXまたはプロバイダの公式動作確認済みリストに掲載されているv6プラス対応ルーターを選ぶこと"],"ans":3,"exp":"v6プラス対応ルーターの選定ではJPIXまたはプロバイダの公式動作確認済みリストを確認することが最重要。「IPv6対応」と表記されていてもv6プラス（MAP-E）の実装に対応していない機器がある。OCNバーチャルコネクトとv6プラスはどちらもMAP-Eだが実装が異なりルーター選定は別途必要。"},{"id":"C071","cat":"C","diff":1,"q":"「派遣工事」と「無派遣工事」の違いとして正しいのはどれか？","choices":["工事担当者が自宅を訪問してONU設置・配線作業を行う工事","無料で行われるのが派遣工事で有料なのが無派遣工事","派遣工事は平日のみで無派遣工事は土日祝も対応可能","NTTが担当するのが派遣工事で光コラボが担当するのが無派遣工事"],"ans":0,"exp":"派遣工事は工事担当者が自宅を訪問してONU設置・配線作業を行う。無派遣工事は局内の設定切り替えのみで完了し、お客様がONUをセルフ設置する形になる。"},{"id":"C072","cat":"C","diff":1,"q":"光回線の「戸建てプラン」と「マンションプラン」の月額料金の違いとして正しいのはどれか？","choices":["一般的に戸建ての方がマンションより月額料金が高い","マンションの方が戸建てより月額料金が高い","戸建てとマンションの月額料金は同額である","マンションは工事費が戸建ての2倍になる"],"ans":0,"exp":"一般的に戸建て（ファミリータイプ）はマンション（マンションタイプ）より月額料金が高い。宅内工事の規模やインフラ整備コストの違いが料金差に反映されている。"},{"id":"C073","cat":"C","diff":1,"q":"光回線の「転用」手続きでお客様が最初に行う操作として正しいのはどれか？","choices":["NTT東西のマイページで転用承諾番号を発行する","光コラボ事業者に電話して転用を直接依頼する","先にフレッツ光の解約手続きを完了させる","現在のプロバイダに転用の許可をもらう"],"ans":0,"exp":"転用はまずNTT東西のマイページ（またはお客様センター）にアクセスして転用承諾番号を取得する。その番号を光コラボ事業者に提示することで転用手続きが進む。"},{"id":"C074","cat":"C","diff":1,"q":"光回線の「開通工事」当日、お客様が必ず準備しておくこととして正しいのはどれか？","choices":["工事時間帯に在宅して担当者を迎える準備をする","前日までにONUを自分で先に設置しておく","工事終了後にマンション管理会社へ連絡する","工事費を現金で当日に手渡しできるよう準備する"],"ans":0,"exp":"派遣工事では工事担当者が宅内に入って作業するため、指定の工事時間帯に在宅が必須。不在の場合は工事ができず日程を再調整することになる。"},{"id":"C075","cat":"C","diff":1,"q":"「ONU（回線終端装置）」は通常誰の所有物か？","choices":["NTT東西が所有しお客様はレンタルして使用する","お客様が工事費とは別に購入して所有する","光コラボ事業者が所有して管理している","工事担当者が持参して置いていく消耗品扱い"],"ans":0,"exp":"ONUはNTT東西が所有する機器であり、お客様はレンタルして利用する。解約時には原則返却は不要だが、機器の種類によっては返却を求められることもある。"},{"id":"C076","cat":"C","diff":1,"q":"光回線の「月額料金の発生開始日」として正しいのはどれか？","choices":["開通工事が完了した開通日から月額料金が発生する","申し込みを完了した当日から月額料金が発生する","初回の請求は開通した翌月の1日から発生する","工事費の支払いが完了した日から月額料金が始まる"],"ans":0,"exp":"光回線の月額料金は開通工事が完了した開通日から発生する。申し込み日ではなく開通日が起算点のため、工事が遅れても申し込み日からの請求はない。"},{"id":"C077","cat":"C","diff":1,"q":"フレッツ光（NTT直販）からandline光SE（光コラボ）に乗り換える手続きの名称として正しいのはどれか？","choices":["転用","事業者変更手続き","新規工事の申し込み","解約後の再契約申請"],"ans":0,"exp":"フレッツ光（NTT直販）から光コラボへの乗り換えは「転用」と呼ぶ。物理的な光ファイバー（アクセスライン）はそのままで、管理事業者がNTT東西から光コラボ事業者に変わる。"},{"id":"C078","cat":"C","diff":1,"q":"光コラボ間の乗り換え（例：
